ức.&lt;SEP&gt;BlueSam là nhóm gồm ba chàng trai đam mê công nghệ, tham gia cuộc thi và đạt giải với ứng dụng “Push up – Luyện tập chống đẩy”.&lt;SEP&gt;BlueSam là nhóm tham gia vòng chung kết sau khi ban tổ chức lựa chọn.\nsource_id: chunk-b9e8ed58af89314115793a4be3ade25d&lt;SEP&gt;chunk-14bb4091aa4c61ca027007392568a24c\nfile_path: ..\\..\\data\\data_1000_chunk_512.json\ncreated_at: 1775576427", "group": "organization", "value": 12}, {"id": 3, "label": "Bùi An Huy", "title": "entity_id: Bùi An Huy\nentity_type: person\ndescription: Bùi An Huy là người nhận bằng khen và học bổng từ PGS.TS. Nguyễn Hoàng Hải.&lt;SEP&gt;Bùi An Huy là thí sinh đỗ vào Trường Đại học Công nghệ, đạt 133/150 điểm và trở thành thủ khoa kỳ thi Đánh giá năng lực của ĐHQGHN năm 2023.\nsource_id: chunk-1a6c662a8d1adf5169acc0ae19d39853&lt;SEP&gt;chunk-4440115afa5843410dc649af96d1e531\nfile_path: ..\\..\\data\\data_1000_chunk_512.json\ncreated_at: 1775534112", "group": "person", "value": 12}, {"id": 4, "label": "Chương trình trao đổi sinh viên", "title": "entity_id: Chương trình trao đổi sinh viên\nentity_type: event\ndescription: Chương trình trao đổi sinh viên được nêu là hoạt động IMEC có thể phối hợp triển khai để sinh viên các trường đại học Việt Nam sang học tập ngắn hạn.&lt;SEP&gt;Chương trình trao đổi sinh viên giữa một số ngành được nêu là nội dung trong định hướng hợp tác.&lt;SEP&gt;Chương trình trao đổi sinh viên tại Đại học Kyushu, Nhật Bản dành cho người học của Trường Đại học Công nghệ, có học kỳ mùa Thu trong năm 2024.\nsource_id: chunk-6a99e66233571a9dda7e3dfa2ef0ab28&lt;SEP&gt;chunk-40776dff6ef683e25f5af67abc07f01e&lt;SEP&gt;chunk-65acb19f7ebb99a4adf05d8ebe9f1fab\nfile_path: ..\\..\\data\\data_1000_chunk_512.json\ncreated_at: 1775554802", "group": "event", "value": 12}, {"id": 5, "label": "Chương trình trao đổi sinh viên/học viên kỳ mùa Xuân năm 2025", "title": "entity_id: Chương trình trao đổi sinh viên/học viên kỳ mùa Xuân năm 2025\nentity_type: chương_trình_đào_tạo\ndescription: Chương trình trao đổi sinh viên/học viên kỳ mùa Xuân năm 2025 tại Đại học Kyushu, Nhật Bản, được thông báo bởi công văn của Đại học Quốc gia Hà Nội.\nsource_id: chunk-512e8885451bdbb210cf433ce1caed13\nfile_path: ..\\..\\data\\data_1000_chunk_512.json\ncreated_at: 1775575785", "group": "chương_trình_đào_tạo", "value": 12}, {"id": 6, "label": "Chương trình đào tạo", "title": "entity_id: Chương trình đào tạo\nentity_type: chương_trình_đào_tạo\ndescription: Chương trình đào tạo là đối tượng trong công tác tuyển sinh/đào tạo do đơn vị đào tạo xác định và gắn với kế hoạch tuyển sinh của đơn vị. Chương trình đào tạo bao gồm các yếu tố như tổ hợp xét tuyển và chỉ tiêu tuyển sinh, qua đó phản ánh phạm vi điểm trúng tuyển được xét theo các phương thức tuyển sinh khác nhau. Đây là căn cứ để đơn vị lập kế hoạch xét tuyển, công bố các điều kiện đăng ký, điểm trúng tuyển và danh sách thí sinh trúng tuyển theo quy định của đơn vị đào tạo và ĐHQGHN; đồng thời trong quản lý đăng ký nguyện vọng, thí sinh phải đáp ứng đầy đủ điều kiện của chương trình đào tạo để được đăng ký. Trước thời điểm kết thúc đăng ký dự tuyển ít nhất 10 ngày, đơn vị đào tạo phải xác định và công bố ngưỡng đầu vào của chương trình. Chương trình đào tạo cũng được nêu trong đề án tuyển sinh và được gán mã số quy ước thống nhất trong đơn vị để định danh, quản lý. Về mặt cấu trúc, chương trình đào tạo có thể được thiết kế với chỉ tiêu riêng theo từng phương thức xét tuyển hoặc theo từng tổ hợp xét tuyển đối với một nhóm ngành/ngành; có thể quy định sử dụng đồng thời một số tổ hợp môn, bài thi/môn thi chính nhân hệ số và các điều kiện phụ. Chương trình đào tạo là cơ sở để xác định các chương trình đủ điều kiện trúng tuyển và là đối tượng để thí sinh xác định nguyện vọng ưu tiên; đồng thời liên quan đến việc báo cáo điểm trúng tuyển trước khi công bố kết quả và khi xác định danh sách thí sinh trúng tuyển phải bảo đảm không vượt quá chỉ tiêu được giao. Ngoài ra, chương trình đào tạo có thể được mô tả dưới nhiều hình thức như chuẩn, chất lượng cao và nhiệm vụ chiến lược; có thể xuất hiện ở cấp “chương trình đào tạo tiến sĩ chuyên ngành Hệ thống thông tin” với thông tin về chuyên ngành và mục tiêu đào tạo. Chương trình đào tạo cũng có thể được định hướng theo mô hình bảo đảm chất lượng và chuẩn đầu ra cao hơn CTĐT đại trà, có phối hợp giữa Nhà trường và doanh nghiệp, nhấn mạnh kỹ năng mềm và kỹ năng trong cuộc sống, đồng thời mời chuyên gia công nghệ từ đối tác doanh nghiệp tham gia giảng dạy. Theo một hướng mô tả mục tiêu khác, chương trình đào tạo hướng đến đào tạo các nhà thiết kế, đồ họa và các công trình sư, tổng công trình sư, được chuẩn bị trong khoảng 3 năm. Đồng thời, các mô tả cho thấy chương trình đào tạo có sự gắn kết và đồng hành của doanh nghiệp và viện nghiên cứu trong hoạt động đào tạo. Chương trình đào tạo/giải pháp đào tạo cũng có thể được thể hiện thông qua việc xây dựng giáo trình đào tạo và sử dụng hiệu quả trong công tác đào tạo kỹ sư.\nsource_id: chunk-3f8b3d332cf0c347e8de3d57dc270374&lt;SEP&gt;chunk-ca3d17d3c1f7fff2b4d41619bb94314f&lt;SEP&gt;chunk-a7392502acc92bb128d9d5a2c2c018b8&lt;SEP&gt;chunk-0d6008bd889a0ebc91d42d3a06f83f83&lt;SEP&gt;chunk-ffb1cfd0c23e7fa4206abe42c582cc74&lt;SEP&gt;chunk-bf836ea6db4d8badfb97990a59aa4543&lt;SEP&gt;chunk-cf425f7ca685593f88901f2f6d924893&lt;SEP&gt;chunk-6e093dcd458c3b7ddd3b4b61730ddfcd&lt;SEP&gt;chunk-18679ecca078f74da86923a647f33b04&lt;SEP&gt;chunk-c482f693ef8c5985db5d7021905a1633&lt;SEP&gt;chunk-997ff671382169a218710deb2964b40a&lt;SEP&gt;chunk-34684aec0d79f3237acdda225af3e906&lt;SEP&gt;chunk-5ef7502b5fff13cfaf706ccf8f094af6&lt;SEP&gt;chunk-cd46703dc1b9c9f1429ca6a08b6faddc&lt;SEP&gt;chunk-1827c42b382a75d980b95a9e2a91b882&lt;SEP&gt;chunk-45910d993033c9d7b48633e1fd8dea6e&lt;SEP&gt;chunk-e95474548797126e22f1ff419766e65f&lt;SEP&gt;chunk-4b7fbb9536d4e17a52df1a87aa1e10a9&lt;SEP&gt;chunk-f76ad378d5647d674585cd166cb0bd01&lt;SEP&gt;chunk-efa98f08730928450460d7950d4a8f5b\nfile_path: ..\\..\\data\\quyet_dinh_1328_chunks.json&lt;SEP&gt;..\\..\\data\\data_1000_chunk_512.json\ncreated_at: 1775575963", "group": "chương_trình_đào_tạo", "value": 16}, {"id": 7, "label": "Chử Đức Trình", "title": "entity_id: Chử Đức Trình\nentity_type: person\ndescription: Chử Đức Trình được nêu là GS.TS tham gia trình bày xêminar tổng quan về lĩnh vực nghiên cứu của mình và nhận lời chúc mừng từ các phòng chức năng.&lt;SEP&gt;Chử Đức Trình giữ chức vụ Hiệu trưởng Nhà trường và ghi nhận, tiếp thu các khuyến nghị, đề xuất từ Đoàn ĐGN.&lt;SEP&gt;Chử Đức Trình được nêu kèm ký hiệu PGS.TS, thể hiện vai trò chuyên môn/học hàm học vị trong danh sách.&lt;SEP&gt;Chử Đức Trình là người được nhắc đến trong bối cảnh phát biểu chỉ đạo tại đại hội và là Phó Bí thư Đảng ủy, Phó Hiệu trưởng Nhà trường.&lt;SEP&gt;Chử Đức Trình là Hiệu trưởng Trường Đại học Công nghệ và ký thỏa thuận hợp tác giữa các bên.&lt;SEP&gt;GS.TS Chử Đức Trình là Hiệu trưởng Trường ĐH Công nghệ, phát biểu tại buổi gặp mặt và gửi lời chúc sức khỏe, cảm ơn đóng góp của TS. Trần Mậu Danh.\nsource_id: chunk-d62c693997b57f941e6cbe4a1db996c0&lt;SEP&gt;chunk-9a33a9a2cfc8a2bc3454dba98ae02d75&lt;SEP&gt;chunk-0d30a969de11751939272d970c41ac81&lt;SEP&gt;chunk-049cc2e5042c0b7defe6c0e543567198&lt;SEP&gt;chunk-a327cb862a6fa32c514f2b9ff0bdcc04&lt;SEP&gt;chunk-fb4aadc6417463845b5999287f6ab063\nfile_path: ..\\..\\data\\data_1000_chunk_512.json\ncreated_at: 1775560143", "group": "person", "value": 12}, {"id": 8, "label": "Công nghệ thông tin", "title": "entity_id: Công nghệ thông tin\nentity_type: chuyên_ngành\ndescription: Công nghệ thông tin là một nhóm/ngành trong hệ thống phân ngành, đồng thời xuất hiện trong các dữ liệu quản lý tuyển sinh và dữ liệu đào tạo đại học như một ngành cụ thể. Trong dữ liệu tuyển sinh, Công nghệ thông tin được mô tả là ngành xét tuyển có chỉ tiêu theo từng phương thức và theo các tổ hợp xét tuyển; ở mức mã tuyển sinh, ngành này gắn với mã CN1 và thể hiện theo mã ngành 7480201 cùng các thông tin liên quan đến quản lý dữ liệu tuyển sinh, đồng thời được nhắc trong các mô tả về cơ cấu liên quan đến hội đồng tuyển sinh (ví dụ sự gắn kết của một số cán bộ thuộc tiểu ban thư ký HĐTS với cơ cấu ngành). Trong dữ liệu đào tạo bậc đại học, Công nghệ thông tin được liệt kê như một ngành/chuyên ngành kèm các số liệu ghi nhận (300, 318, 306) và tỷ lệ 98.94, liên hệ với các nhóm môn thi Tin học, Toán, Vật lý, Hóa học và Sinh học. Về chương trình và tổ chức đào tạo, Công nghệ thông tin được nêu là thế mạnh kiến thức của nhà trường và được gắn với “07 chương trình đào tạo trình độ đại học được đánh giá chất lượng ngoài”; ngành thuộc khoa/hệ của Trường Đại học Công nghệ và gắn với chi bộ nơi Bí thư là PGS.TS. Phạm Ngọc Hùng. Dữ liệu cũng cho thấy mối liên hệ giữa Công nghệ thông tin và ngành Khoa học máy tính (có nhắc đến Đỗ Quang Thành), và việc ngành được xem như một khoa/trường hợp thuộc Trường Đại học Công nghệ (ví dụ Phạm Thị Minh Trang theo học). Ngoài ra, Công nghệ thông tin xuất hiện trong nhóm kiến thức liên ngành mà ngành Công nghệ nông nghiệp cung cấp.\n\nTrong các mô tả gắn với cá nhân/thí sinh và hoạt động chuyên môn, Công nghệ thông tin được dùng để chỉ ngành học của nhiều đối tượng được ghi nhận trong dữ liệu (như Phạm Đức Anh, Hà Xuân Sơn, Bùi An Huy, Vũ Thanh Thảo, Trương Văn Quốc Bảo, cùng các mô tả về đối tượng theo học tại Trường Đại học Công nghệ). Ngành còn được liên hệ với VNPT Technology như một chuyên ngành/định hướng để đáp ứng yêu cầu vị trí thực tập; đồng thời được xem như một nền tảng công nghệ dùng để xác định nhóm khởi nghiệp trong mục tiêu của chương trình. Công nghệ thông tin cũng được nêu là một trong các ngành có sinh viên, học viên cao học và/hoặc nghiên cứu sinh tốt nghiệp đợt tháng 6/2017, và được mô tả là ngành mà Nguyễn Cẩm Tú từng theo học ở trình độ sinh viên trước khi chuyển sang giảng dạy/hoạt động trong lĩnh vực AI. Ngoài vai trò là ngành trong tuyển sinh và đào tạo, Công nghệ thông tin còn được mô tả như một nhóm lĩnh vực gồm ba nhóm: công nghệ thông tin tiềm năng, kết nối di động và khởi nghiệp.\n\nĐồng thời, trong một số thông báo liên quan, ngành Công nghệ thông tin còn được gắn với chuyên ngành An toàn thông tin.\nsource_id: chunk-cecd038c8741ea822ebb8cf98ca0c7b9&lt;SEP&gt;chunk-c3bd05b9f0cb7ea77b612f19f3be6cd4&lt;SEP&gt;chunk-0ebbeb1004b0f84158b918799ea6ef56&lt;SEP&gt;chunk-c324b92b681c17cdf3eba24ba23d8617&lt;SEP&gt;chunk-a84e71dd8daad2198c69b1cc677aaf37&lt;SEP&gt;chunk-d00320150259439576f8a8d2784f861e&lt;SEP&gt;chunk-73f0943bc53f57e4e794f7b328d9c011&lt;SEP&gt;chunk-b9a846de9322c834018b5a5398c00304&lt;SEP&gt;chunk-d38688f088adf0bd88d1322ade343422&lt;SEP&gt;chunk-74b8343cdf7a8927f39450d6d7741ff3&lt;SEP&gt;chunk-7e9ce05ca09efa2e88367aceb54eed0f&lt;SEP&gt;chunk-4b7fbb9536d4e17a52df1a87aa1e10a9&lt;SEP&gt;chunk-4bc9e0bf150a84ffbe8c3fad9d802a51&lt;SEP&gt;chunk-f541b4deaeb1a76f28afbc3c71d01804&lt;SEP&gt;chunk-4440115afa5843410dc649af96d1e531&lt;SEP&gt;chunk-2d9af0564169f835209174494d7b1fe3&lt;SEP&gt;chunk-cbe1df14348439cf10645c5beb4ce748&lt;SEP&gt;chunk-8e401c23aeb0cca4536cf70fdd86f1cf&lt;SEP&gt;chunk-736f5975fb219222d35c2f61d73cb946&lt;SEP&gt;chunk-b1d594998c1682c2568840c15e1bd189&lt;SEP&gt;chunk-d26244bbe1742d15a52d19e1abee5345&lt;SEP&gt;chunk-117eaab3dfa5e5f9a91072db3eb7c1a2&lt;SEP&gt;chunk-4c58838595d7267790ecbcc9f0400ca9&lt;SEP&gt;chunk-0dc814b89f42b41d76783f0d2bd561d7&lt;SEP&gt;chunk-b62fb9854b005b20d61ed132312a3803&lt;SEP&gt;chunk-f06fe39c3373238f34a2854b4e3b10c9&lt;SEP&gt;chunk-f1789ff64448f1d8a3b458adc3cf17e5\nfile_path: ..\\..\\data\\de_an_2024_chunks.json&lt;SEP&gt;..\\..\\data\\quyet_dinh_1328_chunks.json&lt;SEP&gt;..\\..\\data\\data_1000_chunk_512.json\ncreated_at: 1775574333", "group": "chuyên_ngành", "value": 17}, {"id": 9, "label": "GS.TS Chử Đức Trình", "title": "entity_id: GS.TS Chử Đức Trình\nentity_type: person\ndescription: GS.TS Chử Đức Trình được nêu là Hiệu trưởng Nhà trường, tham dự và phát biểu tại buổi gặp mặt.&lt;SEP&gt;GS.TS Chử Đức Trình là Phó Hiệu trưởng; tham dự Hội thảo và Lễ trao giải.&lt;SEP&gt;Hiệu trưởng nhà trường, trình bày Báo cáo về công tác đào tạo và khoa học công nghệ năm học 2023–2024 tại hội nghị.&lt;SEP&gt;GS.TS Chử Đức Trình là Hiệu trưởng Trường Đại học Công nghệ; được nêu là đại diện phía Trường ĐH Công nghệ tham dự.&lt;SEP&gt;Hiệu trưởng Trường ĐH Công nghệ GS.TS Chử Đức Trình, đánh giá cao hợp tác với ATOLL và bày tỏ mong muốn hai bên sớm ký kết.&lt;SEP&gt;Hiệu trưởng Trường ĐH Công nghệ, tham gia buổi trao đổi và làm việc theo nội dung.&lt;SEP&gt;GS.TS Chử Đức Trình chia sẻ về lợi thế của Việt Nam trong lĩnh vực chip bán dẫn và khẳng định Việt Nam có cơ hội để vươn lên vị trí quốc gia có nền công nghiệp hàng đầu trước khi dân số bước vào giai đoạn dân số già.\nsource_id: chunk-97e68f2fa4575a4b18bae08d56e768e9&lt;SEP&gt;chunk-d95fce5269bba584984947febdcc48f4&lt;SEP&gt;chunk-e54dc90afe47788551038c0c8c5a20b3&lt;SEP&gt;chunk-f0b1eaffa2e2206e0c4c14bd5799a6a5&lt;SEP&gt;chunk-716b876310e7bd2a34de993d66876927&lt;SEP&gt;chunk-63e975c10765e044d994471ee1e0a86f&lt;SEP&gt;chunk-6c479722733a1c425f4db21c07b91c1a\nfile_path: ..\\..\\data\\data_1000_chunk_512.json\ncreated_at: 1775574560", "group": "person", "value": 12}, {"id": 10, "label": "GS.TS. Chử Đức Trình", "title": "entity_id: GS.TS. Chử Đức Trình\nentity_type: person\ndescription: GS.TS. Chử Đức Trình là lãnh đạo của Trường ĐH Công nghệ, được mô tả với vai trò là Hiệu trưởng Nhà trường và/hoặc Phó Hiệu trưởng, đồng thời là Phó Bí thư Đảng ủy. Trong các hoạt động học thuật và hợp tác, ông tham dự các hội thảo/phần việc liên quan từ phía Trường ĐH Công nghệ, đồng thời tham gia trao đổi tại lễ ký kết hợp tác với GS.TS. Chang Seop Koh. Tại buổi lễ ký kết, GS.TS. Chử Đức Trình phát biểu nhấn mạnh rằng lễ ký kết sẽ tạo ra sự hợp tác và đem lại kết quả nghiên cứu khoa học, đào tạo cho cả ba bên. Ở một bối cảnh khác, ông phát biểu tại phiên bế mạc và ghi nhận, tiếp thu các khuyến nghị, đề xuất của Đoàn ĐGN. Ông cũng khẳng định tầm quan trọng của chuẩn đầu ra của chương trình đào tạo (CTĐT). Ngoài ra, GS.TS. Chử Đức Trình được nêu là Phó Bí thư Đảng ủy và Phó Hiệu trưởng Nhà trường khi tham dự Lễ tổng kết các khoa, và còn được nhắc tới với tư cách Phó Bí thư Đảng.&lt;SEP&gt;GS.TS. Chử Đức Trình là người được nêu trong nội dung trao đổi, giữ vai trò Hiệu trưởng Trường Đại học Công nghệ, Đại học Quốc gia Hà Nội (UET-VNU), và trình bày kiến thức về chip bán dẫn cùng các liên quan như vật lý, cảm biến và ngành Vi cơ điện tử.\nsource_id: chunk-68ff5a83b0af56203acad8be9bb71769&lt;SEP&gt;chunk-74b8343cdf7a8927f39450d6d7741ff3&lt;SEP&gt;chunk-2dc6425f3af826241828b938d3b9947c&lt;SEP&gt;chunk-c7ca8d69534d17ffba9da5b52ab10c20&lt;SEP&gt;chunk-507d4755a2bad61545c9dcbc5b788598&lt;SEP&gt;chunk-28c13a5c94182964bde50c27ad27ab93&lt;SEP&gt;chunk-d3ddb5e27bb9e8b895402cfab6496f48&lt;SEP&gt;chunk-f8079719074c639fa305906157aade98&lt;SEP&gt;chunk-a0f9dd6f4e6ab47b9f52b7d62c0da622\nfile_path: ..\\..\\data\\data_1000_chunk_512.json\ncreated_at: 1775574540", "group": "person", "value": 12}, {"id": 11, "label": "GS.TSKH Nguyễn Đình Đức", "title": "entity_id: GS.TSKH Nguyễn Đình Đức\nentity_type: person\ndescription: GS.TSKH Nguyễn Đình Đức là một Giáo sư và Tiến sĩ khoa học, được giới thiệu là nhà khoa học uy tín trong lĩnh vực Cơ học và vật liệu composite. Ông tham gia giảng dạy và có các đóng góp tích cực trong các hoạt động khoa học–công nghệ, đồng thời xuất hiện tại nhiều sự kiện với các phát biểu, lời cảm ơn và góp ý cho các văn kiện. Về vai trò quản lý và đào tạo, GS.TSKH Nguyễn Đình Đức được ghi nhận là Trưởng ban Đào tạo tại Đại học Quốc gia Hà Nội (ĐHQGHN) và là Giám đốc Phòng Thí nghiệm Vật liệu và Kết cấu tiên tiến. Ông cũng được nêu là Trưởng ban Đào tạo trong bối cảnh tham dự lễ kỷ niệm với tư cách phía ĐHQGHN.\n\nTrong hoạt động của các đơn vị trực thuộc ĐHQGHN, GS.TSKH Nguyễn Đình Đức được mô tả là Chủ tịch Hội đồng Trường gắn với Trường/ĐH Công nghệ thuộc ĐHQGHN. Vai trò này được thể hiện qua việc ông tham gia các buổi trao đổi, chia sẻ kinh nghiệm tiếp cận thị trường, định hướng thúc đẩy hợp tác đào tạo và nghiên cứu phục vụ phát triển chung, và thực hiện việc trao Nghị quyết ban hành Chiến lược phát triển trường. Ngoài ra, trong cộng đồng chuyên môn, ông được nhắc đến là Phó Chủ tịch Hội Cơ học Việt Nam. Ông tham gia hội đồng biên tập của 10 tạp chí quốc tế thuộc ISI và có phát biểu liên quan đến việc các nhà khoa học Việt Nam được xếp hạng không thua kém. Ông cũng được ca ngợi như “người thắp lửa” cho nghiên cứu khoa học của Phạm Hồng Công và các học trò khác, đồng thời được xem là nhà khoa học xuất sắc với vị trí cao trong bảng xếp hạng năm 2020. GS.TSKH Nguyễn Đình Đức còn được nêu là người đề xuất, sáng lập và giữ vai trò Tổ trưởng Tổ xây dựng Đề án mở ngành và chương trình đào tạo.\nsource_id: chunk-97e68f2fa4575a4b18bae08d56e768e9&lt;SEP&gt;chunk-a1cf3047b6d7ead1b226cab013ba150a&lt;SEP&gt;chunk-eed0a43c267785497cf0255e742af7fe&lt;SEP&gt;chunk-d1c4f85dc345362f564528e275036273&lt;SEP&gt;chunk-74b8343cdf7a8927f39450d6d7741ff3&lt;SEP&gt;chunk-7d08f2b32dd7a2b725cd4d2cf6e42b78&lt;SEP&gt;chunk-5b3e3a91f48d636c96d29ec9b0964e8f&lt;SEP&gt;chunk-4b7fbb9536d4e17a52df1a87aa1e10a9&lt;SEP&gt;chunk-5e8de8faf9039ca7b42684ddc53a8ec7&lt;SEP&gt;chunk-06aed5ecaa8bc03b3bdfd41109d43dbb&lt;SEP&gt;chunk-bf3b2dab3c647f8bfb265d834c45e505&lt;SEP&gt;chunk-5e8c077ffe88c7422abef83194d113d8&lt;SEP&gt;chunk-653c3e3e8802c8487fad608f9741926c&lt;SEP&gt;chunk-2e79134b7e2ef2bed3518516035b2c4f&lt;SEP&gt;chunk-716b876310e7bd2a34de993d66876927&lt;SEP&gt;chunk-63e975c10765e044d994471ee1e0a86f\nfile_path: ..\\..\\data\\data_1000_chunk_512.json\ncreated_at: 1775558987", "group": "person", "value": 13}, {"id": 12, "label": "Hiệu trưởng Nguyễn Việt Hà", "title": "entity_id: Hiệu trưởng Nguyễn Việt Hà\nentity_type: person\ndescription: Hiệu trưởng Nguyễn Việt Hà là người đảm nhiệm vai trò hiệu trưởng tại Trường Đại học Công nghệ (Trường ĐHCN). Trong các sự kiện được ghi nhận tại nhà trường, ông tham gia lễ khai mạc với vai trò phát biểu, nhấn mạnh định hướng và cam kết của Trường ĐHCN đối với hoạt động đào tạo và phục vụ thí sinh; đồng thời đề nghị các thành viên tiếp tục góp ý và tham gia đóng góp thông qua các kênh phản biện, kiến nghị. Ông cũng được mô tả là người bày tỏ sự trân trọng đối với các đóng góp của các thành viên Hội đồng.\n\nBên cạnh các hoạt động phát biểu, Hiệu trưởng Nguyễn Việt Hà trực tiếp tham gia các nghi thức như trao quyết định bổ nhiệm chức danh GS, PGS và tặng hoa chúc mừng. Trong một buổi lễ, ông còn được nêu gắn với vai trò PGS.TS Nguyễn Việt Hà trong bối cảnh ghi hình/chụp ảnh. Ông đồng thời tham gia việc trao tặng khen thưởng, ghi nhận thành tích, bao gồm các thành tích cấp ĐHQGHN, trong bối cảnh hoạt động và các kết quả/đầu tư trọng điểm của ĐHQGHN, đặc biệt liên quan đến lĩnh vực cơ khí và tự động hóa nhằm phục vụ đào tạo và hoạt động thực hành, thực tập. Ngoài ra, Hiệu trưởng Nguyễn Việt Hà còn được đặt trong thông điệp khẳng định rằng nhà trường luôn quan tâm đến các điều kiện đảm bảo chất lượng.\nsource_id: chunk-c7900e55a1878456792f2893a2b9a649&lt;SEP&gt;chunk-bbe290a15692091f354ffb5385d8273d&lt;SEP&gt;chunk-824a0e8df6eccd832bfb388bf660ec06&lt;SEP&gt;chunk-a726ca204a80d494294cbbfa85f3169e&lt;SEP&gt;chunk-54d6f4bb174cf44ff2389841756399d0&lt;SEP&gt;chunk-5e8de8faf9039ca7b42684ddc53a8ec7&lt;SEP&gt;chunk-5083fe8b80d6aa30896e052169b8dc6e&lt;SEP&gt;chunk-0dc814b89f42b41d76783f0d2bd561d7&lt;SEP&gt;chunk-44e0b84fdad88f93dca4b8cf2ea910b7&lt;SEP&gt;chunk-66aedae90503a87bb30259e7b942537c\nfile_path: ..\\..\\data\\data_1000_chunk_512.json\ncreated_at: 1775573501", "group": "person", "value": 12}, {"id": 13, "label": "Hòa Lạc", "title": "entity_id: Hòa Lạc\nentity_type: location\ndescription: Hòa Lạc được mô tả như một không gian của nhà trường, đồng thời là trung tâm khoa học–công nghệ và giáo dục chất lượng cao. Hòa Lạc cũng xuất hiện như một địa điểm gắn với công tác dự án phát triển Trường, tức là khu vực được nhắc đến trong bối cảnh triển khai/định hướng các hoạt động dự án phát triển liên quan đến Trường. Trong một số mô tả về quản lý hoạt động học tập, Hòa Lạc còn được nêu là khu vực không dành cho sinh viên K68 đang học theo thời khóa biểu được đề cập.\n\nNgoài vai trò giáo dục và dự án, Hòa Lạc được nêu là địa điểm đặt Học viện Viettel. Hòa Lạc cũng là nơi diễn ra các hoạt động trong khuôn viên ĐHQGHN, bao gồm hoạt động trồng cây lưu niệm tại không gian ĐHQGHN. Cuối cùng, Hòa Lạc còn được ghi nhận như một địa danh trong mô tả địa điểm tổ chức lễ kỷ niệm.&lt;SEP&gt;Địa bàn di chuyển được đề cập để Trường Đại học Công nghệ chủ động hệ thống cơ sở vật chất và hạ tầng theo chủ trương của ĐHQGHN.\nsource_id: chunk-35900977eb9299da11a0394943cf9257&lt;SEP&gt;chunk-6d42a91de2a2573458ec2a00f7924b91&lt;SEP&gt;chunk-21c73d451caa1868cbd1d3e9f905da8f&lt;SEP&gt;chunk-dab17784adc9dd17150ed2245853d389&lt;SEP&gt;chunk-9333670261fe415ec8faffcbd0dcbb4d&lt;SEP&gt;chunk-9457347bb097438ac4d6e76f8c53d79b&lt;SEP&gt;chunk-89a67f4a3c2b8a7cf37bb55576260c89&lt;SEP&gt;chunk-29e8e52f6e4122b32c6998d8257ddf7d&lt;SEP&gt;chunk-f8ee6716d302aa15eae4352b3165f84b\nfile_path: ..\\..\\data\\data_1000_chunk_512.json\ncreated_at: 1775559948", "group": "location", "value": 12}, {"id": 14, "label": "Hệ thống thông tin", "title": "entity_id: Hệ thống thông tin\nentity_type: chuyên_ngành\ndescription: Hệ thống thông tin (tiếng Anh: “Information Systems”) là một chuyên ngành/ngành đào tạo được ghi nhận trong dữ liệu với mã CN14. Dữ liệu mô tả mối liên hệ giữa Hệ thống thông tin với mã CN14, đồng thời nêu các tổ hợp A00, A01 và D01 cùng các thông tin trong bảng liên quan đến quyết định ban hành. Ở bậc cử nhân, Hệ thống thông tin được ghi nhận theo trình độ cử nhân; ở cấp chương trình tiến sĩ, mô tả yêu cầu luận án phải có đóng góp ban đầu đáng kể và thuộc một trong bốn chương trình đào tạo được khảo sát, đánh giá ngoài. Về bối cảnh tốt nghiệp, Hệ thống thông tin thuộc nhóm ngành/chuyên ngành có đối tượng tốt nghiệp trong kỳ tổ chức lễ, bao gồm sinh viên, học viên cao học và/hoặc nghiên cứu sinh tốt nghiệp đợt tháng 6/2017.\n\nTrong tuyển sinh, Hệ thống thông tin thuộc nhóm chuyên ngành của Khoa Công Nghệ Thông Tin (ngành Hệ thống thông tin) và được nhấn mạnh là chuyên ngành quan trọng trong thời đại kỹ thuật số. Dữ liệu cũng cho thấy chuyên ngành tuyển sinh tiến sĩ trong Khoa Công nghệ Thông tin đi kèm chỉ tiêu tuyển sinh, đồng thời chuyên ngành này tham gia tuyển sinh thạc sĩ đợt 1 năm 2020 thuộc Khoa Công nghệ Thông tin. Ngoài ra, một mô tả khác xác định Hệ thống thông tin là một trong bốn chương trình đào tạo trình độ đại học được đánh giá ngoài, thuộc ngành Hệ thống thông tin; và ngành Hệ thống thông tin được gắn với chuyên ngành Hệ thống thông tin trong thông báo.\nsource_id: chunk-d2a8966b15bf3e84b5310855bf8069c4&lt;SEP&gt;chunk-560aa8f7145b812a0a3f0961eae4bed8&lt;SEP&gt;chunk-32d59c864a39cf5de0e85540da8166e6&lt;SEP&gt;chunk-0c454253ecdc153f0a50ba1863e99f6b&lt;SEP&gt;chunk-73f0943bc53f57e4e794f7b328d9c011&lt;SEP&gt;chunk-eea7f3f0a77966b3554bf342903e05eb&lt;SEP&gt;chunk-c3ff6f5c7e622bf3d36c30e095f53d81&lt;SEP&gt;chunk-fb78f49fb6f886705d2c8450a4f83416&lt;SEP&gt;chunk-8244e636527f361eb3d6735f07279e97&lt;SEP&gt;chunk-f541b4deaeb1a76f28afbc3c71d01804&lt;SEP&gt;chunk-4831025db240fc1fe9d61dc85890f851&lt;SEP&gt;chunk-4c58838595d7267790ecbcc9f0400ca9&lt;SEP&gt;chunk-0dc814b89f42b41d76783f0d2bd561d7&lt;SEP&gt;chunk-7f539bc03df19955b7ad996a7db25089&lt;SEP&gt;chunk-69ee4edf3b41e68d2f1e85bfcd58c0d1&lt;SEP&gt;chunk-fb0e2e1566bb3500aaa5b0c065466edf&lt;SEP&gt;chunk-98a84794fc60999a5664ccbed37e4b33&lt;SEP&gt;chunk-02288b9b453d54a3485963566e1eb175&lt;SEP&gt;chunk-df1cd4430a15e0d8c3f8733c251d68ea&lt;SEP&gt;chunk-3b8acff514b226405357f478799dc3c9&lt;SEP&gt;chunk-f1789ff64448f1d8a3b458adc3cf17e5\nfile_path: ..\\..\\data\\de_an_2024_chunks.json&lt;SEP&gt;..\\..\\data\\data_1000_chunk_512.json\ncreated_at: 1775574326", "group": "chuyên_ngành", "value": 13}, {"id": 15, "label": "Hội nghị tài chính năm 2019", "title": "entity_id: Hội nghị tài chính năm 2019\nentity_type: event\ndescription: Hội nghị tài chính được Trường Đại học Công nghệ tổ chức để đánh giá tình hình thực hiện công tác tài chính năm 2018 và kết quả thực hiện 5 tháng đầu năm 2019 tại nhà E3; hội nghị được đồng chủ trì và có các báo cáo về kế hoạch tài chính, kết quả thực hiện và phương hướng công tác năm tiếp theo.\nsource_id: chunk-618a5b5b173679fd25c32da7d4095869\nfile_path: ..\\..\\data\\data_1000_chunk_512.json\ncreated_at: 1775574076", "group": "event", "value": 12}, {"id": 16, "label": "Hội nghị tài chính trực tuyến năm 2021", "title": "entity_id: Hội nghị tài chính trực tuyến năm 2021\nentity_type: event\ndescription: Hội nghị tài chính trực tuyến được tổ chức vào ngày 23/08/2021 nhằm đánh giá tình hình thực hiện công tác tài chính năm 2020 và kết quả thực hiện 6 tháng đầu năm 2021.\nsource_id: chunk-09dec0902abc37cf1ffabad616527206\nfile_path: ..\\..\\data\\data_1000_chunk_512.json\ncreated_at: 1775528654", "group": "event", "value": 12}, {"id": 17, "label": "Hội nghị đại biểu Công đoàn Trường Đại học Công nghệ giữa nhiệm kỳ 2016-2021", "title": "entity_id: Hội nghị đại biểu Công đoàn Trường Đại học Công nghệ giữa nhiệm kỳ 2016-2021\nentity_type: event\ndescription: Hội nghị/Đại hội đại biểu Công đoàn Trường Đại học Công nghệ giữa nhiệm kỳ 2016-2021, được tổ chức thành công tốt đẹp và bầu đại biểu dự hội nghị Công đoàn Đại học Quốc gia Hà Nội.\nsource_id: chunk-3290791c83cf763605ceed3cb54c10a0\nfile_path: ..\\..\\data\\data_1000_chunk_512.json\ncreated_at: 1775572018", "group": "event", "value": 12}, {"id": 18, "label": "Hội thảo khoa học dành cho nghiên cứu sinh năm 2019", "title": "entity_id: Hội thảo khoa học dành cho nghiên cứu sinh năm 2019\nentity_type: event\ndescription: Hội thảo khoa học dành cho nghiên cứu sinh năm 2019 được Trường Đại học Công nghệ tổ chức, diễn ra ngày 27/03 tại Tòa nhà Sunwah, có nhiều bài/đề tài tham gia và có phần chọn đề tài xuất sắc để trao thưởng.\nsource_id: chunk-4d615de6e6f01f3af3a25a5b99d35f3b\nfile_path: ..\\..\\data\\data_1000_chunk_512.json\ncreated_at: 1775499548", "group": "event", "value": 13}, {"id": 19, "label": "Khoa Công Nghệ Thông Tin", "title": "entity_id: Khoa Công Nghệ Thông Tin\nentity_type: đơn_vị_trực_thuộc\ndescription: Khoa Công Nghệ Thông Tin là một đơn vị thuộc Trường Đại học Công nghệ và được nhắc đến trong nhiều bối cảnh tổ chức, tuyển dụng và hoạt động học thuật. Đơn vị này xuất hiện trong danh sách chỉ tiêu tuyển dụng với số lượng 06 và được gắn với các chuyên ngành của thí sinh gồm Kỹ thuật phần mềm, Mạng máy tính và truyền thông dữ liệu, An toàn thông tin, Hệ thống thông tin và Khoa học máy tính. Khoa cũng được mô tả là nơi có bốn sinh viên K61 tham gia cuộc thi.  \n\nVề quản lý và đánh giá chương trình, Khoa Công Nghệ Thông Tin được nêu là có 1 chương trình được đánh giá theo Bộ tiêu chí của ĐHQGHN. Trong hoạt động nghiên cứu, khoa là đơn vị/thuộc nhóm nghiên cứu thực hiện công trình UFBoot2. Đồng thời, khoa được nêu là đơn vị/chi bộ có đại diện tham gia đóng góp ý kiến tại hội nghị. Một mô tả khác cũng cho biết Nguyễn Đức Thắng (theo mô tả) thuộc về Khoa Công nghệ Thông Tin.&lt;SEP&gt;Khoa Công nghệ thông tin là đơn vị gắn với PGS.TS. Nguyễn Thị Nhật Thanh trong hội thảo.&lt;SEP&gt;Khoa Công nghệ thông tin là đơn vị mà TS. Trần Quốc Long thuộc về, đồng thời được nêu trong ngữ cảnh chủ nhiệm đề tài.\nsource_id: chunk-ead4ac48e0b97eb063181288c238ee63&lt;SEP&gt;chunk-eefda8c40d0bdfbc58750fa073ef47d7&lt;SEP&gt;chunk-ad1d10b4013dd044990c9a4511e35416&lt;SEP&gt;chunk-856a92c6ae6920a97c0675e5f16bd6ba&lt;SEP&gt;chunk-3f56d3c30f409907b9857d30739b3592&lt;SEP&gt;chunk-0ac122b4fa8469ce3639583a8de56a2f&lt;SEP&gt;chunk-3089a518dedc919fea98594b62e909f1&lt;SEP&gt;chunk-fb0e2e1566bb3500aaa5b0c065466edf&lt;SEP&gt;chunk-42e7f6ddb5c8cafedd8c7a0e8e9d1797&lt;SEP&gt;chunk-cd7d1f092e6bd59bfe285476f174cd25\nfile_path: ..\\..\\data\\data_1000_chunk_512.json\ncreated_at: 1775575065", "group": "đơn_vị_trực_thuộc", "value": 13}, {"id": 20, "label": "Khoa Công nghệ Xây dựng – Giao thông", "title": "entity_id: Khoa Công nghệ Xây dựng – Giao thông\nentity_type: đơn_vị_trực_thuộc\ndescription: Khoa Công nghệ Xây dựng – Giao thông là đơn vị tổ chức và có thêm nhiều buổi trải nghiệm thực tế tại Học viện Viettel.&lt;SEP&gt;Khoa Công nghệ Xây dựng – Giao thông là đơn vị trực thuộc Trường Đại học Công nghệ, được thành lập ngày 02/12/2022; khoa có sứ mạng đào tạo nguồn nhân lực công nghệ chất lượng cao, nghiên cứu phát triển và ứng dụng khoa học công nghệ tiên tiến trong lĩnh vực Công nghệ kỹ thuật xây dựng – giao thông, góp phần phát triển hạ tầng và giao thông hiện đại, phát triển xanh trong xu thế CMCN 4.0.&lt;SEP&gt;Khoa được kỳ vọng nhận sinh khí phát triển từ việc hợp tác đào tạo và nghiên cứu giữa hai bên.\nsource_id: chunk-9333670261fe415ec8faffcbd0dcbb4d&lt;SEP&gt;chunk-1684e301bc32d19f14b4a5342837e423&lt;SEP&gt;chunk-bf3b2dab3c647f8bfb265d834c45e505\nfile_path: ..\\..\\data\\data_1000_chunk_512.json\ncreated_at: 1775553538", "group": "đơn_vị_trực_thuộc", "value": 12}, {"id": 21, "label": "Khoa Công nghệ thông tin", "title": "entity_id: Khoa Công nghệ thông tin\nentity_type: đơn_vị_trực_thuộc\ndescription: Khoa Công nghệ thông tin là một đơn vị học thuật/đào tạo thuộc VNU-UET, gắn với Trường Đại học Công nghệ – Đại học Quốc gia Hà Nội (ĐHQGHN); trong một số mô tả, đơn vị này còn được gọi theo cách gắn với “Trường Đại học Công nghệ (ĐHQGHN)”. Khoa xuất hiện trong nhiều ngữ cảnh quản lý và học thuật, đồng thời được liên kết với các cá nhân như PGS.TS Đặng Đức Hạnh, TS. Trần Mai Vũ (thuộc nhóm nghiên cứu được nêu), PGS.TS Hà Quang Thụy (xuất hiện trong phần liên quan đến đơn vị trực thuộc), TS. Đỗ Đức Đông và PGS.TS Phan Xuân Hiếu. Ở khía cạnh quản lý, các mô tả cho biết TS. Võ Đình Hiếu giữ vai trò Phó Chủ nhiệm, cùng các Phó Chủ nhiệm gồm PGS.TS Phạm Bảo Sơn và PGS.TS Phạm Ngọc Hùng.\n\nVề hoạt động chuyên môn và hỗ trợ học tập, Khoa được nhắc trong các nội dung trao/ghi nhận giải thưởng cho nghiên cứu sinh (NCS) của khoa, kèm định hướng về năng lực nghiên cứu theo nhu cầu để xác định trọng tâm thời gian tới; đồng thời Khoa tham gia hội thảo/họp chuyên môn (ví dụ poster của NCS Lê Hoàng Quỳnh). Khoa cũng hỗ trợ sinh viên thông qua hoạt động ôn tập cho nhóm sinh viên giỏi nhằm dự các kỳ thi/cuộc thi, có sự hiện diện của đại diện lãnh đạo. Trong nghiên cứu và sản phẩm, mô tả đề cập nhóm nghiên cứu thực hiện sản phẩm DoIt; đồng thời nhóm BlueSam được nêu là thuộc Khoa Công nghệ thông tin hoặc một đơn vị thuộc Trường Đại học Công nghệ, ĐHQGHN, và một mô tả khác khẳng định BlueSam là nhóm mà các thành viên xuất thân từ Khoa Công nghệ thông tin. Khoa còn được gắn với các sinh viên như Nguyễn Văn Dôn, Kha Văn Thương (thuộc Khoa), Nguyễn Xuân Đức đang theo học tại Khoa (cũng có mô tả liên quan đến Nguyễn Tấn Minh với thông tin “Khoa là đơn vị học tập”).\n\nKhoa Công nghệ thông tin còn xuất hiện trong các thông tin đăng ký/định danh theo khóa học (ví dụ các khóa QH-2022, QH-2023, trong đó Dương Ngân Hà theo học tại Khoa) và trong bối cảnh các ngành trong lịch học của các mô tả liên quan. Về thành tựu và hợp tác, Khoa tham gia tổ chức lễ tổng kết và trao giải thưởng sinh viên nghiên cứu khoa học năm 2023, ghi nhận 28 công trình khoa học được khen thưởng; đồng thời được nêu là đơn vị liên quan trong nhóm thực hiện VNU-SMM: Hệ thống giám sát mạng xã hội. Ngoài ra, có một mô tả bổ sung cho rằng Khoa Công nghệ thông tin thuộc Trường ĐH Công nghệ Sydney, Úc (UTS) và có người đại diện tham gia ký thỏa thuận hợp tác; thông tin này có thể phản ánh quan hệ hợp tác/định danh theo bối cảnh khác, vì đa số mô tả đặt Khoa trong hệ thống VNU-UET/Trường Đại học Công nghệ (ĐHQGHN). Khoa cũng được nhắc trong thông tin về cựu sinh viên K57 Anh Nguyễn Văn Khánh, và được mô tả tham gia các khuyến nghị/cải tiến nhằm nâng cao chất lượng theo định hướng của lãnh đạo nhà trường. Một mô tả khác nêu Khoa Công nghệ thông tin là đơn vị thuộc Trường Đại học Công nghệ, gắn với ngành Khoa học máy tính của Vũ Thành Long.\nsource_id: chunk-47941a0870aa6c0386e9b883e1b2ae2a&lt;SEP&gt;chunk-5b02279de165a97728d81442f368fce3&lt;SEP&gt;chunk-80173c33f3dd2cd4a9f3bbfa74082586&lt;SEP&gt;chunk-86cfcb4ee52da2b2643757368bd183ac&lt;SEP&gt;chunk-6ad550a9eb9cfa0fd796c232cbe06b15&lt;SEP&gt;chunk-a0164f7f660f0511780a1c507673fd81&lt;SEP&gt;chunk-7b81d0c6634bd97499f8cb8631bf5c4f&lt;SEP&gt;chunk-4d615de6e6f01f3af3a25a5b99d35f3b&lt;SEP&gt;chunk-fffc22ca4e4b27a0e13f47d115e19983&lt;SEP&gt;chunk-7ad80a82bd47f062bcd07963ab332bce&lt;SEP&gt;chunk-002414703deab8b54c9cf554471492ce&lt;SEP&gt;chunk-fc73ed1059e312eae72ab783bff01fd4&lt;SEP&gt;chunk-2005eb4c51b813918c965dc8372a1598&lt;SEP&gt;chunk-19ed03951e18fa6848458f2bd015e30d&lt;SEP&gt;chunk-d3da9c89aed63f30db121c599f75518b&lt;SEP&gt;chunk-b9e8ed58af89314115793a4be3ade25d&lt;SEP&gt;chunk-8c3aef2d74a930d688137cedc422a22c&lt;SEP&gt;chunk-08c6fcdb33ecbe14268890478563fc51&lt;SEP&gt;chunk-8b3f7265a717e2c1b642303ee5e681c7&lt;SEP&gt;chunk-9cc599f95d63d272604057fd8aa88455&lt;SEP&gt;chunk-a7dfaea328b5d5c81cbe256e8211ee50&lt;SEP&gt;chunk-62f174882dd84fe498c808dc4a53f916&lt;SEP&gt;chunk-2f6a0ae1ea831f72cdab8b38eb0e808e&lt;SEP&gt;chunk-ad84d61355fc921da9b5fa53489742ad&lt;SEP&gt;chunk-082031e1b79e5138b19557686af1faa5&lt;SEP&gt;chunk-0efac51e7b340f97404e66a3c2471dd2&lt;SEP&gt;chunk-ba89ee29fa4c0d1bafd5c08f394640b4&lt;SEP&gt;chunk-41b19a9281237237779b36fc4659371b&lt;SEP&gt;chunk-1c81102c63409740cad7996319f87efc&lt;SEP&gt;chunk-a0da9b3944720d4db88bd1b2e8e1c49b&lt;SEP&gt;chunk-01468ff331f4ebc74e6ea58c58aba2cf&lt;SEP&gt;chunk-dbc8a4ce9a6e80cd3c325b89dc6fb7a6&lt;SEP&gt;chunk-87e5549e1de1fcbf4b93b0e1735ba280&lt;SEP&gt;chunk-14bb4091aa4c61ca027007392568a24c\nfile_path: ..\\..\\data\\data_1000_chunk_512.json\ncreated_at: 1775576435", "group": "đơn_vị_trực_thuộc", "value": 18}, {"id": 22, "label": "Khoa Cơ học Kỹ thuật và Tự động hóa", "title": "entity_id: Khoa Cơ học Kỹ thuật và Tự động hóa\nentity_type: đơn_vị_trực_thuộc\ndescription: Khoa Cơ học Kỹ thuật và Tự động hóa có các đề tài đạt giải Nhất.&lt;SEP&gt;Khoa Cơ học Kỹ thuật và Tự động hóa là một chương trình được nêu trong văn bản, thuộc nhóm các chương trình cần đánh giá.&lt;SEP&gt;Đơn vị trực thuộc được kỷ niệm 15 năm thành lập; tổ chức gặp mặt các thế hệ cán bộ, giảng viên và báo cáo kết quả trong 15 năm qua.&lt;SEP&gt;Khoa Cơ học Kỹ thuật và Tự động hóa được nêu là một đơn vị đào tạo, thuộc Trường ĐHCN, ĐHQG Hà Nội, xây dựng và hoạt động theo mô hình phối thuộc.\nsource_id: chunk-16082ffa22328598a7603962e06d5759&lt;SEP&gt;chunk-6b59ddfc3d399f3eb888e1aee9ade483&lt;SEP&gt;chunk-bb2e7b04600050c60b4c32e09608c99e&lt;SEP&gt;chunk-b3b9b194ea53d1e6157391c0e749aaee\nfile_path: ..\\..\\data\\data_1000_chunk_512.json\ncreated_at: 1775572097", "group": "đơn_vị_trực_thuộc", "value": 12}, {"id": 23, "label": "Khoa Cơ học kỹ thuật và Tự động hóa", "title": "entity_id: Khoa Cơ học kỹ thuật và Tự động hóa\nentity_type: đơn_vị_trực_thuộc\ndescription: Khoa Cơ học kỹ thuật và Tự động hóa là một khoa thuộc Trường Đại học Công nghệ (Đại học Quốc gia Hà Nội, ĐHQGHN), nơi TS. Trần Thanh Tùng công tác. Khoa có các hoạt động học thuật và hợp tác, trong đó phối hợp tổ chức chương trình trao đổi nghiên cứu quốc tế và tổ chức thi lái xe tự hành với các trường/đơn vị tại Hàn Quốc; đồng thời khoa tham dự và giới thiệu các đội thi của mình. Đối với công tác quản trị học thuật và triển khai chương trình đào tạo, Khoa được Nhà trường đánh giá là có 2 chương trình theo Bộ tiêu chí của ĐHQGHN.\n\nVề hoạt động định hướng cho người học, Khoa tổ chức buổi tìm hiểu, định hướng ngành và giới thiệu các ngành nghề cho tân sinh viên, có sự hỗ trợ của các thầy cô. Khoa cũng có sự tham gia của đại diện lãnh đạo tại các hội thảo. Về cơ cấu tổ chức, thông tin mô tả cho thấy khoa có chức danh chủ nhiệm được nêu trong thông tin đề tài; đồng thời PGS.TS. Phạm Mạnh Thắng giữ chức vụ phó chủ nhiệm thường trực của Khoa.\n\nNgoài ra, Khoa là đơn vị nơi Phòng thí nghiệm Vật liệu và Kết cấu tiên tiến thuộc về, như được nêu trong mô tả chức danh của GS. TSKH Nguyễn Đình Đức.\nsource_id: chunk-5b02279de165a97728d81442f368fce3&lt;SEP&gt;chunk-99b97336c8e19af00c124ea12945c226&lt;SEP&gt;chunk-4d615de6e6f01f3af3a25a5b99d35f3b&lt;SEP&gt;chunk-00013c7d0035e5c15f6307d45bccf8fd&lt;SEP&gt;chunk-2ca8857f44555621498a81cb61b1602d&lt;SEP&gt;chunk-586b6f06d2c379a560c3cc342c4bb78f&lt;SEP&gt;chunk-8233fa2689bbdd699a004ce04abcf40c&lt;SEP&gt;chunk-79f56bb89c14d701a8a574d9804fe8e5\nfile_path: ..\\..\\data\\data_1000_chunk_512.json\ncreated_at: 1775574744", "group": "đơn_vị_trực_thuộc", "value": 13}, {"id": 24, "label": "Khoa học máy tính", "title": "entity_id: Khoa học máy tính\nentity_type: chuyên_ngành\ndescription: Khoa học máy tính là một chuyên ngành/ngành đào tạo thuộc nhóm ngành Công nghệ Thông tin, được ghi nhận trong các bảng tuyển sinh và các danh mục liên quan, tương ứng với mã tuyển sinh CN8. Trong bối cảnh tuyển sinh đại học, ngành Khoa học máy tính thường xuất hiện cùng các tổ hợp môn A00, A01 và D01 và đi kèm các thông số theo bảng mã/chỉ tiêu; thông tin ngành được thể hiện trong các tài liệu dạng bảng và các quyết định ban hành, với vai trò là một trong các ngành đào tạo đại học. Trong hồ sơ đăng ký/dự thi, Khoa học máy tính cũng được mô tả là chuyên ngành thí sinh có thể đăng ký hoặc dự thi.\n\nVề quy chiếu học thuật và thủ tục, Khoa học máy tính được ghi nhận là “ngành liên quan” có thể đáp ứng yêu cầu đối với vị trí thực tập, đồng thời là ngành có sinh viên/học viên thuộc diện tốt nghiệp trong kỳ tổ chức lễ. Ngành này cũng được dùng để mô tả ngành học của một số cá nhân, gồm Đỗ Quang Thành (thuộc khoa Công nghệ thông tin) và Phạm Thị Minh Trang; ngoài ra còn có Vũ Thành Long (sinh viên năm thứ nhất). Trong chương trình đào tạo, Khoa học máy tính được giới thiệu trong chương trình đào tạo chất lượng cao và được liên hệ với nhóm ngành có sinh viên/đối tượng tốt nghiệp đợt tháng 6/2017 (bao gồm sinh viên và/hoặc học viên cao học và/hoặc nghiên cứu sinh).\n\nKhoa học máy tính thuộc nhóm chuyên ngành “Khoa Công nghệ Thông tin”, gắn với ngành Khoa học máy tính và được liên hệ với chuyên ngành tuyển sinh tiến sĩ thuộc Khoa Công nghệ Thông tin. Đồng thời, Khoa học máy tính còn được xác định là chuyên ngành đào tạo thuộc Khoa Công nghệ Thông tin trong tuyển sinh thạc sĩ đợt 1 năm 2020. Ngoài ra, một số trường hợp cá nhân được nêu trong mô tả hồ sơ đăng ký/dự thi của Khoa học máy tính gồm Phạm Đức Anh và Đỗ Thùy Dương.\nsource_id: chunk-560aa8f7145b812a0a3f0961eae4bed8&lt;SEP&gt;chunk-0ebbeb1004b0f84158b918799ea6ef56&lt;SEP&gt;chunk-0c454253ecdc153f0a50ba1863e99f6b&lt;SEP&gt;chunk-73f0943bc53f57e4e794f7b328d9c011&lt;SEP&gt;chunk-7e9ce05ca09efa2e88367aceb54eed0f&lt;SEP&gt;chunk-4bc9e0bf150a84ffbe8c3fad9d802a51&lt;SEP&gt;chunk-f541b4deaeb1a76f28afbc3c71d01804&lt;SEP&gt;chunk-8e401c23aeb0cca4536cf70fdd86f1cf&lt;SEP&gt;chunk-b1d594998c1682c2568840c15e1bd189&lt;SEP&gt;chunk-4c58838595d7267790ecbcc9f0400ca9&lt;SEP&gt;chunk-fe968c7cb5e50463ed2626e2f66eeffc&lt;SEP&gt;chunk-0dc814b89f42b41d76783f0d2bd561d7&lt;SEP&gt;chunk-50474e6ffb40e27087efdb51362c232f&lt;SEP&gt;chunk-7f539bc03df19955b7ad996a7db25089&lt;SEP&gt;chunk-fb0e2e1566bb3500aaa5b0c065466edf&lt;SEP&gt;chunk-98a84794fc60999a5664ccbed37e4b33&lt;SEP&gt;chunk-df1cd4430a15e0d8c3f8733c251d68ea&lt;SEP&gt;chunk-87e5549e1de1fcbf4b93b0e1735ba280&lt;SEP&gt;chunk-f1789ff64448f1d8a3b458adc3cf17e5\nfile_path: ..\\..\\data\\de_an_2024_chunks.json&lt;SEP&gt;..\\..\\data\\data_1000_chunk_512.json\ncreated_at: 1775574329", "group": "chuyên_ngành", "value": 16}, {"id": 25, "label": "Khoa Điện tử Viễn thông", "title": "entity_id: Khoa Điện tử Viễn thông\nentity_type: đơn_vị_trực_thuộc\ndescription: Khoa Điện tử Viễn thông là một đơn vị thuộc Trường Đại học Công nghệ, đóng vai trò đơn vị chuyên môn và được liệt kê cùng với các chuyên ngành như Kỹ thuật điện tử và Kỹ thuật viễn thông. Khoa cũng được gắn với một số cá nhân trong danh sách, bao gồm TS. Chử Đức Trình và PGS.TS. Bùi Thanh Tùng. Trong hoạt động học thuật, Khoa Điện tử Viễn thông có các đề tài đạt giải Nhất và có sự liên quan đến Bộ môn Vi cơ điện tử và vi hệ thống (MEMS). Khoa tổ chức lễ bảo vệ khóa luận tốt nghiệp của ngành Công nghệ Điện tử – Viễn thông. Về phạm vi đào tạo, Khoa được nêu trong điều kiện đối tượng đăng ký cho sinh viên các khóa QH-2022 và QH-2023, đồng thời xuất hiện trong ngữ cảnh liên quan đến Đinh Thị Thái Mai (được nêu trong ngoặc). Ngoài ra, Khoa còn là nơi Khương Thị Oanh học.&lt;SEP&gt;Đơn vị trực thuộc tổ chức lễ bảo vệ khóa luận tốt nghiệp của ngành Công nghệ Điện tử – Viễn thông hệ Nhiệm vụ chiến lược.\nsource_id: chunk-c7900e55a1878456792f2893a2b9a649&lt;SEP&gt;chunk-cabb208711ae01b5a85dd08784d65483&lt;SEP&gt;chunk-16082ffa22328598a7603962e06d5759&lt;SEP&gt;chunk-13f51428066a010e7fc3e4d84de8a5e5&lt;SEP&gt;chunk-da7fa5d862e7e684f2e2138e322bf294&lt;SEP&gt;chunk-a7dfaea328b5d5c81cbe256e8211ee50&lt;SEP&gt;chunk-d595e000056eea8297d9252ecf36d845&lt;SEP&gt;chunk-df1cd4430a15e0d8c3f8733c251d68ea&lt;SEP&gt;chunk-15d83f371295989f8f770315270eb9e7\nfile_path: ..\\..\\data\\data_1000_chunk_512.json\ncreated_at: 1775575379", "group": "đơn_vị_trực_thuộc", "value": 12}, {"id": 26, "label": "Kế hoạch học tập Tuần lễ hội nhập sinh viên", "title": "entity_id: Kế hoạch học tập Tuần lễ hội nhập sinh viên\nentity_type: chương_trình_đào_tạo\ndescription: Kế hoạch học tập “Tuần lễ hội nhập sinh viên” năm học 2021-2022 dành cho sinh viên khóa QH-2021 (K66), bao gồm mục đích và nội dung thông tin nhằm hỗ trợ sinh viên thích ứng với năm học mới và nhiệm vụ học tập trong bối cảnh phòng, chống dịch Covid-19.\nsource_id: chunk-cb4220c57db2b8a1a0273e13380c9c71\nfile_path: ..\\..\\data\\data_1000_chunk_512.json\ncreated_at: 1775548035", "group": "chương_trình_đào_tạo", "value": 12}, {"id": 27, "label": "Kỹ thuật Máy tính", "title": "entity_id: Kỹ thuật Máy tính\nentity_type: chuyên_ngành\ndescription: Ngành thuộc một trong bốn chương trình đào tạo được khảo sát đánh giá ngoài.&lt;SEP&gt;Ngành Kỹ thuật Máy tính cung cấp kiến thức chuyên môn sâu rộng gắn với thực tiễn, là ưu điểm nổi bật tại UET so với các trường đào tạo cùng lĩnh vực.&lt;SEP&gt;Ngành học được mô tả là ngành chủ lực để phát triển nền kinh tế và có nhiều cơ hội việc làm sau tốt nghiệp.&lt;SEP&gt;Kỹ thuật máy tính là một ngành đào tạo truyền thống của nhà trường.&lt;SEP&gt;Chuyên ngành/định hướng đào tạo được nêu, với mô tả là sự kết hợp giữa “cứng” và “mềm”.&lt;SEP&gt;Kỹ thuật máy tính là nhánh chuyên ngành được đề cập cụ thể trong nhu cầu nhân lực chất lượng cao.&lt;SEP&gt;Một trong 04 chương trình đào tạo trình độ đại học được đánh giá ngoài, thuộc ngành Kỹ thuật Máy tính.\nsource_id: chunk-eea7f3f0a77966b3554bf342903e05eb&lt;SEP&gt;chunk-3ff911fde8bdcf8bd4624c83415292a5&lt;SEP&gt;chunk-a085aab048cc0c6bf5bf05d56b6745e9&lt;SEP&gt;chunk-653c3e3e8802c8487fad608f9741926c&lt;SEP&gt;chunk-77f8340b268fdde348a0c7b012b1829f&lt;SEP&gt;chunk-c61438037b659b02507e89743aba7243&lt;SEP&gt;chunk-3b8acff514b226405357f478799dc3c9\nfile_path: ..\\..\\data\\data_1000_chunk_512.json\ncreated_at: 1775573053", "group": "chuyên_ngành", "value": 12}, {"id": 28, "label": "Lễ Bế Giảng Và Trao Bằng Tốt Nghiệp Năm Học 2016-2017", "title": "entity_id: Lễ Bế Giảng Và Trao Bằng Tốt Nghiệp Năm Học 2016-2017\nentity_type: event\ndescription: Sự kiện nhà trường tổ chức lễ bế giảng và trao bằng tốt nghiệp năm 2017 cho sinh viên, học viên cao học và nghiên cứu sinh tốt nghiệp đợt tháng 6/2017.\nsource_id: chunk-a6856939570a377795a7ff53827b17a9\nfile_path: ..\\..\\data\\data_1000_chunk_512.json\ncreated_at: 1775529234", "group": "event", "value": 12}, {"id": 29, "label": "Lễ bế giảng và trao bằng tốt nghiệp năm học 2016-2017", "title": "entity_id: Lễ bế giảng và trao bằng tốt nghiệp năm học 2016-2017\nentity_type: event\ndescription: Sự kiện nhà trường tổ chức vào chiều ngày 29/06, gồm bế giảng và trao bằng tốt nghiệp năm 2017 cho sinh viên, học viên cao học và nghiên cứu sinh tốt nghiệp đợt tháng 6/2017.&lt;SEP&gt;Sự kiện lễ bế giảng và trao bằng tốt nghiệp năm học 2016-2017 diễn ra vào chiều ngày 29/06, Trường Đại học Công nghệ tổ chức cho sinh viên, học viên cao học và nghiên cứu sinh tốt nghiệp đợt tháng 6/2017.\nsource_id: chunk-f541b4deaeb1a76f28afbc3c71d01804&lt;SEP&gt;chunk-0dc814b89f42b41d76783f0d2bd561d7\nfile_path: ..\\..\\data\\data_1000_chunk_512.json\ncreated_at: 1775552076", "group": "event", "value": 16}, {"id": 30, "label": "Lễ khai trương Xưởng cơ khí – Tự động hóa", "title": "entity_id: Lễ khai trương Xưởng cơ khí – Tự động hóa\nentity_type: event\ndescription: Sự kiện tổ chức Lễ khai trương Xưởng cơ khí – Tự động hóa của Trường Đại học Công nghệ (ĐHQGHN) vào ngày 25/05.&lt;SEP&gt;Lễ khai trương Xưởng cơ khí – Tự động hóa được Trường Đại học Công nghệ tổ chức vào ngày 25/05 tại Nhà E3, nhân kỷ niệm giai đoạn Ngày thành lập 25/05/2004–25/05/2017.&lt;SEP&gt;Nội dung thông tin chính của bài: việc tổ chức lễ khai trương xưởng cơ khí – tự động hóa, thành phần tham dự và phát biểu liên quan định hướng đầu tư/đào tạo.&lt;SEP&gt;Sự kiện khai trương Xưởng cơ khí – Tự động hóa, được tổ chức nhân dịp kỷ niệm Ngày thành lập giai đoạn 25/05/2004 – 25/05/2017.\nsource_id: chunk-bbe290a15692091f354ffb5385d8273d&lt;SEP&gt;chunk-82fff52824c85317607a39708935ecf1&lt;SEP&gt;chunk-f76ad378d5647d674585cd166cb0bd01\nfile_path: ..\\..\\data\\data_1000_chunk_512.json\ncreated_at: 1775573642", "group": "event", "value": 13}, {"id": 31, "label": "Nguyễn Việt Hà", "title": "entity_id: Nguyễn Việt Hà\nentity_type: person\ndescription: Nguyễn Việt Hà là một lãnh đạo của Trường ĐH Công nghệ (ĐHQGHN), giữ chức vụ Hiệu trưởng và được ghi nhận với học hàm PGS.TS. Trong vai trò Hiệu trưởng, ông trực tiếp tham gia nhiều hoạt động chính thức của Nhà trường, bao gồm phát biểu tại phiên khai mạc và tham dự các sự kiện đánh giá, đặc biệt là các hoạt động chào đón đoàn đánh giá ngoài. Tại các dịp này, Nguyễn Việt Hà thể hiện sự trân trọng đối với đóng góp của các thành viên Hội đồng, đồng thời đề nghị Nhà trường tiếp tục nhận được tư vấn và góp ý để triển khai các hoạt động hiệu quả hơn; tại lễ bế mạc, ông cảm ơn các đoàn chuyên gia đã dành công sức cho đợt đánh giá và nhấn mạnh sự quan tâm của Nhà trường đến các điều kiện đảm bảo chất lượng. Ông cũng được mô tả là khẳng định Nhà trường luôn quan tâm, thực hiện tốt các điều kiện đảm bảo chất lượng đối với các chương trình đào tạo.\n\nTrong quan hệ đối ngoại, Nguyễn Việt Hà là người ký kết thỏa thuận hợp tác trong chuyến đến thăm và làm việc năm 2017, với trọng tâm liên quan đến đào tạo và phát triển nguồn nhân lực chất lượng cao. Ông cũng có cuộc diện kiến riêng với Bộ trưởng Bộ KHCN Lào, Boviengkham Vongdara. Ngoài ra, ông tham gia các hoạt động tri ân nội bộ như chụp ảnh cùng Nguyễn Thị Xoan, trao tặng quà thay mặt tập thể Lãnh đạo Nhà trường và gửi lời chúc sức khỏe, cảm ơn những đóng góp của Nguyễn Thị Xoan trong buổi chia tay. Nguyễn Việt Hà còn được nhắc đến trong các sự kiện như lễ tổng kết khóa học, trao khen thưởng cho tân thủ khoa và ghi nhận các cá nhân đạt thành tích cao trong học tập. Trong các thông điệp ở cương vị Hiệu trưởng, ông nhấn mạnh rằng kỷ niệm 22 năm ngày truyền thống đã đánh dấu bước trưởng thành tiếp theo của Nhà trường, đồng thời khẳng định sự phát triển của Nhà trường được gìn giữ và đồng hành bởi các thầy/cô nguyên lãnh đạo Nhà trường, bao gồm GS.VS.\nsource_id: chunk-48b2e81367d47a284128ce3ed8c9a232&lt;SEP&gt;chunk-2d0fa6a7d23585261379638aa7781bdd&lt;SEP&gt;chunk-2bf09b0414a94411876841812c14f029&lt;SEP&gt;chunk-26435cc51ec961d4bc384e2e8d9c6f88&lt;SEP&gt;chunk-3d613fcb086518297b90d4c95f460733&lt;SEP&gt;chunk-39689826c7f6456cd1eccb9cdd7f5600&lt;SEP&gt;chunk-313842e57a7dfba1afb863eb871a4c0b&lt;SEP&gt;chunk-614c9735abf0d5083487b3e6fb51231a&lt;SEP&gt;chunk-10582dacd0ec30df77c589a33cb301cd&lt;SEP&gt;chunk-2eece05b4ca6a947ce4ee36f1834b8cd&lt;SEP&gt;chunk-753157c0d9fa8c15829a438582a79cd9&lt;SEP&gt;chunk-4c58838595d7267790ecbcc9f0400ca9&lt;SEP&gt;chunk-bc97890a77b90bd16a33f19fbb1362ad&lt;SEP&gt;chunk-5e8de8faf9039ca7b42684ddc53a8ec7&lt;SEP&gt;chunk-41b19a9281237237779b36fc4659371b&lt;SEP&gt;chunk-42dc7c996830887d7337f92b3bd4a6eb&lt;SEP&gt;chunk-258efc78e597faee830837bc841994ad&lt;SEP&gt;chunk-7856a345391fb81bf26904976ac3b92a\nfile_path: ..\\..\\data\\data_1000_chunk_512.json\ncreated_at: 1775573458", "group": "person", "value": 14}, {"id": 32, "label": "Nguyễn Đức Thắng", "title": "entity_id: Nguyễn Đức Thắng\nentity_type: person\ndescription: Nguyễn Đức Thắng được liệt kê như tác giả liên quan đến nghiên cứu vật liệu nano porphyrinoid và nano Ag trong kháng khuẩn.&lt;SEP&gt;Nguyễn Đức Thắng là sinh viên được TS. Đặng Thanh Hải đánh giá cao về ý nghĩa khoa học và kết quả nghiên cứu; Nguyễn Đức Thắng cảm thấy may mắn vì có sự đồng hành của TS. Đặng Thanh Hải và các thầy/cô, anh/chị tại phòng thí nghiệm.&lt;SEP&gt;Nguyễn Đức Thắng là sinh viên năm ba và là người thực hiện đề tài nghiên cứu liên quan đến mạng nơ-ron tích chập, có thành tích giải Ba sinh viên nghiên cứu khoa học cấp Đại học Quốc gia Hà Nội (ĐHQGHN) và từng đạt giải nhất môn Tin học cấp quốc gia.\nsource_id: chunk-74b602bb518159f8fd4a506994af7101&lt;SEP&gt;chunk-0ac122b4fa8469ce3639583a8de56a2f&lt;SEP&gt;chunk-25e12e92395e44545e8121687a70330a\nfile_path: ..\\..\\data\\data_1000_chunk_512.json\ncreated_at: 1775551966", "group": "person", "value": 12}, {"id": 33, "label": "Ngành Cơ Kỹ thuật", "title": "entity_id: Ngành Cơ Kỹ thuật\nentity_type: chuyên_ngành\ndescription: Ngành Cơ Kỹ thuật được mô tả là có năng lực nghiên cứu, phát triển và vận hành các hệ thống, thiết bị trong công nghiệp, bao gồm hệ thống và thiết bị gia công cơ khí; hệ thống cơ điện tử; hệ thống thủy lực; cánh tay robot; và công nghệ môi trường với các tính toán mô phỏng dòng chảy, mô phỏng động lực học, môi trường và công trình biển trong quản lý.\nsource_id: chunk-9d0302b0d28ec502bb1eea46ac7c2bf1\nfile_path: ..\\..\\data\\data_1000_chunk_512.json\ncreated_at: 1775534266", "group": "chuyên_ngành", "value": 12}, {"id": 34, "label": "Nhà E3", "title": "entity_id: Nhà E3\nentity_type: location\ndescription: Nhà E3 là một địa điểm/tòa nhà thuộc khu vực địa chỉ trụ sở chính của Trường Đại học Công nghệ, gắn với nhiều hoạt động điều hành, tổ chức sự kiện và phối hợp đào tạo. Theo các mô tả, Nhà E3 đặt trụ sở của Trung tâm JTIRC tại tầng 7 và được sử dụng làm không gian cho các hoạt động hội nghị, phối hợp đào tạo, tuyển dụng; ngoài ra, Nhà E3 cũng được gắn với Phòng 107 và từng được nêu là nơi đặt địa điểm thi cùng với Phòng 212. Về lịch sử sự kiện, Nhà E3 từng là nơi tổ chức Lễ khai trương Xưởng cơ khí – Tự động hóa, đồng thời tổ chức Lễ bế mạc cuộc thi “Lập trình Việt Nam – Hàn Quốc năm 2023” (được mô tả là lần đầu tiên tổ chức tại đây), cùng với Lễ tổng kết và trao giải thưởng sinh viên nghiên cứu khoa học năm 2023. Nhà E3 còn diễn ra lễ khai mạc cuộc thi dành cho học sinh lần đầu tham dự, lễ bế giảng trong khuôn khổ hợp tác với Trung tâm tư vấn và giải pháp công nghệ Việt Hàn, chương trình gặp mặt thân mật toàn thể nữ cán bộ, viên chức và người lao động, và buổi gặp gỡ Hội cựu chiến binh thuộc Trường Đại học Công nghệ. Về hoạt động nội bộ, Nhà E3 được dùng để tổ chức Đại hội Chi bộ Công nghệ thông tin nhiệm kỳ 2022–2025 và Đại hội chi bộ Hiệu bộ 2; Nhà E3 còn là nơi tiếp đoàn CIAT tại Trường Đại học Công nghệ và tổ chức buổi làm việc diễn ra ngày 29/10/2021, cũng như tổ chức Hội nghị tài chính năm 2019.\nsource_id: chunk-457ee99614d1d4684d2dd863a6932c1d&lt;SEP&gt;chunk-a8bcb9373a60a7f6c24b0e489aa080be&lt;SEP&gt;chunk-bbe290a15692091f354ffb5385d8273d&lt;SEP&gt;chunk-2fcee1b38d0995af08d41a10cb50b6b6&lt;SEP&gt;chunk-753157c0d9fa8c15829a438582a79cd9&lt;SEP&gt;chunk-81b00668814f85d085df1a7648c51f2f&lt;SEP&gt;chunk-7fbbc42dcf818c71b6ae768644d0f223&lt;SEP&gt;chunk-6d1a8882f2f906bd16024b8cc49f983f&lt;SEP&gt;chunk-49657745ab392f0b35c898d04c27a5a7&lt;SEP&gt;chunk-b4b7e36d12b16edcb01a8ed73c16ca4a&lt;SEP&gt;chunk-82fff52824c85317607a39708935ecf1&lt;SEP&gt;chunk-13be596e6c2ce895e68b8ed73a8171eb&lt;SEP&gt;chunk-082031e1b79e5138b19557686af1faa5&lt;SEP&gt;chunk-5083fe8b80d6aa30896e052169b8dc6e&lt;SEP&gt;chunk-5bd32a5a9562557677f50bd92b77494c&lt;SEP&gt;chunk-f8ee6716d302aa15eae4352b3165f84b&lt;SEP&gt;chunk-71acee0a8901d0b8d4e3ba93102df2f0&lt;SEP&gt;chunk-773d20c2da68c460f87314da5162d52b&lt;SEP&gt;chunk-f76ad378d5647d674585cd166cb0bd01&lt;SEP&gt;chunk-618a5b5b173679fd25c32da7d4095869&lt;SEP&gt;chunk-c997ac125f0050062b709404aca9a79b\nfile_path: ..\\..\\data\\de_an_2024_chunks.json&lt;SEP&gt;..\\..\\data\\data_1000_chunk_512.json\ncreated_at: 1775575612", "group": "location", "value": 12}, {"id": 35, "label": "Nhà trường", "title": "entity_id: Nhà trường\nentity_type: concept\ndescription: Nhà trường là đơn vị giáo dục và đồng thời là chủ thể quản lý ở cấp đơn vị, chịu sự quản lý tương ứng và có tổng chỉ tiêu tuyển sinh; trong các điều chỉnh liên quan, nội dung điều chỉnh được nêu là không làm thay đổi tổng chỉ tiêu tuyển sinh. Trong hoạt động tuyển sinh và xét tuyển, Nhà trường công bố điểm ưu tiên áp dụng theo phương thức xét tuyển dựa trên kết quả tổ hợp môn thi tốt nghiệp THPT năm 2024; việc xem xét để vào học dựa trên kết quả học tập THPT, kết quả kiểm tra kiến thức và năng lực tiếng Việt, đồng thời tuân theo quy định của Nhà trường và ĐHQGHN. Nhà trường tổ chức các chương trình đào tạo toàn diện, bao quát, gắn đào tạo với nghiên cứu khoa học và các hoạt động liên quan; đối với thí sinh trúng tuyển chưa nhập trường trong thời hạn 03 ngày, tổ chức hoạt động gặp mặt/tiếp đón. Nhà trường cũng được mô tả có thẩm quyền đồng ý khi sinh viên đăng ký ít hơn số tối thiểu hoặc nhiều hơn số tối đa.\n\nVề quản lý và nhân sự, Nhà trường có Hiệu trưởng Nguyễn Việt Hà; giảng viên tham gia giảng dạy các buổi tập huấn đội tuyển và trong các văn bản có gắn vai trò Phó Hiệu trưởng. Nhà trường tham gia đánh giá, kiểm định các chương trình đào tạo; triển khai kế hoạch nâng cao năng lực cán bộ, đội ngũ nghiên cứu và chất lượng đào tạo theo định hướng phát triển toàn diện “bứt phá” thông qua cơ chế thu hút và đầu tư. Nhà trường công bố dự kiến định mức học phí, thời gian thu, hình thức và thời hạn nộp học phí cùng các khoản nợ (nếu có), tiếp nhận khuyến nghị/đề xuất sau khảo sát chính thức, và tổ chức hoạt động nhằm nâng cao chất lượng đào tạo và giáo dục; đồng thời ghi nhận mong muốn tiếp tục nhận hỗ trợ từ GS.TS. NGƯT Bạch Gia Dương cho đào tạo và nghiên cứu khoa học. Nhà trường còn được mô tả thực hiện công tác tài chính và đã cơ bản hoàn thành chỉ tiêu, kế hoạch giai đoạn 2016–2018.\n\nTrong phối hợp nâng cao chất lượng, Nhà trường hợp tác với doanh nghiệp, lồng ghép kỹ năng mềm và kỹ năng trong cuộc sống vào các môn học; tổ chức báo cáo tổng kết cùng các hoạt động khoa học công nghệ gắn với đào tạo. Nhà trường tổ chức lễ ra mắt, trưng bày sản phẩm khoa học công nghệ tiêu biểu và ký kết chương trình hợp tác hỗ trợ phát triển Trung tâm, gồm hợp tác với Viện nghiên cứu sáng chế; cam kết tạo điều kiện để cán bộ, nhà khoa học tham gia triển khai các hoạt động hiệu quả. Nhà trường tổ chức tư vấn và cử cán bộ tham gia gian tư vấn trong bối cảnh hợp tác cộng đồng, phối hợp với Trường Đại học Công nghệ và xây dựng cộng đồng cựu sinh viên; đồng thời quan tâm đến đời sống và điều kiện để sinh viên học tập, phát triển. Nhà trường còn được nêu có hợp tác với Samsung, nhận hỗ trợ cho đào tạo và nghiên cứu khoa học, và tổ chức hoạt động tri ân trong cộng đồng cựu sinh viên thông qua tiếp đón, triển khai hợp tác/trưng bày/chương trình.\n\nVề gắn kết với người học và hỗ trợ nghề nghiệp, Nhà trường khảo sát, tìm kiếm và hỗ trợ cơ hội thực tập, việc làm; có đội ngũ cán bộ kỹ thuật viên hướng dẫn thực hành để sinh viên hòa nhập công việc sau tốt nghiệp. Nhà trường hỗ trợ để sinh viên tiếp cận học bổng, tham gia các chương trình đào tạo, và tổ chức hoạt động kết hợp chuyến thăm với Boeing để phỏng vấn sinh viên. Nhà trường được nêu là chủ thể trong kế hoạch đề nghị các Khoa và sinh viên các lớp K61 cùng các khóa cũ đủ điều kiện tốt nghiệp thực hiện các công việc đã nêu và thông báo/đề nghị các Khoa/Viện triển khai sinh hoạt lớp khóa học đầu năm học 2023–2024. Nhà trường xây dựng cơ chế phối hợp giữa các đơn vị để tư vấn, hỗ trợ sinh viên kịp thời, tổ chức các hoạt động đối thoại trực tiếp định kỳ với sinh viên; tổ chức tham quan khu giảng đường và các phòng học thực hành, thực tập cho đoàn học sinh nhằm tạo không gian tham quan, giao lưu và định hướng nghề nghiệp. Nhà trường cũng đề cập định hướng “song hành” và gắn với sự nghiệp “trồng người” thông qua khảo sát theo đợt, tiếp thu khuyến nghị để cải tiến nâng cao chất lượng, đồng thời trong một bối cảnh khác đề nghị tạo điều kiện cho đoàn thu thập thông tin phục vụ đánh giá theo định hướng quan tâm của Hiệu trưởng nhằm đảm bảo chất lượng.\n\nTrong nội dung hợp tác, đối tượng được nhắc đến gồm Trường Đại học Công nghệ (ĐHCN) và ĐHQGHN. Đồng thời, theo mô tả bổ sung, “Nhà trường” được dùng để chỉ Trường Đại học Công nghệ trong thông tin về lễ ký kết thỏa thuận hợp tác.\nsource_id: chunk-c813248f3fd91e9c88ae0b8e03534373&lt;SEP&gt;chunk-566c52cd13c2645f71810bac5ed79b9f&lt;SEP&gt;chunk-6965e521e19b54175b8063b76f581f31&lt;SEP&gt;chunk-5b02279de165a97728d81442f368fce3&lt;SEP&gt;chunk-1cd3785292674e6778a02587a94ca2be&lt;SEP&gt;chunk-26435cc51ec961d4bc384e2e8d9c6f88&lt;SEP&gt;chunk-ec91545ddc9cc68506032e4470a8a9f8&lt;SEP&gt;chunk-a2074c1ce083e1df89b954fe58b0b262&lt;SEP&gt;chunk-fb78f49fb6f886705d2c8450a4f83416&lt;SEP&gt;chunk-a70eebf800e7a62325facb9b2a39e225&lt;SEP&gt;chunk-cbca8a3204d1b4738454c99fcc14fd6c&lt;SEP&gt;chunk-35900977eb9299da11a0394943cf9257&lt;SEP&gt;chunk-f0ed8f16302e4eb641a96c123d7699d4&lt;SEP&gt;chunk-9a33a9a2cfc8a2bc3454dba98ae02d75&lt;SEP&gt;chunk-e95474548797126e22f1ff419766e65f&lt;SEP&gt;chunk-b8ca46505c25cb71f65e8e716fa0cc11&lt;SEP&gt;chunk-cbaad4f5ffa444e3dcb8bd427461a522&lt;SEP&gt;chunk-3cf8f1078cdae17cb169490b06a7d3a2&lt;SEP&gt;chunk-cff3159a90a97f5f8a586b9b02800305&lt;SEP&gt;chunk-da7fa5d862e7e684f2e2138e322bf294&lt;SEP&gt;chunk-ff82987a098b25f804d5fad5776fd19d&lt;SEP&gt;chunk-198ae95ae51a73bdde16bfabc5eeb0b1&lt;SEP&gt;chunk-46a2c80abbf0715cb6590c4e29109c36&lt;SEP&gt;chunk-8b3f7265a717e2c1b642303ee5e681c7&lt;SEP&gt;chunk-c0938a6509e63e88a09d6ba4b56654b1&lt;SEP&gt;chunk-e256f76874c017ad64b8c26abae14a81&lt;SEP&gt;chunk-3ebb2c409088319e502833350531aaa5&lt;SEP&gt;chunk-f0b1eaffa2e2206e0c4c14bd5799a6a5&lt;SEP&gt;chunk-6eea7eddaf35625985f819ad545909ce&lt;SEP&gt;chunk-33a24bfcac3a123fd6825fd7a9c3340b&lt;SEP&gt;chunk-c1a1b0abc28272f46be9093a21f65136&lt;SEP&gt;chunk-3ff911fde8bdcf8bd4624c83415292a5&lt;SEP&gt;chunk-a085aab048cc0c6bf5bf05d56b6745e9&lt;SEP&gt;chunk-5e8de8faf9039ca7b42684ddc53a8ec7&lt;SEP&gt;chunk-4faa9efda80f51cf7e323d1bf593ae3f&lt;SEP&gt;chunk-43df8dc4a15954796f288350d5490c29&lt;SEP&gt;chunk-1bfeef9a58955bf3e2ccd4cc860b3387&lt;SEP&gt;chunk-c8c08836ed219eac2f78784395ca751a&lt;SEP&gt;chunk-1a5695a13e9666f6da88052c24ef18d6&lt;SEP&gt;chunk-3b9b14ee7b72c05cb87811adb1c73b4d&lt;SEP&gt;chunk-2e79134b7e2ef2bed3518516035b2c4f&lt;SEP&gt;chunk-28c13a5c94182964bde50c27ad27ab93&lt;SEP&gt;chunk-3d849f409aa7fd6fa035cdc049cc9c4e&lt;SEP&gt;chunk-4a44d25733d7e250ff903ae46a3de731&lt;SEP&gt;chunk-f8079719074c639fa305906157aade98&lt;SEP&gt;chunk-4efd5ba965a41bf51a4ab842704088d1&lt;SEP&gt;chunk-258efc78e597faee830837bc841994ad&lt;SEP&gt;chunk-0a1062e0c26d240d4b7a1aa919a43b0d&lt;SEP&gt;chunk-dbc8a4ce9a6e80cd3c325b89dc6fb7a6&lt;SEP&gt;chunk-66aedae90503a87bb30259e7b942537c&lt;SEP&gt;chunk-880f3fe6ed4da0d4b6c4587adfeb4ab8&lt;SEP&gt;chunk-4f11779749aed293abcdd91a02dabb0d&lt;SEP&gt;chunk-efa98f08730928450460d7950d4a8f5b\nfile_path: ..\\..\\data\\de_an_2024_chunks.json&lt;SEP&gt;..\\..\\data\\data_1000_chunk_512.json\ncreated_at: 1775575954", "group": "concept", "value": 21}, {"id": 36, "label": "Năm học 2017-2018", "title": "entity_id: Năm học 2017-2018\nentity_type: mốc_thời_gian\ndescription: Năm học được xác định là trọng tâm công tác sau năm học 2016-2017 và là giai đoạn tiếp tục thực hiện các chỉ tiêu, kế hoạch, nhiệm vụ công tác đào tạo.&lt;SEP&gt;Năm học được nêu kế hoạch nhiệm vụ trong Hội nghị.&lt;SEP&gt;Năm học được xác định là trọng tâm công tác sau khi đánh giá năm học 2016-2017.&lt;SEP&gt;Năm học được đề ra kế hoạch nhiệm vụ trong Hội nghị.&lt;SEP&gt;Khoảng thời gian năm học 2017-2018, trong đó có học kì II liên quan đến học bổng.\nsource_id: chunk-30f1f5ef1a97261c29fe2d1041ddb840&lt;SEP&gt;chunk-a8bcb9373a60a7f6c24b0e489aa080be&lt;SEP&gt;chunk-2005eb4c51b813918c965dc8372a1598&lt;SEP&gt;chunk-81b00668814f85d085df1a7648c51f2f&lt;SEP&gt;chunk-f131c083ef7183d954e01cebf1ff156e\nfile_path: ..\\..\\data\\data_1000_chunk_512.json\ncreated_at: 1775576459", "group": "mốc_thời_gian", "value": 12}, {"id": 37, "label": "PGS.TS. Nguyễn Việt Hà", "title": "entity_id: PGS.TS. Nguyễn Việt Hà\nentity_type: person\ndescription: PGS.TS. Nguyễn Việt Hà là Hiệu trưởng Trường Đại học Công nghệ (ĐHCN). Trong năm học 2016–2017, ông tham gia Hội nghị đại biểu công chức, viên chức và tổ chức/tổng kết năm học với tư cách là Hiệu trưởng; các nội dung tổng kết của nhà trường và/hoặc các đơn vị thuộc trường ghi nhận sự tham dự của ông. Ông cũng tham dự hội nghị tổng kết năm học của các đơn vị trong Trường và đồng thời tham gia các hội thảo, thể hiện vai trò vừa điều hành công tác quản trị vừa tham gia hoạt động học thuật. Tư liệu cũng cho thấy ông giữ vai trò Hiệu trưởng và tham dự Hội nghị tài chính năm 2019.\n\nVề đối ngoại và hợp tác, PGS.TS. Nguyễn Việt Hà tham dự và tiếp đón/gặp mặt Bộ trưởng Bộ Khoa học và Công nghệ Lào Boviengkham Vongdara, phản ánh sự tham gia ở cấp bộ. Ông tham dự và phát biểu tại phiên khai mạc của Hội nghị tài chính trực tuyến năm 2021, trong đó đánh giá kết quả cải thiện nguồn thu và nêu các điểm sáng cũng như những tồn tại, hạn chế trong hoạt động tài chính. Ngoài ra, ông đại diện Trường ĐHCN tham gia các hoạt động ký kết; trong các tư liệu ảnh ông được ghi nhận cùng các đại diện. Trong bối cảnh hợp tác, ông tiếp đoàn và bày tỏ sự vui mừng khi Samsung coi trọng hợp tác với nhà trường. Ông cũng phát biểu tại phiên bế mạc và tiếp thu các khuyến nghị của Đoàn đánh giá ngoài.\nsource_id: chunk-a8bcb9373a60a7f6c24b0e489aa080be&lt;SEP&gt;chunk-286b577c73681bccb19daefed6cccaa1&lt;SEP&gt;chunk-26435cc51ec961d4bc384e2e8d9c6f88&lt;SEP&gt;chunk-09dec0902abc37cf1ffabad616527206&lt;SEP&gt;chunk-a6856939570a377795a7ff53827b17a9&lt;SEP&gt;chunk-2eece05b4ca6a947ce4ee36f1834b8cd&lt;SEP&gt;chunk-dd1026ed848085f290de481ab1d588cf&lt;SEP&gt;chunk-75953e090f489e714f8f24eb0bf5b4e3&lt;SEP&gt;chunk-81b00668814f85d085df1a7648c51f2f&lt;SEP&gt;chunk-6d1a8882f2f906bd16024b8cc49f983f&lt;SEP&gt;chunk-cbe1df14348439cf10645c5beb4ce748&lt;SEP&gt;chunk-a726ca204a80d494294cbbfa85f3169e&lt;SEP&gt;chunk-80fd2fdd8cfd6f45704669bb2568aec8&lt;SEP&gt;chunk-33a24bfcac3a123fd6825fd7a9c3340b&lt;SEP&gt;chunk-d3ddb5e27bb9e8b895402cfab6496f48&lt;SEP&gt;chunk-e8e4aec6754d5b1c472e0f2ca9c98229&lt;SEP&gt;chunk-dbc8a4ce9a6e80cd3c325b89dc6fb7a6&lt;SEP&gt;chunk-618a5b5b173679fd25c32da7d4095869&lt;SEP&gt;chunk-4f11779749aed293abcdd91a02dabb0d&lt;SEP&gt;chunk-efa98f08730928450460d7950d4a8f5b\nfile_path: ..\\..\\data\\data_1000_chunk_512.json\ncreated_at: 1775575953", "group": "person", "value": 17}, {"id": 38, "label": "PGS.TS. Phạm Bảo Sơn", "title": "entity_id: PGS.TS. Phạm Bảo Sơn\nentity_type: person\ndescription: PGS.TS. Phạm Bảo Sơn là Phó Chủ nhiệm khoa Công nghệ thông tin, tham gia trao giải thưởng cho các NCS khoa CNTT.&lt;SEP&gt;PGS.TS. Phạm Bảo Sơn là Phó Hiệu trưởng Nhà trường, tham dự hội thảo.&lt;SEP&gt;Một trong các lãnh đạo được nêu tham dự lễ bế mạc cùng các trưởng/phó phòng ban và các khoa.&lt;SEP&gt;PGS.TS. Phạm Bảo Sơn là Bí thư Đảng ủy, phát biểu tổng kết tại hội nghị, khẳng định kết quả của Đảng bộ Trường và nêu các nhiệm vụ trọng tâm cho năm 2019.&lt;SEP&gt;Bí thư Đảng ủy; phát biểu tổng kết hội nghị.&lt;SEP&gt;Đại diện của ĐHQGHN tham dự buổi lễ khai giảng với chức danh Phó Giám đốc ĐHQGHN.\nsource_id: chunk-4d615de6e6f01f3af3a25a5b99d35f3b&lt;SEP&gt;chunk-fffc22ca4e4b27a0e13f47d115e19983&lt;SEP&gt;chunk-81f18e91a5029c15ef23ce86e8d2d7cf&lt;SEP&gt;chunk-cbe1df14348439cf10645c5beb4ce748&lt;SEP&gt;chunk-553080a17f7731b8b355581319ce2133&lt;SEP&gt;chunk-94f9971d368da1ee816d9fea1b85fdad&lt;SEP&gt;chunk-a5998feea2b4711403e27c05e0df301b\nfile_path: ..\\..\\data\\data_1000_chunk_512.json\ncreated_at: 1775554413", "group": "person", "value": 13}, {"id": 39, "label": "Phạm Bảo Sơn", "title": "entity_id: Phạm Bảo Sơn\nentity_type: person\ndescription: Nhân sự được nhắc đến trong phần mô tả có tham gia cùng các trưởng/phó phòng ban/chức năng và các khoa trong trường.&lt;SEP&gt;Phạm Bảo Sơn phát biểu chúc mừng và trao huy hiệu 30 năm tuổi Đảng cho 2 đồng chí tại buổi lễ.&lt;SEP&gt;Bí thư Đảng uỷ Trường ĐHCN, tham dự buổi lễ và trao quyết định và huy hiệu 30 năm tuổi Đảng.&lt;SEP&gt;Phạm Bảo Sơn là Phó Hiệu trưởng, chụp ảnh cùng cô Nguyễn Thị Xoan.&lt;SEP&gt;Phạm Bảo Sơn được Thủ tướng Chính phủ bổ nhiệm làm Phó Giám đốc ĐHQGHN; đồng thời là Phó Hiệu trưởng Trường Đại học Công nghệ thuộc ĐHQGHN và được công nhận năng lực tại lễ công bố.\nsource_id: chunk-4bd09eabb5d4f8f2393b46c5439befb0&lt;SEP&gt;chunk-dba5b377e1c9b5b068f0ca57f56cec60&lt;SEP&gt;chunk-4a5d559f1efa1f5cef1a8018588ed86d&lt;SEP&gt;chunk-614c9735abf0d5083487b3e6fb51231a&lt;SEP&gt;chunk-9648f19efbd48cd5d8564f4e27b0d44d\nfile_path: ..\\..\\data\\data_1000_chunk_512.json\ncreated_at: 1775571375", "group": "person", "value": 12}, {"id": 40, "label": "Phạm Thị Minh Trang", "title": "entity_id: Phạm Thị Minh Trang\nentity_type: person\ndescription: Phạm Thị Minh Trang là sinh viên nỗ lực học tập liên tiếp trong 4 năm và nhận học bổng Jardine Cycle &amp; Carriage.\nsource_id: chunk-b1d594998c1682c2568840c15e1bd189\nfile_path: ..\\..\\data\\data_1000_chunk_512.json\ncreated_at: 1775537728", "group": "person", "value": 12}, {"id": 41, "label": "Sinh Viên Đại Học Hệ Chính Quy", "title": "entity_id: Sinh Viên Đại Học Hệ Chính Quy\nentity_type: đối_tượng_khu_vực\ndescription: Nhóm đối tượng sinh viên đại học hệ chính quy, đang trong thời gian đào tạo chính thức và thuộc diện nộp hồ sơ trợ cấp xã hội.&lt;SEP&gt;Nhóm đối tượng sinh viên được yêu cầu thực hiện nộp hồ sơ nhận trợ cấp xã hội.&lt;SEP&gt;Nhóm đối tượng được Phòng Đào tạo gửi thông tin về các chứng chỉ ngoại ngữ đáp ứng chuẩn đầu ra.&lt;SEP&gt;Nhóm đối tượng được yêu cầu nộp hồ sơ: sinh viên đại học hệ chính quy của Trường Đại học Công nghệ.&lt;SEP&gt;Sinh Viên Đại Học Hệ Chính Quy là nhóm sinh viên được yêu cầu làm hồ sơ xin miễn, giảm học phí.&lt;SEP&gt;Nhóm sinh viên thuộc hệ chính quy tại Đại học Công nghệ, được đề nghị làm hồ sơ xin miễn, giảm học phí nếu thuộc đúng đối tượng.\nsource_id: chunk-ce24d7b914739b0af35834efa118fb56&lt;SEP&gt;chunk-bb3bc6fa71c3037ec14a3077247d3ed9&lt;SEP&gt;chunk-1a3df01c18894f70ba1089c4742063c5&lt;SEP&gt;chunk-8a8bf0a7a35902248e9287f31956d16c&lt;SEP&gt;chunk-580b5abdf4be0a326badd5dd25bce593&lt;SEP&gt;chunk-907c25d340b82628688d48f44a193d56\nfile_path: ..\\..\\data\\data_1000_chunk_512.json\ncreated_at: 1775576277", "group": "đối_tượng_khu_vực", "value": 12}, {"id": 42, "label": "Thỏa thuận hợp tác", "title": "entity_id: Thỏa thuận hợp tác\nentity_type: điều_khoản\ndescription: Thỏa thuận hợp tác được nêu là kết quả ký kết trong chuyến đến thăm và làm việc năm 2017.&lt;SEP&gt;Thỏa thuận hợp tác do hai hiệu trưởng ký, liên quan đến hợp tác giáo dục giữa Cộng hòa Belarus và Việt Nam.&lt;SEP&gt;Thỏa thuận hợp tác giữa phía Việt Nam và các trường đại học Belarus trong lĩnh vực kỹ thuật công nghệ được ký kết trong khuôn khổ “Ngày hội Giáo dục Belarus”.&lt;SEP&gt;Thỏa thuận được Trường ĐH Công nghệ, ĐHQGHN ký kết với hai đại học quốc gia của Belarus về lĩnh vực kỹ thuật công nghệ.&lt;SEP&gt;Thỏa thuận hợp tác là các thỏa thuận được ký giữa các trường và giữa hai bên Cộng hòa Belarus và Việt Nam trong lĩnh vực giáo dục.&lt;SEP&gt;Cơ sở hợp tác giữa Trường Đại học Công nghệ, Đại học Quốc gia Hà Nội và Trường Đại học Công nghệ Chiba, được nêu là căn cứ để trao học bổng.&lt;SEP&gt;Các thỏa thuận hợp tác được ký kết giữa lãnh đạo các bên liên quan, làm cơ sở cho việc mở rộng mô hình phối thuộc.\nsource_id: chunk-2bf09b0414a94411876841812c14f029&lt;SEP&gt;chunk-a327cb862a6fa32c514f2b9ff0bdcc04&lt;SEP&gt;chunk-8ebf34cb943b7ae241ee5638de0cb5df&lt;SEP&gt;chunk-345ba3ea4c0a4f72cc85d813e2af9cd8&lt;SEP&gt;chunk-1bae06f1a4113699c662d137b2664719&lt;SEP&gt;chunk-5e0d5eb2b63e933c911e3c3ff608faa2&lt;SEP&gt;chunk-b3b9b194ea53d1e6157391c0e749aaee\nfile_path: ..\\..\\data\\data_1000_chunk_512.json\ncreated_at: 1775572110", "group": "điều_khoản", "value": 15}, {"id": 43, "label": "Trường ĐHCN", "title": "entity_id: Trường ĐHCN\nentity_type: đơn_vị_trực_thuộc\ndescription: Trường ĐHCN (Trường Đại học Công nghệ) là một đơn vị thuộc Đại học Quốc gia Hà Nội (ĐHQGHN), được mô tả có vai trò quan trọng trong hệ thống đào tạo và quản trị của ĐHQGHN, định hướng ưu tiên theo chiến lược của ĐHQGHN và được nhấn mạnh là đơn vị tiên phong trong các trường thành viên. Về tổ chức đào tạo, Trường có hai khu học tập chính; việc học của sinh viên được phân bổ theo ngành và theo thời gian học. Công tác quản lý đào tạo và người học được thực hiện thông qua các khoa gắn với cơ cấu giảng viên và cán bộ khoa học (từ trình độ tiến sĩ trở lên), có nhắc đến tỷ lệ GS và PGS. Trường có cơ chế ghi nhận thành tích theo giai đoạn (ví dụ năm 2018 ghi nhận 12 gương mặt trẻ tiêu biểu nhận danh hiệu), cung cấp học bổng cho thủ khoa đầu vào (có mô tả liên quan học bổng ADF), và tổ chức các hoạt động hỗ trợ/ghi nhận sinh viên đạt giải trong kỳ thi học sinh giỏi và Olympic cấp khu vực hoặc quốc tế. Hoạt động nghiên cứu và đào tạo được nêu theo các giai đoạn, có đề cập nhóm sinh viên đạt Giải Nhì “Sinh viên nghiên cứu khoa học” năm 2016 và các giai đoạn 2020–2021. \n\nTrường ĐHCN liên quan đến chương trình đào tạo thứ 05, được đánh giá đạt chuẩn AUN-QA và tham gia định hướng đào tạo; đồng thời Trường ban hành quy định về yêu cầu hồ sơ trong quản lý quy trình, bổ sung quy định chung của ĐHQGHN. Trường tham gia đánh giá cơ sở trong hệ thống ĐHQGHN như một “chương trình đánh giá thứ năm”. Trong tuyển sinh, Trường xây dựng phương án tuyển sinh hằng năm làm căn cứ và ban hành quy định cụ thể về yêu cầu hồ sơ theo từng năm; một số mô tả cũng ghi nhận vai trò hỗ trợ đào tạo ngành Kỹ thuật robot theo phương án tuyển sinh hằng năm. Trường còn tham gia hoạt động sinh viên phục vụ tuyển dụng, bao gồm tập hợp sinh viên, phối hợp hội thảo tuyển dụng, hỗ trợ thực hiện, quản lý sinh viên và điều chỉnh lịch học. Ngoài ra, Trường được nhắc trong bối cảnh là nơi sinh viên đạt các giải nhì cấp ĐHQGHN.\n\nVề hợp tác và hệ sinh thái sáng tạo, Trường tổ chức trao đổi/làm việc và cử cán bộ, sinh viên sang Trường Đại học Công nghệ Chiba; phát triển hợp tác đào tạo gắn với người học và việc làm, tiếp nhận ý kiến để tăng cường năng lực quản trị đại học và đẩy mạnh đào tạo, nghiên cứu tại cơ sở tầng 7 Nhà E3, nơi JTIRC đặt trụ sở. Trường tham gia hệ sinh thái Creative Lab by UP (với đối tác UTS), được mô tả bảo đảm cơ sở vật chất và trang thiết bị nghiên cứu cho sinh viên nước ngoài; đồng thời là đối tác với Viện nghiên cứu sáng chế và khai thác, phối hợp chương trình b by UP để tổ chức hoạt động tạo sân chơi sáng tạo, hỗ trợ hiện thực hóa ý tưởng và tham dự sự kiện/trưng bày, bao gồm Triển lãm quốc tế đầu tiên về đổi mới sáng tạo Việt Nam. Trường tham gia trưng bày sản phẩm khoa học công nghệ và ký kết chương trình hợp tác hỗ trợ phát triển Trung tâm (02 gian hàng, 04 sản phẩm) tại lễ ra mắt Trung tâm Đổi mới Sáng tạo về internet vạn vật; đồng thời tham gia tuyển dụng trong khuôn khổ chương trình khoa học và công nghệ quốc gia liên quan đến trạm thu di động thông tin vệ tinh nhằm nâng cao chất lượng đào tạo và cơ hội việc làm. Về hoạt động xã hội, Trường tổ chức hoạt động “xanh” ở Hòa Lạc và tham gia phong trào thi đua “Giỏi việc trường – Đảm việc nhà” giai đoạn 2016–2020, đồng thời tham gia xây dựng bản đồ số Việt Nam (VNmap) trong đề án Hệ tri thức Việt số hóa.\n\nVề năng lực giảng dạy và nghiên cứu, Trường triển khai các ngành đào tạo qua các khoa chủ chốt, trong đó có Khoa Vật lý kỹ thuật và Công nghệ nano; đồng thời có mô tả liên quan đến Khoa Cơ học kỹ thuật và Tự động hóa, cùng các khoa chủ chốt cho đào tạo và phát triển trong các lĩnh vực điện tử, viễn thông và công nghệ thông tin. Các nhân sự được nêu gồm GS.TS. NGƯT Bạch Gia Dương (liên quan nghiên cứu siêu cao tần), PGS.TS Nguyễn Ngọc Bình (được mô tả là người Việt Nam đầu tiên được một trường đại học của Nhật Bản mời và bổ nhiệm), và Nguyễn Thị Xoan (công tác 22 năm), đồng thời Nguyễn Thị Xoan được nêu là đồng sáng lập InfoRe (được mô tả là cựu sinh viên của Trường). Trường cũng được liên hệ với các nhóm thầy trò/đề tài đạt giải liên quan đến Nguyễn Như Cường và Nguyễn Tiến Duy, có thông tin Trường chủ trì hội nghị về trí tuệ nhân tạo lần đầu tiên, là đích trúng tuyển cho sinh viên khóa QH.2023, tổ chức đào tạo sau đại học và hợp tác với các tập đoàn công nghệ/doanh nghiệp để tạo môi trường thực tập và hỗ trợ định hướng nghề nghiệp. Trường tổ chức gặp mặt các thế hệ cán bộ, giảng viên, trao tặng danh hiệu thi đua, khen thưởng và kỷ niệm chương.\n\nVề lãnh đạo và các sự kiện, Trường ĐHCN được nêu là nơi PGS.TS Nguyễn Việt Hà giữ chức vụ Hiệu trưởng và là đơn vị tổ chức kỳ thi IOI 2020 trực tuyến tại Việt Nam; Trường cũng được ghi nhận là điểm đến đoàn công tác nơi GS. Kazuhiro Takanabe đánh giá hiệu quả cao. Trường có thông tin phỏng vấn TS. Đinh Triều Dương và ghi nhận một số nhân sự/đối tác như Nguyễn Thị Thanh Vân, đồng thời có mô tả bổ sung liên quan đến PGS.TS Lê Anh Cường. Trường hỗ trợ tổ chức các khóa đào tạo công nghệ về lập trình Java, lập trình ứng dụng Android, lập trình ứng dụng mobile và thực hiện các đề tài nghiên cứu phát triển công nghệ; đồng thời một mô tả khác chỉ nêu Trường ĐHCN là đơn vị được đề cập trong nội dung thông báo.\nsource_id: chunk-c324b92b681c17cdf3eba24ba23d8617&lt;SEP&gt;chunk-911dbda4cdcc1d65567a9ed8f9511285&lt;SEP&gt;chunk-dc8ed48bf33f9c590e86423b4cffdf9a&lt;SEP&gt;chunk-3d4aef5003e1aee160cdc619a29f60ef&lt;SEP&gt;chunk-24bf8f10fe4493b04a123772b28798a7&lt;SEP&gt;chunk-d62c6
