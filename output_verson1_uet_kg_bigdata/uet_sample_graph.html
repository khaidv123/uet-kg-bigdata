lt;SEP&gt;chunk-63e975c10765e044d994471ee1e0a86f&lt;SEP&gt;chunk-c854cbe0973076620c102f92ebe0b38e&lt;SEP&gt;chunk-bc75659918a5984dda532f0b481b51aa&lt;SEP&gt;chunk-05e825400e75116f5897686ee1bcbfdf&lt;SEP&gt;chunk-286d542bfd69c0b1c7ad1cfdd15b745d&lt;SEP&gt;chunk-efa98f08730928450460d7950d4a8f5b&lt;SEP&gt;chunk-aa3e8ae62b2af0da1857e881aa9a9de0&lt;SEP&gt;chunk-c401f3557f59df12ef5b95fcefe119e7\nfile_path: ..\\..\\data\\data_1000_chunk_512.json\ncreated_at: 1775576126", "group": "đơn_vị_trực_thuộc", "value": 18}, {"id": 73, "label": "Trường Đại Học Công Nghệ", "title": "entity_id: Trường Đại Học Công Nghệ\nentity_type: organization\ndescription: Trường Đại Học Công Nghệ (đôi khi viết “Trường Đại học Công nghệ”, viết tắt “Trường ĐHCN”) là một cơ sở giáo dục đại học tham gia các hoạt động tổ chức, đào tạo và tuyển sinh. Trường được mô tả là đơn vị thuộc Đại học Quốc gia Hà Nội (ĐHQGHN), đồng thời định hướng bảo đảm chất lượng theo chuẩn quốc tế thông qua hợp tác với các đối tác trong và ngoài nước, bao gồm ký kết/phát triển các dự án và các cụm hoạt động liên quan đến ĐHQGHN. Trường cũng được nêu trong bối cảnh tham gia ký kết thỏa thuận hợp tác song phương với Viện Nghiên cứu sáng chế và khai thác (thuộc ĐHQGHN), tiếp nhận hỗ trợ quốc tế cho chương trình đào tạo, giảng dạy và triển khai thông tin học bổng theo các thỏa thuận hợp tác; tổ chức các lễ ký kết phục vụ phối hợp đào tạo và tuyển dụng; và phối hợp tổ chức hội thảo tuyển dụng việc làm cho sinh viên sắp tốt nghiệp.\n\nVề tổ chức–quản trị và hoạt động học thuật, Trường Đại Học Công Nghệ có công đoàn nhà trường và công đoàn khối Hiệu bộ, đồng thời tổ chức đại hội công đoàn khối Hiệu bộ. Về chuyên môn, trường có Khoa Điện tử Viễn thông (đôi khi ghi “Khoa Điện tử viễn thông”) và có Khoa Vật lý kỹ thuật và Công nghệ nano tham gia phát triển sản phẩm. Trường gắn với đào tạo và tuyển sinh, bao gồm xét tuyển và thông báo xét tuyển thẳng; có kế hoạch bế giảng/trao bằng theo từng đợt (ví dụ kế hoạch năm học 2023–2024 và trao bằng “Đợt 1” năm 2024), đồng thời thông báo kế hoạch học tập/tuần sinh hoạt công dân sinh viên cho năm học 2018–2019. Trường được mô tả là đơn vị đào tạo sinh viên đại học chính quy trong thời gian đào tạo chính thức thuộc diện nộp hồ sơ trợ cấp xã hội và là đối tượng của đợt khảo sát chính thức kiểm định chất lượng, đồng thời tiếp đón và làm việc với đoàn chuyên gia đánh giá chất lượng cấp cơ sở giáo dục theo tiêu chuẩn kiểm định chất lượng giáo dục của Bộ GD&amp;ĐT. Một số mô tả cũng đề cập đến tuyển sinh theo các mốc tham khảo điểm trúng tuyển năm 2018–2019.\n\nTrong lĩnh vực nghiên cứu và hoạt động công nghệ, Trường Đại Học Công Nghệ được mô tả gắn với nỗ lực làm chủ công nghệ điện gió hiệu năng cao và các bước liên quan đến hệ thống điện gió tổng thể. Trường tham gia hoạt động cộng đồng như chương trình hỗ trợ sinh viên có hoàn cảnh khó khăn nhân dịp Tết 2022 và tổ chức tham quan/kiến tập thực tế tại doanh nghiệp. Trường còn được mô tả là thành viên trong chương trình đào tạo Điện toán đám mây của Amazon. Một số nội dung đề cập trường trong các hội nghị sơ kết giữa nhiệm kỳ 2015–2020 với Đảng bộ, cũng như trong đóng góp của các trường đại học công nghệ cho việc cung cấp nhân lực phát triển ngành bán dẫn. Một số mô tả liên hệ trường với KHOA CÔNG NGHỆ NÔNG NGHIỆP và tham gia đào tạo, tổ chức Hội nghị đào tạo năm học 2016–2017, cùng triển khai nhiều chương trình đào tạo và công tác tuyển sinh. Trường cũng xuất hiện trong ngữ cảnh dùng tên “Trường ĐH Công nghệ – Đại học Quốc gia Hà Nội (VNU-UET)” như một tên gọi liên quan và được nhắc đến như đơn vị tổ chức buổi gặp mặt chia tay. Về quản trị nghiên cứu, hiệu trưởng ban hành quyết định 640/QĐ-CTSV công nhận nghiên cứu sinh. Một số mô tả bổ sung nêu rằng sinh viên phải thi đỗ để đáp ứng tiêu chí trong “Học Tập 1”, đồng thời trường là cơ sở giáo dục đại học có liên quan đến đối tượng sinh viên đại học hệ chính quy tại trường.\n\nNgoài ra, Trường Đại Học Công Nghệ được ghi nhận đã tổ chức buổi nhập học cho chương trình đào tạo chất lượng cao đối với ngành Khoa học máy tính và Công nghệ kỹ thuật điện tử, truyền thông.\nsource_id: chunk-f81ebbd06cc6ee41baae9dc03554dd54&lt;SEP&gt;chunk-cadba0d059bc4060a57eb1df3a65e144&lt;SEP&gt;chunk-c9d66ec8634b64e3621d5fd4186eefa1&lt;SEP&gt;chunk-522a85684dbf6e36456ac34398662fd9&lt;SEP&gt;chunk-60b72a332210e60072ad9a6b5c69b509&lt;SEP&gt;chunk-0d2f82e52e6b948f23822a3979f97d5f&lt;SEP&gt;chunk-2fcee1b38d0995af08d41a10cb50b6b6&lt;SEP&gt;chunk-5a1c6f8a47409d216a938e8a1d44d421&lt;SEP&gt;chunk-b23156692529fb0b927615a67bb44310&lt;SEP&gt;chunk-e61341e964d49b40ba059b00c4be5856&lt;SEP&gt;chunk-ce24d7b914739b0af35834efa118fb56&lt;SEP&gt;chunk-2829159a7da87d2067e92f62f6daa5e5&lt;SEP&gt;chunk-2b6b55dc02e1ddbbc958f2c26d5eefcd&lt;SEP&gt;chunk-ad1d10b4013dd044990c9a4511e35416&lt;SEP&gt;chunk-7c940ae81078db4b25f07fd960582d4f&lt;SEP&gt;chunk-64360a1c12b1ce1666dae520d5548536&lt;SEP&gt;chunk-6d1a8882f2f906bd16024b8cc49f983f&lt;SEP&gt;chunk-61f256ad335e082d67ee0cad6d3767d8&lt;SEP&gt;chunk-d4e29998c50441f18626a93a1cde2661&lt;SEP&gt;chunk-9c5d7d5f2f8c847971799cd3ffb43cec&lt;SEP&gt;chunk-46e692bcf6e2caf0d2a35ec5f5786550&lt;SEP&gt;chunk-e6b17d109b3d7b5afd61e22e3f485632&lt;SEP&gt;chunk-3e5d9d16dbca5cfca6458b1f396c1496&lt;SEP&gt;chunk-4810b39af41b06f6dc177ececb2ded6a&lt;SEP&gt;chunk-c8c93b4f68bb9342b0c400e3c9b15210&lt;SEP&gt;chunk-f50f1b2f0fb830d3b1a5ad22ae3e32fa&lt;SEP&gt;chunk-f845a4dab795d68dd7d5666a03f8143a&lt;SEP&gt;chunk-8a8bf0a7a35902248e9287f31956d16c&lt;SEP&gt;chunk-cdd5647f24a79212bedf829945f5d9dd&lt;SEP&gt;chunk-3089a518dedc919fea98594b62e909f1&lt;SEP&gt;chunk-5d36424d5f8d7390c1ba84b79e167b8a&lt;SEP&gt;chunk-fe5e86546e71546907836b5cd0f24bcb&lt;SEP&gt;chunk-e51795219f0810d4a814cd272438bb84&lt;SEP&gt;chunk-fb4aadc6417463845b5999287f6ab063&lt;SEP&gt;chunk-790636d74a6a9390a5d937bccf9f50e6&lt;SEP&gt;chunk-78630d5c86d5f4b44cca7ca39ab93dc3&lt;SEP&gt;chunk-85670a1edb34a2ef42b161f92ccfafb6&lt;SEP&gt;chunk-66d1600bb3e45c6a3047794240346743&lt;SEP&gt;chunk-580b5abdf4be0a326badd5dd25bce593&lt;SEP&gt;chunk-078f8d9ea78e915ccd92eca2045d1146\nfile_path: ..\\..\\data\\data_1000_chunk_512.json\ncreated_at: 1775575963", "group": "organization", "value": 14}, {"id": 74, "label": "Trường Đại học Công nghệ – ĐHQGHN", "title": "entity_id: Trường Đại học Công nghệ – ĐHQGHN\nentity_type: organization\ndescription: Trường Đại học Công nghệ – ĐHQGHN (VNU-UET) là một cơ sở giáo dục thuộc Đại học Quốc gia Hà Nội (ĐHQGHN). Các mô tả liên quan đến Trường gắn với nhiều cá nhân và vai trò khác nhau, trong đó Trường được nêu là có liên quan đến TS. Đỗ Đức Đông và là nơi Nguyễn Văn Hiệu được đề cập với vai trò Hiệu trưởng sáng lập. Về hoạt động học thuật và hợp tác, Trường Đại học Công nghệ – ĐHQGHN tham dự và/hoặc cử đại diện tham gia các sự kiện; đồng thời là đơn vị đăng cai và phối hợp tổ chức hội thảo. Trường cũng được mô tả tham gia ký kết thỏa thuận hợp tác song phương và phối hợp tổ chức hội thảo “Trường nghiên cứu về Các công nghệ tiên tiến trong ứng dụng Internet-of-Things” (RS2017). Bên cạnh đó, Trường được mô tả luôn hỗ trợ và tạo môi trường để thúc đẩy sáng tạo, khởi nghiệp cho sinh viên và cựu sinh viên, đồng thời triển khai nội dung về sinh viên hội nhập quốc tế.\n\nTrong đào tạo và tổ chức nội bộ, các mô tả ghi nhận Trường Đại học Công nghệ – ĐHQGHN là nơi một số cá nhân học tập (bao gồm Trần Nguyễn Phương Nam; Vũ Thị Minh Thư; Đoàn Đức Mạnh; Vũ Thành Long). Trường cũng được nêu có các đơn vị thuộc Trường xuất hiện gắn với vai trò đồng chí Chử Đức Trình (Phó Hiệu trưởng), và có hỗ trợ tích cực để sinh viên tiếp cận nguồn học bổng. Ở lĩnh vực sở hữu trí tuệ, Trường được mô tả là đơn vị được cấp bằng độc quyền sáng chế cho “Thiết bị la bàn điện tử” theo các quyết định/ văn bản tương ứng được nêu trong mô tả. Ngoài ra, Trường còn được mô tả là đơn vị chủ trì dự án/đề tài nghiên cứu và là nơi nhận tài trợ cho các công trình khoa học do Quỹ VinIF tổ chức.\nsource_id: chunk-9c64ae932473815f6deb1f5a4cb6adf1&lt;SEP&gt;chunk-86cfcb4ee52da2b2643757368bd183ac&lt;SEP&gt;chunk-d95fce5269bba584984947febdcc48f4&lt;SEP&gt;chunk-d7646afd71a7fe117eb4720c8fa4e688&lt;SEP&gt;chunk-04500fb4dd8ed15e0c55f510c02dc121&lt;SEP&gt;chunk-8455c45ea6c7cd65abb7df3df1e9ed4c&lt;SEP&gt;chunk-d80f11d9041fa41b149ae355215a077c&lt;SEP&gt;chunk-2dc6425f3af826241828b938d3b9947c&lt;SEP&gt;chunk-913cf9dba6a40fb60f8bc6fe33f9366a&lt;SEP&gt;chunk-49657745ab392f0b35c898d04c27a5a7&lt;SEP&gt;chunk-1bfeef9a58955bf3e2ccd4cc860b3387&lt;SEP&gt;chunk-181abd1ab03d7ff3faf19da49d8da2c5&lt;SEP&gt;chunk-87e5549e1de1fcbf4b93b0e1735ba280&lt;SEP&gt;chunk-ca5cb0bee2f935f59219b26328a9a750\nfile_path: ..\\..\\data\\data_1000_chunk_512.json\ncreated_at: 1775575046", "group": "organization", "value": 13}, {"id": 75, "label": "Trường Đại học Công nghệ – Đại học Quốc gia Hà Nội", "title": "entity_id: Trường Đại học Công nghệ – Đại học Quốc gia Hà Nội\nentity_type: location\ndescription: Trường Đại học Công nghệ – Đại học Quốc gia Hà Nội là một trường đại học thành viên thuộc Đại học Quốc gia Hà Nội (ĐHQGHN), có sứ mệnh đào tạo nguồn nhân lực chất lượng cao đồng thời thực hiện nghiên cứu phát triển và ứng dụng khoa học–công nghệ. Trường được mô tả là đơn vị tiên phong trong việc tiếp cận các chuẩn mực giáo dục đại học của khu vực và thế giới, đồng thời duy trì vị thế trong các lĩnh vực mũi nhọn; trong đó có 4/6 lĩnh vực được xếp hạng so với năm 2022.\n\nVề hoạt động học thuật và sự kiện, Trường tổ chức Lễ ra mắt Viện Trí tuệ nhân tạo trực thuộc Trường vào ngày 25/5/2022 theo cả hình thức trực tiếp và trực tuyến. Năm 2024, Trường là đơn vị tổ chức Hội nghị Đào tạo và Khoa học công nghệ, tập trung vào các định hướng đào tạo và khoa học công nghệ, kèm phiên khai mạc khảo sát chính thức đánh giá ngoài. Trường cũng phối hợp tổ chức lễ khai mạc một cuộc thi lần đầu diễn ra tại Trường (có trao thưởng, liên quan đến Khoa Công nghệ thông tin), được nêu là địa điểm tổ chức lễ trao học bổng năm 2022, và là nơi diễn ra Lễ bảo vệ luận án Tiến sĩ chuyên ngành Hệ thống thông tin tại Hà Nội. Ngoài ra, Trường tổ chức lễ kỷ niệm 40 năm ngày Nhà giáo Việt Nam. Một mô tả khác cho biết Trường là nơi diễn ra Lễ bảo vệ luận án tiến sĩ vào sáng ngày 07/11; nội dung này phù hợp với việc Trường thường xuyên tổ chức bảo vệ luận án tiến sĩ.\n\nTrong nhân sự và quản lý đào tạo, Trường được ghi nhận có thêm 03 nhà giáo đạt tiêu chuẩn chức danh giáo sư và phó giáo sư vào năm 2023; đồng thời xuất hiện trong bối cảnh các quyết định công nhận nghiên cứu sinh, bao gồm nhắc đến quyết định công nhận nghiên cứu sinh số 394/QĐ-ĐT, thể hiện vai trò “đơn vị” trong quy trình liên quan. Về hợp tác quốc tế, Trường ký thỏa thuận hợp tác với MAI về đào tạo và nghiên cứu, có sinh viên ngành Công nghệ hàng không vũ trụ tham gia chương trình theo thỏa thuận; đồng thời ký kết hợp tác giai đoạn 3 với Tập đoàn Samsung Việt Nam nhằm tiếp tục cung cấp nguồn nhân lực chất lượng cao. Trường cũng tham gia tư vấn tuyển sinh (hỗ trợ thí sinh hướng dẫn đăng ký xét tuyển đại học năm 2017) và phối hợp tổ chức tọa đàm; đồng thời hợp tác tổ chức buổi nói chuyện với LG Display Việt Nam Hải Phòng. Ngoài ra, một đơn vị trong nước tổ chức buổi tiếp và làm việc với Trường Đại học Tokyo (Nhật Bản), với sự tham dự có đại diện từ các viện thuộc Trường.\nsource_id: chunk-eea7f3f0a77966b3554bf342903e05eb&lt;SEP&gt;chunk-7b81d0c6634bd97499f8cb8631bf5c4f&lt;SEP&gt;chunk-5be46360f8c709deb9a6dbb367592d78&lt;SEP&gt;chunk-e54dc90afe47788551038c0c8c5a20b3&lt;SEP&gt;chunk-1e34a321b19ea73c53b8b95dcf48dfc1&lt;SEP&gt;chunk-9889b42ff019ea22443f04049e5bbf83&lt;SEP&gt;chunk-2f9664a1c1ca19a444c5ba82dddc6ea9&lt;SEP&gt;chunk-2737f7dcc8c9be0a2115154d37dfbe32&lt;SEP&gt;chunk-7fbbc42dcf818c71b6ae768644d0f223&lt;SEP&gt;chunk-8995429eb96a1d438614d966ef45910a&lt;SEP&gt;chunk-68b1a983bdd20072f83db7f563c13d5a&lt;SEP&gt;chunk-49968df12333b15f8600e3de89d62437&lt;SEP&gt;chunk-4831025db240fc1fe9d61dc85890f851&lt;SEP&gt;chunk-082031e1b79e5138b19557686af1faa5&lt;SEP&gt;chunk-5fc3f25285a47deefa15107355dd6ee7&lt;SEP&gt;chunk-0a1bcd18732094697c8b72ef2b2b6296&lt;SEP&gt;chunk-c1a1b0abc28272f46be9093a21f65136&lt;SEP&gt;chunk-305e49817591b2e668a10b5250878527&lt;SEP&gt;chunk-40776dff6ef683e25f5af67abc07f01e&lt;SEP&gt;chunk-5e8c077ffe88c7422abef83194d113d8&lt;SEP&gt;chunk-1d30ad17f1121b9cb09529be712ce5a4\nfile_path: ..\\..\\data\\data_1000_chunk_512.json\ncreated_at: 1775558297", "group": "location", "value": 12}, {"id": 76, "label": "Việt Nam", "title": "entity_id: Việt Nam\nentity_type: location\ndescription: Việt Nam là một “quốc gia/bối cảnh” xuất hiện trong nhiều lĩnh vực và chuỗi hoạt động đa dạng. Ở cấp độ công nghệ và cộng đồng, Việt Nam gắn với nhu cầu bảo đảm khả năng tiếp cận công nghệ cho người khiếm thị, đồng thời được liên hệ đến các cộng đồng quan tâm ứng dụng VAV sau khi ứng dụng này có mặt trên Google Play. Trong học thuật, Việt Nam được xem là một trong các quốc gia có đóng góp công trình cho các hội nghị. Ở môi trường tổ chức/doanh nghiệp, Việt Nam được nêu cùng MQ ICT Solutions như một trong bốn công ty thuộc hệ sinh thái, với kỳ vọng phát triển trung tâm đào tạo sinh viên và triển khai hợp tác trao đổi sinh viên với IMEC; đồng thời Việt Nam được đặt trong định hướng hỗ trợ doanh nghiệp vươn lên thành một trong các công ty công nghệ hàng đầu khu vực và tham gia chuỗi cung ứng vi mạch bán dẫn toàn cầu. Việt Nam cũng là bối cảnh cho việc SAE (Viện Công nghệ Hàng không vũ trụ) chính thức ra mắt; trong một mô tả liên quan đến NATV, “Quốc gia” được hiểu theo nghĩa NATV tiên phong tại Việt Nam trong nghiên cứu và thiết kế ô tô thương hiệu NISSAN, kèm lộ trình R&amp;D hướng tới thương mại hóa dựa trên bối cảnh thị trường và nhu cầu sử dụng trong nước. Ngoài ra, Việt Nam được mô tả là nơi LGDVH mở rộng đầu tư, nơi cần làm chủ triển khai hệ thống điện gió tổng thể và các công nghệ liên quan do năng lượng gió tăng mạnh; đồng thời được nhấn mạnh có địa hình đa dạng, khí hậu–thời tiết đặc trưng theo vùng miền và là nơi có hệ thống cung cấp dữ liệu/nguồn ảnh.  \n\nTrong lĩnh vực môi trường và dữ liệu quan trắc, Việt Nam được mô tả có mạng lưới trạm quan trắc còn hạn chế, làm tăng độ bất định ở các khu vực thiếu trạm, với trọng tâm vào chất lượng và ô nhiễm không khí. Việt Nam có bản đồ nồng độ bụi PM2.5 phục vụ quản lý và được đưa vào Báo cáo EPI 2018 cùng các thứ hạng liên quan đến chất lượng không khí và sức khỏe môi trường; Việt Nam cũng xuất hiện trong các nghiên cứu và phương pháp giám sát, quản lý ô nhiễm không khí, củng cố vai trò trong nỗ lực dữ liệu hóa và quản trị chất lượng không khí. Một số mô tả khác nhấn mạnh năng lực nghiên cứu của Việt Nam qua các thành tựu như vắc xin và ghép tạng so với thế giới.  \n\nTrong giáo dục, hợp tác và quốc tế hóa, Việt Nam được mô tả có thứ hạng cao theo tiêu chí Kết quả tuyển dụng, có “vị trí xếp hạng cao nhất ở Việt Nam”, với đội tuyển sinh viên duy trì thành tích. Việt Nam nổi bật trong hợp tác khu vực về khởi nghiệp và đổi mới sáng tạo, gồm hợp tác với Hàn Quốc gắn với chuyến thăm và làm việc của Tổng thống Hàn Quốc tháng 6/2023, giao lưu/hợp tác phần mềm, và hợp tác giáo dục với Cộng hòa Belarus theo thỏa thuận, kèm tổ chức “Ngày hội Giáo dục Belarus” lần đầu và các hoạt động ký kết. Việt Nam cũng được nêu là điểm đến và đối tác trong chương trình Global Wales năm 2023 khi đoàn làm việc của Tập đoàn Samsung đến làm việc; đồng thời được xem là bối cảnh nơi các chuyên gia/nhà nghiên cứu đầu ngành hoạt động và kỳ vọng chương trình đào tạo có yếu tố nước ngoài thu hút người học. Việt Nam xuất hiện trong các bối cảnh triển khai đào tạo có yếu tố nước ngoài; có mô tả về “quốc gia” trong công trình liên quan điều hành chính sách và mô tả quốc gia về số lượng sinh viên tham gia, trải nghiệm môi trường sống tại Nhật, cùng một mô tả thứ hạng trong đó ĐHQGHN đứng vị trí số 1. Trong giáo dục công nghệ máy tính, Việt Nam được mô tả là địa điểm tổ chức kỳ thi IOI 2020 trực tuyến, nơi các thí sinh tham dự IOI 2020 đại diện.  \n\nTrong trí tuệ nhân tạo (AI), Việt Nam được mô tả vừa bắt đầu có quan tâm vừa là quốc gia đang ứng dụng và phát triển AI; xuất hiện trong các xếp hạng công bố về AI trên các tạp chí quốc tế như ISI và Scopus, đồng thời có chỉ số sáng tạo quốc gia và nền tảng công nghiệp AI. Việt Nam cũng được dự báo tiếp tục nhận các chỉ đạo phát triển AI trong tương lai, kèm bài giảng công chúng và khóa huấn luyện nâng cao nhằm lan tỏa tri thức và năng lực thực thi trong các chương trình đào tạo liên quan đến công nghệ và AI; AI đồng thời được nêu như công cụ thúc đẩy phát triển trong nhiều lĩnh vực.  \n\nNgoài ra, Việt Nam được đề cập trong bối cảnh gia nhập WTO với các điều kiện kinh tế–xã hội liên quan và vai trò chủ thể của yêu cầu phát triển kinh tế biển gắn với nguồn năng lượng sóng. Việt Nam còn được bổ sung là quốc gia có “cơ hội thành công cao” trong phát triển ngành bán dẫn nhờ vị trí địa lý thuận lợi và nền chính trị ổn định, đồng thời xuất hiện trong bối cảnh hợp tác lịch sử lâu dài và bền chặt với CHLB Nga. Việt Nam được nêu đã phê duyệt một số giống biến đổi gen và cũng được mô tả trong hợp tác phát triển giữa Việt Nam và Nhật Bản. Về nền kinh tế, Việt Nam được ghi nhận có nông nghiệp giữ vai trò quan trọng, và các định hướng phát triển công nghệ nông nghiệp được gắn với thế mạnh của đất nước. Một mô tả khác nhấn mạnh Việt Nam có nhiều lợi thế trong lĩnh vực chip bán dẫn, gồm vị trí địa lý, nền tảng công nghiệp điện tử, thị trường tốt, nhiều doanh nghiệp đầu tư và nguồn nhân lực trẻ, cùng sự đồng hành của nhiều quốc gia và doanh nghiệp trên thế giới.\nsource_id: chunk-9d11239c7661d6629a95e18ae3d9f8d6&lt;SEP&gt;chunk-c93f312ce61c87b410d91587c89f40b7&lt;SEP&gt;chunk-4166b29d3d9d72c8633be3f6c9252f40&lt;SEP&gt;chunk-30c181f4aa2c849a90de3cd3928e5852&lt;SEP&gt;chunk-6a99e66233571a9dda7e3dfa2ef0ab28&lt;SEP&gt;chunk-bc09250c04495dee022491dc4fe04f47&lt;SEP&gt;chunk-25460f125e4e5767b543cb63b0b83793&lt;SEP&gt;chunk-48f713a499aaafe51c50da28b0a7a6cb&lt;SEP&gt;chunk-522a85684dbf6e36456ac34398662fd9&lt;SEP&gt;chunk-90c2db1b0925e8b40f745afe557228ec&lt;SEP&gt;chunk-9d3f6a1595a8e6f488f82e2fd76f04e8&lt;SEP&gt;chunk-39689826c7f6456cd1eccb9cdd7f5600&lt;SEP&gt;chunk-037b6a7d78980ec7da048e0aa0c84751&lt;SEP&gt;chunk-944ce2255899537f5492dac939115d80&lt;SEP&gt;chunk-3cf90efe033e5ded92b461ad94851b55&lt;SEP&gt;chunk-5b3e3a91f48d636c96d29ec9b0964e8f&lt;SEP&gt;chunk-8613c9cfa2ba254e288947750ebfd235&lt;SEP&gt;chunk-3d5c2d4835da8437b0e5f2d102e63002&lt;SEP&gt;chunk-cdd6349a4c91f2ec1f3ef4223beb840a&lt;SEP&gt;chunk-5a02c8ae1cd60d03d864a5c28e9b7752&lt;SEP&gt;chunk-7fbbc42dcf818c71b6ae768644d0f223&lt;SEP&gt;chunk-67b8a97d87f022b7f21aded50dab9340&lt;SEP&gt;chunk-9c5d7d5f2f8c847971799cd3ffb43cec&lt;SEP&gt;chunk-a327cb862a6fa32c514f2b9ff0bdcc04&lt;SEP&gt;chunk-8ebf34cb943b7ae241ee5638de0cb5df&lt;SEP&gt;chunk-4d9ba6115d871cdeeca6beea5b91a52a&lt;SEP&gt;chunk-c8e5a73225405649ef76b2239319a57c&lt;SEP&gt;chunk-345ba3ea4c0a4f72cc85d813e2af9cd8&lt;SEP&gt;chunk-1bae06f1a4113699c662d137b2664719&lt;SEP&gt;chunk-1010b616485d42c71a131e4ecfc24215&lt;SEP&gt;chunk-acd7e618643d8b8c6089dbd941157aba&lt;SEP&gt;chunk-baeed7d930afb8da1a9ce6b826a4b689&lt;SEP&gt;chunk-33a24bfcac3a123fd6825fd7a9c3340b&lt;SEP&gt;chunk-25db5e0f346b168310a107d0213d5d38&lt;SEP&gt;chunk-a085aab048cc0c6bf5bf05d56b6745e9&lt;SEP&gt;chunk-9bfeeda764cf055fcee4689e3d55d4ed&lt;SEP&gt;chunk-eba4a754296d6bc055fc8b4d4d2a442b&lt;SEP&gt;chunk-2e7ddbf9bb5a9756dfc557c5ec5e3ead&lt;SEP&gt;chunk-e763cce82ab114b641534f127cb534bc&lt;SEP&gt;chunk-9d676323292c7d78dcf48144f276965e&lt;SEP&gt;chunk-f27fb67ac82acaf99dfbc03f3897777d&lt;SEP&gt;chunk-44e0b84fdad88f93dca4b8cf2ea910b7&lt;SEP&gt;chunk-60e355fb94abfa5b47ef91cf38a5c755&lt;SEP&gt;chunk-3d849f409aa7fd6fa035cdc049cc9c4e&lt;SEP&gt;chunk-5d36424d5f8d7390c1ba84b79e167b8a&lt;SEP&gt;chunk-63e975c10765e044d994471ee1e0a86f&lt;SEP&gt;chunk-46f4503c7d611185583d516bbe6ec053&lt;SEP&gt;chunk-c6a31139ccee6473616b53b099c85aa9&lt;SEP&gt;chunk-e0de36577ec23f2c5a1669f781a210e9&lt;SEP&gt;chunk-8a7e7d9c2d81d63e9420d386f1660ef9&lt;SEP&gt;chunk-42e7f6ddb5c8cafedd8c7a0e8e9d1797&lt;SEP&gt;chunk-1241a583ad5c28008997a3ede7a15de3&lt;SEP&gt;chunk-0f9afce8a889fa5ce822ae23fc04b2e3&lt;SEP&gt;chunk-1d787e1c9110800e62fe659a7e6c8b80&lt;SEP&gt;chunk-6c479722733a1c425f4db21c07b91c1a\nfile_path: ..\\..\\data\\data_1000_chunk_512.json\ncreated_at: 1775574567", "group": "location", "value": 13}, {"id": 77, "label": "Xét Tuyển Thẳng", "title": "entity_id: Xét Tuyển Thẳng\nentity_type: phương_thức_tuyển_sinh\ndescription: Xét Tuyển Thẳng là một phương thức tuyển sinh/xét tuyển được quy định trong quy chế tuyển sinh do Bộ GD&amp;ĐT ban hành, đồng thời được triển khai theo cơ chế đặc thù của ĐHQGHN. Phương thức này được dùng như một căn cứ về thời điểm và điều kiện áp dụng cho thí sinh, thường được nêu trong các văn bản/trang thông tin liên quan đến tuyển sinh theo hướng ưu tiên. Khi thực hiện, các đơn vị đào tạo căn cứ nội dung đã công bố trong đề án tuyển sinh của mình và phù hợp với nhóm đối tượng thuộc phương thức xét tuyển thẳng theo quy định cho từng năm (đặc biệt được đề cập trong bối cảnh đại học chính quy năm 2024), đồng thời vẫn dựa trên khung pháp lý của Bộ và có thể được cập nhật theo từng giai đoạn.\n\nXét Tuyển Thẳng còn được hiểu là việc công nhận trúng tuyển đối với các đối tượng thuộc khoản 1 và 2 Điều 8 Thông tư 08/2022/TT-BGDĐT: các thí sinh đáp ứng yêu cầu điều kiện dự tuyển nhưng không cần xét đến ngưỡng đầu vào. Ngoài ra, phương thức này cũng được mô tả như một hình thức áp dụng theo quy định chung của Bộ GD&amp;ĐT cho đại học chính quy năm 2019, trong đó việc xét tuyển thẳng dựa trên thành tích tại các kỳ thi/đội tuyển quốc gia.\nsource_id: chunk-aa1cba655a0cdd24eb42bb9fa5ed653a&lt;SEP&gt;chunk-b2910b018535b8cad831c52e68a11230&lt;SEP&gt;chunk-e2e77743fb90d76576cdd797d7c3d1da&lt;SEP&gt;chunk-43c856f4bdfe687ea4c848b9c52f8f5c&lt;SEP&gt;chunk-2c37cf9ad2e22d8246e6a569f25bfda5&lt;SEP&gt;chunk-c9d66ec8634b64e3621d5fd4186eefa1&lt;SEP&gt;chunk-f9fa6a412f1bacf075f18890048c8e18&lt;SEP&gt;chunk-30840a2e5d5cca3e2c8e65b8e497e314&lt;SEP&gt;chunk-bbe6e9de019a69f9a0bb2d4e41dcf05a\nfile_path: ..\\..\\data\\de_an_2024_chunks.json&lt;SEP&gt;..\\..\\data\\quyet_dinh_1328_chunks.json&lt;SEP&gt;..\\..\\data\\data_1000_chunk_512.json\ncreated_at: 1775534684", "group": "phương_thức_tuyển_sinh", "value": 12}, {"id": 78, "label": "Xét tuyển", "title": "entity_id: Xét tuyển\nentity_type: phương_thức_tuyển_sinh\ndescription: Xét tuyển là hoạt động và cũng là hình thức/phương thức tuyển sinh trong đó các thí sinh được lựa chọn để vào trường theo các diện và phương thức xét tuyển. Việc xét tuyển dựa trên kết quả thi hoặc kết quả đánh giá, đồng thời gắn với lịch trình đăng ký và công bố kết quả. Ở cấp độ thực hiện, xét tuyển được tiến hành như một quy trình xử lý riêng tại đơn vị đào tạo (hoặc xử lý chung theo nhóm khi nhiều đơn vị cùng tham gia) nhằm xác định điều kiện trúng tuyển và lập danh sách thí sinh đủ điều kiện trúng tuyển cho một ngành/nhóm ngành hoặc chương trình đào tạo, dựa trên các tiêu chí xét tuyển và tuân thủ các quy định trong Quy chế. Xét tuyển cũng bao gồm việc tổ chức các đợt xét tuyển bổ sung mà thí sinh có thể tham gia. Trong các văn bản mô tả/hồ sơ tuyển sinh, “Xét tuyển” thường được nêu như một hình thức tuyển sinh và được thực hiện theo các quy định của Đại học Quốc gia Hà Nội, bao gồm cả trường hợp xét tuyển theo hướng dẫn tuyển sinh sau đại học hằng năm.&lt;SEP&gt;Một trong các hình thức tuyển sinh được nêu cho chương trình: xét tuyển.\nsource_id: chunk-af9a015f54d835324a9340cecb98c2dd&lt;SEP&gt;chunk-1deaf3341433e5fa2ee300c53b6045ba&lt;SEP&gt;chunk-6e093dcd458c3b7ddd3b4b61730ddfcd&lt;SEP&gt;chunk-1f39a0ff78c35fa4b16ff781cf5edaf3&lt;SEP&gt;chunk-cfd8825c1d0fcae590be6246e2358a4d&lt;SEP&gt;chunk-0f61d921cf112e516a7df6ee55f82e92&lt;SEP&gt;chunk-47224af94d578c5232192e9d2d5058e0&lt;SEP&gt;chunk-7296d4b8e81d3695626afda7ef2b005e&lt;SEP&gt;chunk-40470a177c1e0d8fde59a5113c45071e\nfile_path: ..\\..\\data\\de_an_2024_chunks.json&lt;SEP&gt;..\\..\\data\\quyet_dinh_1328_chunks.json&lt;SEP&gt;..\\..\\data\\data_1000_chunk_512.json\ncreated_at: 1775571059", "group": "phương_thức_tuyển_sinh", "value": 12}, {"id": 79, "label": "Đơn vị đào tạo", "title": "entity_id: Đơn vị đào tạo\nentity_type: đơn_vị_trực_thuộc\ndescription: Đơn vị đào tạo là chủ thể thực hiện các nội dung liên quan đến tuyển sinh và đào tạo theo quy định, bao gồm việc tổ chức thông báo tuyển sinh và công bố đề án tuyển sinh trước khi mở đăng ký dự tuyển. Trên cơ sở các nguyên tắc chung được nêu và công khai trong đề án tuyển sinh, đơn vị đào tạo thực hiện quy đổi theo các quy định cụ thể, triển khai các biện pháp cần thiết để phục vụ thí sinh. Trong quá trình tuyển sinh, Đơn vị đào tạo quyết định danh sách thí sinh trúng tuyển theo từng nhóm ngành/ngành và theo từng chương trình đào tạo, công bố điểm trúng tuyển; nếu có quy định thì đồng thời công bố các điều kiện/tiêu chí phụ kèm theo, các hình thức ưu tiên xét tuyển cho từng trường hợp và xác định nhóm ngành/ngành hoặc chương trình mà các đối tượng tuyển thẳng được vào theo quy định. Cuối cùng, đơn vị đào tạo chịu trách nhiệm tổ chức triển khai toàn bộ công tác tuyển sinh đúng với nội dung trong thông báo tuyển sinh và đề án tuyển sinh.\n\nĐơn vị đào tạo có thể gắn với các trường đại học thành viên và các trường/khoa trực thuộc ĐHQGHN (những đơn vị có chức năng, nhiệm vụ tổ chức đào tạo đại học). Đơn vị đào tạo sử dụng mã số quy ước thống nhất để định danh nhóm ngành/ngành hoặc chương trình đào tạo và áp dụng phương thức tuyển sinh. Ở giai đoạn hậu tuyển, Đơn vị đào tạo gửi giấy báo trúng tuyển, hướng dẫn thủ tục nhập học và xem xét tiếp nhận hoặc bảo lưu kết quả tuyển sinh khi thí sinh không xác nhận nhập học; đồng thời phải giải trình về căn cứ khoa học và thực tiễn trong việc xác định phương thức tuyển sinh, phương thức xét tuyển, tổ hợp xét tuyển và phân bổ chỉ tiêu tuyển sinh. Đơn vị đào tạo cũng thực hiện cam kết, tư vấn, hỗ trợ và giải quyết khiếu nại để bảo vệ quyền lợi của thí sinh, đặc biệt tổ chức cho thí sinh thuộc đối tượng xét tuyển thẳng đăng ký dự tuyển và tổ chức xét tuyển thẳng cho các thí sinh đủ điều kiện; có kế hoạch và thông báo xét tuyển sớm, tổ chức xét tuyển cho thí sinh đã hoàn thành thủ tục dự tuyển, và công bố/tải danh sách thí sinh đủ điều kiện trúng tuyển lên hệ thống.\n\nVề tổ chức, Đơn vị đào tạo là nơi có Thủ trưởng thành lập HĐTS và chịu trách nhiệm tổ chức, điều hành toàn bộ công tác tuyển sinh theo quy định. Nếu Đơn vị đào tạo vi phạm về công tác tuyển sinh thì sẽ bị áp dụng xử lý theo quy định của ĐHQGHN và các quy định pháp luật hiện hành.\nsource_id: chunk-ddace097418fed36cbe37da8f4249576&lt;SEP&gt;chunk-3f8b3d332cf0c347e8de3d57dc270374&lt;SEP&gt;chunk-c214b57125a6e684d66bb9c16816dffa&lt;SEP&gt;chunk-0d6008bd889a0ebc91d42d3a06f83f83&lt;SEP&gt;chunk-ffb1cfd0c23e7fa4206abe42c582cc74&lt;SEP&gt;chunk-73e274f4a5ed1f38ed08014e717a6f92&lt;SEP&gt;chunk-d830f682b07ebeb668d54551a6209b96&lt;SEP&gt;chunk-ff59c46f3ab103315ca32379f39a3d18&lt;SEP&gt;chunk-18679ecca078f74da86923a647f33b04&lt;SEP&gt;chunk-39701be07619a29470685a24ef242d87&lt;SEP&gt;chunk-d847432d893deb66ba9545e43db1c0ff&lt;SEP&gt;chunk-c482f693ef8c5985db5d7021905a1633&lt;SEP&gt;chunk-34684aec0d79f3237acdda225af3e906&lt;SEP&gt;chunk-4b93cbd5d0914f2cef5a210a16b4bbf5&lt;SEP&gt;chunk-759233ad94ecba2518607c2566ed9fbe&lt;SEP&gt;chunk-d70df8c903fddbcbfa9aedc2b549731f&lt;SEP&gt;chunk-04f0fde7624010888d30f43632b7cf85\nfile_path: ..\\..\\data\\quyet_dinh_1328_chunks.json\ncreated_at: 1775486854", "group": "đơn_vị_trực_thuộc", "value": 12}, {"id": 80, "label": "Đại học", "title": "entity_id: Đại học\nentity_type: đơn_vị_trực_thuộc\ndescription: Đại học là cấp học được liệt kê trong bảng, áp dụng cho các ngành xét tuyển có mã CN2, CN8, CN12, CN14, CN15, CN5, CN6, CN7, CN9, CN10.&lt;SEP&gt;Đại học là cấp đào tạo xuất hiện trong dữ liệu tuyển sinh, áp dụng cho các mã ngành (CN10, CN3, CN4, CN11, CN13, CN17, CN18).&lt;SEP&gt;Hình thức/đơn vị “Đại học” được ghi kèm với các ngành trong bảng.&lt;SEP&gt;Đại học là hình thức/bậc đào tạo xuất hiện trong bảng, áp dụng cho các chuyên ngành được liệt kê.&lt;SEP&gt;Đại học là đơn vị/ngành cấp học được ghi trong các hàng của bảng cho từng chuyên ngành.&lt;SEP&gt;Bậc đào tạo được Viện (SAE) thực hiện cung cấp nguồn nhân lực trình độ cao.&lt;SEP&gt;Cơ sở đào tạo được nhắc đến trong bối cảnh lịch học nhằm giúp sinh viên hoàn thành việc học tại trường Đại học.\nsource_id: chunk-560aa8f7145b812a0a3f0961eae4bed8&lt;SEP&gt;chunk-303b6a6387641139bc31e379d439a83b&lt;SEP&gt;chunk-d00320150259439576f8a8d2784f861e&lt;SEP&gt;chunk-cdd102ef559843b58c6abe39e1f64531&lt;SEP&gt;chunk-1a7858e2173d3a60e2bbb79e15b63ed3&lt;SEP&gt;chunk-3cf90efe033e5ded92b461ad94851b55&lt;SEP&gt;chunk-cdd6349a4c91f2ec1f3ef4223beb840a\nfile_path: ..\\..\\data\\de_an_2024_chunks.json&lt;SEP&gt;..\\..\\data\\data_1000_chunk_512.json\ncreated_at: 1775530285", "group": "đơn_vị_trực_thuộc", "value": 12}, {"id": 81, "label": "Đại học Quốc gia Hà Nội (ĐHQGHN)", "title": "entity_id: Đại học Quốc gia Hà Nội (ĐHQGHN)\nentity_type: organization\ndescription: Đại học Quốc gia Hà Nội (ĐHQGHN) là tổ chức/cơ quan chủ quản liên quan đến nhiều hoạt động giáo dục, hợp tác và tuyển sinh. Trong các bối cảnh hợp tác, ĐHQGHN tham gia với vai trò đại diện tại các phiên khai mạc, tham dự các buổi làm việc và trực tiếp ký kết hợp tác với đối tác; đồng thời trong các tài liệu tuyển sinh và chương trình chuyên môn, cụm “Đại học Quốc gia Hà Nội” được sử dụng như cách viết đầy đủ để chỉ chính ĐHQGHN khi đơn vị triển khai chương trình. Về tổ chức tiền thân và hoạt động đào tạo, ĐHQGHN được gắn với hệ thống tổ chức tiền thân liên quan đến việc hình thành UET và là chủ thể thực hiện các hoạt động hợp tác đào tạo, bồi dưỡng trong lĩnh vực Cơ học.  \n\nTrong tuyển sinh đại học chính quy, ĐHQGHN là đơn vị tổ chức tuyển sinh, có quyền ban hành/ra quy định và cấp bằng theo các quy chế; công tác xét tuyển gắn với các tiêu chí và các kỳ thi Olympic bậc THPT, đặc biệt đối với các trường THPT chuyên thuộc ĐHQGHN. ĐHQGHN cũng quy định yêu cầu kiểm tra kiến thức và năng lực tiếng Việt; việc xem xét đưa thí sinh vào học được thực hiện theo quy định của ĐHQGHN và quy định của từng trường. Trong tuyển sinh sau đại học, ĐHQGHN xuất hiện trong hướng dẫn thí sinh truy cập cổng đăng ký tuyển sinh để đăng ký dự thi trực tuyến.  \n\nỞ hợp tác quốc tế, ĐHQGHN ban hành các công văn thông báo chương trình trao đổi, bao gồm “Trao đổi sinh viên/học viên kỳ mùa Thu năm 2024 tại Đại học Nagoya, Nhật Bản” và công văn thông báo chương trình trao đổi học kỳ mùa Xuân tại Đại học Kyushu, Nhật Bản trong năm 2025.  \n\nVề công bố và xếp hạng, ĐHQGHN được ghi nhận tăng 100 bậc và thuộc nhóm 851–900 trong QS WUR 2025, đồng thời được mô tả là cơ sở giáo dục đại học lần đầu tiên được THE công bố thứ hạng trong World University Rankings 2020. ĐHQGHN cũng tham gia Đề án Hệ tri thức Việt số hóa và là đơn vị cung cấp bộ dữ liệu cho kho tàng Dữ liệu mở. Ngoài ra, ĐHQGHN xuất hiện trong bối cảnh hệ thống tổ chức tuyển sinh theo “cấu phần”, trong đó có Trường Đại học Công nghệ thuộc hệ thống tuyển sinh.\nsource_id: chunk-6bcc8f005ce852796bff648b4290f029&lt;SEP&gt;chunk-39701be07619a29470685a24ef242d87&lt;SEP&gt;chunk-eea7f3f0a77966b3554bf342903e05eb&lt;SEP&gt;chunk-77d7917ef2e7d9cd9a81dd72330ed7f1&lt;SEP&gt;chunk-89e0ac1547f905d6006b333dd22bda7f&lt;SEP&gt;chunk-b8ca46505c25cb71f65e8e716fa0cc11&lt;SEP&gt;chunk-8e79e22b4c737d5026aa4eaa8f8b6d88&lt;SEP&gt;chunk-bf3b2dab3c647f8bfb265d834c45e505&lt;SEP&gt;chunk-89497855f0e028aa383068cd7c75c0e3&lt;SEP&gt;chunk-5c5b245ca6df504ec1dadf8e03631fec&lt;SEP&gt;chunk-39fccda76f3469fb62958eaa660ce83f&lt;SEP&gt;chunk-f1789ff64448f1d8a3b458adc3cf17e5&lt;SEP&gt;chunk-ba194dff6867b5bd0a6e75b28fc87c8c&lt;SEP&gt;chunk-077c2eaae12fe57fa3f23857dfb7c451&lt;SEP&gt;chunk-512e8885451bdbb210cf433ce1caed13\nfile_path: ..\\..\\data\\de_an_2024_chunks.json&lt;SEP&gt;..\\..\\data\\quyet_dinh_1328_chunks.json&lt;SEP&gt;..\\..\\data\\data_1000_chunk_512.json\ncreated_at: 1775575792", "group": "organization", "value": 12}, {"id": 82, "label": "Đề án tuyển sinh", "title": "entity_id: Đề án tuyển sinh\nentity_type: content\ndescription: Đề án tuyển sinh được nêu là nội dung ĐHQGHN thông qua và công bố.&lt;SEP&gt;Đề án tuyển sinh là văn bản quy định cụ thể các chính sách ưu tiên tuyển sinh riêng.&lt;SEP&gt;Đề án tuyển sinh là nơi đơn vị đào tạo công bố công khai nguyên tắc quy đổi cụ thể mức điểm ưu tiên.&lt;SEP&gt;Đề án tuyển sinh được nêu là nơi đơn vị phải công bố chỉ tiêu, tiêu chí và quy trình xét tuyển.&lt;SEP&gt;Đề án tuyển sinh là đề án do đơn vị đào tạo xây dựng, công bố và thực hiện nhằm phục vụ trách nhiệm giải trình, cam kết đối với thí sinh và các bên liên quan.&lt;SEP&gt;Đề án tuyển sinh là tài liệu phải gửi theo mẫu tại Phụ lục V trước khi công bố ít nhất 10 ngày.&lt;SEP&gt;Tài liệu/đề án nêu ra các rủi ro liên quan đến công tác tuyển sinh của đơn vị để đơn vị chủ động giải quyết.\nsource_id: chunk-a9650fb1673ca3caba1c69a1523baa2a&lt;SEP&gt;chunk-ddace097418fed36cbe37da8f4249576&lt;SEP&gt;chunk-09629085451f3c02c08e6a7d6b9f76ee&lt;SEP&gt;chunk-3f8b3d332cf0c347e8de3d57dc270374&lt;SEP&gt;chunk-ffb1cfd0c23e7fa4206abe42c582cc74&lt;SEP&gt;chunk-5ef7502b5fff13cfaf706ccf8f094af6&lt;SEP&gt;chunk-2b9a003783b9ab1d9a343d82f0ae4423\nfile_path: ..\\..\\data\\quyet_dinh_1328_chunks.json\ncreated_at: 1775486863", "group": "content", "value": 12}, {"id": 83, "label": "Chương trình đào tạo ngành Kỹ thuật viễn thông", "title": "entity_id: Chương trình đào tạo ngành Kỹ thuật viễn thông\nentity_type: chương_trình_đào_tạo\ndescription: Chương trình đào tạo ngành Kỹ thuật viễn thông có mục thông tin ngành, mã số, chuyên ngành, trình độ, thời gian đào tạo và các mục tiêu phát triển năng lực.&lt;SEP&gt;Chương trình đào tạo ngành Kỹ thuật viễn thông với các yêu cầu tổng số tín chỉ, cơ cấu khối kiến thức và các học phần trong khung chương trình.&lt;SEP&gt;Chương trình đào tạo ngành Kỹ thuật viễn thông có tổng số 64 tín chỉ, gồm khối kiến thức chung, khối kiến thức cơ sở và chuyên ngành, có phần bắt buộc, tự chọn và luận văn thạc sĩ.\nsource_id: chunk-efe159e1777962ebcab9fabab7212a7b&lt;SEP&gt;chunk-32b0adbcd0807bb39304712db201c937&lt;SEP&gt;chunk-f698281742245ca9155169923bfbf025\nfile_path: ..\\..\\data\\data_1000_chunk_512.json\ncreated_at: 1775558956", "group": "chương_trình_đào_tạo", "value": 12}, {"id": 84, "label": "Chương trình đào tạo ngành Mạng máy tính và truyền thông dữ liệu", "title": "entity_id: Chương trình đào tạo ngành Mạng máy tính và truyền thông dữ liệu\nentity_type: chương_trình_đào_tạo\ndescription: Chương trình đào tạo ngành Mạng máy tính và truyền thông dữ liệu với phiên bản chất lượng cao (CLC TT23), gồm thông tin ngành đào tạo, mã số, danh hiệu tốt nghiệp và thời gian đào tạo.&lt;SEP&gt;Chương trình đào tạo ngành Mạng máy tính và truyền thông dữ liệu, có nêu yêu cầu về chất lượng luận án và các yêu cầu công bố kết quả nghiên cứu.&lt;SEP&gt;Chương trình đào tạo ngành Mạng máy tính và truyền thông dữ liệu, nêu các yêu cầu năng lực tối thiểu về chuẩn đầu ra.&lt;SEP&gt;Chương trình đào tạo ngành Mạng máy tính và truyền thông dữ liệu, nêu các chuẩn về kiến thức chuyên môn và năng lực chuyên môn.\nsource_id: chunk-d48248c013722b9717e32f91fae06cf3&lt;SEP&gt;chunk-e97596da008d70490f3ffdc4cbcb315b&lt;SEP&gt;chunk-01001a9bae2f0ab69f011fb36217702d&lt;SEP&gt;chunk-7cf2ae42db2ac565287d424cefc5bae1\nfile_path: ..\\..\\data\\data_1000_chunk_512.json\ncreated_at: 1775553510", "group": "chương_trình_đào_tạo", "value": 12}, {"id": 85, "label": "Công nghệ Thông tin", "title": "entity_id: Công nghệ Thông tin\nentity_type: chuyên_ngành\ndescription: Công nghệ Thông tin là một lĩnh vực được nhắc đến trong nhiều ngữ cảnh khác nhau và nhìn chung liên quan đến các hoạt động như phân tích, thiết kế, xây dựng, cài đặt, bảo trì, phát triển và quản lý hệ thống, chương trình, dự án. Trong lĩnh vực giáo dục, Công nghệ Thông tin là tên ngành đào tạo bằng tiếng Việt và được xem là trọng tâm của chương trình đào tạo; đây cũng là một ngành đào tạo truyền thống của nhà trường. Công nghệ Thông tin còn được nêu như một nhóm/đối tượng phù hợp để hưởng lợi từ các hoạt động giao lưu, và đồng thời được đề cập như một vị trí/lĩnh vực liên quan đến các công nghệ trong bối cảnh giáo dục và nghiên cứu. Ở một số mô tả khác, Công nghệ Thông tin được xem là một lĩnh vực công nghệ thuộc nền tảng đa ngành được cung cấp cho “Hồng Nga”. Ngoài ra, lĩnh vực này còn được đưa ra trong bối cảnh nhu cầu nhân lực chất lượng cao trong khoảng 20 năm tới.\nsource_id: chunk-4d208cedb75bf0f504de3dcecf00b986&lt;SEP&gt;chunk-298623ed20dfe8038c498acce3799ac1&lt;SEP&gt;chunk-cad83b4bf106c5992952cc7305a09f4e&lt;SEP&gt;chunk-866f372902773a35e5446d6b8a51dc35&lt;SEP&gt;chunk-ce40906525c6b7d04dd7daafbd86a514&lt;SEP&gt;chunk-f67129c9d06d54ac5fe76f8dd8fb09c0&lt;SEP&gt;chunk-653c3e3e8802c8487fad608f9741926c&lt;SEP&gt;chunk-c61438037b659b02507e89743aba7243\nfile_path: ..\\..\\data\\data_1000_chunk_512.json\ncreated_at: 1775558527", "group": "chuyên_ngành", "value": 12}, {"id": 86, "label": "Giảng Viên", "title": "entity_id: Giảng Viên\nentity_type: concept\ndescription: Giảng Viên là người phụ trách và hướng dẫn sinh viên trong quá trình ôn tập kiến thức, đồng thời hỗ trợ để sinh viên tham dự kỳ thi. Trong bối cảnh giảng dạy, Giảng Viên được đánh giá theo các chỉ báo trong Khung Năng Lực Giảng Dạy; để đáp ứng yêu cầu giảng dạy chất lượng, Giảng Viên cần tạo lập môi trường dạy và học tích cực, hiệu quả, đồng thời thể hiện năng lực chuyên môn, mức độ hiểu biết, sự chuẩn bị, phương pháp và cách tổ chức, quản lý lớp học. Trong lớp học, Giảng Viên là người giúp sinh viên có thể tương tác một cách mạnh dạn xuyên suốt buổi học.\n\nVề vận hành học tập trên hệ thống, Giảng Viên là chủ thể cung cấp phản hồi và có các thông báo liên quan đến buổi thi trên hệ thống Course. Giảng Viên cũng tham gia trao đổi với sinh viên và tham gia các hoạt động khảo sát phản hồi diễn ra thường xuyên, định kỳ. Trong các hoạt động chuyên môn khác, Giảng Viên có thể được nêu như một nhóm quan tâm tại hội thảo thông qua các đề xuất và giải pháp tích cực. Trên phương diện cấu trúc dữ liệu, “Giảng viên” là trường dữ liệu dùng để liệt kê những người phụ trách các lớp học phần; đồng thời Giảng Viên cũng có thể được mô tả như một nhóm vị trí liên quan đến lĩnh vực công nghệ, công nghệ nông nghiệp và khởi nghiệp đổi mới sáng tạo, và có thể hỗ trợ việc đào tạo ngành Kỹ thuật robot.\n\nNgoài ra, Giảng Viên còn có thể được thể hiện thông qua trường hợp cụ thể như vai trò công tác của TS. Trần Mậu Danh tại Trường ĐH Công nghệ – ĐHQGHN.\nsource_id: chunk-a0164f7f660f0511780a1c507673fd81&lt;SEP&gt;chunk-fb8f9cd232d7f2380710e3b7954a97de&lt;SEP&gt;chunk-944ce2255899537f5492dac939115d80&lt;SEP&gt;chunk-f26b36005e08c342e1eda50a01aedb49&lt;SEP&gt;chunk-41b1e97b5b7dee226180bae2fd84a247&lt;SEP&gt;chunk-22564af7596b3c851806db6a1299bd0f&lt;SEP&gt;chunk-cb0d1945eac3c636a61416d43a91be30&lt;SEP&gt;chunk-70f0595e0db74a4a98d9a197c22d5c5c&lt;SEP&gt;chunk-a78818cdb47dd96117f91f6c52a36b6d&lt;SEP&gt;chunk-fb4aadc6417463845b5999287f6ab063\nfile_path: ..\\..\\data\\data_1000_chunk_512.json\ncreated_at: 1775560130", "group": "concept", "value": 12}, {"id": 87, "label": "HĐTS", "title": "entity_id: HĐTS\nentity_type: kháiniệm\ndescription: HĐTS là tổ chức của các đơn vị, có trách nhiệm gửi báo cáo hằng năm theo quy định tại Điều 24.&lt;SEP&gt;HĐTS là đơn vị có Chủ tịch chịu trách nhiệm xác định danh sách thí sinh trúng tuyển và bảo đảm các điều kiện về tỉ lệ gọi trúng tuyển, chỉ tiêu của chương trình đào tạo.&lt;SEP&gt;HĐTS được nêu như một tổ chức/ban chịu trách nhiệm liên quan đến công tác xác định danh sách thí sinh trúng tuyển.&lt;SEP&gt;HĐTS là Hội đồng tuyển sinh, có thẩm quyền quyết định phương án điểm trúng tuyển và tiếp nhận việc trình quyết định phương án.&lt;SEP&gt;HĐTS là hội đồng tuyển sinh được Thủ trưởng đơn vị đào tạo thành lập theo từng hình thức đào tạo để điều hành các công việc liên quan đến tuyển sinh.&lt;SEP&gt;HĐTS là đơn vị được tổ chức để triển khai công tác tuyển sinh và có các tiểu ban giúp việc.\nsource_id: chunk-5ef7502b5fff13cfaf706ccf8f094af6&lt;SEP&gt;chunk-759233ad94ecba2518607c2566ed9fbe&lt;SEP&gt;chunk-cd46703dc1b9c9f1429ca6a08b6faddc&lt;SEP&gt;chunk-04f0fde7624010888d30f43632b7cf85&lt;SEP&gt;chunk-a1c5b99e5fadbdaca2d068d23b86c33a&lt;SEP&gt;chunk-b9a846de9322c834018b5a5398c00304\nfile_path: ..\\..\\data\\quyet_dinh_1328_chunks.json\ncreated_at: 1775486850", "group": "kháiniệm", "value": 12}, {"id": 88, "label": "Hệ thống", "title": "entity_id: Hệ thống\nentity_type: data\ndescription: Hệ thống là một nền tảng phục vụ nhiều nhu cầu khác nhau, trong đó nổi bật là quản lý quy trình tuyển sinh và tương tác trực tuyến giữa đơn vị đào tạo và thí sinh. Hệ thống là nơi đơn vị đào tạo phải cung cấp thông tin và dữ liệu tuyển sinh theo đúng định dạng, đồng thời bảo đảm tính xác thực; đồng thời tải danh sách thí sinh đủ điều kiện trúng tuyển để xử lý nguyện vọng và nơi thí sinh thực hiện đăng ký xét tuyển/nguyện vọng. Trên hệ thống, thí sinh có thể đăng ký theo lựa chọn cá nhân để được công nhận trúng tuyển theo nguyện vọng hoặc mở rộng cơ hội trúng tuyển nguyện vọng khác. Hệ thống cũng cho phép thí sinh xác nhận nhập học trực tuyến, và đơn vị đào tạo cập nhật danh sách thí sinh trúng tuyển cũng như nhập học theo thời hạn quy định.\n\nBên cạnh mảng tuyển sinh, Hệ thống còn được mô tả như một giải pháp được nghiên cứu và phát triển để hỗ trợ tổ chức, cá nhân và đơn vị khảo sát thu thập và phân tích suy nghĩ/quan điểm của người dùng đối với thương hiệu, nhằm phục vụ marketing và quản lý danh tiếng. Nhóm nghiên cứu đã phát triển hệ thống và sau đó nhận được sự quan tâm từ các tổ chức liên quan. Ngoài ra, trong bối cảnh kỳ thi, hệ thống được dùng để thí sinh làm quen thông qua thi thử, liên quan đến phòng máy, cách thức nộp và chấm bài.\nsource_id: chunk-bf836ea6db4d8badfb97990a59aa4543&lt;SEP&gt;chunk-d847432d893deb66ba9545e43db1c0ff&lt;SEP&gt;chunk-d70df8c903fddbcbfa9aedc2b549731f&lt;SEP&gt;chunk-05606b066406dc625b317be835f83897&lt;SEP&gt;chunk-2b9a003783b9ab1d9a343d82f0ae4423&lt;SEP&gt;chunk-ac222c304ce1d401db154dadc22e3019&lt;SEP&gt;chunk-a079af5352492c1709f7fa71e12d2d65&lt;SEP&gt;chunk-54d6f4bb174cf44ff2389841756399d0\nfile_path: ..\\..\\data\\quyet_dinh_1328_chunks.json&lt;SEP&gt;..\\..\\data\\data_1000_chunk_512.json\ncreated_at: 1775546477", "group": "data", "value": 12}, {"id": 89, "label": "Học bổng", "title": "entity_id: Học bổng\nentity_type: điểm_chuẩn\ndescription: Học bổng là nhóm nội dung nêu các loại học bổng khuyến khích học tập, hỗ trợ sinh viên có hoàn cảnh khó khăn và các học bổng khác.&lt;SEP&gt;Học bổng được cung cấp trong thỏa thuận, dùng để hỗ trợ đào tạo trong 02 năm.&lt;SEP&gt;Học bổng được mô tả vừa mang giá trị tinh thần vừa mang giá trị vật chất, tạo động lực cho mỗi UETer và được cung cấp dưới nhiều loại.&lt;SEP&gt;Học bổng là phần thưởng được PGS.TS. Nguyễn Hoàng Hải tặng cho Bùi An Huy.&lt;SEP&gt;Học bổng được mô tả là đã giúp nhiều trong việc trang trải học phí và các chi phí hỗ trợ học tập khác.&lt;SEP&gt;Học bổng là đối tượng được đề cập trong nội dung, có điều kiện gồm kết quả học tập, điểm rèn luyện và các hoạt động Đoàn, Hội, hoạt động xã hội; đồng thời có tiêu chí thành công qua học tập và ngoại khóa.&lt;SEP&gt;Học bổng là khoản hỗ trợ được NATV cung cấp cho sinh viên tham gia trong quá trình đào tạo.\nsource_id: chunk-911dbda4cdcc1d65567a9ed8f9511285&lt;SEP&gt;chunk-42efc428f31a0463f0af26150cefad7c&lt;SEP&gt;chunk-91c0c014930658410e595aec94815ab9&lt;SEP&gt;chunk-1a6c662a8d1adf5169acc0ae19d39853&lt;SEP&gt;chunk-e5a978d6c50f126819cbaf82e9b94d0d&lt;SEP&gt;chunk-29cf880e057f62e5264c80cad7bc0f76&lt;SEP&gt;chunk-063008d5904ffe32bee3b63969398756\nfile_path: ..\\..\\data\\de_an_2024_chunks.json&lt;SEP&gt;..\\..\\data\\data_1000_chunk_512.json\ncreated_at: 1775558748", "group": "điểm_chuẩn", "value": 12}, {"id": 90, "label": "Hội nghị quốc tế IEEE lần thứ 12 về Hệ thống trên chip nhúng đa lõi xử lý và Trí tuệ nhân tạo", "title": "entity_id: Hội nghị quốc tế IEEE lần thứ 12 về Hệ thống trên chip nhúng đa lõi xử lý và Trí tuệ nhân tạo\nentity_type: event\ndescription: Hội nghị quốc tế IEEE lần thứ 12 diễn ra tại Trường Đại học Công nghệ (Đại học Quốc gia Hà Nội), gồm Lễ khai mạc “Hội nghị Khoa học Quốc tế IEEE lần thứ 12 về Hệ thống trên chip nhúng đa lõi xử lý và Trí tuệ nhân tạo” (MCSoC), có thêm các phiên thảo luận về trí tuệ nhân tạo và nhận các công trình chất lượng cao từ nhiều quốc gia.\nsource_id: chunk-c93f312ce61c87b410d91587c89f40b7\nfile_path: ..\\..\\data\\data_1000_chunk_512.json\ncreated_at: 1775495789", "group": "event", "value": 12}, {"id": 91, "label": "Khung chương trình đào tạo", "title": "entity_id: Khung chương trình đào tạo\nentity_type: concept\ndescription: Khung chương trình đào tạo là một cấu trúc/khung nội dung trong văn bản được trình bày chủ yếu dưới dạng bảng. Khung chương trình đào tạo thể hiện danh mục các học phần kèm các thuộc tính học thuật và dữ liệu tổ chức như: số thứ tự (STT/Số TT), mã học phần (Mã số học phần/Mã học phần), tên học phần (có thể ghi theo tiếng Việt và tiếng Anh), số tín chỉ, số giờ tín chỉ, mã học phần tiên quyết (học phần tiên quyết/ môn học tiên quyết). Ngoài ra, khung còn phân bổ khối lượng cho từng học phần theo các thành phần học tập như lý thuyết, thực hành và tự học (Lý thuyết/Thực hành/Tự học hoặc tương đương). Trong văn bản, phần mô tả cấu trúc Khung chương trình đào tạo thường được đặt trong một mục cụ thể (ví dụ mục 2) và mô tả thông tin về học phần, mã học phần, số tín chỉ, số giờ tín chỉ và mã học phần tiên quyết, đồng thời có thể được mô tả kèm các khối kiến thức và cách sắp xếp cấu trúc dữ liệu theo bảng. Tài liệu sinh viên cũng được yêu cầu đọc và nghiên cứu kỹ theo hướng dẫn trong chính văn bản mô tả khung này.\nsource_id: chunk-756a0f6c007a8a997fd3c6dec5da8c84&lt;SEP&gt;chunk-8683285277902046c26e55084625aaaf&lt;SEP&gt;chunk-4feae774c6e8bc223f7fed8b043a0e74&lt;SEP&gt;chunk-dab17784adc9dd17150ed2245853d389&lt;SEP&gt;chunk-d7750493bfeca45f98383d1c1b8a00aa&lt;SEP&gt;chunk-154e857b6434dc42f7b9a942f2fd153c&lt;SEP&gt;chunk-32b0adbcd0807bb39304712db201c937&lt;SEP&gt;chunk-02288b9b453d54a3485963566e1eb175\nfile_path: ..\\..\\data\\data_1000_chunk_512.json\ncreated_at: 1775572341", "group": "concept", "value": 12}, {"id": 92, "label": "Luận án", "title": "entity_id: Luận án\nentity_type: content\ndescription: Luận án là một công trình nghiên cứu khoa học của nghiên cứu sinh trong lĩnh vực Mạng máy tính và truyền thông dữ liệu, đồng thời là sản phẩm nghiên cứu bắt buộc trong thời gian đào tạo. Luận án phải đáp ứng các yêu cầu về chất lượng và kết quả theo chương trình đào tạo, thể hiện rõ tính độc lập của tác giả, xác nhận năng lực nghiên cứu độc lập và có đóng góp ban đầu đáng kể về kiến thức HTTT (hệ thống thông tin).  \n\nLuận án được yêu cầu thể hiện thông qua kết quả nghiên cứu và giá trị đối với các lĩnh vực liên quan, và có đóng góp mới. Đồng thời, luận án có thể bao gồm việc khảo sát và đánh giá MTT (một đối tượng/giải pháp liên quan đến MTT) trong cả mô phỏng và thí nghiệm thật, trình bày lý thuyết, kết quả nghiên cứu cũng như đề xuất phương pháp định vị chính xác robot di động trong môi trường không biết trước. Luận án cũng cần đáp ứng yêu cầu về tính tự chủ của tác giả, đi kèm minh chứng kết quả lao động, và thường liên quan đến việc công bố các kết quả theo quy định.&lt;SEP&gt;Công trình nghiên cứu khoa học của nghiên cứu sinh, thể hiện đóng góp mới và kết quả nghiên cứu chủ yếu do tác giả thực hiện trong thời gian đào tạo.\nsource_id: chunk-ee63dca257171ab3959cfffddaa50155&lt;SEP&gt;chunk-c3ff6f5c7e622bf3d36c30e095f53d81&lt;SEP&gt;chunk-e97596da008d70490f3ffdc4cbcb315b&lt;SEP&gt;chunk-56c4d27c32adea39fa84699a835ecb90&lt;SEP&gt;chunk-94f193a5b458a1232a62fedc78d4a973&lt;SEP&gt;chunk-dae1983daf75cae2bebd06523fbe09b2&lt;SEP&gt;chunk-0343aa9d0a0352a481c98d732a671083&lt;SEP&gt;chunk-3ef6f23c598c6ccdcee5dd8402f9cb3d&lt;SEP&gt;chunk-744c227fa1b0938eff2907ccafed0676&lt;SEP&gt;chunk-09eb9ad29076e8d9eb0f5ff67b0e6793\nfile_path: ..\\..\\data\\data_1000_chunk_512.json\ncreated_at: 1775575166", "group": "content", "value": 12}, {"id": 93, "label": "Quỹ VinIF", "title": "entity_id: Quỹ VinIF\nentity_type: organization\ndescription: Quỹ VinIF (VINIF) thực hiện các chương trình hợp tác và tài trợ nhằm hỗ trợ các nhà khoa học, nhà nghiên cứu và các tài năng trẻ phát huy sáng tạo trong các lĩnh vực Khoa học Công nghệ và Văn hóa, Lịch sử.&lt;SEP&gt;Quỹ VinIF tổ chức hoạt động rình khoa học và tài trợ cho các đề tài nghiên cứu được nêu trong văn bản.&lt;SEP&gt;Quỹ VinIF (Quỹ Đổi mới sáng tạo Vingroup) tài trợ nghiên cứu cho dự án/đề tài của Trường Đại học Công nghệ – ĐHQGHN; được gọi tắt là Quỹ VinIF.\nsource_id: chunk-0e8dca1cbe9f82c449bcc8787676b12a&lt;SEP&gt;chunk-ca5cb0bee2f935f59219b26328a9a750&lt;SEP&gt;chunk-cd7d1f092e6bd59bfe285476f174cd25\nfile_path: ..\\..\\data\\data_1000_chunk_512.json\ncreated_at: 1775575040", "group": "organization", "value": 12}, {"id": 94, "label": "SVTech", "title": "entity_id: SVTech\nentity_type: organization\ndescription: SVTech là công ty hoạt động trong các lĩnh vực SI, Cloud Services và Software, có tầm nhìn trở thành một trong những công ty hàng đầu về tích hợp hệ thống tại Việt Nam và khu vực; SVTech tuyển dụng kỹ sư giải pháp Network và được mô tả là đối tác cao cấp tại Việt Nam của nhiều hãng CNTT.\nsource_id: chunk-4f5f193176d336bf63709487ca850dc4\nfile_path: ..\\..\\data\\data_1000_chunk_512.json\ncreated_at: 1775558696", "group": "organization", "value": 12}, {"id": 95, "label": "TS. Bùi Đình Tú", "title": "entity_id: TS. Bùi Đình Tú\nentity_type: person\ndescription: TS. Bùi Đình Tú là giảng viên và nhà nghiên cứu trong lĩnh vực khoa học vật lý và công nghệ nano. Ông tham gia các hoạt động chia sẻ, trao đổi chuyên môn và truyền thông gắn với việc cựu sinh viên các khóa 58V, 59V, 60V thành lập doanh nghiệp, phát triển sản phẩm ứng dụng trong nông nghiệp, đồng thời được mô tả là người giới thiệu các sản phẩm tự động hóa và nhấn mạnh các giải pháp/hệ thống cần phù hợp với điều kiện môi trường tại Việt Nam. Về định hướng học thuật–nghiên cứu, TS. Bùi Đình Tú được ghi nhận gắn với Khoa Vật lý kỹ thuật và Công nghệ nano – Trường ĐHCN – ĐHQGHN; ông cùng nhóm thầy trò tham gia cuộc thi “Sáng tạo khởi nghiệp ĐHQGHN 2017”. Ông được nêu là thành phần/nhóm tác giả của giải pháp hữu ích “Hệ thống chiếu sáng bằng đèn led cho các cây rau mầm”, đồng thời tham gia triển khai thiết bị tích hợp hệ thống chiếu sáng thông minh cho cây trồng tại Việt Nam; cũng có mô tả ông thực hiện khảo sát thực tế để nhận diện nhu cầu hệ thống chiếu sáng cho cây và được nêu trong việc đạt giải. Ở vai trò quản lý và phát triển công nghệ, TS. Bùi Đình Tú được xác định là chủ nhiệm Bộ môn Kỹ thuật năng lượng và là phó chủ nhiệm khoa; ông tham gia phát triển, cải tiến và chia sẻ các hệ thống LED chiếu sáng, đồng thời tham gia giám sát thông số nông nghiệp ứng dụng IoT. Ông còn được liên hệ là cá nhân thuộc nội dung/nhóm tác giả của hệ thống ứng dụng IoT trong nông nghiệp, và được mô tả là giảng viên phụ trách lớp Vật lý kỹ thuật KNM3 (K60V) trong kế hoạch. Trong các nội dung trích dẫn khác, TS. Bùi Đình Tú bày tỏ lời chúc sức khỏe, hạnh phúc đến thầy và gia đình, đồng thời mong thầy tiếp tục song hành với Khoa và Nhà trường trong sự nghiệp “trồng người”. Bên cạnh đó, ông nhấn mạnh định hướng biến ý tưởng thành sản phẩm khoa học công nghệ thực tế phục vụ nông nghiệp, và định hướng tương lai sẽ phát triển thêm sản phẩm tự động hóa mang bản sắc của nhóm nghiên cứu cũng như thương hiệu nhà trường; ông cũng được ghi nhận tham gia cùng sinh viên trong cuộc thi và được xem là có động lực mạnh mẽ từ phong trào.\nsource_id: chunk-d6a3593baab604dea4c38a6914d1b5e9&lt;SEP&gt;chunk-03bae3f94b003ecf56a7afee0ca68fdc&lt;SEP&gt;chunk-fb7f7b40a50da794b627b640f0913ce8&lt;SEP&gt;chunk-5a93806ea417c689a26307a7dfa587e9&lt;SEP&gt;chunk-af41db2bb10375a55725ea3beeec211d&lt;SEP&gt;chunk-ec35554866173bcbc654577a7e971e7d&lt;SEP&gt;chunk-e67f0e21e0edabd3a063939d76377661&lt;SEP&gt;chunk-46e692bcf6e2caf0d2a35ec5f5786550&lt;SEP&gt;chunk-0a4057886d419fd61de36ba902503c2d&lt;SEP&gt;chunk-1d7c55370991b4c523fd7abe7eaa65d6&lt;SEP&gt;chunk-fb4aadc6417463845b5999287f6ab063&lt;SEP&gt;chunk-0a1062e0c26d240d4b7a1aa919a43b0d&lt;SEP&gt;chunk-6cbf5f296409d0cf015c0c7e1fdba6a7&lt;SEP&gt;chunk-924a31fecc8475da77f842b14d7ff1a3\nfile_path: ..\\..\\data\\data_1000_chunk_512.json\ncreated_at: 1775573489", "group": "person", "value": 12}, {"id": 96, "label": "Thí Sinh", "title": "entity_id: Thí Sinh\nentity_type: person\ndescription: Thí Sinh là đối tượng tham gia tuyển sinh/xét tuyển đại học, bao gồm người đăng ký nguyện vọng và được xét chọn theo nguyên tắc bình đẳng theo điểm, không phân biệt thứ tự ưu tiên nguyện vọng. Trong bối cảnh xét tuyển diện dự bị đại học, Thí Sinh có thể là học sinh đã hoàn thành chương trình dự bị tại các trường dự bị đại học và tốt nghiệp năm 2023; khi xét tuyển theo diện dự bị, việc ưu tiên được thực hiện theo thứ tự xét tuyển. Khi Thí Sinh có nhiều nguyện vọng/mã xét tuyển với mức ưu tiên khác nhau, nếu đã trúng tuyển ở nguyện vọng/mã có mức ưu tiên cao hơn thì sẽ không tiếp tục được xét ở các nguyện vọng/mã có mức ưu tiên tiếp theo.  \n\nTrong quá trình xét tuyển, Thí Sinh chịu sự áp dụng các quy định về ngưỡng đầu vào theo nhóm ngành dự tuyển và có thể cần đáp ứng các điều kiện liên quan đến điểm thi và chứng chỉ; năng lực được thể hiện thông qua kết quả học tập, kết quả thi, các đánh giá và việc tham gia các kỳ thi/kiểm tra để phân loại theo tiêu chí đánh giá. Thí Sinh có thể được tra cứu kết quả xét tuyển và nhận hướng dẫn khi trúng tuyển để nhập học, đồng thời tùy theo hình thức thi có thể phải làm bài hoặc trả lời phỏng vấn. Thí Sinh cũng là đối tượng được hưởng các lợi ích trong khuôn khổ hợp tác bình đẳng của tuyển sinh, phản ánh vai trò của mình như người tham gia xét tuyển và là một trong các chủ thể hưởng lợi từ việc bảo đảm công bằng hơn.  \n\nThêm vào đó, trong một số mô tả ngữ nghĩa, “Thí Sinh” còn được dùng cho bối cảnh liên quan đến việc sử dụng ngoại ngữ để sinh sống và học tập tại quốc gia mục tiêu, nhưng không làm thay đổi bản chất vai trò Thí Sinh như người tham gia tuyển sinh. Thí Sinh cũng có thể được xem là chủ thể nộp hồ sơ và là căn cứ để tính lệ phí theo từng thí sinh. Ở một số trường hợp xét tuyển, Thí Sinh tham gia xét tuyển dựa trên kết quả kỳ thi THPT năm 2020 và phải đáp ứng đồng thời ngưỡng đảm bảo chất lượng đầu vào cũng như ngưỡng yêu cầu theo nhóm ngành; theo cách hiểu theo kỳ thi, “Thí sinh” còn chỉ nhóm tham gia kỳ thi, được nêu như đối tượng tham gia các hoạt động liên quan và tham dự các môn thi theo lịch.\nsource_id: chunk-e732161a0f2aec090cd6903591c36bf2&lt;SEP&gt;chunk-17ffa574be2b388741266262cd613593&lt;SEP&gt;chunk-1b5dfa8d570d9f115a0abdcc7e2ecb66&lt;SEP&gt;chunk-bd7a7bbc80531e89c5eb7b0bbe377ce5&lt;SEP&gt;chunk-f07b7f3cf578ddfb280ac9076fde7ce7&lt;SEP&gt;chunk-170b153fd5ea4a9ddacf6c3b10783810&lt;SEP&gt;chunk-2c37cf9ad2e22d8246e6a569f25bfda5&lt;SEP&gt;chunk-6bfc5f2ad22b00d8a493668fdba2fd14&lt;SEP&gt;chunk-b6a5d12bb427f7e1f231f4edfaaa1e92&lt;SEP&gt;chunk-5723991a6a9203aecbff36619b09682b&lt;SEP&gt;chunk-41965627f8aee74cd8b5924133644fe1&lt;SEP&gt;chunk-03913866a9a5b2938de1653d231afa22&lt;SEP&gt;chunk-5adc0fc3821f2db8cadbdd2b8ba8e1c1&lt;SEP&gt;chunk-d773368bbf4cc7eeff0dd9ef007741e5\nfile_path: ..\\..\\data\\de_an_2024_chunks.json&lt;SEP&gt;..\\..\\data\\quyet_dinh_1328_chunks.json&lt;SEP&gt;..\\..\\data\\data_1000_chunk_512.json\ncreated_at: 1775574981", "group": "person", "value": 12}, {"id": 97, "label": "Thí sinh", "title": "entity_id: Thí sinh\nentity_type: person\ndescription: Thí sinh là chủ thể tham gia tuyển sinh đại học, được xác định theo các điều kiện và tiêu chí nhằm phục vụ việc ưu tiên xét tuyển. Thí sinh có thể được hưởng các chính sách ưu tiên, đặc biệt là ưu tiên khu vực, nhưng việc áp dụng chỉ thực hiện trong phạm vi và đúng quy định hiện hành; chẳng hạn, ưu tiên khu vực không được cộng nếu tốt nghiệp từ năm 2022 trở về trước. Trong quá trình xét tuyển, Thí sinh phải đáp ứng các ngưỡng đầu vào theo từng phương thức tuyển sinh; một số phương thức sử dụng chứng chỉ tiếng Anh để quy đổi điểm theo quy định. Nếu Thí sinh thuộc nhiều diện đối tượng chính sách, Thí sinh chỉ được tính một mức điểm ưu tiên cao nhất theo quy định.\n\nVề vai trò trong quy trình tuyển sinh, Thí sinh là đối tượng đăng ký dự tuyển và lựa chọn trường, ngành, chương trình đào tạo cùng phương thức tuyển sinh phù hợp. Thí sinh có thể dự tuyển theo nguyện vọng hoặc theo các diện/điều kiện ưu tiên xét tuyển dựa trên thành tích và/hoặc điều kiện học tập, theo các nhóm điều kiện cụ thể trong văn bản hướng dẫn. Kết quả xét tuyển của Thí sinh được tra cứu trên trang thông tin điện tử của đơn vị và Cổng thông tin tuyển sinh của ĐHQGHN. Trên hệ thống đăng ký, Thí sinh thực hiện các bước như đăng ký nguyện vọng xét tuyển và đăng ký dự thi (nếu có); việc xác định trúng tuyển được thực hiện thông qua xử lý nguyện vọng. Thí sinh có thể được tiếp nhận vào học, bảo lưu kết quả tuyển sinh hoặc xác nhận nhập học, đồng thời phải tuân thủ nguyên tắc công bằng trong tuyển sinh. Hệ thống cho phép Thí sinh lựa chọn giữa việc được công nhận trúng tuyển theo nguyện vọng đã chọn hoặc mở rộng cơ hội trúng tuyển sang nguyện vọng khác; nếu không đủ điều kiện trúng tuyển, Thí sinh vẫn có thể tiếp tục đăng ký theo phương thức tuyển sinh khác. Trường hợp vi phạm trong tổ chức thi, đăng ký dự tuyển hoặc dự thi để được trúng tuyển, Thí sinh có thể bị áp dụng hình thức xử lý tương ứng theo mức độ vi phạm. Một số cấu trúc xét tuyển cho phép Thí sinh được xét hồ sơ ở vòng 1 và, nếu được hội đồng thông qua, tham gia phỏng vấn ở vòng 2; một số trường hợp cũng có thể đăng ký thông qua ứng dụng.\n\nNgoài tuyển sinh trong nước, Thí sinh có thể tham gia kỳ thi quốc tế, trong đó thực hiện bài thi lập trình trên máy tính và làm 03 bài toán mỗi ngày thi. Thí sinh cũng là nhóm đối tượng được hướng dẫn đăng ký xét tuyển đại học năm 2017 theo các điều kiện đã nêu trong nội dung hướng dẫn, đồng thời là đối tượng được tham dự tư vấn tại khu vực nhóm ngành và được giải đáp thắc mắc (bao gồm các hoạt động liên quan đến kỳ thi tuyển sinh đại học chính quy năm 2019).\nsource_id: chunk-6bcc8f005ce852796bff648b4290f029&lt;SEP&gt;chunk-97bf5a79f00ec4b5ddceb369c7596050&lt;SEP&gt;chunk-566c52cd13c2645f71810bac5ed79b9f&lt;SEP&gt;chunk-ddace097418fed36cbe37da8f4249576&lt;SEP&gt;chunk-3f8b3d332cf0c347e8de3d57dc270374&lt;SEP&gt;chunk-0d6008bd889a0ebc91d42d3a06f83f83&lt;SEP&gt;chunk-ffb1cfd0c23e7fa4206abe42c582cc74&lt;SEP&gt;chunk-d830f682b07ebeb668d54551a6209b96&lt;SEP&gt;chunk-038bfce812c2a7c7b1d93d0bc6564602&lt;SEP&gt;chunk-6e093dcd458c3b7ddd3b4b61730ddfcd&lt;SEP&gt;chunk-1f39a0ff78c35fa4b16ff781cf5edaf3&lt;SEP&gt;chunk-34684aec0d79f3237acdda225af3e906&lt;SEP&gt;chunk-759233ad94ecba2518607c2566ed9fbe&lt;SEP&gt;chunk-d70df8c903fddbcbfa9aedc2b549731f&lt;SEP&gt;chunk-05606b066406dc625b317be835f83897&lt;SEP&gt;chunk-9d6115c7a5ebb3ed4117be7e2961ad7c&lt;SEP&gt;chunk-b495e8010133b2f822cbd69c369f7b82&lt;SEP&gt;chunk-68b1a983bdd20072f83db7f563c13d5a&lt;SEP&gt;chunk-d95e1b30541689d3635c247fd401a51b&lt;SEP&gt;chunk-135c0c39a9b799eb3239fc99ede592fa&lt;SEP&gt;chunk-e256f76874c017ad64b8c26abae14a81&lt;SEP&gt;chunk-0633c817993a42cd0f642d9227d83ada\nfile_path: ..\\..\\data\\de_an_2024_chunks.json&lt;SEP&gt;..\\..\\data\\quyet_dinh_1328_chunks.json&lt;SEP&gt;..\\..\\data\\data_1000_chunk_512.json\ncreated_at: 1775574959", "group": "person", "value": 12}, {"id": 98, "label": "Thông tin tuyển sinh", "title": "entity_id: Thông tin tuyển sinh\nentity_type: content\ndescription: Thông tin tuyển sinh bao gồm chi phí đào tạo, mức thu học phí, dịch vụ tuyển sinh và các khoản thu khác; chính sách học bổng, miễn giảm học phí, hỗ trợ tài chính, chỗ ở ký túc xá và các chính sách ưu đãi, hỗ trợ khác.&lt;SEP&gt;Thông tin tuyển sinh là dữ liệu/thông tin mà thí sinh phải tìm hiểu và mà đơn vị đào tạo phải cung cấp lên hệ thống để phục vụ tuyển sinh.&lt;SEP&gt;Mục nội dung trình bày về thông tin tuyển sinh của chương trình đào tạo.&lt;SEP&gt;Phần nội dung chương trình liên quan đến tuyển sinh được nhắc đến trong văn bản.&lt;/entity&gt;\nsource_id: chunk-0d6008bd889a0ebc91d42d3a06f83f83&lt;SEP&gt;chunk-bf836ea6db4d8badfb97990a59aa4543&lt;SEP&gt;chunk-819e04af32b73716c3808980a9300a89&lt;SEP&gt;chunk-7296d4b8e81d3695626afda7ef2b005e\nfile_path: ..\\..\\data\\quyet_dinh_1328_chunks.json&lt;SEP&gt;..\\..\\data\\data_1000_chunk_512.json\ncreated_at: 1775570895", "group": "content", "value": 12}, {"id": 99, "label": "VAV", "title": "entity_id: VAV\nentity_type: organization\ndescription: VAV là ứng dụng được đưa lên Google Play và nhanh chóng đạt các mốc tải về, đánh giá và bình luận trong khoảng 2 tháng.&lt;SEP&gt;VAV là tên/viết tắt của trợ lý ảo cho người Việt trên nền tảng di động được đề cập trong nội dung.&lt;SEP&gt;VAV là hệ thống có khả năng đặt chuông theo thời điểm báo thức, nhận diện các tham số trong khẩu lệnh người dùng và thực hiện các tính toán, phân tích thông minh trên điện thoại di động để phục vụ số lượng lớn người dùng đồng thời.\nsource_id: chunk-037b6a7d78980ec7da048e0aa0c84751&lt;SEP&gt;chunk-d3ab281f1c2c7f3f939a012c7f98602d&lt;SEP&gt;chunk-45385f61a07f6619cdef03505fa9e227\nfile_path: ..\\..\\data\\data_1000_chunk_512.json\ncreated_at: 1775528823", "group": "organization", "value": 12}, {"id": 100, "label": "Đơn vị Đào tạo", "title": "entity_id: Đơn vị Đào tạo\nentity_type: đơn_vị_trực_thuộc\ndescription: Đơn vị đào tạo tải lên hệ thống danh sách thí sinh dự kiến đủ điều kiện trúng tuyển, lặp lại quy trình xét tuyển ở chu kỳ sau và quyết định điểm trúng tuyển ở chu kỳ cuối.&lt;SEP&gt;Đơn vị đào tạo được nêu như chủ thể thực hiện các nghĩa vụ trong công tác xét tuyển theo đề án tuyển sinh đã công bố và theo quy định pháp luật.&lt;SEP&gt;Đơn vị đào tạo thực hiện công bố kế hoạch xét tuyển, hướng dẫn đăng ký, công bố điểm trúng tuyển và điều kiện, tiêu chí phụ (nếu có), cũng như tổ chức cho thí sinh tra cứu kết quả.&lt;SEP&gt;Tổ chức thực hiện xác nhận nhập học và có thể cho phép thí sinh tham gia xét tuyển ở nơi khác hoặc ở đợt bổ sung.\nsource_id: chunk-ca3d17d3c1f7fff2b4d41619bb94314f&lt;SEP&gt;chunk-1cb8513b18d53e7800fe51928b1efe1c&lt;SEP&gt;chunk-cf425f7ca685593f88901f2f6d924893&lt;SEP&gt;chunk-1f39a0ff78c35fa4b16ff781cf5edaf3\nfile_path: ..\\..\\data\\quyet_dinh_1328_chunks.json\ncreated_at: 1775485931", "group": "đơn_vị_trực_thuộc", "value": 12}]);
    const edges = new vis.DataSet([{"from": 69, "to": 71, "title": "weight: 1.0\ndescription: Trường được mô tả là nơi sinh viên thuộc về trong nội dung.\nkeywords: đào tạo,đối tượng\nsource_id: chunk-36ae4f9d220db7e7b99fffc25891f449\nfile_path: ..\\..\\data\\data_1000_chunk_512.json\ncreated_at: 1775531021", "label": "đào tạo,đối tượng"}, {"from": 69, "to": 35, "title": "weight: 3.0\ndescription: Sinh viên khi đăng ký ngoài giới hạn tối thiểu/tối đa phải được Nhà trường đồng ý.&lt;SEP&gt;Nhà trường hỗ trợ để sinh viên tự tin và hòa nhập vào công việc ngay khi tốt nghiệp.&lt;SEP&gt;Nội dung nêu hợp tác mang lại nhiều lợi ích, đặc biệt cho sinh viên.\nkeywords: chuẩn bị sau tốt nghiệp,hòa nhập công việc,hưởng lợi,tuân thủ quy định,xin đồng ý,đào tạo\nsource_id: chunk-c0938a6509e63e88a09d6ba4b56654b1&lt;SEP&gt;chunk-a085aab048cc0c6bf5bf05d56b6745e9&lt;SEP&gt;chunk-4f11779749aed293abcdd91a02dabb0d\nfile_path: ..\\..\\data\\data_1000_chunk_512.json\ncreated_at: 1775575287", "label": "chuẩn bị sau tốt nghiệp,hòa nhập công việc,hưởng lợi,tuân th"}, {"from": 69, "to": 43, "title": "weight: 2.0\ndescription: Trường ĐHCN nâng cao chất lượng đào tạo nhằm giúp sinh viên có cơ hội làm việc tốt hơn.&lt;SEP&gt;Trường ĐHCN tập hợp sinh viên tham gia, phối hợp quản lý sinh viên và điều chỉnh lịch học.\nkeywords: mục tiêu đầu ra,nâng cao cơ hội việc làm,quản lý,tuyển chọn\nsource_id: chunk-6eea7eddaf35625985f819ad545909ce&lt;SEP&gt;chunk-063008d5904ffe32bee3b63969398756\nfile_path: ..\\..\\data\\data_1000_chunk_512.json\ncreated_at: 1775558840", "label": "mục tiêu đầu ra,nâng cao cơ hội việc làm,quản lý,tuyển chọn"}, {"from": 69, "to": 74, "title": "weight: 1.0\ndescription: Nội dung nêu Trường Đại học Công nghệ – ĐHQGHN thúc đẩy sáng tạo khởi nghiệp trong sinh viên.\nkeywords: hỗ trợ,thúc đẩy\nsource_id: chunk-8455c45ea6c7cd65abb7df3df1e9ed4c\nfile_path: ..\\..\\data\\data_1000_chunk_512.json\ncreated_at: 1775531149", "label": "hỗ trợ,thúc đẩy"}, {"from": 69, "to": 29, "title": "we h được nêu với vai trò Phó Hiệu trưởng thuộc Nhà trường (gắn với đơn vị Trường Đại học Công nghệ – ĐHQGHN).\nkeywords: lãnh đạo,vai trò\nsource_id: chunk-d95fce5269bba584984947febdcc48f4\nfile_path: ..\\..\\data\\data_1000_chunk_512.json\ncreated_at: 1775499396", "label": "lãnh đạo,vai trò"}, {"from": 54, "to": 1, "title": "weight: 1.0\ndescription: Đoàn đánh giá yêu cầu Trường Đại học Công nghệ điều chỉnh hợp lý về cơ cấu và nội dung chương trình, chiến lược dạy và học, quy hoạch và phát triển đội ngũ, đồng thời tăng cường hội thảo tọa đàm giữa sinh viên và giảng viên.\nkeywords: kiểm định và đánh giá chất lượng,yêu cầu điều chỉnh\nsource_id: chunk-0ccb202bc7d60ea55fffa935dbe281db\nfile_path: ..\\..\\data\\data_1000_chunk_512.json\ncreated_at: 1775572888", "label": "kiểm định và đánh giá chất lượng,yêu cầu điều chỉnh"}, {"from": 75, "to": 53, "title": "weight: 2.0\ndescription: Trường Đại học Công nghệ được nêu là trường thành viên của ĐHQGHN.&lt;SEP&gt;ĐHQGHN được nêu liên quan đến các thành phần tham dự sự kiện, gắn với Trường Đại học Công nghệ – Đại học Quốc gia Hà Nội.\nkeywords: quan hệ tổ chức,thuộc về,tư cách thành viên,đơn vị\nsource_id: chunk-5be46360f8c709deb9a6dbb367592d78&lt;SEP&gt;chunk-c1a1b0abc28272f46be9093a21f65136\nfile_path: ..\\..\\data\\data_1000_chunk_512.json\ncreated_at: 1775549514", "label": "quan hệ tổ chức,thuộc về,tư cách thành viên,đơn vị"}, {"from": 75, "to": 51, "title": "weight: 2.0\ndescription: VNU-UET được dùng để chỉ Trường Đại học Công nghệ – Đại học Quốc gia Hà Nội.&lt;SEP&gt;VNU-UET là tên viết tắt của Trường Đại học Công nghệ – Đại học Quốc gia Hà Nội.\nkeywords: gắn kết danh xưng,tên viết tắt,viết tắt,định danh\nsource_id: chunk-7b81d0c6634bd97499f8cb8631bf5c4f&lt;SEP&gt;chunk-e54dc90afe47788551038c0c8c5a20b3\nfile_path: ..\\..\\data\\data_1000_chunk_512.json\ncreated_at: 1775528541", "label": "gắn kết danh xưng,tên viết tắt,viết tắt,định danh"}, {"from": 53, "to": 1, "title": "weight: 19.0\ndescription: Quan hệ “(Trường Đại học Công nghệ, ĐHQGHN)” mô tả sự gắn kết giữa Trường Đại học Công nghệ và ĐHQGHN (Đại học Quốc gia Hà Nội) trong tổ chức, quản trị và các hoạt động học thuật. Theo các mô tả, Trường Đại học Công nghệ thuộc khuôn khổ ĐHQGHN, thường được nhận diện như UET‑VNU, và xuất hiện song hành với ĐHQGHN trong thông tin giữa các đơn vị. Trong tuyển sinh và đào tạo, ĐHQGHN được mô tả có vai trò tổ chức tuyển sinh và đào tạo cho Trường Đại học Công nghệ, đồng thời hai đơn vị phối hợp trong việc đón nhận tân học viên/nghiên cứu sinh, phản ánh sự phối hợp ở khâu tiếp nhận nhân lực học thuật. Trường Đại học Công nghệ cũng được mô tả là đơn vị triển khai các nhóm đề tài cấp sở và cấp ĐHQGHN, góp phần vào hệ thống hoạt động học thuật của ĐHQGHN, và được ghi nhận như một “trường thành viên” trong các thông tin liên quan đến sinh viên cũng như sự trưởng thành của các chương trình đào tạo. Ngoài ra, Trường Đại học Công nghệ và ĐHQGHN cùng tham gia hợp tác 3 bên với sự tham gia của đội ngũ nhà khoa học và các công trình/nghiên cứu. Các mô tả cũng cho biết ĐHQGHN sẽ xác nhận lại số lượng và các văn bản gốc liên quan đến Trường Đại học Công nghệ nhằm củng cố tính chính danh và cập nhật của mối liên hệ; trong khuôn khổ này, học viên/nghiên cứu sinh thuộc ĐHQGHN có thể nhận học bổng thông qua chương trình phối hợp với Trường Đại học Công nghệ.\nkeywords: giao nhiệm vụ,gắn kết,hợp tác,hợp tác 3 bên,liên kết,liên kết tổ chức,liên kết đại học,liên quan,liên quan tổ chức,nghiên cứu,phát triển,phạm vi đề tài,phối hợp,phụ thuộc,quản lý,thuộc,thuộc hệ thống,thuộc về,trực thuộc,xác nhận lại,đóng góp,đơn vị quản lý,đơn vị thành viên,đại học quốc gia\nsource_id: chunk-9ab2ef792aae97cabbe765a0b8f13dec&lt;SEP&gt;chunk-ec91545ddc9cc68506032e4470a8a9f8&lt;SEP&gt;chunk-0761fa57aabb60f1cec1b8b498faf0ab&lt;SEP&gt;chunk-00013c7d0035e5c15f6307d45bccf8fd&lt;SEP&gt;chunk-d680927740192cc803a01a18f1172bbc&lt;SEP&gt;chunk-81b00668814f85d085df1a7648c51f2f&lt;SEP&gt;chunk-1fbecf3c48735a3c7c237506a73c0974&lt;SEP&gt;chu "from": 53, "to": 82, "title": "weight: 2.0\ndescription: ĐHQGHN được nêu thông qua và công bố Đề án tuyển sinh.&lt;SEP&gt;Đề án tuyển sinh là căn cứ để ĐHQGHN giám sát việc thực hiện quy định pháp luật và các cam kết đối với người học.\nkeywords: công bố,giám sát,quy định pháp luật,thông qua\nsource_id: chunk-a9650fb1673ca3caba1c69a1523baa2a&lt;SEP&gt;chunk-ffb1cfd0c23e7fa4206abe42c582cc74\nfile_path: ..\\..\\data\\quyet_dinh_1328_chunks.json\ncreated_at: 1775485512", "label": "công bố,giám sát,quy định pháp luật,thông qua"}, {"from": 53, "to": 57, "title": "weight: 3.0\ndescription: Điều 12 nêu ĐHQGHN xây dựng kế hoạch tuyển sinh dựa trên kế hoạch chung của Bộ GD&amp;ĐT.&lt;SEP&gt;Bộ GD&amp;ĐT nêu hoạt động kiểm định góp phần giúp ĐHQGHN từng bước khẳng định mình và hội nhập quốc tế.&lt;SEP&gt;Bộ GD&amp;ĐT kỳ vọng hoạt động kiểm định sẽ giúp ĐHQGHN từng bước khẳng định mình.\nkeywords: căn cứ kế hoạch,nâng cao,nâng cao chất lượng,tác động,tác động kỳ vọng\nsource_id: chunk-42c0bd7eac70305a81f43b3e9300d670&lt;SEP&gt;chunk-5e81f4c61b793aac41403ee6596f567b&lt;SEP&gt;chunk-805841d4cd9b0dc5b2250fe0db1af589\nfile_path: ..\\..\\data\\quyet_dinh_1328_chunks.json&lt;SEP&gt;..\\..\\data\\data_1000_chunk_512.json\ncreated_at: 1775573954", "label": "căn cứ kế hoạch,nâng cao,nâng cao chất lượng,tác động,tác độ"}, {"from": 53, "to": 43, "title": "weight: 7.0\ndescription: Trường ĐHCN được nêu là đơn vị thuộc ĐHQGHN và có các cá nhân được nhận danh hiệu do ĐHQGHN tuyên dương.&lt;SEP&gt;Chương trình đánh giá của Trường ĐHCN được xác định là chương trình đánh giá thứ năm trong ĐHQGHN.&lt;SEP&gt;Trường ĐHCN được nêu gắn với ĐHQGHN trong thông tin về nhóm thầy trò.&lt;SEP&gt;Trường ĐHCN được nêu trong bối cảnh tham gia hoạt động của ĐHQGHN tại Hòa Lạc.&lt;SEP&gt;Văn bản đặt Trường ĐHCN trong ngữ cảnh ĐHQGHN, cho thấy mối quan hệ tổ chức giữa các đơn vị.&lt;SEP&gt;Trường ĐHCN được nêu gắn với ĐHQGHN trong văn bản.&lt;SEP&gt;Thông tin cho thấy Trường ĐHCN thuộc/ghi nhận cùng với ĐHQGHN trong nội dung hồ sơ.\nkeywords: bối cảnh,bối cảnh đánh giá,liên kết,liên kết tổ chức,liên quan,tham gia,thuộc hệ thống,trực thuộc,xếp thứ tự,đơn vị trực thuộc\nsource_id: chunk-24bf8f10fe4493b04a123772b28798a7&lt;SEP&gt;chunk-6b59ddfc3d399f3eb888e1aee9ade483&lt;SEP&gt;chunk-fb7f7b40a50da794b627b640f0913ce8&lt;SEP&gt;chunk-9457347bb097438ac4d6e76f8c53d79b&lt;SEP&gt;chunk-b9166f3a2cba60ebfa42d6417c42d6c2&lt;SEP&gt;chunk-79f56bb89c14d701a8a574d9804fe8e5&lt;SEP&gt;chunk-abbcd84010b1b921e0082f05625d13b6\nfile_path: ..\\..\\data\\data_1000_chunk_512.json\ncreated_at: 1775575855", "label": "bối cảnh,bối cảnh đánh giá,liên kết,liên kết tổ chức,liên qu"}, {"from": 53, "to": 74, "title": "weight: 1.0\ndescription: Trường Đại học Công nghệ – ĐHQGHN gắn với ĐHQGHN trong tên gọi được nêu.\nkeywords: liên kết tổ chức\nsource_id: chunk-d7646afd71a7fe117eb4720c8fa4e688\nfile_path: ..\\..\\data\\data_1000_chunk_512.json\ncreated_at: 1775499902", "label": "liên kết tổ chức"}, {"from": 53, "to": 30, "title": "weight: 1.0\ndescription: ĐHQGHN được nêu là có tham dự buổi lễ và có đầu tư trọng điểm trong lĩnh vực liên quan đến xưởng.\nkeywords: tham dự,đầu tư\nsource_id: chunk-bbe290a15692091f354ffb5385d8273d\nfile_path: ..\\..\\data\\data_1000_chunk_512.json\ncreated_at: 1775499957", "label": "tham dự,đầu tư"}, {"from": 53, "to": 63, "title": "weight: 2.0\ndescription: ĐHQGHN tin tưởng giao nhiệm vụ, qua đó tạo điều kiện cho sinh viên được tiếp cận học tập và thực hành.&lt;SEP&gt;ĐHQGHN tin tưởng giao nhiệm vụ, qua đó tạo điều kiện cho sinh viên được tiếp cận học tập và thực hành.\nkeywords: giao nhiệm vụ,tạo điều kiện\nsource_id: chunk-59487b438c63dbdd479560c5298ab748\nfile_path: ..\\..\\data\\data_1000_chunk_512.json\ncreated_at: 1775530303", "label": "giao nhiệm vụ,tạo điều kiện"}, {"from": 53, "to": 67, "title": "weight: 1.0\ndescription: Phạm Hồng Công thuộc hệ thống ĐHQGHN thông qua Trường Đại học Công nghệ.\nkeywords: học tập,liên kết tổ chức\nsource_id: chunk-b88514b57a69a5330e5177384620b006\nfile_path: ..\\..\\data\\data_1000_chunk_512.json\ncreated_at: 1775500443", "label": "học tập,liên kết tổ chức"}, {"from": 53, "to": 72, "title": "weight: 8.0\ndescription: Quan hệ “(Trường ĐH Công nghệ, ĐHQGHN)” được mô tả theo nhiều ngữ cảnh cho thấy Trường ĐH Công nghệ được gắn liền với ĐHQGHN (ĐHQGHN). Cụ thể, Trường ĐH Công nghệ được nêu là thuộc ĐHQGHN, bao gồm cả trong các mô tả theo hướng tổ chức/đơn vị học tập. Đồng thời, trong một số nội dung khác, Trường ĐH Công nghệ được xem là đơn vị cùng ĐHQGHN tham gia ký kết thỏa thuận hợp tác. Trường ĐH Công nghệ cũng xuất hiện đồng hành với ĐHQGHN trong bối cảnh giảng viên tham gia trình bày báo cáo. Ngoài ra, Trường ĐH Công nghệ và ĐHQGHN được nêu cùng tham gia phát triển hệ thống BLife. Cuối cùng, Trường ĐH Công nghệ còn được gắn với ĐHQGHN trong bối cảnh ĐHQGHN công nhận các phòng thí nghiệm trọng điểm và nhóm nghiên cứu mạnh.\nkeywords: công nhận,liên kết,liên kết tổ chức,liên quan,phối hợp,thuộc hệ thống,thuộc quản lý,trực thuộc,đào tạo,đơn vị tham gia,đại học quốc gia,đồng nêu,đồng phát triển\nsource_id: chunk-d1c4f85dc345362f564528e275036273&lt;SEP&gt;chunk-345ba3ea4c0a4f72cc85d813e2af9cd8&lt;SEP&gt;chunk-40d6169a38950ca096c8b3332f3a4e55&lt;SEP&gt;chunk-acd7e618643d8b8c6089dbd941157aba&lt;SEP&gt;chunk-41b19a9281237237779b36fc4659371b&lt;SEP&gt;chunk-ba882b4d55f4e724cc8bcfb9b596c21e&lt;SEP&gt;chunk-8f1c3ebde2e253c5be812bef35417df2&lt;SEP&gt;chunk-aa3e8ae62b2af0da1857e881aa9a9de0\nfile_path: ..\\..\\data\\data_1000_chunk_512.json\ncreated_at: 1775576181", "label": "công nhận,liên kết,liên kết tổ chức,liên quan,phối hợp,thuộc"}, {"from": 53, "to": 73, "title": "weight: 3.0\ndescription: Trường Đại học Công nghệ được nêu là thuộc ĐHQGHN trong bối cảnh ký kết.&lt;SEP&gt;Văn bản nêu Trường Đại học Công nghệ thuộc ĐHQGHN trong bối cảnh phát triển VAV.&gt;&lt;SEP&gt;Trường Đại học Công nghệ được mô tả gắn với ĐHQGHN (VNU).\nkeywords: liên kết học thuật,liên kết tổ chức,quản lý,thuộc hệ thống,đơn vị trực thuộc\nsource_id: chunk-0d2f82e52e6b948f23822a3979f97d5f&lt;SEP&gt;chunk-5a1c6f8a47409d216a938e8a1d44d421&lt;SEP&gt;chunk-3e5d9d16dbca5cfca6458b1f396c1496\nfile_path: ..\\..\\data\\data_1000_chunk_512.json\ncreated_at: 1775538227", "label": "liên kết học thuật,liên kết tổ chức,quản lý,thuộc hệ thống,đ"}, {"from": 53, "to": 35, "title": "weight: 1.0\ndescription: ĐHQGHN cam kết áp dụng chính sách tốt để thu hút và đầu tư vun cao các nhóm nhà khoa học mũi nhọn tại nhà trường.\nkeywords: chính sách,thu hút đầu tư\nsource_id: chunk-35900977eb9299da11a0394943cf9257\nfile_path: ..\\..\\data\\data_1000_chunk_512.json\ncreated_at: 1775528536", "label": "chính sách,thu hút đầu tư"}, {"from": 53, "to": 28, "title": "weight: 1.0\ndescription: Buổi lễ có sự tham dự của đại diện về phía ĐHQGHN.\nkeywords: tham dự,đại diện\nsource_id: chunk-a6856939570a377795a7ff53827b17a9\nfile_path: ..\\..\\data\\data_1000_chunk_512.json\ncreated_at: 1775529302", "label": "tham dự,đại diện"}, {"from": 53, "to": 36, "title": "weight: 1.0\ndescription: Năm học 2017-2018 triển khai thực hiện các chỉ tiêu/kế hoạch/nhiệm vụ được ĐHQGHN và Trường ban hành.\nkeywords: quy định chỉ tiêu\nsource_id: chunk-2005eb4c51b813918c965dc8372a1598\nfile_path: ..\\..\\data\\data_1000_chunk_512.json\ncreated_at: 1775531496", "label": "quy định chỉ tiêu"}, {"from": 53, "to": 61, "title": "weight: 1.0\ndescription: ĐHQGHN được nêu là đơn vị gắn với việc trao Bằng khen cho Nguyễn Hải Phong.\nkeywords: ghi nhận,đơn vị quản lý\nsource_id: chunk-d9f09ced67119e0dd0ab1ad21d4f1ce0\nfile_path: ..\\..\\data\\data_1000_chunk_512.json\ncreated_at: 1775531621", "label": "ghi nhận,đơn vị quản lý"}, {"from": 53, "to": 42, "title": "weight: 1.0\ndescription: ĐHQGHN tham gia cùng Trường ĐH Công nghệ trong việc ký kết thỏa thuận hợp tác theo nội dung nêu.\nkeywords: ký kết,tham gia\nsource_id: chunk-8ebf34cb943b7ae241ee5638de0cb5df\nfile_path: ..\\..\\data\\data_1000_chunk_512.json\ncreated_at: 1775536284", "label": "ký kết,tham gia"}, {"from": 53, "to": 78, "title": "weight: 1.0\ndescription: Hình thức xét tuyển được thực hiện theo quy định của ĐHQGHN (Đại học Quốc gia Hà Nội).\nkeywords: quy định áp dụng\nsource_id: chunk-cfd8825c1d0fcae590be6246e2358a4d\nfile_path: ..\\..\\data\\data_1000_chunk_512.json\ncreated_at: 1775546088", "label": "quy định áp dụng"}, {"from": 53, "to": 65, "title": "weight: 1.0\ndescription: ĐHQGHN tiếp tục đầu tư cho nhóm nghiên cứu để hoàn thiện sản phẩm.\nkeywords: hỗ trợ,đầu tư\nsource_id: chunk-5a71385043d0e397346809ab97f587ce\nfile_path: ..\\..\\data\\data_1000_chunk_512.json\ncreated_at: 1775547958", "label": "hỗ trợ,đầu tư"}, {"from": 53, "to": 51, "title": "weight: 1.0\ndescription: VNU-UET được nêu trong bối cảnh phối hợp liên quan giữa ĐHQGHN và Trường ĐH Công nghệ.\nkeywords: bối cảnh tổ chức,liên quan đơn vị\nsource_id: chunk-f0b1eaffa2e2206e0c4c14bd5799a6a5\nfile_path: ..\\..\\data\\data_1000_chunk_512.json\ncreated_at: 1775548870", "label": "bối cảnh tổ chức,liên quan đơn vị"}, {"from": 53, "to": 29, "title": "weight: 1.0\ndescription: ĐHQGHN tham dự buổi lễ.\nkeywords: tham dự,đại diện\nsource_id: chunk-0dc814b89f42b41d76783f0d2bd561d7\nfile_path: ..\\..\\data\\data_1000_chunk_512.json\ncreated_at: 1775552142", "label": "tham dự,đại diện"}, {"from": 53, "to": 11, "title": "weight: 1.0\ndescription: GS.TSKH Nguyễn Đình Đức được nêu là đại diện phía ĐHQGHN tham dự lễ kỷ niệm.\nkeywords: chức vụ,đại diện\nsource_id: chunk-5e8c077ffe88c7422abef83194d113d8\nfile_path: ..\\..\\data\\data_1000_chunk_512.json\ncreated_at: 1775554340", "label": "chức vụ,đại diện"}, {"from": 53, "to": 38, "title": "weight: 1.0\ndescription: PGS.TS. Phạm Bảo Sơn là đại diện của ĐHQGHN (Phó Giám đốc ĐHQGHN) tham dự buổi lễ.\nkeywords: chức vụ,đại diện\nsource_id: chunk-94f9971d368da1ee816d9fea1b85fdad\nfile_path: ..\\..\\data\\data_1000_chunk_512.json\ncreated_at: 1775554511", "label": "chức vụ,đại diện"}, {"from": 53, "to": 81, "title": "weight: 1.0\ndescription: ĐHQGHN là
