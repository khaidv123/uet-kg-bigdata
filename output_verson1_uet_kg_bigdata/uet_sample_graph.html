unk-6201fb9a3d68b0dee6a9652ff85255d1&lt;SEP&gt;chunk-3899d02237561662f7693910b7d2e71d&lt;SEP&gt;chunk-f50f1b2f0fb830d3b1a5ad22ae3e32fa&lt;SEP&gt;chunk-799783222865dcbc3506d701d1681ab8&lt;SEP&gt;chunk-a3a59240ba50490e332a4eb7e94bb482&lt;SEP&gt;chunk-a78818cdb47dd96117f91f6c52a36b6d&lt;SEP&gt;chunk-14d0aef2080eddebe8541faf787911fc&lt;SEP&gt;chunk-0f61d921cf112e516a7df6ee55f82e92&lt;SEP&gt;chunk-8233fa2689bbdd699a004ce04abcf40c&lt;SEP&gt;chunk-f78959122a207a384e0e4be22e913014&lt;SEP&gt;chunk-a5998feea2b4711403e27c05e0df301b&lt;SEP&gt;chunk-9637790a369706e669cc964f994f07dd&lt;SEP&gt;chunk-1d30ad17f1121b9cb09529be712ce5a4&lt;SEP&gt;chunk-c61438037b659b02507e89743aba7243&lt;SEP&gt;chunk-063008d5904ffe32bee3b63969398756&lt;SEP&gt;chunk-39fccda76f3469fb62958eaa660ce83f&lt;SEP&gt;chunk-47224af94d578c5232192e9d2d5058e0&lt;SEP&gt;chunk-c26e7368b61a03cd222f2a0f21715012&lt;SEP&gt;chunk-7296d4b8e81d3695626afda7ef2b005e&lt;SEP&gt;chunk-dee4c0dda13ffdc358b9b9797a60e79d&lt;SEP&gt;chunk-e4001cd8269101400b9d22038a2e3501&lt;SEP&gt;chunk-8a7e7d9c2d81d63e9420d386f1660ef9&lt;SEP&gt;chunk-b3b9b194ea53d1e6157391c0e749aaee&lt;SEP&gt;chunk-1aace439930c13873d2de65e18abf07f&lt;SEP&gt;chunk-8391a8d8343cbd0b4f06846dc33ec7dd&lt;SEP&gt;chunk-6cbf5f296409d0cf015c0c7e1fdba6a7&lt;SEP&gt;chunk-b9166f3a2cba60ebfa42d6417c42d6c2&lt;SEP&gt;chunk-79f56bb89c14d701a8a574d9804fe8e5&lt;SEP&gt;chunk-d2dc92947d9618802f61c76854e38c85&lt;SEP&gt;chunk-caa4b07aba5db1cc9fee147964df8709&lt;SEP&gt;chunk-abbcd84010b1b921e0082f05625d13b6&lt;SEP&gt;chunk-aa3e8ae62b2af0da1857e881aa9a9de0\nfile_path: ..\\..\\data\\de_an_2024_chunks.json&lt;SEP&gt;..\\..\\data\\data_1000_chunk_512.json\ncreated_at: 1775576143", "group": "đơn_vị_trực_thuộc", "value": 17}, {"id": 44, "label": "Trường Đại học Công nghệ (ĐHCN)", "title": "entity_id: Trường Đại học Công nghệ (ĐHCN)\nentity_type: đơn_vị_trực_thuộc\ndescription: Trường Đại học Công nghệ (ĐHCN) là một đơn vị giáo dục thuộc Đại học Quốc gia Hà Nội (ĐHQGHN), sử dụng “ĐHCN”/“Trường Đại học Công nghệ” như cách viết tắt khi đề cập đến đơn vị triển khai chương trình. Trường được ghi nhận tham gia tổ chức các hoạt động liên quan đến xét tuyển giảng viên trình độ Tiến sĩ trong khuôn khổ tuyển dụng viên chức giảng viên năm 2021. Trong các nội dung chuyên môn và nghiên cứu, Trường được gắn với GS.TS.NGƯT Bạch Gia Dương, đồng thời là nơi cán bộ, sinh viên gửi cảm nhận và là địa điểm tổ chức phiên họp lần thứ VIII. Ở các hoạt động định hướng, Trường được nêu là đối tượng được tư vấn và tham gia góp ý cho các chủ trương, nhiệm vụ trọng tâm trong giai đoạn tới.\n\nVề hợp tác, Trường Đại học Công nghệ được mô tả là đơn vị tiếp đón và trao đổi trong buổi làm việc liên quan đến robot, kèm kế hoạch gửi nghiên cứu sinh sang Nhật Bản. Trường có các kết quả nghiên cứu được cấp bằng độc quyền cho các giải pháp hữu ích (được nêu là hai nghiên cứu) và xuất hiện trong bối cảnh tuyển sinh cùng thành tích cá nhân, bao gồm việc Nguyễn Xuân Đức được tuyển thẳng và đạt danh hiệu thủ khoa đầu vào năm học 2013–2014. Trường cũng tổ chức/đồng tổ chức chuỗi chương trình liên quan đến Samsung và tiếp đón đoàn làm việc của Tập đoàn Samsung. Về đào tạo, Trường từng tổ chức Lễ khai giảng năm học 2019–2020 và đang đào tạo các ngành Kỹ thuật robot và Kỹ thuật xây dựng, được nhắc đến với các thành tựu nghiên cứu về robot và từng xuất hiện trong bối cảnh một buổi nói chuyện được tổ chức tại phòng 212-E3. Ngoài ra, Trường được mô tả là đơn vị thuộc hệ thống ĐHQGHN và là nơi thuộc nhóm nghiên cứu thực hiện đề tài. Trường cũng được ghi nhận là nơi ngành Kỹ thuật máy tính bắt đầu tuyển sinh.\nsource_id: chunk-ead4ac48e0b97eb063181288c238ee63&lt;SEP&gt;chunk-ea57c9315676c67210911da548478a31&lt;SEP&gt;chunk-77d7917ef2e7d9cd9a81dd72330ed7f1&lt;SEP&gt;chunk-824a0e8df6eccd832bfb388bf660ec06&lt;SEP&gt;chunk-af41db2bb10375a55725ea3beeec211d&lt;SEP&gt;chunk-793697f37d99480ccf403a1b21f35491&lt;SEP&gt;chunk-9cc599f95d63d272604057fd8aa88455&lt;SEP&gt;chunk-8e79e22b4c737d5026aa4eaa8f8b6d88&lt;SEP&gt;chunk-2f6a0ae1ea831f72cdab8b38eb0e808e&lt;SEP&gt;chunk-33a24bfcac3a123fd6825fd7a9c3340b&lt;SEP&gt;chunk-94f9971d368da1ee816d9fea1b85fdad&lt;SEP&gt;chunk-1c81102c63409740cad7996319f87efc&lt;SEP&gt;chunk-1241a583ad5c28008997a3ede7a15de3&lt;SEP&gt;chunk-077c2eaae12fe57fa3f23857dfb7c451\nfile_path: ..\\..\\data\\data_1000_chunk_512.json\ncreated_at: 1775575297", "group": "đơn_vị_trực_thuộc", "value": 15}, {"id": 45, "label": "Trường Đại học Công nghệ Chiba", "title": "entity_id: Trường Đại học Công nghệ Chiba\nentity_type: organization\ndescription: Trường Đại học Công nghệ Chiba đến thăm và làm việc với Trường ĐHCN để thảo luận các vấn đề về kinh nghiệm quản lý trong quản trị đại học; đồng thời được đề nghị cung cấp ý kiến đóng góp tích cực để nâng cao năng lực quản trị đại học của Trường ĐHCN.&lt;SEP&gt;Đơn vị đối tác tại Nhật Bản có đoàn đến tham quan, làm việc với Trường Đại học Công nghệ nhằm tăng cường hợp tác về quản trị đại học.&lt;SEP&gt;Trường Đại học Công nghệ Chiba (Chiba Institute of Technology) là đơn vị tại Nhật Bản, sẽ trao tặng 03 suất học bổng thạc sĩ và đào tạo khoảng 10.000 sinh viên.&lt;SEP&gt;Trường Đại học Công nghệ Chiba là đối tác trong hợp tác chặt chẽ với Trường Đại học Công nghệ.&lt;SEP&gt;Trường Đại học Công nghệ Chiba là nơi diễn ra chương trình giao lưu quốc tế dành cho Vũ Thành Long.\nsource_id: chunk-2bf09b0414a94411876841812c14f029&lt;SEP&gt;chunk-dc8ed48bf33f9c590e86423b4cffdf9a&lt;SEP&gt;chunk-5e0d5eb2b63e933c911e3c3ff608faa2&lt;SEP&gt;chunk-eee448d65297e857086b921596d54542&lt;SEP&gt;chunk-87e5549e1de1fcbf4b93b0e1735ba280\nfile_path: ..\\..\\data\\data_1000_chunk_512.json\ncreated_at: 1775573254", "group": "organization", "value": 12}, {"id": 46, "label": "Trần Quốc Quân", "title": "entity_id: Trần Quốc Quân\nentity_type: person\ndescription: Trần Quốc Quân tham gia nhóm nghiên cứu, đạt giải nhất sinh viên nghiên cứu khoa học, có thành tích xuất sắc trong học tập và nghiên cứu; được nhà trường quyết định cho làm chuyển tiếp Nghiên cứu sinh từ tháng 8/2013 và được giữ lại làm cán bộ giảng dạy.&lt;SEP&gt;TS. Trần Quốc Quân là cựu sinh viên, giảng viên Trường Đại học Công nghệ và được Forbes Việt Nam vinh danh năm 2020 trưởng thành từ Trường Đại học Công nghệ – ĐHQGHN; TS Trần Quốc Quân sinh năm 1990 và là thủ khoa năm 2012 của Trường ĐH Công nghệ.&lt;SEP&gt;Ứng viên được nêu trong danh sách kết quả, có năm sinh, giới tính, học hàm/học vị, ngành và nơi làm việc cùng kết quả đạt.\nsource_id: chunk-31a055eeb31950564ffbe9add97a6bd5&lt;SEP&gt;chunk-c119713a2d3a55432d71a2b3d048ed46&lt;SEP&gt;chunk-f62aad7d2ff12ef85afe04fe8239cc8b\nfile_path: ..\\..\\data\\data_1000_chunk_512.json\ncreated_at: 1775575709", "group": "person", "value": 12}, {"id": 47, "label": "Tập đoàn hàng không Boeing, Mỹ", "title": "entity_id: Tập đoàn hàng không Boeing, Mỹ\nentity_type: organization\ndescription: Tập đoàn hàng không Boeing, Mỹ tham gia phỏng vấn tuyển thực tập sinh, kết nối với nhà trường để tạo cơ hội thực tập và mong muốn hỗ trợ đào tạo theo các nội dung liên quan STEM và chương trình giảng dạy.\nsource_id: chunk-586ad7b3e7248ae5bc4853a5567d59f1\nfile_path: ..\\..\\data\\data_1000_chunk_512.json\ncreated_at: 1775552082", "group": "organization", "value": 12}, {"id": 48, "label": "Tự chủ đại học", "title": "entity_id: Tự chủ đại học\nentity_type: concept\ndescription: Lĩnh vực được nhắc đến trong bối cảnh Đảng bộ trường Đại học Công nghệ cần nâng cao lãnh đạo một số nhiệm vụ trọng tâm liên quan.&lt;SEP&gt;Chủ trương tiến đến tự chủ đại học được thảo luận, gắn với các ý kiến phản hồi tích cực và đồng thuận.\nsource_id: chunk-cbe1df14348439cf10645c5beb4ce748&lt;SEP&gt;chunk-e8e4aec6754d5b1c472e0f2ca9c98229\nfile_path: ..\\..\\data\\data_1000_chunk_512.json\ncreated_at: 1775559572", "group": "concept", "value": 12}, {"id": 49, "label": "UET", "title": "entity_id: UET\nentity_type: other\ndescription: UET (thường viết đầy đủ là Trường Đại học Công nghệ, theo dạng VNU-UET) là một đơn vị thuộc Đại học Quốc gia Hà Nội (ĐHQGHN/VNU). UET được mô tả vừa như một “không gian” giúp hình thành đam mê và định hướng nghiên cứu, vừa là nơi triển khai đào tạo và “mái nhà chung”/điểm đến của người học sau quá trình học tập. Về đào tạo, UET có các ngành/lĩnh vực đào tạo, trong đó có Hệ thống thông tin; đồng thời UET được nêu là quản lý 6 lĩnh vực đào tạo do ĐHQGHN quản lý và nhấn mạnh ngành Kỹ thuật Máy tính với lợi thế cung cấp kiến thức chuyên môn sâu rộng gắn với thực tiễn. Về tổ chức–quản trị, UET được gắn với hoạt động quản trị chất lượng; về nhân sự, UET có liên hệ với lĩnh vực thông tin qua vai trò Phó Giám đốc là giảng viên của UET. Trong hoạt động học thuật và với sinh viên, UET chú trọng phát triển sản phẩm, tham gia nghiên cứu khoa học và tích lũy kiến thức qua nhiều hoạt động, tổ chức hội thảo và hỗ trợ tiếp cận thông tin học bổng (có trường hợp sinh viên năm thứ nhất tìm hiểu học bổng tại UET). Về hạ tầng thông tin, UET được nhận diện qua tên miền https://uet.vnu.edu.vn và xuất hiện trong các URL liên quan đến triển khai tầm thu học phí năm học 2023–2024. Về hợp tác và hội nhập quốc tế, UET được mô tả có hoạt động giao lưu với SUTD, tham gia các cuộc thi cùng các trường khác để chọn đội có thành tích tốt nhất, đồng thời hợp tác đào tạo/trao đổi giảng viên với Trường ĐH Quốc gia Chungbuk và hợp tác đào tạo với CBNU. Ngoài ra, UET được nêu là đơn vị hợp tác với Trường ĐH Giao thông vận tải trong một sự kiện quan trọng, kỳ vọng phát huy thế mạnh về cơ sở vật chất và đội ngũ cán bộ, giảng viên. Tên viết tắt “UET” cũng được gắn với một nhóm sinh viên được nhắc đến trong mô tả.\nsource_id: chunk-97e68f2fa4575a4b18bae08d56e768e9&lt;SEP&gt;chunk-a2074c1ce083e1df89b954fe58b0b262&lt;SEP&gt;chunk-d7646afd71a7fe117eb4720c8fa4e688&lt;SEP&gt;chunk-d8a2412bf77af2eec97a7a16c354ccfa&lt;SEP&gt;chunk-03a094feba8feb4c02ad036e0d5fdacb&lt;SEP&gt;chunk-35900977eb9299da11a0394943cf9257&lt;SEP&gt;chunk-ecd48404b1869426daccf41afe48cd6d&lt;SEP&gt;chunk-ce40906525c6b7d04dd7daafbd86a514&lt;SEP&gt;chunk-1ea8105716ff70f1a51bb3682beb4a24&lt;SEP&gt;chunk-9d0302b0d28ec502bb1eea46ac7c2bf1&lt;SEP&gt;chunk-2e6748671ad59f59ccee6852d16d676a&lt;SEP&gt;chunk-8b3f7265a717e2c1b642303ee5e681c7&lt;SEP&gt;chunk-77339be9f43e1e58c1b8c0aa8e68ca8b&lt;SEP&gt;chunk-4aa49c4ade846a08159b36c2ce09ffc6&lt;SEP&gt;chunk-5daed4360a43d1bb10d5e77ce7f63d54&lt;SEP&gt;chunk-1010b616485d42c71a131e4ecfc24215&lt;SEP&gt;chunk-326591638c210607b3054ab752cc6dfe&lt;SEP&gt;chunk-a085aab048cc0c6bf5bf05d56b6745e9&lt;SEP&gt;chunk-56880a10a95d3e280095149be4176406&lt;SEP&gt;chunk-a8ac4e0a6ebfbc95176a17ee262268b1&lt;SEP&gt;chunk-51db51565f943228373a5d08c9e4ec06&lt;SEP&gt;chunk-89497855f0e028aa383068cd7c75c0e3&lt;SEP&gt;chunk-3c4744e3cab2085a302fdce42889d075\nfile_path: ..\\..\\data\\data_1000_chunk_512.json\ncreated_at: 1775573954", "group": "other", "value": 13}, {"id": 50, "label": "VNU-SMM: Hệ thống giám sát mạng xã hội", "title": "entity_id: VNU-SMM: Hệ thống giám sát mạng xã hội\nentity_type: data\ndescription: VNU-SMM: Hệ thống giám sát mạng xã hội được giới thiệu như một hệ thống giám sát mạng xã hội, có tên mới là DSWatcher và được sử dụng tại nhiều cơ quan, doanh nghiệp để thu thập dữ liệu và hỗ trợ quản lý thương hiệu, phân tích thông tin từ mạng xã hội.\nsource_id: chunk-ba89ee29fa4c0d1bafd5c08f394640b4\nfile_path: ..\\..\\data\\data_1000_chunk_512.json\ncreated_at: 1775550003", "group": "data", "value": 12}, {"id": 51, "label": "VNU-UET", "title": "entity_id: VNU-UET\nentity_type: organization\ndescription: VNU-UET là tên viết tắt của Trường Đại học Công nghệ – Đại học Quốc gia Hà Nội (ĐHQGHN), thường được sử dụng trong nhiều văn bản và ngữ cảnh khác nhau để chỉ đơn vị Trường Đại học Công nghệ thuộc ĐHQGHN. Trong các thông tin về hoạt động, sự kiện/hội nghị, hoặc dữ liệu liên quan đến chức vụ, vai trò của đơn vị, VNU-UET cũng được nêu kèm tên đầy đủ của trường để làm rõ ngữ cảnh.\n\nVề mặt tổ chức, VNU-UET vừa được xác định như một đơn vị gắn với Trường Đại học Công nghệ – ĐHQGHN, vừa có thể được dùng để chỉ địa điểm tổ chức một số chương trình, chẳng hạn Immersion Course. Trong bối cảnh sự kiện, “VNU-UET” đôi khi được dùng theo nghĩa đơn vị liên quan đến việc tổ chức/thu hút tham gia của các nhóm, ví dụ nhóm bạn sinh viên tham gia chương trình. Ngoài ra, VNU-UET còn xuất hiện như tên viết tắt tham gia tổ chức các hoạt động định hướng nghề nghiệp, được dùng trong thông tin về ra mắt sản phẩm, và được liên hệ với vai trò đăng cai tổ chức kỳ thi. Bên cạnh đó, VNU-UET cũng được gắn với đội tuyển Toán học của Trường Đại học Công nghệ – ĐHQGHN.\nsource_id: chunk-9c64ae932473815f6deb1f5a4cb6adf1&lt;SEP&gt;chunk-7b81d0c6634bd97499f8cb8631bf5c4f&lt;SEP&gt;chunk-d7646afd71a7fe117eb4720c8fa4e688&lt;SEP&gt;chunk-e54dc90afe47788551038c0c8c5a20b3&lt;SEP&gt;chunk-d680927740192cc803a01a18f1172bbc&lt;SEP&gt;chunk-913cf9dba6a40fb60f8bc6fe33f9366a&lt;SEP&gt;chunk-d1c1697c6774b991f1aa0fd226e841fd&lt;SEP&gt;chunk-b1d594998c1682c2568840c15e1bd189&lt;SEP&gt;chunk-5daed4360a43d1bb10d5e77ce7f63d54&lt;SEP&gt;chunk-3e5d9d16dbca5cfca6458b1f396c1496&lt;SEP&gt;chunk-6fb2be7c3faead2c2fcca8c6b191ceed&lt;SEP&gt;chunk-cd65bd38c10cc80a341989d296fd4fe4&lt;SEP&gt;chunk-705ef0131397538af3b6eb26607486e7&lt;SEP&gt;chunk-f0b1eaffa2e2206e0c4c14bd5799a6a5&lt;SEP&gt;chunk-29e8e52f6e4122b32c6998d8257ddf7d&lt;SEP&gt;chunk-1bfeef9a58955bf3e2ccd4cc860b3387&lt;SEP&gt;chunk-488b38d233f0c2361a6e0da97be8d1d0&lt;SEP&gt;chunk-f8079719074c639fa305906157aade98&lt;SEP&gt;chunk-fb4aadc6417463845b5999287f6ab063&lt;SEP&gt;chunk-fc4dd9c64660eadd115006954b61e0fa&lt;SEP&gt;chunk-c4198e8da0a60eeb26a49b3e0fc751d4&lt;SEP&gt;chunk-7222f37f44efc4548ace33a9120c56b0\nfile_path: ..\\..\\data\\data_1000_chunk_512.json\ncreated_at: 1775574373", "group": "organization", "value": 16}, {"id": 52, "label": "Vật lý kỹ thuật", "title": "entity_id: Vật lý kỹ thuật\nentity_type: chuyên_ngành\ndescription: Vật lý kỹ thuật là một nhóm ngành/chuyên ngành trong bảng tuyển sinh, được mô tả như một “ngành” thuộc mã CN3 trong dữ liệu tuyển sinh và đồng thời là ngành/chuyên ngành được liệt kê trong bảng tương ứng với mã tuyển sinh CN3. Trong cấu trúc dữ liệu tuyển sinh, Vật lý kỹ thuật còn gắn với các thông tin theo các cột như thời lượng đào tạo, địa điểm học và loại bằng, đi kèm các số liệu tương ứng trong bảng. Về mặt mã số, Vật lý kỹ thuật được xác định là một chuyên ngành kỹ thuật có mã số 7520401 và được đặt trong ngữ cảnh “07 chương trình đào tạo trình độ đại học được đánh giá chất lượng ngoài”. Trong các mô tả liên quan đến “tốt nghiệp”, Vật lý kỹ thuật có đối tượng tốt nghiệp theo kỳ tổ chức lễ; đồng thời cũng được nêu là có sinh viên, học viên cao học và/hoặc nghiên cứu sinh tốt nghiệp đợt tháng 6/2017. Ngành học này gắn với tên ngành Vật lý kỹ thuật trong chương trình đào tạo và được mô tả là một chuyên ngành đóng vai trò nguồn nhân lực, phản ánh việc người học hoàn thành chương trình và tham gia lễ tốt nghiệp theo các đợt được tổ chức.\nsource_id: chunk-cecd038c8741ea822ebb8cf98ca0c7b9&lt;SEP&gt;chunk-303b6a6387641139bc31e379d439a83b&lt;SEP&gt;chunk-0ebbeb1004b0f84158b918799ea6ef56&lt;SEP&gt;chunk-2cc0a8e1e5ce4cf508ab8feae3eb98df&lt;SEP&gt;chunk-1a7858e2173d3a60e2bbb79e15b63ed3&lt;SEP&gt;chunk-790034372189e4984658cf1ff1537314&lt;SEP&gt;chunk-74b8343cdf7a8927f39450d6d7741ff3&lt;SEP&gt;chunk-f541b4deaeb1a76f28afbc3c71d01804&lt;SEP&gt;chunk-4c58838595d7267790ecbcc9f0400ca9&lt;SEP&gt;chunk-154e857b6434dc42f7b9a942f2fd153c&lt;SEP&gt;chunk-0dc814b89f42b41d76783f0d2bd561d7&lt;SEP&gt;chunk-8021ad216c1583516c956d8629bf8729\nfile_path: ..\\..\\data\\de_an_2024_chunks.json&lt;SEP&gt;..\\..\\data\\data_1000_chunk_512.json\ncreated_at: 1775552808", "group": "chuyên_ngành", "value": 13}, {"id": 53, "label": "ĐHQGHN", "title": "entity_id: ĐHQGHN\nentity_type: đơn_vị_trực_thuộc\ndescription: ĐHQGHN (Đại học Quốc gia Hà Nội) là cơ sở giáo dục/đại học quốc gia thuộc hệ thống ĐHQGHN, giữ vai trò điều phối và quản lý các hoạt động trọng tâm trên toàn hệ thống. Trong công tác tuyển sinh, ĐHQGHN tham gia và/hoặc tổ chức cơ chế xét tuyển thẳng đối với học sinh THPT hệ chuyên thuộc ĐHQGHN, tổ chức/điều phối các kỳ thi Olympic và tham gia tổ chức kỳ thi Đánh giá năng lực (ĐGNL; VSTEP/HSA) hoặc tương tự. ĐHQGHN công bố kết quả và dữ liệu phục vụ xét tuyển theo mức điểm ưu tiên, ban hành hoặc tham gia ban hành các văn bản quản lý về thời hạn, quy trình tuyển sinh; cập nhật dữ liệu theo đề án tuyển sinh, xác định mốc các đợt bổ sung và gắn dữ liệu theo từng dòng/chuyên ngành. ĐHQGHN cũng quyết định/chỉ đạo/điều phối quy định xét tuyển đặc thù, công tác đánh giá năng lực, công bố đề án tuyển sinh và tiêu chí/ngưỡng đầu vào cho giai đoạn 2017–2023, vận hành Ban Chỉ đạo tuyển sinh và Cổng thông tin tuyển sinh để thí sinh tra cứu kết quả/ngưỡng, phê duyệt phương thức tuyển sinh và tiếp nhận báo cáo phương án. Các điều chỉnh hằng năm có thể bao gồm mã đăng ký SAT (ví dụ năm 2024), nội dung đề án thu hút học sinh Nam Trung Bộ và Nam Bộ, hướng dẫn cập nhật danh sách trúng tuyển, xử lý gian lận và triển khai cơ chế đặc thù như chứng chỉ ngoại ngữ thi online.\n\nTrong tuyển sinh liên ngành và sau đại học từ 2017, ĐHQGHN được mô tả cung cấp phần mềm tuyển sinh sau đại học để thí sinh khai báo dự tuyển, ban hành hằng năm hướng dẫn điều kiện, hồ sơ và quy định tuyển sinh sau đại học; đồng thời nhấn mạnh yêu cầu công khai tình hình khảo sát việc làm và áp dụng quy định xét tuyển đối với công dân nước ngoài. ĐHQGHN cũng áp dụng các văn bản/công văn hướng dẫn công tác sinh viên giai đoạn 2021–2022, đặc biệt về ngưỡng đảm bảo chất lượng đầu vào. Về quản trị đào tạo, ĐHQGHN ban hành Quy chế đào tạo đại học và quy định liên quan đến đăng ký, bao gồm xử lý trường hợp số lượng đăng ký không đạt hoặc vượt ngưỡng tối thiểu/tối đa (trong phạm vi nhà trường đồng ý) và quy định đăng ký số tín chỉ; đồng thời quản lý đào tạo thông qua đặt chỉ tiêu, kế hoạch và nhiệm vụ đào tạo cho UET trong các năm học 2017–2018, có tham chiếu các khung/quy định về năng lực giảng dạy của giảng viên (nhắc Quyết định số 2401/QĐ-ĐHQGHN) và tham gia hoạt động kiểm định với các đơn vị/cá nhân trực thuộc.\n\nTrong quan hệ ĐHQGHN – Trường Đại học Công nghệ (UET/ĐHCN), các mô tả cho thấy sự gắn kết nhiều chiều: ĐHQGHN được nêu là tổ chức chủ quản của UET/ĐHCN, gắn với hoạt động nghiên cứu đề tài cùng UET; đồng thời có mô tả về việc UET từng được xem như đối tượng/ưu tiên trong chiến lược phát triển hoặc có vai trò quản lý/thuộc UET trong khuôn khổ hợp tác (được nhắc theo cấu trúc VNU–UET). ĐHQGHN cũng được mô tả là đơn vị đại học gắn với Trường Đại học Công nghệ nơi nhóm BlueSam đến từ, phản ánh sự liên kết giữa hệ thống ĐHQGHN và các hoạt động/nhóm nghiên cứu tại UET.\n\nĐHQGHN thúc đẩy hợp tác quốc tế và nghiên cứu thông qua các thỏa thuận với nhiều đối tác; các đơn vị thuộc ĐHQGHN (kể cả UET–VNU) ký thỏa thuận với MAI, Trường ĐH Công nghệ ký với các đại học quốc gia Belarus; ĐHQGHN hợp tác với Đại học Clermont Auvergne và có đề cập liên quan đến Đại học Công nghệ Chiba. ĐHQGHN liên hệ với “đơn vị phát triển VAV” (VAV) và Viện Đảm bảo chất lượng giáo dục ĐHQGHN, đồng thời được đưa vào nhóm các trường đại học hàng đầu theo QS WUR 2025. ĐHQGHN triển khai chính sách thu hút nghiên cứu sinh và tiến sĩ, tham dự các hội thảo về đào tạo nhân tài và phát triển nguồn nhân lực chất lượng cao, thảo luận phát triển nhóm nghiên cứu mạnh; phối hợp trao học bổng với POSCO TJ Park (2021–2022), nhận học bổng ADF và phối hợp ADF trao học bổng cho thủ khoa đầu vào của Trường ĐH Công nghệ, cùng chương trình học bổng Toshiba cho học viên và nghiên cứu sinh. ĐHQGHN nhấn mạnh chỉ số đánh giá sản phẩm khoa học công nghệ (có nhắc công trình UFBoot2 với số trích dẫn cao) và tổ chức nghiệm thu đề tài khoa học công nghệ cấp ĐHQGHN tại Trường ĐH Công nghệ.\n\nVề đối ngoại, học thuật và hình ảnh, ĐHQGHN được mô tả có phương án tái đầu tư nguồn thu học phí và có vai trò của Giám đốc; tham gia nhiều hoạt động như tặng Bằng khen cho sinh viên tại lễ tổng kết khóa học K58, tiếp đón đoàn làm việc của Samsung, phối hợp/trao đổi với LGDVH để thu hút nhân tài và phát triển hạ tầng đào tạo thông qua UET–VNU, tổ chức lễ tổng kết và trao thưởng công trình sinh viên nghiên cứu khoa học cấp ĐHQGHN năm 2017, trồng cây và tạo không gian học tập/sinh hoạt xanh tại Hòa Lạc, và tham gia hợp tác 3 bên với FPT. ĐHQGHN được mô tả có biến động thứ hạng Webometrics theo thời gian, từng dẫn đầu Việt Nam ở một số mốc (nhắc tháng 1/2020) và chiếm hạng nhất trong bảng xếp hạng Webometrics 2007. ĐHQGHN định hướng phát triển theo nghiên cứu và đại học số thông qua số hóa tài liệu, tham gia phát triển hệ thống BLife, được ghi nhận là tiên phong thành lập Khoa Công nghệ Nông nghiệp, có tham gia tiếp đoàn CIAT; đồng thời tham gia/đăng cai hội thảo quốc tế về tích hợp hệ thống cùng Trường ĐH Công nghệ và xuất hiện trong “Sáng tạo khởi nghiệp ĐHQGHN 2017”. Ngoài ra, ĐHQGHN còn được nêu trong vai trò công nhận phòng thí nghiệm trọng điểm và nhóm nghiên cứu mạnh cấp ĐHQGHN gắn với Trường ĐH Công nghệ, và được mô tả là đơn vị đưa kết quả nghiên cứu ra thị trường để kết nối nhà khoa học với doanh nghiệp và nhà đầu tư. Một mô tả ngắn cũng cho thấy ĐHQGHN có liên quan đến Trường ĐHCN trong hồ sơ, phản ánh sự gắn kết thông tin giữa các thực thể trong dữ liệu được đề cập.\nsource_id: chunk-a1f18f5fcf6e63a0cbd7e2aef2e73353&lt;SEP&gt;chunk-b411571421fd1e71727ad110e22d48fe&lt;SEP&gt;chunk-0639db15ed0575cdeb829d8a203a46c4&lt;SEP&gt;chunk-28f547b58c21b631b4398f5666bdc538&lt;SEP&gt;chunk-af9a015f54d835324a9340cecb98c2dd&lt;SEP&gt;chunk-aa1cba655a0cdd24eb42bb9fa5ed653a&lt;SEP&gt;chunk-f8020318aa29fb36ec7c9ef65f0237a6&lt;SEP&gt;chunk-566c52cd13c2645f71810bac5ed79b9f&lt;SEP&gt;chunk-e4c9484d2c42749a4f2545c34a9eb157&lt;SEP&gt;chunk-18601e96a6da0041c763bbf0764817e4&lt;SEP&gt;chunk-9a006ae3c6a47d88c88c15417c0e81d2&lt;SEP&gt;chunk-51728c249edbe2ffa611d004c2c204a2&lt;SEP&gt;chunk-0c454253ecdc153f0a50ba1863e99f6b&lt;SEP&gt;chunk-a84e71dd8daad2198c69b1cc677aaf37&lt;SEP&gt;chunk-9ab2ef792aae97cabbe765a0b8f13dec&lt;SEP&gt;chunk-fb27102441a5e0d4ba41b9cafbeaa  và đưa ra yêu cầu đối với Trường Đại học Công nghệ về điều chỉnh chương trình, chiến lược dạy và học, quy hoạch phát triển đội ngũ, và tổ chức hội thảo tọa đàm giữa sinh viên và giảng viên.\nsource_id: chunk-2eece05b4ca6a947ce4ee36f1834b8cd&lt;SEP&gt;chunk-0ccb202bc7d60ea55fffa935dbe281db\nfile_path: ..\\..\\data\\data_1000_chunk_512.json\ncreated_at: 1775572812", "group": "organization", "value": 12}, {"id": 55, "label": "Đại học Quốc gia Hà Nội", "title": "entity_id: Đại học Quốc gia Hà Nội\nentity_type: đơn_vị_trực_thuộc\ndescription: Đại học Quốc gia Hà Nội (ĐHQGHN, VNU) được mô tả là một đơn vị cấp cao trong hệ thống cơ sở đại học trực thuộc, đồng thời còn được gọi là “đơn vị đại học quản lý” và “đơn vị tuyển sinh”. Với vai trò chi phối và bảo đảm việc áp dụng quy định về tuyển sinh và đào tạo, ĐHQGHN tổ chức/định hướng công tác tuyển sinh đại học chính quy, bao gồm tổ chức tuyển sinh năm 2017 theo hệ thống chỉ tiêu (7.345 chỉ tiêu, 99 ngành/chương trình đào tạo bậc đại học) với sự phối hợp của các đơn vị thành viên. Trong quản lý đào tạo, ĐHQGHN ban hành quy chế và văn bản quản lý đào tạo đại học, thể hiện qua Quyết định số 3626/QĐ-ĐHQGHN về quy chế đào tạo đại học, và có thẩm quyền hoặc tham gia các hoạt động liên quan đến công nhận nghiên cứu sinh (ví dụ Quyết định số 3205/QĐ-SĐH). ĐHQGHN cũng phát hành công văn/thông tin chỉ đạo về công tác sinh viên, như công văn số 768/ĐHQGHN-CT&amp;CTHSSV về đề cử sinh viên tham gia chương trình trao đổi TF–NUS LEaRN, và xuất hiện trong các thông báo tuyển dụng với vai trò đơn vị chủ quản/đại học cấp trên; một số mô tả khác còn đề cập ĐHQGHN như “đơn vị đại học nơi có viên/học viên tham gia” theo các điều kiện nêu trong văn bản.\n\nVề tổ chức và hợp tác, ĐHQGHN được xác định là đầu mối/đối tác quản lý trực tiếp gắn với Trường Đại học Công nghệ (FIMO). ĐHQGHN tiếp nhận chứng chỉ chất lượng AUN-QA cho các chương trình đào tạo của FIMO, phối hợp tổ chức hoạt động học thuật và tổng kết đào tạo theo hệ thống tín chỉ (kế hoạch tổng kết năm học 2019–2020). ĐHQGHN cũng được nhắc đến trong các bối cảnh liên quan thứ hạng QS WUR by Subject 2023 và đồng hành cùng FIMO trong các sự kiện học thuật và quốc tế, gồm đồng chủ trì Hội nghị Trí tuệ nhân tạo AI4LIFE 2018, tham gia các buổi làm việc của FIMO (có làm việc với Boeing), cùng bối cảnh “Trường Đại học Công nghệ – ĐHQGHN” (VNU-UET) có sự tham gia/phát biểu của Phó Giám đốc Nguyễn Hoàng Hải. Ngoài ra, ĐHQGHN triển khai và đồng hành các hoạt động hỗ trợ sinh viên, khởi nghiệp và học bổng: tổ chức/đồng hành cuộc thi “Sáng tạo khởi nghiệp Đại học Quốc gia Hà Nội”, triển khai Dự án hỗ trợ khởi nghiệp và thực hiện các đề án thuộc Nhiệm vụ chiến lược; tham gia/triển khai học bổng Nguyễn Trường Tộ và hỗ trợ sinh viên nghèo vượt khó, đồng thời ban hành công văn thông báo các chương trình học bổng Shinnyo (2022–2023) và Shinnyo-en (2023–2024). Theo thỏa thuận hợp tác, sinh viên FIMO–ĐHQGHN được thuộc diện nhận học bổng thạc sĩ, với lễ trao học bổng diễn ra tại Trường Đại học Công nghệ. Các mô tả cũng ghi nhận hoạt động quyên góp/ủng hộ có sự tham dự của Công đoàn ĐHQGHN, đề án mở chương trình đào tạo ngành Kỹ thuật Robot (18/02/2018), và công văn về “Trao đổi học kỳ mùa Thu tại Đại học Kyushu, Nhật Bản” năm 2024; thêm vào đó, ĐHQGHN xuất hiện trong bối cảnh liên quan đến nghiên cứu được cấp bằng độc quyền sáng chế với tư cách là đơn vị liên quan.\n\nTổng thể, ĐHQGHN được mô tả là một trong những cơ sở đại học hàng đầu Việt Nam, tiên phong tham gia AUN, có chủ trương hướng tới tự chủ đại học (bao gồm kế hoạch di chuyển về Hòa Lạc và định hướng công tác tự chủ, quản trị đại học). Đồng thời, các mô tả nhấn mạnh vai trò Công đoàn ĐHQGHN trong việc tham dự/tổ chức hội nghị công đoàn cho đại biểu được bầu và liên quan đến Nhiệm vụ chiến lược nhằm xây dựng, phát triển các ngành/chuyên ngành tại ĐHQGHN. Một số mô tả bổ sung còn coi ĐHQGHN là “lò đào tạo” cho các nhà sáng lập startup, trong đó có đề cập 06 nhà sáng lập startup, và ĐHQGHN còn xuất hiện trong bối cảnh lễ ký kết với cách diễn đạt “– Đại học Quốc gia Hà Nội”.\nsource_id: chunk-457ee99614d1d4684d2dd863a6932c1d&lt;SEP&gt;chunk-f8020318aa29fb36ec7c9ef65f0237a6&lt;SEP&gt;chunk-7616737e824d72530897f1de64d028aa&lt;SEP&gt;chunk-78d8e093eda2ea379a1198d804f80ae9&lt;SEP&gt;chunk-d154adbc9cebe63edec7b57cc0fb6a31&lt;SEP&gt;chunk-47941a0870aa6c0386e9b883e1b2ae2a&lt;SEP&gt;chunk-e08a5096c6786563c55bce3fdb6e565a&lt;SEP&gt;chunk-2bf09b0414a94411876841812c14f029&lt;SEP&gt;chunk-85e7f3a95c0661c7f3255a19f288db2e&lt;SEP&gt;chunk-99b97336c8e19af00c124ea12945c226&lt;SEP&gt;chunk-3c8df3ff7c17323598715fdec1e52e0e&lt;SEP&gt;chunk-c7900e55a1878456792f2893a2b9a649&lt;SEP&gt;chunk-bc09250c04495dee022491dc4fe04f47&lt;SEP&gt;chunk-988f93799b4d14547a0b5dfa81023762&lt;SEP&gt;chunk-42efc428f31a0463f0af26150cefad7c&lt;SEP&gt;chunk-286b577c73681bccb19daefed6cccaa1&lt;SEP&gt;chunk-68ff5a83b0af56203acad8be9bb71769&lt;SEP&gt;chunk-80ead412aa64994bda37959a8a64529e&lt;SEP&gt;chunk-d1be213626c937aa11e6d8ba73186f71&lt;SEP&gt;chunk-77d7917ef2e7d9cd9a81dd72330ed7f1&lt;SEP&gt;chunk-0f2ee7d35b2b916bdbfeef909cf8a2df&lt;SEP&gt;chunk-a31efb191e1d55b62d4574be319e6949&lt;SEP&gt;chunk-94a7a176284b917cf1c262cc485c80ec&lt;SEP&gt;chunk-753157c0d9fa8c15829a438582a79cd9&lt;SEP&gt;chunk-75953e090f489e714f8f24eb0bf5b4e3&lt;SEP&gt;chunk-662197e00be46e2e8d749cdd970a9093&lt;SEP&gt;chunk-824a0e8df6eccd832bfb388bf660ec06&lt;SEP&gt;chunk-af41db2bb10375a55725ea3beeec211d&lt;SEP&gt;chunk-e6fa4beaa9deb44835ebb9159bd04ee9&lt;SEP&gt;chunk-1e2b409df351e00ba9252521675a6320&lt;SEP&gt;chunk-0d30a969de11751939272d970c41ac81&lt;SEP&gt;chunk-0926809b5854b3a58e3db38bdad979c7&lt;SEP&gt;chunk-dc4b395641f240e29e5c57b2ac3da353&lt;SEP&gt;chunk-9d0302b0d28ec502bb1eea46ac7c2bf1&lt;SEP&gt;chunk-2d9af0564169f835209174494d7b1fe3&lt;SEP&gt;chunk-41f7696696ef90ac579a60c8f6744940&lt;SEP&gt;chunk-08ed5e9140f7a885a31d002f3e369d2a&lt;SEP&gt;chunk-d2ed99677278ffd6489c8c46a6ec4a24&lt;SEP&gt;chunk-f79a2771bc2b5e7f0f9f433e297cd567&lt;SEP&gt;chunk-fb0ff2 nk-e8e4aec6754d5b1c472e0f2ca9c98229&lt;SEP&gt;chunk-f8ee6716d302aa15eae4352b3165f84b&lt;SEP&gt;chunk-09b66a34fe176fa89c76e1013579cf6d&lt;SEP&gt;chunk-181abd1ab03d7ff3faf19da49d8da2c5&lt;SEP&gt;chunk-3290791c83cf763605ceed3cb54c10a0&lt;SEP&gt;chunk-87e5549e1de1fcbf4b93b0e1735ba280&lt;SEP&gt;chunk-805841d4cd9b0dc5b2250fe0db1af589&lt;SEP&gt;chunk-f6daf1b52f11576e1e64a117ac87c73a&lt;SEP&gt;chunk-a19020dab6ea37551da28af33bce64a2&lt;SEP&gt;chunk-af9817c4d74fd222577299d14653a45a&lt;SEP&gt;chunk-efa98f08730928450460d7950d4a8f5b\nfile_path: ..\\..\\data\\de_an_2024_chunks.json&lt;SEP&gt;..\\..\\data\\quyet_dinh_1328_chunks.json&lt;SEP&gt;..\\..\\data\\data_1000_chunk_512.json\ncreated_at: 1775575947", "group": "đơn_vị_trực_thuộc", "value": 19}, {"id": 56, "label": "Buổi Lễ", "title": "entity_id: Buổi Lễ\nentity_type: event\ndescription: Buổi lễ là nơi Hiệu trưởng Nguyễn Việt Hà phát biểu, liên quan đến việc ký kết diễn ra thành công.&lt;SEP&gt;Buổi Lễ bao gồm phần nghi thức chung và phần trao bằng tại các sân khấu riêng, trong đó người học nhận bằng theo quy định thời gian và trình tự.&lt;SEP&gt;Phần sự kiện cụ thể được tổ chức trong buổi lễ, gồm thời gian và địa điểm.&lt;SEP&gt;Buổi lễ nơi Nguyễn Thị Anh Thu phát biểu và Choi Joo Ho bày tỏ sự vui mừng về hợp tác.&lt;SEP&gt;Buổi lễ là sự kiện nơi Trưởng Ban CT&amp;CTHSSV Đinh Văn Hường chúc mừng 29 sinh viên thủ khoa và trao/ghi nhận việc cấp học bổng ADF.&lt;SEP&gt;Buổi lễ là thời điểm diễn ra hoạt động nhà trường chúc mừng các tập thể và cá nhân đạt danh hiệu thi đua khen thưởng và thành tích.&lt;SEP&gt;Buổi Lễ là sự kiện diễn ra vào sáng thứ Sáu ngày 30/06/2023, có yêu cầu người học mặc lễ phục chỉnh tề trước khi vào hội trường.\nsource_id: chunk-39689826c7f6456cd1eccb9cdd7f5600&lt;SEP&gt;chunk-7c940ae81078db4b25f07fd960582d4f&lt;SEP&gt;chunk-9c64fe219a368e98d9ad7f9492373762&lt;SEP&gt;chunk-986b389245afdc1ea40de92286abf96a&lt;SEP&gt;chunk-7f96c6447d3a36696ccc7ae268779a26&lt;SEP&gt;chunk-f9f017616f5cee647984013d3b39f31b&lt;SEP&gt;chunk-bcbffae987aca02219e6388c699ce5e8\nfile_path: ..\\..\\data\\data_1000_chunk_512.json\ncreated_at: 1775555405", "group": "event", "value": 12}, {"id": 57, "label": "Bộ GD&ĐT", "title": "entity_id: Bộ GD&amp;ĐT\nentity_type: organization\ndescription: Bộ GD&amp;ĐT (Bộ Giáo dục và Đào tạo) là cơ quan nhà nước của Việt Nam, có chức năng ban hành và hướng dẫn các quy chế, quy định liên quan đến tuyển sinh; đồng thời tổ chức và quản lý các hoạt động gắn với công tác xét tuyển. Bộ được mô tả là cơ quan ban hành Quy chế tuyển sinh hiện hành và các quy định về nhóm ưu tiên xét tuyển, đồng thời tổ chức việc xây dựng, công bố quy chế tuyển sinh và kế hoạch chung cho các phương thức xét tuyển, bao gồm dự kiến thời gian các đợt tuyển sinh bổ sung và các mốc thời gian liên quan. Bộ cũng xây dựng và công bố kế hoạch tuyển sinh chung để các cơ sở đào tạo triển khai đăng ký xét tuyển đợt 1 đối với đào tạo chính quy theo mọi phương thức tuyển sinh, đồng thời yêu cầu các đơn vị bảo đảm thực hiện phù hợp kế hoạch chung.\n\nTrong mảng tuyển chọn và xét tuyển, Bộ GD&amp;ĐT tổ chức các kỳ thi chọn học sinh giỏi quốc gia và quốc tế, cũng như các kỳ thi khoa học, kỹ thuật cấp quốc gia và quốc tế; kết quả các kỳ thi này được dùng làm căn cứ trong điều kiện xét tuyển thẳng theo Điều 8. Bộ cũng tổ chức kỳ thi tốt nghiệp THPT năm 2024 và có liên thông với hệ thống tuyển sinh (trang nghiệp vụ), quy chế tuyển sinh, hướng dẫn lịch trình xét tuyển và hỗ trợ xử lý nguyện vọng trên Hệ Thống. Hằng năm, Bộ công bố các chứng chỉ hành nghề thuộc lĩnh vực sức khỏe để các đơn vị đào tạo cập nhật, cung cấp dữ liệu tuyển sinh lên hệ thống và tuân thủ quy định về xét tuyển. Ngoài ra, Bộ ban hành quy chế và quy định liên quan đến thi tốt nghiệp THPT, quy định xử lý vi phạm và quy định về lưu trữ, bảo quản tài liệu phục vụ công tác tuyển sinh, đồng thời tham gia các kế hoạch chung (trong đó có với ĐHQGHN) về công bố kết quả và các hoạt động theo kế hoạch.\n\nBộ GD&amp;ĐT còn được mô tả gắn với trách nhiệm giải trình của Hội đồng tuyển sinh (HĐTS) đối với toàn bộ công tác tuyển sinh, tham gia ban hành kế hoạch chung để thí sinh đăng ký nguyện vọng trên hệ thống, và hướng dẫn cập nhật danh sách thí sinh trúng tuyển cùng các nội dung liên quan. Một số văn bản được nêu như Thông tư liên tịch số 37/2012/TTLT-BLĐTBXH-BYT-BTC-BGDĐT về báo cáo tình hình và kết quả tuyển sinh, thể hiện vai trò của Bộ trong các yêu cầu báo cáo, xin ý kiến và phối hợp. Song song đó, Bộ cũng được mô tả là ban hành tiêu chuẩn bảo đảm chất lượng/kiểm định và tiêu chuẩn đánh giá cơ sở nhằm nâng cao chất lượng đào tạo và hỗ trợ hội nhập quốc tế, với các tài liệu tiêu biểu như Thông tư liên tịch số 35/2014/TTLT-BGDĐT-BTC và Thông tư liên tịch số 09/2016/TTLT-BGDĐT-BTC-BLĐTBXH, cùng với mô tả về việc ban hành Thông tư 23. Bộ còn được mô tả có yêu cầu công khai tình hình khảo sát việc làm. \n\nVề lĩnh vực kiểm định/đảm bảo chất lượng, Bộ GD&amp;ĐT được nêu là đã có đại diện đánh giá cao các hoạt động tích cực của AUN trong những năm qua và kỳ vọng hoạt động kiểm định sẽ góp phần nâng cao chất lượng đào tạo.\nsource_id: chunk-b411571421fd1e71727ad110e22d48fe&lt;SEP&gt;chunk-6260b53c4ad5102d152c1a2d21341d09&lt;SEP&gt;chunk-0639db15ed0575cdeb829d8a203a46c4&lt;SEP&gt;chunk-28f547b58c21b631b4398f5666bdc538&lt;SEP&gt;chunk-aa1cba655a0cdd24eb42bb9fa5ed653a&lt;SEP&gt;chunk-e4c9484d2c42749a4f2545c34a9eb157&lt;SEP&gt;chunk-1deaf3341433e5fa2ee300c53b6045ba&lt;SEP&gt;chunk-a9650fb1673ca3caba1c69a1523baa2a&lt;SEP&gt;chunk-1b5dfa8d570d9f115a0abdcc7e2ecb66&lt;SEP&gt;chunk-fc34d20b3416657466a7bdeb0577eba6&lt;SEP&gt;chunk-42c0bd7eac70305a81f43b3e9300d670&lt;SEP&gt;chunk-13be03fc142357f3e9a931260092ef21&lt;SEP&gt;chunk-0d6008bd889a0ebc91d42d3a06f83f83&lt;SEP&gt;chunk-bf836ea6db4d8badfb97990a59aa4543&lt;SEP&gt;chunk-d830f682b07ebeb668d54551a6209b96&lt;SEP&gt;chunk-ff59c46f3ab103315ca32379f39a3d18&lt;SEP&gt;chunk-170b153fd5ea4a9ddacf6c3b10783810&lt;SEP&gt;chunk-0abf0789ba93e1147b98fac10073dd1f&lt;SEP&gt;chunk-c92925a533e68756425abf9fbc22af83&lt;SEP&gt;chunk-4b93cbd5d0914f2cef5a210a16b4bbf5&lt;SEP&gt;chunk-99f0cf87ddf1406829eba421dbb9a9cc&lt;SEP&gt;chunk-759233ad94ecba2518607c2566ed9fbe&lt;SEP&gt;chunk-031414c753c8f1116a82797ec2080ff5&lt;SEP&gt;chunk-7616737e824d72530897f1de64d028aa&lt;SEP&gt;chunk-0c40ec77f587211069b2554aa5ed34bb&lt;SEP&gt;chunk-d70df8c903fddbcbfa9aedc2b549731f&lt;SEP&gt;chunk-04f0fde7624010888d30f43632b7cf85&lt;SEP&gt;chunk-2b9a003783b9ab1d9a343d82f0ae4423&lt;SEP&gt;chunk-a1c5b99e5fadbdaca2d068d23b86c33a&lt;SEP&gt;chunk-f9fa6a412f1bacf075f18890048c8e18&lt;SEP&gt;chunk-5e81f4c61b793aac41403ee6596f567b&lt;SEP&gt;chunk-10582dacd0ec30df77c589a33cb301cd&lt;SEP&gt;chunk-6b59ddfc3d399f3eb888e1aee9ade483&lt;SEP&gt;chunk-1121d1c81fa414d7c32a969014fae42d&lt;SEP&gt;chunk-2bf2783adc44abb51d79232d876108fc&lt;SEP&gt;chunk-8ebf34cb943b7ae241ee5638de0cb5df&lt;SEP&gt;chunk-345ba3ea4c0a4f72cc85d813e2af9cd8&lt;SEP&gt;chunk-6bc75b3dd65031f5ca76440f47370e48&lt;SEP&gt;chunk-8a8bf0a7a35902248e9287f31956d16c&lt;SEP&gt;chunk-e51795219f0810d4a814cd272438bb84&lt;SEP&gt;chunk-bc75659918a5984dda532f0b481b51aa&lt;SEP&gt;chunk-450cad9d84d93d96040649f3a8bd8bb3&lt;SEP&gt;chunk-7856a345391fb81bf26904976ac3b92a&lt;SEP&gt;chunk-286d542bfd69c0b1c7ad1cfdd15b745d&lt;SEP&gt;chunk-805841d4cd9b0dc5b2250fe0db1af589\nfile_path: ..\\..\\data\\de_an_2024_chunks.json&lt;SEP&gt;..\\..\\data\\quyet_dinh_1328_chunks.json&lt;SEP&gt;..\\..\\data\\data_1000_chunk_512.json\ncreated_at: 1775573841", "group": "organization", "value": 12}, {"id": 58, "label": "FastGo", "title": "entity_id: FastGo\nentity_type: organization\ndescription: FastGo là một dịch vụ được ra mắt chính thức vào tháng 6/2018, hỗ trợ các hãng xe và xe cá nhân tham gia.&lt;SEP&gt;FastGo là ứng dụng gọi xe thông minh “made in Vietnam”, ra mắt tháng 6/2018, có mục tiêu chiếm lĩnh 40% thị phần gọi xe thông minh và đang mở rộng sang Đông Nam Á, Mỹ, Brazil.\nsource_id: chunk-ba882b4d55f4e724cc8bcfb9b596c21e&lt;SEP&gt;chunk-5ee86ac13f365877826a7e3743fee7b3\nfile_path: ..\\..\\data\\data_1000_chunk_512.json\ncreated_at: 1775555774", "group": "organization", "value": 12}, {"id": 59, "label": "Hà Nội", "title": "entity_id: Hà Nội\nentity_type: location\ndescription: Hà Nội là một địa danh/thành phố xuất hiện trong nhiều ngữ cảnh dữ liệu hành chính, tuyển dụng, sự kiện và tuyển sinh. Trong các bản ghi địa chỉ và tuyển dụng, Hà Nội thường được dùng như nơi đặt trụ sở chính hoặc nơi làm việc được nêu trong thông tin tuyển dụng (ví dụ các vị trí như “kỹ sư giải pháp”), đồng thời cũng có thể là nơi liên hệ trong các chuyến đi công tác khi hoạt động diễn ra ngoài Hà Nội. Về sự kiện, Hà Nội được ghi nhận là địa điểm tổ chức tọa đàm ngày 10/5; là thành phố diễn ra lễ khai mạc hội thảo và tổ chức lễ trao giải “Giải thưởng Nhân tài Đất Việt 2018”; đồng thời là nơi diễn ra chương trình Vinh Quang Việt Nam 2022, chương trình/hội thảo quốc tế về ô nhiễm không khí ở châu Á, và Hội thảo Quốc tế Việt Nam học lần thứ 5. Hà Nội còn được gắn với Khu Công Nghệ Cao Hòa Lạc thông qua hoạt động đón tiếp đoàn Hiệp hội hợp tác kinh doanh nông nghiệp Hà Lan – Việt Nam (vòng chung kết tại nhà thi đấu Quận Tây Hồ), và là nơi đón đoàn giáo viên, học sinh Trường THPT Chu Văn An.\n\nNgoài vai trò địa điểm sự kiện, Hà Nội xuất hiện trong dữ liệu liên quan đến triển khai hạ tầng và chương trình số, bao gồm hệ thống cung cấp video 360 độ cho các tuyến phố chính và một số tuyến phố cụ thể. Hà Nội cũng liên quan đến hoạt động lắp đặt mạng lưới thiết bị quan trắc bụi mịn PM2.5 và PM10 tại một số địa điểm thuộc trường học và cơ quan. Trên bình diện dữ liệu cá nhân/tổ chức, Hà Nội được ghi nhận là nơi sinh của nhiều cá nhân (NCS Phạm Duy Hưng, Nguyễn Thế Anh Tuấn, Nguyễn Thanh Tuyền, NCS Bùi Thị Hồng Nhung, Vũ Quốc Tuấn và NCS Nguyễn Thị Chăm), đồng thời là địa điểm liên hệ gắn với nơi sinh đối với Phạm Đức Anh và Nguyễn Thanh Tuyền. Hà Nội cũng xuất hiện trong địa chỉ trụ sở và trung tâm nghiên cứu kỹ thuật của NATV gắn với thông tin liên quan đến Lê Thị Thảo, và được nhắc trong bối cảnh tuyển sinh liên quan đến ĐHQGHN, kèm ngữ cảnh “Thảo lên để nhập học”. Dữ liệu bổ sung còn cho thấy có một hoạt động/địa điểm tại Hà Nội diễn ra vào ngày 25/10/2022. Cuối cùng, Hà Nội cũng được nêu như thành phố trong địa chỉ địa điểm thi.\nsource_id: chunk-457ee99614d1d4684d2dd863a6932c1d&lt;SEP&gt;chunk-78d8e093eda2ea379a1198d804f80ae9&lt;SEP&gt;chunk-e08a5096c6786563c55bce3fdb6e565a&lt;SEP&gt;chunk-6b273045c65d329d223bf700c31265d7&lt;SEP&gt;chunk-30c181f4aa2c849a90de3cd3928e5852&lt;SEP&gt;chunk-66ddcb13e30d0dea19db561c8b87de9e&lt;SEP&gt;chunk-cc8e89558018e68f4d35b8fd455cbb17&lt;SEP&gt;chunk-7e9ce05ca09efa2e88367aceb54eed0f&lt;SEP&gt;chunk-8244e636527f361eb3d6735f07279e97&lt;SEP&gt;chunk-ccbcd7e1fecd1d977592a8251dce787c&lt;SEP&gt;chunk-1e34a321b19ea73c53b8b95dcf48dfc1&lt;SEP&gt;chunk-64360a1c12b1ce1666dae520d5548536&lt;SEP&gt;chunk-2dc6425f3af826241828b938d3b9947c&lt;SEP&gt;chunk-dc4b395641f240e29e5c57b2ac3da353&lt;SEP&gt;chunk-ce5f5ac2d4416907a884352e921bd8e5&lt;SEP&gt;chunk-b4b7e36d12b16edcb01a8ed73c16ca4a&lt;SEP&gt;chunk-6c80f45b7d826d78e5a120ab2bd872ce&lt;SEP&gt;chunk-23826e8f8617f176f40c8449e4728fae&lt;SEP&gt;chunk-ad85244e17dd1838db2e3a05f591d33a&lt;SEP&gt;chunk-47ae4ee9c488da7a4c05917517fac30d&lt;SEP&gt;chunk-baeed7d930afb8da1a9ce6b826a4b689&lt;SEP&gt;chunk-a0f7f1df2eeaf12ccbdab1e4bc5381b9&lt;SEP&gt;chunk-d5dee4ccfd2ab40f904f1d46acd0560f&lt;SEP&gt;chunk-f50f1b2f0fb830d3b1a5ad22ae3e32fa&lt;SEP&gt;chunk-8ffb4ca07c75ed6279f07e6f1f8075f2&lt;SEP&gt;chunk-f8079719074c639fa305906157aade98&lt;SEP&gt;chunk-4f5f193176d336bf63709487ca850dc4&lt;SEP&gt;chunk-133d3b263e157081f887dea9cda784d7&lt;SEP&gt;chunk-100322b59594988fb4cc613a7c57ac92&lt;SEP&gt;chunk-50a85792bc2fa7bfeeee52d51ac816e0&lt;SEP&gt;chunk-0326e6d60c2774a63b0622df85116370&lt;SEP&gt;chunk-ca5cb0bee2f935f59219b26328a9a750&lt;SEP&gt;chunk-c997ac125f0050062b709404aca9a79b\nfile_path: ..\\..\\data\\de_an_2024_chunks.json&lt;SEP&gt;..\\..\\data\\quyet_dinh_1328_chunks.json&lt;SEP&gt;..\\..\\data\\data_1000_chunk_512.json\ncreated_at: 1775575619", "group": "location", "value": 12}, {"id": 60, "label": "IELTS", "title": "entity_id: IELTS\nentity_type: chứng_chỉ_bằng_cấp\ndescription: IELTS là một chứng chỉ tiếng Anh quốc tế và đồng thời là một “cột điểm/tiêu chuẩn đầu vào” trong hệ thống xét tuyển, được dùng làm căn cứ để xét tuyển và tính điểm theo công thức quy đổi. Trong các bảng quy đổi chứng chỉ, IELTS được trình bày như cột giá trị điểm tương ứng với các mức đạt được, phản ánh thang điểm/tiêu chí gồm các mốc điển hình như 5.5, 6.0, 6.5, 7.0, 7.5 và dải 8.0–9.0. IELTS cũng được xác định là một trong những chứng chỉ tiếng Anh quốc tế được chấp nhận, với ngưỡng từ 5.5 trở lên; từ đó, chứng chỉ IELTS có thể được sử dụng để tính ĐX bằng công thức quy đổi dựa trên mức điểm tương ứng trong bảng.&lt;SEP&gt;IELTS là một chứng chỉ tiếng Anh quốc tế nằm trong nhóm các chứng chỉ được công nhận.&lt;SEP&gt;Loại chứng chỉ trong bảng tham chiếu với mức điểm tối thiểu tương ứng bậc 3 và bậc 4.&lt;SEP&gt;Chứng chỉ tiếng Anh quốc tế được nêu trong danh mục kết quả có thể dùng để xét tuyển.\nsource_id: chunk-cecd038c8741ea822ebb8cf98ca0c7b9&lt;SEP&gt;chunk-aa1cba655a0cdd24eb42bb9fa5ed653a&lt;SEP&gt;chunk-f8020318aa29fb36ec7c9ef65f0237a6&lt;SEP&gt;chunk-566c52cd13c2645f71810bac5ed79b9f&lt;SEP&gt;chunk-8fcf479b7acfaef1cec391c974807f4a&lt;SEP&gt;chunk-58d6f1b0acca94c213830a65920089c8&lt;SEP&gt;chunk-c6036d3d21022f6578d122b7d5c2b48c&lt;SEP&gt;chunk-c9d66ec8634b64e3621d5fd4186eefa1&lt;SEP&gt;chunk-905bbcd404a8c35707a1568c43f3a6e5&lt;SEP&gt;chunk-1a3df01c18894f70ba1089c4742063c5&lt;SEP&gt;chunk-03913866a9a5b2938de1653d231afa22\nfile_path: ..\\..\\data\\de_an_2024_chunks.json&lt;SEP&gt;..\\..\\data\\quyet_dinh_1328_chunks.json&lt;SEP&gt;..\\..\\data\\data_1000_chunk_512.json\ncreated_at: 1775555868", "group": "chứng_chỉ_bằng_cấp", "value": 12}, {"id": 61, "label": "Nguyễn Hải Phong", "title": "entity_id: Nguyễn Hải Phong\nentity_type: person\ndescription: Nguyễn Hải Phong là thủ khoa, tham gia các hoạt động Đoàn để rèn luyện kỹ năng, đồng thời nỗ lực vượt qua các môn học khó và vượt qua môn Giáo dục thể chất.&lt;SEP&gt;Nguyễn Hải Phong là thủ khoa tốt nghiệp, có thành tích trong học tập, nghiên cứu khoa học và hoạt động đoàn thể; người học trong ngành Vật lý kỹ thuật và Công nghệ nano và nhận Bằng khen của Giám đốc ĐHQGHN với điểm trung bình 3,75, xếp loại xuất sắc toàn khóa học.\nsource_id: chunk-3d072668510be70dab22d4f22df9f087&lt;SEP&gt;chunk-d9f09ced67119e0dd0ab1ad21d4f1ce0\nfile_path: ..\\..\\data\\data_1000_chunk_512.json\ncreated_at: 1775531552", "group": "person", "value": 12}, {"id": 62, "label": "Nguyễn Xuân Đức", "title": "entity_id: Nguyễn Xuân Đức\nentity_type: person\ndescription: Nguyễn Xuân Đức là sinh viên được tuyển thẳng, đạt danh hiệu thủ khoa đầu vào năm học 2013-2014 và tham gia kỳ thi lập trình viên sinh viên cấp khu vực tại Đà Nẵng.&lt;SEP&gt;Nguyễn Xuân Đức là sinh viên lớp K58CA, khoa Công nghệ thông tin, được tuyển thẳng và đạt danh hiệu thủ khoa đầu vào năm học 2013-2014 của Trường Đại học Công nghệ (ĐHCN). Nguyễn Xuân Đức tham gia kỳ thi lập trình viên sinh viên cấp khu vực tại Đà Nẵng và có chia sẻ về thời gian ôn luyện cùng thầy cô và các bạn; đồng thời có nhận được sự hỗ trợ và chỉ dạy từ thầy Hồ Đắc Phương.&lt;SEP&gt;Nguyễn Xuân Đức là sinh viên lớp K58CA, tham gia các hoạt động đoàn thể và nghiên cứu; được tuyển thẳng, đạt danh hiệu thủ khoa đầu vào năm học 2013-2014 và tham gia kỳ thi lập trình viên sinh viên cấp khu vực tại Đà Nẵng.\nsource_id: chunk-9cc599f95d63d272604057fd8aa88455&lt;SEP&gt;chunk-2f6a0ae1ea831f72cdab8b38eb0e808e&lt;SEP&gt;chunk-1c81102c63409740cad7996319f87efc\nfile_path: ..\\..\\data\\data_1000_chunk_512.json\ncreated_at: 1775555575", "group": "person", "value": 12}, {"id": 63, "label": "Nhà Trường", "title": "entity_id: Nhà Trường\nentity_type: đơn_vị_trực_thuộc\ndescription: Nhà Trường là một đơn vị giáo dục tham gia và thực hiện các hoạt động liên quan đến tuyển sinh, bao gồm tuyển sinh, xét tuyển và công bố kết quả. Nhà Trường công bố kết quả liên quan đến điểm thi tốt nghiệp THPT năm 2024 để phục vụ công tác xét tuyển; trong quá trình xét tuyển có thể điều chuyển chỉ tiêu nhưng cam kết không làm ảnh hưởng đến quyền lợi của thí sinh và không thay đổi tổng chỉ tiêu tuyển sinh. Trong phạm vi trách nhiệm pháp lý và các quy định chuyên môn, Nhà Trường cam kết bảo vệ quyền lợi chính đáng của thí sinh khi phát sinh rủi ro, phù hợp với quy định của pháp luật, quy chế tuyển sinh của Bộ GD&amp;ĐT, quy chế tuyển sinh của ĐHQGHN và đề án tuyển sinh của Trường. Bên cạnh tuyển sinh, Nhà Trường gắn với tư vấn và hỗ trợ nội bộ: tiếp nhận tư vấn trực tiếp từ chi ủy tại hai chi bộ Hiệu bộ 1 và Hiệu bộ 2 cùng với công đoàn khối Hiệu bộ; đồng thời là đối tượng được đánh giá toàn diện bởi đoàn chuyên gia và được cán bộ giới thiệu cho học viên, nghiên cứu sinh như một nơi cung cấp các thông tin cần biết.\n\nVề phát triển năng lực và hợp tác, Nhà Trường phát triển đội ngũ, nâng cao trình độ, ký kết hợp tác với đối tác trong và ngoài nước; tổ chức cho sinh viên tiếp cận học tập và thực hành với trang thiết bị tiên tiến. Nhà Trường được kỳ vọng là đối tác lâu dài về tuyển dụng và đào tạo với TS. Hoàng Vũ Chung. Trong quản trị, Nhà Trường rà soát và điều chỉnh nhiệm vụ, đẩy nhanh tiến độ giải ngân theo kế hoạch, bổ sung nguồn lực, hoàn thành thanh toán, xử lý công nợ tạm ứng, đối chiếu xác nhận và thu hồi thuế thu nhập cá nhân; đồng thời thông báo và đề nghị các đơn vị triển khai sinh hoạt lớp khóa học đầu năm học 2020–2021 theo kế hoạch trong văn bản và các công việc liên quan đến bước ngoặt của đào tạo theo tín chỉ cho các Khoa và sinh viên đủ điều kiện tốt nghiệp.\n\nTrong lĩnh vực đào tạo, Nhà Trường triển khai đào tạo chất lượng cao theo Thông tư 23, tăng cường đổi mới giảng dạy và tổ chức các hoạt động triển khai giảng dạy kết hợp trong giai đoạn ảnh hưởng của dịch Covid-19. Nhà Trường truyền thông mời phụ huynh/người thân tham dự Lễ thông qua người học; tổ chức các buổi làm việc/seminar có sự tham dự của học viên, nghiên cứu sinh và cán bộ; tổ chức các khóa đào tạo ngắn hạn, biên soạn nội dung khóa học cùng với Thầy Cô, lồng ghép kỹ năng mềm và kỹ năng trong cuộc sống vào các môn học. Nhà Trường còn được gắn với Phó Hiệu trưởng Chử Đức Trình trong việc tổ chức các buổi lễ, chúc mừng các tập thể, cá nhân đạt danh hiệu thi đua khen thưởng, đồng thời là chủ thể lãnh đạo cấp học bổng tại Lễ khai giảng. Nhà Trường cũng là đơn vị tổ chức lễ bế giảng và trao bằng tốt nghiệp cho người học hoàn tất thủ tục hồ sơ giấy tờ theo thời gian và địa điểm nêu, đồng thời cung cấp lịch các lớp học phần kỹ năng bổ trợ; tổ chức các hoạt động liên quan đến sinh viên theo từng năm học và xây dựng các nội dung hướng dẫn tương ứng.\n\nNhà Trường đồng thời quan tâm và thực hiện các điều kiện đảm bảo chất lượng cho các chương trình đào tạo, gồm hoạt động kiểm định chất lượng và tự đánh giá. Ngoài ra, Nhà Trường được mô tả như một đơn vị có nhu cầu gắn với kế hoạch phát triển lâu dài.\nsource_id: chunk-a1f18f5fcf6e63a0cbd7e2aef2e73353&lt;SEP&gt;chunk-e4c9484d2c42749a4f2545c34a9eb157&lt;SEP&gt;chunk-17ffa574be2b388741266262cd613593&lt;SEP&gt;chunk-edd7721223fd7fee829b0fdc3252d467&lt;SEP&gt;chunk-2d0fa6a7d23585261379638aa7781bdd&lt;SEP&gt;chunk-2d4d6f8915a8b537ed2aac9b7d78db18&lt;SEP&gt;chunk-59487b438c63dbdd479560c5298ab748&lt;SEP&gt;chunk-33bfd7b17ac823188becd46e8e54b265&lt;SEP&gt;chunk-03b3b4e2aa5a4872c5941689d3f11bd4&lt;SEP&gt;chunk-ecd48404b1869426daccf41afe48cd6d&lt;SEP&gt;chunk-a7631531aecf18e7765b2de8b1641c5a&lt;SEP&gt;chunk-426badc4b1cabd169f00cd7928d010ac&lt;SEP&gt;chunk-41b1e97b5b7dee226180bae2fd84a247&lt;SEP&gt;chunk-1c2719a3a784adb76a7e7eb73260c472&lt;SEP&gt;chunk-d0e06092eacff4e7d986ddef9bf03e8e&lt;SEP&gt;chunk-9c64fe219a368e98d9ad7f9492373762&lt;SEP&gt;chunk-87d1f6864716b8ed92e2d84df6e4afc6&lt;SEP&gt;chunk-99884e07e274a97a64a091cd84a38277&lt;SEP&gt;chunk-127cf5a72e81a47211107cbe9ccf4f26&lt;SEP&gt;chunk-f0a6ce2918ce5f33b43f8b04902772e7&lt;SEP&gt;chunk-f9f017616f5cee647984013d3b39f31b&lt;SEP&gt;chunk-a78818cdb47dd96117f91f6c52a36b6d&lt;SEP&gt;chunk-f9e24e21c51161621eed5c002c4b1983&lt;SEP&gt;chunk-1d7c55370991b4c523fd7abe7eaa65d6&lt;SEP&gt;chunk-51d11fe1baf53ad791aab8e6e1c76913&lt;SEP&gt;chunk-7856a345391fb81bf26904976ac3b92a&lt;SEP&gt;chunk-bbbd106dde88bc3d8835240e2613e312\nfile_path: ..\\..\\data\\de_an_2024_chunks.json&lt;SEP&gt;..\\..\\data\\data_1000_chunk_512.json\ncreated_at: 1775573643", "group": "đơn_vị_trực_thuộc", "value": 12}, {"id": 64, "label": "Nhóm Nghiên Cứu", "title": "entity_id: Nhóm Nghiên Cứu\nentity_type: organization\ndescription: Nhóm Nghiên Cứu là một tập thể tham gia và thực hiện các hoạt động nghiên cứu với tinh thần khởi đầu tích cực, nhưng có thể gặp khó khăn trong quá trình triển khai, đặc biệt ở khâu cài đặt môi trường; vì vậy nhóm phải làm lại phần cứng và xử lý các vấn đề liên quan đến thuật toán. Nhóm cũng gắn với phát triển đầu dò, bao gồm tối ưu đầu dò để đạt kích thước/độ phân giải cỡ dưới 20 micromet và phát triển vật liệu mới nhằm tăng chu kì chạm. Trong phạm vi nhiệm vụ chế tạo, Nhóm Nghiên Cứu thực hiện hoàn chỉnh hệ thống đo và định vị từ trường Trái Đất dựa trên hiệu ứng từ giảo–áp điện kết hợp với kỹ thuật GPS. Nhóm được mô tả như một đối tác tham gia hoạt động đổi mới sáng tạo của Trung Tâm, đồng thời là đơn vị gặp trở ngại khi thực hiện đề tài, đặc biệt ở việc thu hẹp khoảng cách giữa nghiên cứu lý thuyết và nghiên cứu thực nghiệm; vì vậy nhóm còn được nhắc như một đối tượng cần được so sánh và được đề xuất hình thành, phát triển theo hướng liên ngành và liên đơn vị thông qua các giải pháp chính sách đầu tư.\n\nVề định danh cá nhân, Nhóm Nghiên Cứu là nhóm mà TS. Trần Quốc Quân được GS Nguyễn Đình Đức dìu dắt tham gia từ thời còn là sinh viên. Nhóm tập trung đảm bảo giá thành thấp, dễ chế tạo, đồng thời chú trọng chất lượng công nghệ; nhóm hoạt động và đánh giá các thông số liên quan đến từ trường đối với các sản phẩm và các sáng chế được nội địa hóa. Nhóm cũng được nêu là đơn vị thực hiện các nỗ lực dẫn đến việc nhận được bằng sáng chế vào năm 2019. Ngoài ra, Nhóm Nghiên Cứu còn được mô tả là chủ thể thực hiện việc mở rộng mạng lưới hợp tác và chuyển kết quả nghiên cứu tới ứng dụng thực tế.\nsource_id: chunk-9d11239c7661d6629a95e18ae3d9f8d6&lt;SEP&gt;chunk-d6b79d9ba555d1cdac7f7d5999776f0d&lt;SEP&gt;chunk-e6850f38a400675b65d46c2fee859767&lt;SEP&gt;chunk-4b89bed61c182070989481a53bd71b9d&lt;SEP&gt;chunk-ce5f5ac2d4416907a884352e921bd8e5&lt;SEP&gt;chunk-19249e8c8ee2267b83ba6bf53e523e95&lt;SEP&gt;chunk-7b08ab6b129f18b1f1b0d6082d3ecd41&lt;SEP&gt;chunk-31a055eeb31950564ffbe9add97a6bd5&lt;SEP&gt;chunk-3122d2c0abfb791bf20ff4c8acd9dfa2&lt;SEP&gt;chunk-ad261efcc8a065a2242b930a1ace70c1&lt;SEP&gt;chunk-7eeb8aa86637b31e1e3f5ea6fa15e633\nfile_path: ..\\..\\data\\data_1000_chunk_512.json\ncreated_at: 1775572297", "group": "organization", "value": 12}, {"id": 65, "label": "Nhóm nghiên cứu", "title": "entity_id: Nhóm nghiên cứu\nentity_type: organization\ndescription: Nhóm nghiên cứu là một chủ thể/tập thể tham gia các hoạt động nghiên cứu và triển khai, ứng dụng các thuật toán và mô hình của xử lý ngôn ngữ tự nhiên (NLP) và trí tuệ nhân tạo (AI) để trích xuất thông tin từ dữ liệu. Nhóm được ghi nhận với việc tạo ra một “giải pháp hữu ích” trong văn bản, đồng thời thực hiện nghiên cứu và phát triển theo định hướng hiệu quả sản phẩm, hướng tới công nghệ chế tạo đơn giản và giá thành thấp. Về kết quả công nghệ, Nhóm nghiên cứu thực hiện “Kỹ thuật mã hóa và giải mã video phân tán DVC”, trong đó TS. Đinh Triều Dương làm Trưởng nhóm; nhóm đã nỗ lực để đạt được bằng sáng chế và đã nộp hồ sơ xin cấp bằng độc quyền sáng chế từ năm 2017, đồng thời tiếp tục nộp hồ sơ để cấp bằng cho kỹ thuật nêu trên. Ngoài mảng video phân tán DVC, Nhóm nghiên cứu còn tiến hành nghiên cứu phục vụ dự báo và quản lý chất lượng không khí, hướng tới cung cấp các phát hiện từ bản đồ để hỗ trợ nhà hoạch định chính sách; nhóm tham gia cuộc thi Vệ tinh AI dự đoán chất lượng không khí cùng với Lương Sơn Bá. Nhóm cũng tham gia phát triển sản phẩm DoIt – Hệ thống nâng cao chất lượng văn bản; trong quá trình thực hiện, nhóm gặp khó khăn khi xử lý lượng dữ liệu lớn và sau đó áp dụng công nghệ Big Data để xây dựng nền tảng xử lý dữ liệu, đồng thời tiếp tục nghiên cứu theo hướng thương mại hóa và được ĐHQGHN đầu tư để hoàn thiện sản phẩm đưa ra thị trường. Bên cạnh đó, Nhóm nghiên cứu là đơn vị thực hiện sản phẩm “Hệ thống thu thập và Phân tích quan điểm cộng đồng mạng đối với các sản phẩm thương mại”.  \n\nSong song với các mảng công nghệ AI/Dữ liệu và sản phẩm phần mềm, Nhóm nghiên cứu còn thực hiện hoạt động tự thiết kế, chế tạo và làm chủ công nghệ cho các bộ điều khiển và các thiết bị liên quan, từng bước làm chủ công nghệ trong thiết kế hệ thống tự động hóa. Nhóm cũng triển khai sản phẩm hệ thống cửa tự động lắp cho biệt thự, với 30 sản phẩm được ứng dụng thực tế tại nhiều doanh nghiệp và cơ quan.\nsource_id: chunk-ac222c304ce1d401db154dadc22e3019&lt;SEP&gt;chunk-28aa9c5ec87813f59646f304741f8b90&lt;SEP&gt;chunk-180a70f27830aa2c535ac387c006ce5e&lt;SEP&gt;chunk-25460f125e4e5767b543cb63b0b83793&lt;SEP&gt;chunk-a2074c1ce083e1df89b954fe58b0b262&lt;SEP&gt;chunk-af41db2bb10375a55725ea3beeec211d&lt;SEP&gt;chunk-d3da9c89aed63f30db121c599f75518b&lt;SEP&gt;chunk-085958e76186db53a9503d1998cd7821&lt;SEP&gt;chunk-df5962c40dbbbac51d5a501fb03bd77c&lt;SEP&gt;chunk-5a71385043d0e397346809ab97f587ce&lt;SEP&gt;chunk-9637790a369706e669cc964f994f07dd&lt;SEP&gt;chunk-b9166f3a2cba60ebfa42d6417c42d6c2&lt;SEP&gt;chunk-79f56bb89c14d701a8a574d9804fe8e5&lt;SEP&gt;chunk-4b94413b58eaf74c12c591a1e4a4c833\nfile_path: ..\\..\\data\\data_1000_chunk_512.json\ncreated_at: 1775574745", "group": "organization", "value": 12}, {"id": 66, "label": "Nhật Bản", "title": "entity_id: Nhật Bản\nentity_type: location\ndescription: Nhật Bản là một quốc gia được nhắc đến trong nhiều bối cảnh học thuật, nghiên cứu và giao lưu quốc tế. Trong các mô tả mang tính học thuật, Nhật Bản được dùng như ví dụ cho các nước tư bản phát triển có nhu cầu mạnh về xây dựng và đô thị hóa giai đoạn thập niên 70–80. Nhật Bản cũng xuất hiện trong các hoạt động gửi/đóng góp công trình cho bài trình bày tại hội nghị, và được gắn với một nhóm nghiên cứu có phần thí nghiệm/hoạt động nghiên cứu đặt tại ĐH Tsukuba và/hoặc liên hệ với Shimizu; đồng thời còn liên hệ đến các hoạt động giao lưu và chương trình được tổ chức tại Trường Đại học Công nghệ Chiba/ĐH Công nghiệp Chiba, trong đó có đề cập GS. Ryuichi Oka. Nhật Bản còn được đưa vào nội dung seminar về robot.\n\nTrong quan hệ quốc tế, Nhật Bản được nêu là đối tác trong phát triển quan hệ hữu nghị Việt Nam–Nhật Bản, bao gồm hỗ trợ sinh viên hòa mình vào môi trường học tập và làm việc, và là điểm đến cho các chuyến tham quan trải nghiệm kéo dài khoảng một tuần. Nhật Bản được gắn với NATV (được mô tả là công ty 100% vốn đầu tư Nhật Bản) như một trong các địa điểm/cơ hội để cử đi đào tạo ở nước ngoài, và cũng được mô tả là một trong bốn công ty thuộc MQ ICT Solutions. Về giáo dục và trao đổi, Nhật Bản được liên hệ với Trường ĐH Công nghệ Chiba/ĐH Công nghiệp Chiba, được phản ánh trong các bảng tổng sắp huy chương (nhóm “đứng trước”) với bối cảnh sinh viên đến Nhật Bản đóng chi phí trực tiếp bằng tiền mặt. Các mô tả cũng đề cập Trường Đại học Tokyo thuộc Nhật Bản, trong khi chương trình trao đổi sinh viên thực hiện tại Đại học Kyushu, và có thêm thông tin về chương trình trao đổi sinh viên/học viên tại Đại học Nagoya. Nhật Bản còn xuất hiện như điểm đến của chương trình tài trợ chuyến thăm ngắn hạn, thông tin đăng ký học bổng và các mô tả liên quan đến Tổ chức Shinnyo-en, Quỹ học bổng Toshiba và hợp tác giáo dục. Ngoài ra, Nhật Bản được nhắc đến như nơi có các tài xế công hoạt động, phục vụ hành khách lên xuống xe.\nsource_id: chunk-2aa13bc21ff1f9d8013c80932fecbe69&lt;SEP&gt;chunk-2bf09b0414a94411876841812c14f029&lt;SEP&gt;chunk-c93f312ce61c87b410d91587c89f40b7&lt;SEP&gt;chunk-def1f0be210d2734c9c67686ff64e51c&lt;SEP&gt;chunk-c17fa0947822771b6d5bf8051814834f&lt;SEP&gt;chunk-8ec5ad1074ca3e4d0412134b8433d77a&lt;SEP&gt;chunk-4166b29d3d9d72c8633be3f6c9252f40&lt;SEP&gt;chunk-86cfcb4ee52da2b2643757368bd183ac&lt;SEP&gt;chunk-522a85684dbf6e36456ac34398662fd9&lt;SEP&gt;chunk-50cc7ab4caa4a5eda9e4f0ed12324a36&lt;SEP&gt;chunk-ccbcd7e1fecd1d977592a8251dce787c&lt;SEP&gt;chunk-cdd6349a4c91f2ec1f3ef4223beb840a&lt;SEP&gt;chunk-f2733e1c4667400d8ddf35a319a839d7&lt;SEP&gt;chunk-e419ccf26191b347649a4a3c291329cb&lt;SEP&gt;chunk-02cfa24b72ceff38a32b29af784176e0&lt;SEP&gt;chunk-93b929264080094efe6c7177d395ffa3&lt;SEP&gt;chunk-e6fa4beaa9deb44835ebb9159bd04ee9&lt;SEP&gt;chunk-793697f37d99480ccf403a1b21f35491&lt;SEP&gt;chunk-87d1f6864716b8ed92e2d84df6e4afc6&lt;SEP&gt;chunk-a7dfaea328b5d5c81cbe256e8211ee50&lt;SEP&gt;chunk-96e17d41a43a19549f4a65e9635df03a&lt;SEP&gt;chunk-cd65bd38c10cc80a341989d296fd4fe4&lt;SEP&gt;chunk-5e0d5eb2b63e933c911e3c3ff608faa2&lt;SEP&gt;chunk-705ef0131397538af3b6eb26607486e7&lt;SEP&gt;chunk-799783222865dcbc3506d701d1681ab8&lt;SEP&gt;chunk-65acb19f7ebb99a4adf05d8ebe9f1fab&lt;SEP&gt;chunk-8233fa2689bbdd699a004ce04abcf40c&lt;SEP&gt;chunk-3d849f409aa7fd6fa035cdc049cc9c4e&lt;SEP&gt;chunk-5e28fc285044e44ac5663573c4f51126&lt;SEP&gt;chunk-be4346f2d9abd23d10b7a2ccb07ff879&lt;SEP&gt;chunk-0f9afce8a889fa5ce822ae23fc04b2e3&lt;SEP&gt;chunk-87e5549e1de1fcbf4b93b0e1735ba280&lt;SEP&gt;chunk-a9983a0ade5e8c61b9020587ebe4599e&lt;SEP&gt;chunk-ba194dff6867b5bd0a6e75b28fc87c8c\nfile_path: ..\\..\\data\\data_1000_chunk_512.json\ncreated_at: 1775574871", "group": "location", "value": 12}, {"id": 67, "label": "Phạm Hồng Công", "title": "entity_id: Phạm Hồng Công\nentity_type: person\ndescription: Sinh viên Trường Đại học Công nghệ, ĐHQGHN; là nghiên cứu sinh mới bước vào năm thứ ba và có 17 bài báo quốc tế.&lt;SEP&gt;Phạm Hồng Công là thực tập sinh sau tiến sĩ đồng thời là giảng viên kiêm nhiệm tại Trường ĐH Công nghệ, ĐHQGHN và tham gia nghiên cứu khoa học từ khi là sinh viên năm thứ 2.&lt;SEP&gt;Nghiên cứu sinh tham gia Lễ bảo vệ luận án tiến sĩ chuyên ngành Cơ kỹ thuật, công tác tại Viện Hàn lâm Khoa học và Công nghệ Việt Nam.\nsource_id: chunk-b88514b57a69a5330e5177384620b006&lt;SEP&gt;chunk-d1c4f85dc345362f564528e275036273&lt;SEP&gt;chunk-305e49817591b2e668a10b5250878527\nfile_path: ..\\..\\data\\data_1000_chunk_512.json\ncreated_at: 1775552393", "group": "person", "value": 12}, {"id": 68, "label": "Sinh Viên", "title": "entity_id: Sinh Viên\nentity_type: person\ndescription: Sinh Viên là đối tượng tham gia chương trình đào tạo, được tạo điều kiện để tiếp cận việc học tập và thực hành với các trang thiết bị tiên tiến gắn với thực tiễn làm việc tại doanh nghiệp. Trong bối cảnh quản lý kết quả rèn luyện, Sinh Viên được ghi nhận trong các bảng tổng hợp kết quả rèn luyện và dữ liệu được tổng hợp theo “Lớp”. Sinh Viên có thể được xét nhận học bổng học kỳ 1 và cần nộp bổ sung hồ sơ để Quỹ tiếp tục xét học bổng học kỳ 2. Sinh Viên cũng có thể thuộc diện xem xét hưởng trợ cấp theo hoàn cảnh đặc biệt khó khăn về kinh tế và có điều kiện “vượt khó học tập”.\n\nTrong quá trình học, Sinh Viên được khuyến khích chủ động tương tác với giảng viên, tham gia các hoạt động trao đổi để nhận tư vấn/cố vấn học tập và cung cấp phản hồi thông qua khảo sát. Đối với thủ tục học bổng, Sinh Viên được khuyến nghị xem yêu cầu của từng tổ chức để lựa chọn chứng chỉ phù hợp khi nộp hồ sơ. Sinh Viên có thể tham gia chương trình có lịch học kết hợp vừa học tiếng Nhật vừa học tại Trường Đại học/Cao Đẳng. Trong bối cảnh sáng tạo khởi nghiệp, Sinh Viên cần có nền tảng vững chắc và sự kiên trì. Ngoài ra, Sinh Viên có thể là đối tượng nhận bằng trong các sự kiện trao bằng và tham gia các hoạt động đổi mới sáng tạo của Trung Tâm; đồng thời được cập nhật thông tin công nghệ đang triển khai từ phía công nghiệp. Sinh Viên cũng có thể là nhóm đối tượng được xét chọn và đăng ký theo thông tin học bổng Shinnyo, và được kỳ vọng mở rộng nhận học bổng trong cộng đồng học thuật. Riêng theo quy định giảm học phí, Sinh viên cũng là đối tượng được áp dụng việc giảm học phí theo các điều khoản trong đoạn văn bản.\nsource_id: chunk-59487b438c63dbdd479560c5298ab748&lt;SEP&gt;chunk-8871efa488d4189227b7085a8c34c5f7&lt;SEP&gt;chunk-944ce2255899537f5492dac939115d80&lt;SEP&gt;chunk-5723991a6a9203aecbff36619b09682b&lt;SEP&gt;chunk-00b3afe69b7fae9decd0bf754eb2ba89&lt;SEP&gt;chunk-d5f05e4976e54abbacbfd15d13e214c0&lt;SEP&gt;chunk-41b1e97b5b7dee226180bae2fd84a247&lt;SEP&gt;chunk-f2733e1c4667400d8ddf35a319a839d7&lt;SEP&gt;chunk-d80f11d9041fa41b149ae355215a077c&lt;SEP&gt;chunk-7c940ae81078db4b25f07fd960582d4f&lt;SEP&gt;chunk-ce5f5ac2d4416907a884352e921bd8e5&lt;SEP&gt;chunk-127cf5a72e81a47211107cbe9ccf4f26&lt;SEP&gt;chunk-be4346f2d9abd23d10b7a2ccb07ff879&lt;SEP&gt;chunk-995e2fe433ca3d8ddeefa8772fe442ed&lt;SEP&gt;chunk-abbad8346d986061dfc2e8f7d1092a3b\nfile_path: ..\\..\\data\\data_1000_chunk_512.json\ncreated_at: 1775574631", "group": "person", "value": 12}, {"id": 69, "label": "Sinh viên", "title": "entity_id: Sinh viên\nentity_type: person\ndescription: Sinh viên là nhóm người tham gia các hoạt động học tập và đào tạo; theo nghĩa rộng, đó là những người theo học và tham dự các hoạt động liên quan đến đào tạo, còn theo nghĩa hẹp trong một số ngữ cảnh “sinh viên” có thể chỉ người tham gia học tiếng Nhật theo lịch sắp xếp (vừa học tiếng Nhật vừa học tại Trường Đại học) hoặc là thuật ngữ cho các chủ thể thuộc nhóm đối tượng được miễn học, miễn học/miễn thi. Trong các chương trình tập huấn về thiết kế, lập trình hệ thống điều khiển và tự động hóa, sinh viên vừa là người tham gia vừa là nhóm thụ hưởng, gắn nhu cầu đào tạo với việc nâng cao chất lượng đào tạo và năng lực nghiên cứu. Sinh viên có thể đồng thời là thí sinh đủ điều kiện dự thi và đăng ký các chương trình chuyên sâu kèm thực tập và trải nghiệm thực tế, nhất là với nhóm yêu thích công nghệ và đam mê Blockchain nhằm chuẩn bị môi trường làm việc sau tốt nghiệp; trong bối cảnh VUCA, sinh viên được định hướng tăng cường tự học và thích ứng. Sinh viên có thể thực hiện đồ án/khóa luận tốt nghiệp (ĐA/KLTN) và có thể nhận học bổng toàn phần từ Tập đoàn Viettel và các đơn vị đối tác (ví dụ một số trường hợp khóa 1 được miễn học phí và nhận học bổng toàn phần theo năng lực học tập), đồng thời có trường hợp tại Trường Đại học Công nghệ – ĐHQGHN đạt thành tích ở Giải thưởng Honda Y-E-S nhưng bị ảnh hưởng bởi Covid-19 dẫn đến một số trường hợp chưa hoàn thành đúng hạn.\n\nVề hoạt động học thuật và thủ tục, sinh viên tham gia các yêu cầu khi dự thi như đăng nhập hệ thống Course trước ca thi, bật Video/Audio khi đến lượt, xuất trình thẻ sinh viên và hướng camera rõ mặt trong suốt thời gian thi. Sinh viên Trường Đại học Công nghệ – ĐHQGHN được mô tả có năng lực ngôn ngữ cơ bản tốt và tư duy/sáng tạo để giải quyết vấn đề triển khai dự án; nhà trường cũng hỗ trợ thúc đẩy sáng tạo khởi nghiệp. Sinh viên tham gia lễ bế giảng và trao bằng tốt nghiệp theo số lượng được công nhận, với các nhóm đối tượng tốt nghiệp nhận bằng trong buổi lễ; đồng thời được khuyến khích tiếp cận cơ hội công nghệ và kinh doanh, đóng góp ý tưởng mới và triển khai thực tiễn. Một số chương trình/hồ sơ yêu cầu nhập thông tin vào liên kết, nộp bản đánh máy theo danh mục tài liệu quy định và có thể phải đáp ứng tiêu chí trong Tập 1.1 để hưởng hỗ trợ, đặc biệt với sinh viên người dân tộc thiểu số. Sinh viên còn có thể là đối tượng thụ hưởng chương trình thực tập tại SVMC, tham gia nghiên cứu khoa học dưới hướng dẫn của TS Chu Đức Hà và thảo luận về rủi ro trong lĩnh vực siêu cao tần công suất lớn với PGS.TS. Bạch Gia Dương; tham dự các cuộc thi có thể trưng bày sản phẩm của Nhà trường.\n\nSinh viên được xem là nhóm cần được quan tâm kỳ vọng vì tương lai đất nước, có thể được cử tham gia Hội nghị đối thoại cấp Khoa/Viện hoặc cấp Trường theo thành phần quy định và tham gia phỏng vấn tuyển thực tập sinh do Boeing tổ chức. Định hướng nghề nghiệp nhấn mạnh sự tự tin và hòa nhập công việc ngay khi tốt nghiệp nhờ kiến thức chuyên môn gắn với thực tiễn; đồng thời sinh viên là nhóm thụ hưởng khi nhà trường nâng cao chất lượng đào tạo, có cơ hội làm việc tốt hơn tại doanh nghiệp lớn như Samsung thông qua hợp tác giữa Samsung, nhà trường và bản thân sinh viên. Về hỗ trợ, sinh viên có thể cần xin đồng ý khi đăng ký số lượng khóa học ít hơn số tối thiểu hoặc nhiều hơn số tối đa; trong hồ sơ/văn bản liên quan học bổng và chương trình, sinh viên chịu trách nhiệm tìm hiểu thông tin và đăng ký khi đủ điều kiện. Sinh viên có thể thuộc đối tượng tuyển sinh theo yêu cầu tích lũy tín chỉ và có thể được xét tốt nghiệp sớm; nhà trường tư vấn, hỗ trợ và tổ chức đối thoại trực tiếp định kỳ để sinh viên trình bày tâm tư, nguyện vọng, thắc mắc và phản ánh.\n\nNgoài ra, sinh viên còn là nhóm nhận quà gồm sinh viên quốc tế và sinh viên có hoàn cảnh khó khăn, đồng thời là đối tượng tham gia chương trình hợp tác trong đó Trường ĐHCN tập hợp và quản lý, NATV quản lý thực thi và đánh giá/tuyển chọn. Sinh viên cũng nhận lợi ích từ hợp tác giữa Samsung và Nhà trường, đặc biệt trong đào tạo và nghiên cứu, và được mô tả là nhóm được hỗ trợ để tự tin và thuận lợi trao đổi học thuật trong quá trình học và bảo vệ. Đồng thời, sinh viên cũng có thể là đối tượng thực hiện việc nộp bổ sung giấy tờ/hồ sơ để xin miễn, giảm học phí theo quy định.\nsource_id: chunk-7d68d6e3660458b8ec3b1cd4c90d2c2e&lt;SEP&gt;chunk-36532b8cff315fbcc70a1cd6cca4b5cf&lt;SEP&gt;chunk-05b594e49dcbf27924c0093b6f15502f&lt;SEP&gt;chunk-8cbff95a82adc2e017e3546bc5b7ead2&lt;SEP&gt;chunk-9d3f6a1595a8e6f488f82e2fd76f04e8&lt;SEP&gt;chunk-cbca8a3204d1b4738454c99fcc14fd6c&lt;SEP&gt;chunk-be8183c67c24bd5e9c55ae060a1bf360&lt;SEP&gt;chunk-d1be213626c937aa11e6d8ba73186f71&lt;SEP&gt;chunk-43743229e1483f1ea2b87a6dca15f3fd&lt;SEP&gt;chunk-946f8eac07827d9ee3515f1b1f19ca7b&lt;SEP&gt;chunk-8613c9cfa2ba254e288947750ebfd235&lt;SEP&gt;chunk-5785a19d03138c472b3eaf413a43ffae&lt;SEP&gt;chunk-e95474548797126e22f1ff419766e65f&lt;SEP&gt;chunk-974fbc906812212876d466374587558f&lt;SEP&gt;chunk-36ae4f9d220db7e7b99fffc25891f449&lt;SEP&gt;chunk-8455c45ea6c7cd65abb7df3df1e9ed4c&lt;SEP&gt;chunk-f541b4deaeb1a76f28afbc3c71d01804&lt;SEP&gt;chunk-67b8a97d87f022b7f21aded50dab9340&lt;SEP&gt;chunk-c479a88ef525a66d04b1e793c76ada93&lt;SEP&gt;chunk-5197c02f5eeb52967672f12e03f8b528&lt;SEP&gt;chunk-e173981379275e49bf1295c13b9943b3&lt;SEP&gt;chunk-e845bef132b5b0934548eb27c519b053&lt;SEP&gt;chunk-670e719106a65ca4cb600880f74f1f99&lt;SEP&gt;chunk-d95e1b30541689d3635c247fd401a51b&lt;SEP&gt;chunk-c0938a6509e63e88a09d6ba4b56654b1&lt;SEP&gt;chunk-44266e6fbb079354ca0ddef18425eca0&lt;SEP&gt;chunk-6eea7eddaf35625985f819ad545909ce&lt;SEP&gt;chunk-33a24bfcac3a123fd6825fd7a9c3340b&lt;SEP&gt;chunk-a085aab048cc0c6bf5bf05d56b6745e9&lt;SEP&gt;chunk-29e8e52f6e4122b32c6998d8257ddf7d&lt;SEP&gt;chunk-e763cce82ab114b641534f127cb534bc&lt;SEP&gt;chunk-0dc814b89f42b41d76783f0d2bd561d7&lt;SEP&gt;chunk-586ad7b3e7248ae5bc4853a5567d59f1&lt;SEP&gt;chunk-ec2504a0bf9e3f3f0d4caa676d586e06&lt;SEP&gt;chunk-02f17bc4d0a46c7651b9f538bec4dab2&lt;SEP&gt;chunk-8e576aa0968906f55b4ae53142820906&lt;SEP&gt;chunk-e9cffa1a8610d93b189b8eb7a73983d9&lt;SEP&gt;chunk-4a44d25733d7e250ff903ae46a3de731&lt;SEP&gt;chunk-01468ff331f4ebc74e6ea58c58aba2cf&lt;SEP&gt;chunk-063008d5904ffe32bee3b63969398756&lt;SEP&gt;chunk-4f11779749aed293abcdd91a02dabb0d&lt;SEP&gt;chunk-f6daf1b52f11576e1e64a117ac87c73a&lt;SEP&gt;chunk-e38c1f3c096f72a82bacd20cd1741954\nfile_path: ..\\..\\data\\data_1000_chunk_512.json\ncreated_at: 1775576268", "group": "person", "value": 14}, {"id": 70, "label": "Trí tuệ nhân tạo", "title": "entity_id: Trí tuệ nhân tạo\nentity_type: chuyên_ngành\ndescription: Trí tuệ nhân tạo là một khái niệm/chuyên ngành được ghi nhận trong dữ liệu học thuật, gắn với mã CN12 và liên hệ với các tổ hợp A00, A01, D01 cùng các giá trị số kèm theo. Trong các bảng dữ liệu đào tạo đại học, Trí tuệ nhân tạo được thể hiện đồng thời như một ngành học liên kết với mã ngành 7480107 và các thông tin/“quyết định” đi kèm; trong bối cảnh chương trình đào tạo, ngành này còn được mô tả như một mảng kiến thức thuộc chương trình đào tạo đại học. Ở góc độ ứng dụng, Trí tuệ nhân tạo còn được nhắc đến như một công nghệ được áp dụng trong quá trình xử lý và trích xuất thông tin. Về mặt chủ đề học thuật, Trí tuệ nhân tạo xuất hiện trong hội nghị với nội dung được đưa vào ba phiên thảo luận và được mô tả là một trong các lĩnh vực then chốt trong “Cuộc cách mạng công nghiệp lần thứ 4”.\n\nTrí tuệ nhân tạo cũng được xem là lĩnh vực có tác động lớn và sâu sắc đến đời sống hàng ngày, tham gia giải quyết các thách thức xã hội, đồng thời có ứng dụng trong y học và nhiều lĩnh vực khác. Về yêu cầu nền tảng, Trí tuệ nhân tạo liên quan đến kiến thức nền tảng ngành KHMT (được nêu trong CĐR 5) và được coi là lĩnh vực cần được xử lý trên cơ sở nền tảng toán học trong bối cảnh các ứng dụng công nghệ. Ngoài ra, Trí tuệ nhân tạo là đối tượng công bố trên các tạp chí quốc tế như ISI và Scopus và là lĩnh vực có đào tạo tại nhiều khoa. Trí tuệ nhân tạo cũng được mô tả là một ngành đào tạo được mở mới, mang tính trách nhiệm xã hội.\nsource_id: chunk-d2a8966b15bf3e84b5310855bf8069c4&lt;SEP&gt;chunk-560aa8f7145b812a0a3f0961eae4bed8&lt;SEP&gt;chunk-32d59c864a39cf5de0e85540da8166e6&lt;SEP&gt;chunk-a84e71dd8daad2198c69b1cc677aaf37&lt;SEP&gt;chunk-73f0943bc53f57e4e794f7b328d9c011&lt;SEP&gt;chunk-ac222c304ce1d401db154dadc22e3019&lt;SEP&gt;chunk-c93f312ce61c87b410d91587c89f40b7&lt;SEP&gt;chunk-4b7fbb9536d4e17a52df1a87aa1e10a9&lt;SEP&gt;chunk-0926809b5854b3a58e3db38bdad979c7&lt;SEP&gt;chunk-1187c9f9ab68a43bc0377190f37254e6&lt;SEP&gt;chunk-41b19a9281237237779b36fc4659371b&lt;SEP&gt;chunk-9d676323292c7d78dcf48144f276965e&lt;SEP&gt;chunk-653c3e3e8802c8487fad608f9741926c\nfile_path: ..\\..\\data\\de_an_2024_chunks.json&lt;SEP&gt;..\\..\\data\\data_1000_chunk_512.json\ncreated_at: 1775555115", "group": "chuyên_ngành", "value": 12}, {"id": 71, "label": "Trường", "title": "entity_id: Trường\nentity_type: organization\ndescription: Trường là một đơn vị học tập và quản trị, đóng vai trò quản lý–điều hành trong hoạt động đào tạo và tuyển sinh. Trường chịu trách nhiệm cập nhật, bổ sung và điều chỉnh Đề án tuyển sinh năm 2024, công bố các nội dung đúng thời hạn; đồng thời tổ chức đăng ký và xét tuyển, bao gồm việc ban hành thông báo về thời hạn đăng ký, công bố kết quả và thời hạn sơ tuyển. Một số mô tả cho biết Trường có hoạt động thông báo thí sinh trúng tuyển đối với 01 NV và trong bối cảnh tuyển sinh có thông tin là không xét tuyển chứng chỉ tiếng Anh TOEFL iBT (home edition). Về quản trị và tổ chức hoạt động, Trường tham gia các báo cáo dự kiến đổi mới tổ chức, triển khai ôn luyện đội tuyển trong một tháng cùng đội ngũ giảng viên UET, tổ chức các hoạt động gắn kết giữa các khối và đơn vị thông qua công đoàn, đồng thời phối hợp với các nhà trường trong và ngoài nước để hỗ trợ học tập, thực hành và trao đổi học thuật.\n\nTrong đào tạo, Trường triển khai học tập và đánh giá năng lực ngôn ngữ cơ bản của sinh viên, tổ chức đào tạo theo tín chỉ và tiếp nhận báo cáo tình hình học tập từ các lớp do cán bộ kiểm tra thực hiện. Những năm gần đây, Trường được ghi nhận trong việc tổ chức tuyển sinh và xây dựng ba chương trình đào tạo mới; đồng thời tiếp nhận thông báo kế hoạch từ Phòng Đào tạo. Trường cũng có sự tham gia của sinh viên bậc đại học trong các hoạt động đầu tư/cải tạo/nâng cấp phòng học và triển khai các dự án tăng cường năng lực đào tạo và nghiên cứu. Trường phối hợp với Phòng Hành chính – Quản trị 1 trong quản lý hành chính, truyền thông, quản trị cơ sở vật chất, thiết bị và an ninh trật tự; được mô tả là đơn vị do Đảng bộ chỉ đạo, tiếp nhận sự quan tâm của Đảng ủy cấp trên, thực hiện nhiệm vụ trọng tâm năm 2019 và chuẩn bị kế hoạch phát triển dài hạn gắn với nhu cầu của các khoa và Nhà trường, đi kèm cơ chế quản lý phục vụ đào tạo, dịch vụ và chuyển giao.\n\nTrường còn là kênh thông tin liên quan đến Minh Trang và học bổng Jardine Cycle &amp; Carriage, với yêu cầu ghi “thông tin đơn vị học tập” lên mặt ngoài túi hồ sơ, nhấn mạnh thông điệp cựu sinh viên gìn giữ và phát huy giá trị thương hiệu của Trường và định hướng phát triển thời gian tới. Về nghĩa vụ quản trị, Trường tham gia thực hiện nghĩa vụ thuế đối với các hợp đồng nghiên cứu khoa học và hợp đồng dịch vụ có đơn vị/cá nhân tham gia, áp dụng cơ chế đặt ngưỡng yêu cầu theo từng nhóm ngành. Về hạ tầng và đối thoại, Trường có wifi phủ sóng toàn trường, tiếp nhận kiến nghị và đề xuất giải pháp, tổ chức Hội nghị đối thoại cấp Trường; đồng thời là nơi diễn ra công tác sinh viên nhằm hướng tới giáo dục và rèn luyện toàn diện, hỗ trợ sinh viên hoàn thiện nhân cách và kỹ năng sống. Ngoài đào tạo và quản trị, Trường tổ chức hoạt động “Xuân gắn kết – Tết yêu thương” và chia sẻ, trao quà cho sinh viên dịp Tết, đồng thời xây dựng và triển khai các chương trình đào tạo mới, giáo trình, ngân hàng câu hỏi và các khóa học ngắn hạn cấp chứng chỉ. Trường cũng được mô tả là luôn chuẩn bị kỹ lưỡng cho kế hoạch phát triển lâu dài gắn với nhu cầu của các đơn vị; đồng thời là đơn vị thực hiện công tác xét tuyển, được nêu là thuận lợi nhờ điểm thi chi tiết hơn.\nsource_id: chunk-28f547b58c21b631b4398f5666bdc538&lt;SEP&gt;chunk-af9a015f54d835324a9340cecb98c2dd&lt;SEP&gt;chunk-aa1cba655a0cdd24eb42bb9fa5ed653a&lt;SEP&gt;chunk-753e0d1923e8e9b449fb7ba8d346c897&lt;SEP&gt;chunk-edd7721223fd7fee829b0fdc3252d467&lt;SEP&gt;chunk-59487b438c63dbdd479560c5298ab748&lt;SEP&gt;chunk-d8a2412bf77af2eec97a7a16c354ccfa&lt;SEP&gt;chunk-66ddcb13e30d0dea19db561c8b87de9e&lt;SEP&gt;chunk-33bfd7b17ac823188becd46e8e54b265&lt;SEP&gt;chunk-35900977eb9299da11a0394943cf9257&lt;SEP&gt;chunk-8613c9cfa2ba254e288947750ebfd235&lt;SEP&gt;chunk-f26b36005e08c342e1eda50a01aedb49&lt;SEP&gt;chunk-36ae4f9d220db7e7b99fffc25891f449&lt;SEP&gt;chunk-41b1e97b5b7dee226180bae2fd84a247&lt;SEP&gt;chunk-0506877d6323254e8a60d8475fba7309&lt;SEP&gt;chunk-ff0626638ada09e2e982d0411a14145a&lt;SEP&gt;chunk-21c73d451caa1868cbd1d3e9f905da8f&lt;SEP&gt;chunk-91c0c014930658410e595aec94815ab9&lt;SEP&gt;chunk-553080a17f7731b8b355581319ce2133&lt;SEP&gt;chunk-423f00663d45780d5f80b7aba9ed524a&lt;SEP&gt;chunk-4aa49c4ade846a08159b36c2ce09ffc6&lt;SEP&gt;chunk-44266e6fbb079354ca0ddef18425eca0&lt;SEP&gt;chunk-3ebb2c409088319e502833350531aaa5&lt;SEP&gt;chunk-43df8dc4a15954796f288350d5490c29&lt;SEP&gt;chunk-91f6c250b6e2767ece6efcf351033879&lt;SEP&gt;chunk-41965627f8aee74cd8b5924133644fe1&lt;SEP&gt;chunk-70f0595e0db74a4a98d9a197c22d5c5c&lt;SEP&gt;chunk-ec2504a0bf9e3f3f0d4caa676d586e06&lt;SEP&gt;chunk-4a44d25733d7e250ff903ae46a3de731&lt;SEP&gt;chunk-15b28ce3d924ce37f24ee1c17a45f1d5&lt;SEP&gt;chunk-15037255d95cc285820ac14054b58126&lt;SEP&gt;chunk-bbbd106dde88bc3d8835240e2613e312&lt;SEP&gt;chunk-d773368bbf4cc7eeff0dd9ef007741e5\nfile_path: ..\\..\\data\\de_an_2024_chunks.json&lt;SEP&gt;..\\..\\data\\data_1000_chunk_512.json\ncreated_at: 1775574987", "group": "organization", "value": 12}, {"id": 72, "label": "Trường ĐH Công nghệ", "title": "entity_id: Trường ĐH Công nghệ\nentity_type: đơn_vị_trực_thuộc\ndescription: Trường ĐH Công nghệ là một cơ sở giáo dục đại học tại Việt Nam, trong một số tài liệu kiểm định hoặc mô tả hoạt động có thể được gọi rút gọn/tương đương với “Trường Đại học Công nghệ” và thường được nêu là thuộc ĐHQGHN. Trường tham gia công tác lãnh đạo trong bối cảnh kiểm định chất lượng: thông qua vai trò Hiệu trưởng, Trường tổ chức phát biểu khai mạc và tiếp nhận Đoàn đánh giá ngoài (ĐGN) để kiểm định 4 chương trình đào tạo, đồng thời tiếp nhận, xử lý các nhận xét và góp ý từ ĐGN nhằm cải tiến, nâng cao chất lượng đào tạo và giáo dục, với tinh thần tiếp thu ý kiến được đánh giá cao.\n\nVề tổ chức, Trường được nêu là đơn vị trực tiếp quản lý/thuộc Viện Công nghệ Hàng không Vũ trụ (SAE), có giảng viên tham gia phối hợp giảng dạy và có khoa Vật lý nano. Trường được gắn với một số giảng viên kiêm nhiệm như Phạm Hồng Công và TS. Lê Đình Anh (bắt đầu làm việc từ năm 2019), cùng các nội dung liên quan đến TS Chu Đức Hà và PGS.TS Hồ Sĩ Đàm. Trường còn được mô tả gắn với các cá nhân và thành tích đào tạo, nghiên cứu (như TS. Trần Quốc Quân, thủ khoa năm 2012; các sinh viên Trương Văn Quốc Bảo, Trần Doãn Đức, Nguyễn Hữu Tuất) và được nhắc đến như nơi đạt giải nhất trong hoạt động sinh viên nghiên cứu khoa học. Trường cũng tổ chức tham quan, giao lưu và định hướng nghề nghiệp cho học sinh với sự tham dự của nhiều lãnh đạo và giảng viên.\n\nTrong hợp tác học thuật và tuyển dụng, Trường có quan hệ với Viện Công nghệ điện tử Hàn Quốc (KETI) từ năm 2016, bao gồm trao đổi giảng viên/cán bộ và phối hợp tổ chức hoạt động dựa trên các dự án nghiên cứu; đồng thời dự kiến giới thiệu sinh viên ưu tú tham gia đào tạo và lấy bằng Thạc sĩ tại Đại học Trung Chính. Trường hợp tác với Tập đoàn Samsung Việt Nam thông qua học bổng Tài năng Samsung và hoạt động tuyển dụng, tham dự “Ngày hội Giáo dục Belarus” và ký thỏa thuận với các đại học Belarus trong lĩnh vực kỹ thuật, công nghệ, tổ chức hội thảo “Sinh viên UET và cơ hội nghề nghiệp trong tương lai”, cùng phối hợp với Viettel tổ chức các buổi trải nghiệm thực tế. Hiệu trưởng được nêu tham gia ký kết thỏa thuận hợp tác với FPT; Trường cũng là điểm đến trao đổi học thuật trong workshop thuộc dự án Global Wales, cung cấp cơ hội học bổng, thực tập và việc làm, đồng thời phối hợp tổ chức các sự kiện khác. Ngoài ra, Trường tham gia các hoạt động như phỏng vấn sinh viên (trong bối cảnh Boeing đánh giá năng lực sinh viên), nghiệm thu thành công đề tài khoa học công nghệ cấp ĐHQGHN và tham gia cuộc thi điều khiển xe tự hành cùng ĐH Dong–A.\n\nTrường còn được nhắc đến trong hoạt động chuyển giao/ứng dụng kết quả nghiên cứu, đóng vai trò kết nối nhà khoa học với doanh nghiệp và nhà đầu tư khi các kết quả nghiên cứu được đưa ra thị trường. Trường cũng tham gia phát triển hệ thống BLife và phối hợp triển khai trên bệnh nhân, được mô tả có quyết định chuyển tiếp nghiên cứu sinh và giữ lại làm cán bộ giảng dạy, đồng thời ghi nhận định hướng nuôi dưỡng người học theo khẩu hiệu “Học thật – Thi thật – Thành công thật”. Hiệu trưởng PGS.TS. Nguyễn Ngọc Bình được nêu là người giữ vai trò lãnh đạo và phát biểu về việc cải thiện chất lượng chương trình đào tạo, đồng thời đánh giá cao sự hợp tác với ATOLL.\nsource_id: chunk-48b2e81367d47a284128ce3ed8c9a232&lt;SEP&gt;chunk-7715a8512ac7269aee67179ba0b19595&lt;SEP&gt;chunk-42efc428f31a0463f0af26150cefad7c&lt;SEP&gt;chunk-d7d003e48dd2fd02fafbfe46f8aeb5c3&lt;SEP&gt;chunk-fb78f49fb6f886705d2c8450a4f83416&lt;SEP&gt;chunk-d1c4f85dc345362f564528e275036273&lt;SEP&gt;chunk-f7aea8f39dbd3f51707fccb5ee635356&lt;SEP&gt;chunk-9a33a9a2cfc8a2bc3454dba98ae02d75&lt;SEP&gt;chunk-3cf90efe033e5ded92b461ad94851b55&lt;SEP&gt;chunk-2829159a7da87d2067e92f62f6daa5e5&lt;SEP&gt;chunk-e6fa4beaa9deb44835ebb9159bd04ee9&lt;SEP&gt;chunk-1e2b409df351e00ba9252521675a6320&lt;SEP&gt;chunk-4f17bfc7d42357234b8031a45024fee6&lt;SEP&gt;chunk-5a02c8ae1cd60d03d864a5c28e9b7752&lt;SEP&gt;chunk-986b389245afdc1ea40de92286abf96a&lt;SEP&gt;chunk-ee0e992ba89822394b61a23ffb9c6d47&lt;SEP&gt;chunk-8ebf34cb943b7ae241ee5638de0cb5df&lt;SEP&gt;chunk-345ba3ea4c0a4f72cc85d813e2af9cd8&lt;SEP&gt;chunk-9e5fcdec6279199d9d227003b4a7c66e&lt;SEP&gt;chunk-77339be9f43e1e58c1b8c0aa8e68ca8b&lt;SEP&gt;chunk-be293afad6453b64e8a1d10382ce305b&lt;SEP&gt;chunk-40d6169a38950ca096c8b3332f3a4e55&lt;SEP&gt;chunk-9333670261fe415ec8faffcbd0dcbb4d&lt;SEP&gt;chunk-31a055eeb31950564ffbe9add97a6bd5&lt;SEP&gt;chunk-c119713a2d3a55432d71a2b3d048ed46&lt;SEP&gt;chunk-acd7e618643d8b8c6089dbd941157aba&lt;SEP&gt;chunk-117eaab3dfa5e5f9a91072db3eb7c1a2&lt;SEP&gt;chunk-3ebb2c409088319e502833350531aaa5&lt;SEP&gt;chunk-c1a1b0abc28272f46be9093a21f65136&lt;SEP&gt;chunk-41b19a9281237237779b36fc4659371b&lt;SEP&gt;chunk-c8c08836ed219eac2f78784395ca751a&lt;SEP&gt;chunk-2ca8857f44555621498a81cb61b1602d&lt;SEP&gt;chunk-c86023b14d78884a4ac66f954508edb1&lt;SEP&gt;chunk-ba882b4d55f4e724cc8bcfb9b596c21e&lt;SEP&gt;chunk-8f1c3ebde2e253c5be812bef35417df2&lt;SEP&gt;chunk-01468ff331f4ebc74e6ea58c58aba2cf&lt;SEP&gt;chunk-f8079719074c639fa305906157aade98&
