 1.0\ndescription: Khái niệm “Nhà trường” được dùng để chỉ Trường Đại học Công nghệ trong mô tả sự hợp tác.\nkeywords: đồng nhất khái niệm\nsource_id: chunk-198ae95ae51a73bdde16bfabc5eeb0b1\nfile_path: ..\\..\\data\\data_1000_chunk_512.json\ncreated_at: 1775536131", "label": "đồng nhất khái niệm"}, {"from": 35, "to": 21, "title": "weight: 1.0\ndescription: Nhà trường đánh giá 1 chương trình thuộc Khoa Công nghệ thông tin theo Bộ tiêu chí của ĐHQGHN.\nkeywords: đánh giá chương trình\nsource_id: chunk-5b02279de165a97728d81442f368fce3\nfile_path: ..\\..\\data\\data_1000_chunk_512.json\ncreated_at: 1775495690", "label": "đánh giá chương trình"}, {"from": 35, "to": 23, "title": "weight: 1.0\ndescription: Nhà trường đánh giá 2 chương trình thuộc Khoa Cơ học kỹ thuật và Tự động hóa theo Bộ tiêu chí của ĐHQGHN.\nkeywords: đánh giá chương trình\nsource_id: chunk-5b02279de165a97728d81442f368fce3\nfile_path: ..\\..\\data\\data_1000_chunk_512.json\ncreated_at: 1775495692", "label": "đánh giá chương trình"}, {"from": 35, "to": 37, "title": "weight: 1.0\ndescription: PGS.TS. Nguyễn Việt Hà được nêu là Hiệu trưởng của Nhà trường.\nkeywords: chức vụ,lãnh đạo\nsource_id: chunk-26435cc51ec961d4bc384e2e8d9c6f88\nfile_path: ..\\..\\data\\data_1000_chunk_512.json\ncreated_at: 1775499449", "label": "chức vụ,lãnh đạo"}, {"from": 35, "to": 49, "title": "weight: 1.0\ndescription: Nhà trường tạo điều kiện để sinh viên học tập và phát triển trong môi trường UET.\nkeywords: môi trường học tập,điều kiện học tập\nsource_id: chunk-8b3f7265a717e2c1b642303ee5e681c7\nfile_path: ..\\..\\data\\data_1000_chunk_512.json\ncreated_at: 1775536386", "label": "môi trường học tập,điều kiện học tập"}, {"from": 35, "to": 43, "title": "weight: 1.0\ndescription: Trường ĐHCN là đơn vị/nhà trường được nhắc đến trực tiếp trong việc nâng cao chất lượng đào tạo.\nkeywords: đơn vị chịu trách nhiệm\nsource_id: chunk-6eea7eddaf35625985f819ad545909ce\nfile_path: ..\\..\\data\\data_1000_chunk_512.json\ncreated_at: 1775549188", "label": "đơn vị chịu trách nhiệm"}, {"from": 44, "to": 1, "title": "weight: 1.0\ndescription: “Trường Đại học Công nghệ (ĐHCN)” là cách viết tắt được dùng để chỉ cùng đơn vị Trường Đại học Công nghệ.\nkeywords: tên viết tắt\nsource_id: chunk-77d7917ef2e7d9cd9a81dd72330ed7f1\nfile_path: ..\\..\\data\\data_1000_chunk_512.json\ncreated_at: 1775528607", "label": "tên viết tắt"}, {"from": 44, "to": 55, "title": "weight: 1.0\ndescription: Trường Đại học Công nghệ (ĐHCN) được nêu là thuộc/được đặt trong khuôn khổ của Đại học Quốc gia Hà Nội.\nkeywords: liên quan,thuộc\nsource_id: chunk-af41db2bb10375a55725ea3beeec211d\nfile_path: ..\\..\\data\\data_1000_chunk_512.json\ncreated_at: 1775532813", "label": "liên quan,thuộc"}, {"from": 44, "to": 81, "title": "weight: 1.0\ndescription: Trường Đại học Công nghệ được nêu là thuộc Đại học Quốc gia Hà Nội.\nkeywords: quản lý,thuộc hệ thống\nsource_id: chunk-077c2eaae12fe57fa3f23857dfb7c451\nfile_path: ..\\..\\data\\data_1000_chunk_512.json\ncreated_at: 1775575359", "label": "quản lý,thuộc hệ thống"}, {"from": 44, "to": 62, "title": "weight: 3.0\ndescription: Nguyễn Xuân Đức là sinh viên của Trường Đại học Công nghệ (ĐHCN) và đạt thành tích thủ khoa đầu vào tại đây.&lt;SEP&gt;Nguyễn Xuân Đức được tuyển thẳng và đạt danh hiệu thủ khoa đầu vào tại Trường Đại học Công nghệ (ĐHCN).&lt;SEP&gt;Nguyễn Xuân Đức được tuyển thẳng vào Trường Đại học Công nghệ (ĐHCN) và đạt danh hiệu thủ khoa đầu vào của trường.\nkeywords: thành tích,tuyển sinh,đơn vị đào tạo,đạt danh hiệu\nsource_id: chunk-9cc599f95d63d272604057fd8aa88455&lt;SEP&gt;chunk-2f6a0ae1ea831f72cdab8b38eb0e808e&lt;SEP&gt;chunk-1c81102c63409740cad7996319f87efc\nfile_path: ..\\..\\data\\data_1000_chunk_512.json\ncreated_at: 1775555641", "label": "thành tích,tuyển sinh,đơn vị đào tạo,đạt danh hiệu"}, {"from": 44, "to": 37, "title": "weight: 1.0\ndescription: PGS.TS. Nguyễn Việt Hà là Hiệu trưởng Nhà trường và tham gia tiếp đoàn của Samsung.\nkeywords: vai trò lãnh đạo,đại diện\nsource_id: chunk-33a24bfcac3a123fd6825fd7a9c3340b\nfile_path: ..\\..\\data\\data_1000_chunk_512.json\ncreated_at: 1775549206", "label": "vai trò lãnh đạo,đại diện"}, {"from": 26, "to": 1, "title": "weight: 1.0\ndescription: Nhà trường thông báo kế hoạch học tập “Tuần lễ hội nhập sinh viên” cho sinh viên khóa QH-2021 (K66).\nkeywords: thông báo,triển khai\nsource_id: chunk-cb4220c57db2b8a1a0273e13380c9c71\nfile_path: ..\\..\\data\\data_1000_chunk_512.json\ncreated_at: 1775548102", "label": "thông báo,triển khai"}, {"from": 30, "to": 1, "title": "weight: 3.0\ndescription: Trường Đại học Công nghệ (ĐHQGHN) tổ chức Lễ khai trương Xưởng cơ khí – Tự động hóa.&lt;SEP&gt;Trường Đại học Công nghệ tổ chức Lễ khai trương Xưởng cơ khí – Tự động hóa.&lt;SEP&gt;Trường Đại học Công nghệ tổ chức Lễ khai trương Xưởng cơ khí – Tự động hóa.\nkeywords: sự kiện,tổ chức,đơn vị tổ chức\nsource_id: chunk-bbe290a15692091f354ffb5385d8273d&lt;SEP&gt;chunk-82fff52824c85317607a39708935ecf1&lt;SEP&gt;chunk-f76ad378d5647d674585cd166cb0bd01\nfile_path: ..\\..\\data\\data_1000_chunk_512.json\ncreated_at: 1775573709", "label": "sự kiện,tổ chức,đơn vị tổ chức"}, {"from": 30, "to": 34, "title": "weight: 3.0\ndescription: Nhà E3 là địa điểm diễn ra Lễ khai trương Xưởng cơ khí – Tự động hóa.&lt;SEP&gt;Lễ khai trương diễn ra tại Nhà E3.&lt;SEP&gt;Lễ khai trương Xưởng cơ khí – Tự động hóa được tổ chức tại Nhà E3.\nkeywords: sự kiện,tổ chức,địa điểm\nsource_id: chunk-bbe290a15692091f354ffb5385d8273d&lt;SEP&gt;chunk-82fff52824c85317607a39708935ecf1&lt;SEP&gt;chunk-f76ad378d5647d674585cd166cb0bd01\nfile_path: ..\\..\\data\\data_1000_chunk_512.json\ncreated_at: 1775573683", "label": "sự kiện,tổ chức,địa điểm"}, {"from": 23, "to": 1, "title": "weight: 2.0\ndescription: Khoa được nêu trong phạm vi Trường Đại học Công nghệ.&lt;SEP&gt;Khoa Cơ học kỹ thuật và tự động hóa thuộc Trường Đại học Công nghệ và được nêu như lực lượng phối hợp tổ chức các hoạt động hợp tác.\nkeywords: cơ sở đào tạo,phối hợp tổ chức,thuộc về,đơn vị trực thuộc\nsource_id: chunk-00013c7d0035e5c15f6307d45bccf8fd&lt;SEP&gt;chunk-586b6f06d2c379a560c3cc342c4bb78f\nfile_path: ..\\..\\data\\data_1000_chunk_512.json\ncreated_at: 1775553207", "label": "cơ sở đào tạo,phối hợp tổ chức,thuộc về,đơn vị trực thuộc"}, {"from": 23, "to": 43, "title": "weight: 1.0\ndescription: Khoa Cơ học kỹ thuật và Tự động hóa được nêu gắn với Trường ĐHCN.\nkeywords: trực thuộc\nsource_id: chunk-79f56bb89c14d701a8a574d9804fe8e5\nfile_path: ..\\..\\data\\data_1000_chunk_512.json\ncreated_at: 1775574807", "label": "trực thuộc"}, {"from": 43, "to": 1, "title": "weight: 1.0\ndescription: Trường ĐHCN là cách gọi rút gọn chỉ cùng đối tượng với Trường Đại học Công nghệ.\nkeywords: viết tắt,đồng nhất\nsource_id: chunk-81f18e91a5029c15ef23ce86e8d2d7cf\nfile_path: ..\\..\\data\\data_1000_chunk_512.json\ncreated_at: 1775527954", "label": "viết tắt,đồng nhất"}, {"from": 43, "to": 73, "title": "weight: 1.0\ndescription: Trường ĐHCN là cách gọi rút gọn để chỉ Trường Đại học Công nghệ trong mô tả sự kiện.\nkeywords: viết tắt,đồng nhất\nsource_id: chunk-64360a1c12b1ce1666dae520d5548536\nfile_path: ..\\..\\data\\data_1000_chunk_512.json\ncreated_at: 1775532839", "label": "viết tắt,đồng nhất"}, {"from": 43, "to": 22, "title": "weight: 1.0\ndescription: Khoa là một đơn vị đào tạo thuộc Trường ĐHCN.\nkeywords: trực thuộc,đào tạo\nsource_id: chunk-b3b9b194ea53d1e6157391c0e749aaee\nfile_path: ..\\..\\data\\data_1000_chunk_512.json\ncreated_at: 1775572152", "label": "trực thuộc,đào tạo"}, {"from": 1, "to": 55, "title": "weight: 29.0\ndescription: Quan hệ “(Trường Đại học Công nghệ, Đại học Quốc gia Hà Nội)” mô tả mối liên hệ tổ chức giữa Trường Đại học Công nghệ và Đại học Quốc gia Hà Nội (ĐHQGHN). Theo các mô tả, Trường Đại học Công nghệ thường được hiểu là đơn vị thành viên/đơn vị trực thuộc hệ thống của ĐHQGHN, thể hiện qua việc ĐHQGHN được nhắc đồng thời trong tên gọi và trong nhiều ngữ cảnh hành chính–truyền thông của nhà trường. Trong các ngữ cảnh như công bố điểm chuẩn, hoạt động ký kết, đón nhận chứng chỉ, triển khai kế hoạch và tham gia sự kiện, Trường Đại học Công nghệ được xác định “trực thuộc Đại học Quốc gia Hà Nội”. Quan hệ này cũng thể hiện qua phối hợp hành chính: Trường Đại học Công nghệ nhận công văn từ ĐHQGHN để thông báo chương trình học bổng Shinnyo (Nhật Bản) năm học 2022–2023, trong đó sinh viên Trường Đại học Công nghệ – ĐHQGHN được nêu là đối tượng nhận học bổng thạc sĩ. Đồng thời, ĐHQGHN được mô tả là đơn vị tổ chức một số lễ kỷ niệm có sự tham gia của Trường Đại học Công nghệ, củng cố vai trò điều phối/hệ thống của ĐHQGHN đối với trường. Trong hợp tác đào tạo và kế hoạch triển khai (kể cả bối cảnh tuyển sinh), Trường Đại học Công nghệ tiếp tục được gắn với ĐHQGHN, với ĐHQGHN đóng vai trò đơn vị liên hệ/đơn vị đi kèm trong các hoạt động thực hiện. Ngoài ra, mô tả thứ hai nhấn mạnh rằng Trường Đại học Công nghệ hoạt động theo các quy định và căn cứ trong khuôn khổ Đại học Quốc gia Hà Nội.\nkeywords: căn cứ kế hoạch,cơ sở quản lý,cấu trúc quản lý,gắn kết,hệ thống,hệ thống quản lý,hỗ trợ,liên kết,liên kết công bố,liên kết tên gọi,liên kết tổ chức,liên kết đơn vị trực thuộc,liên quan quản lý,liên quan tổ chức,nhận công văn,phạm vi liên quan,phạm vi tham gia,phối hợp,quản lý,sinh viên,thuộc,thuộc hệ thống,thuộc hệ thống quản lý,thuộc quản lý,thuộc về,thông báo,trường thành viên,trực thuộc,tư cách thành viên,tổ chức sự kiện,đơn vị chủ quản,đơn vị gắn kết,đơn vị thành viên\nsource_id: chunk-457ee99614d1d4684d2dd863a6932c1d&lt;SEP&gt;chunk-f8020318aa29fb36ec7c9ef65f0237a6&lt;SEP&gt;chunk-3c8df3ff7c17323598715fdec1e52e0e&lt;SEP&gt;chunk-bc09250c04495dee022491dc4fe04f47&lt;SEP&gt;chunk-286b577c73681bccb19daefed6cccaa1&lt;SEP&gt;chunk-77d7917ef2e7d9cd9a81dd72330ed7f1&lt;SEP&gt;chunk-94a7a176284b917cf1c262cc485c80ec&lt;SEP&gt;chunk-75953e090f489e714f8f24eb0bf5b4e3&lt;SEP&gt;chunk-662197e00be46e2e8d749cdd970a9093&lt;SEP&gt;chunk-e6fa4beaa9deb44835ebb9159bd04ee9&lt;SEP&gt;chunk-9d0302b0d28ec502bb1eea46ac7c2
