 thể liên quan đến thời lượng đào tạo cũng như địa điểm học (một phần dữ liệu về “bằng bị cắt” trong trích xuất). Ngoài ra, mô tả trong dữ liệu cũng cho thấy “Công nghệ hàng không vũ trụ” thuộc lĩnh vực mà Viện (SAE) thực hiện đào tạo, nghiên cứu và chuyển giao.\nsource_id: chunk-cecd038c8741ea822ebb8cf98ca0c7b9&lt;SEP&gt;chunk-d2a8966b15bf3e84b5310855bf8069c4&lt;SEP&gt;chunk-0ebbeb1004b0f84158b918799ea6ef56&lt;SEP&gt;chunk-2cc0a8e1e5ce4cf508ab8feae3eb98df&lt;SEP&gt;chunk-9a006ae3c6a47d88c88c15417c0e81d2&lt;SEP&gt;chunk-cdd102ef559843b58c6abe39e1f64531&lt;SEP&gt;chunk-790034372189e4984658cf1ff1537314&lt;SEP&gt;chunk-3cf90efe033e5ded92b461ad94851b55\nfile_path: ..\\..\\data\\de_an_2024_chunks.json&lt;SEP&gt;..\\..\\data\\data_1000_chunk_512.json\ncreated_at: 1775528989", "group": "chuyên_ngành", "value": 12}, {"id": 22, "label": "Công nghệ thông tin", "title": "entity_id: Công nghệ thông tin\nentity_type: chuyên_ngành\ndescription: Công nghệ thông tin là một nhóm/ngành trong hệ thống phân ngành, đồng thời xuất hiện trong các dữ liệu quản lý tuyển sinh và dữ liệu đào tạo đại học như một ngành cụ thể. Trong dữ liệu tuyển sinh, Công nghệ thông tin được mô tả là ngành xét tuyển có chỉ tiêu theo từng phương thức và theo các tổ hợp xét tuyển; ở mức mã tuyển sinh, ngành này gắn với mã CN1 và thể hiện theo mã ngành 7480201 cùng các thông tin liên quan đến quản lý dữ liệu tuyển sinh, đồng thời được nhắc trong các mô tả về cơ cấu liên quan đến hội đồng tuyển sinh (ví dụ sự gắn kết của một số cán bộ thuộc tiểu ban thư ký HĐTS với cơ cấu ngành). Trong dữ liệu đào tạo bậc đại học, Công nghệ thông tin được liệt kê như một ngành/chuyên ngành kèm các số liệu ghi nhận (300, 318, 306) và tỷ lệ 98.94, liên hệ với các nhóm môn thi Tin học, Toán, Vật lý, Hóa học và Sinh học. Về chương trình và tổ chức đào tạo, Công nghệ thông tin được nêu là thế mạnh kiến thức của nhà trường và được gắn với “07 chương trình đào tạo trình độ đại học được đánh giá chất lượng ngoài”; ngành thuộc khoa/hệ của Trường Đại học Công nghệ và gắn với chi bộ nơi Bí thư là PGS.TS. Phạm Ngọc Hùng. Dữ liệu cũng cho thấy mối liên hệ giữa Công nghệ thông tin và ngành Khoa học máy tính (có nhắc đến Đỗ Quang Thành), và việc ngành được xem như một khoa/trường hợp thuộc Trường Đại học Công nghệ (ví dụ Phạm Thị Minh Trang theo học). Ngoài ra, Công nghệ thông tin xuất hiện trong nhóm kiến thức liên ngành mà ngành Công nghệ nông nghiệp cung cấp.\n\nTrong các mô tả gắn với cá nhân/thí sinh và hoạt động chuyên môn, Công nghệ thông tin được dùng để chỉ ngành học của nhiều đối tượng được ghi nhận trong dữ liệu (như Phạm Đức Anh, Hà Xuân Sơn, Bùi An Huy, Vũ Thanh Thảo, Trương Văn Quốc Bảo, cùng các mô tả về đối tượng theo học tại Trường Đại học Công nghệ). Ngành còn được liên hệ với VNPT Technology như một chuyên ngành/định hướng để đáp ứng yêu cầu vị trí thực tập; đồng thời được xem như một nền tảng công nghệ dùng để xác định nhóm khởi nghiệp trong mục tiêu của chương trình. Công nghệ thông tin cũng được nêu là một trong các ngành có sinh viên, học viên cao học và/hoặc nghiên cứu sinh tốt nghiệp đợt tháng 6/2017, và được mô tả là ngành mà Nguyễn Cẩm Tú từng theo học ở trình độ sinh viên trước khi chuyển sang giảng dạy/hoạt động trong lĩnh vực AI. Ngoài vai trò là ngành trong tuyển sinh và đào tạo, Công nghệ thông tin còn được mô tả như một nhóm lĩnh vực gồm ba nhóm: công nghệ thông tin tiềm năng, kết nối di động và khởi nghiệp.\n\nĐồng thời, trong một số thông báo liên quan, ngành Công nghệ thông tin còn được gắn với chuyên ngành An toàn thông tin.\nsource_id: chunk-cecd038c8741ea822ebb8cf98ca0c7b9&lt;SEP&gt;chunk-c3bd05b9f0cb7ea77b612f19f3be6cd4&lt;SEP&gt;chunk-0ebbeb1004b0f84158b918799ea6ef56&lt;SEP&gt;chunk-c324b92b681c17cdf3eba24ba23d8617&lt;SEP&gt;chunk-a84e71dd8daad2198c69b1cc677aaf37&lt;SEP&gt;chunk-d00320150259439576f8a8d2784f861e&lt;SEP&gt;chunk-73f0943bc53f57e4e794f7b328d9c011&lt;SEP&gt;chunk-b9a846de9322c834018b5a5398c00304&lt;SEP&gt;chunk-d38688f088adf0bd88d1322ade343422&lt;SEP&gt;chunk-74b8343cdf7a8927f39450d6d7741ff3&lt;SEP&gt;chunk-7e9ce05ca09efa2e88367aceb54eed0f&lt;SEP&gt;chunk-4b7fbb9536d4e17a52df1a87aa1e10a9&lt;SEP&gt;chunk-4bc9e0bf150a84ffbe8c3fad9d802a51&lt;SEP&gt;chunk-f541b4deaeb1a76f28afbc3c71d01804&lt;SEP&gt;chunk-4440115afa5843410dc649af96d1e531&lt;SEP&gt;chunk-2d9af0564169f835209174494d7b1fe3&lt;SEP&gt;chunk-cbe1df14348439cf10645c5beb4ce748&lt;SEP&gt;chunk-8e401c23aeb0cca4536cf70fdd86f1cf&lt;SEP&gt;chunk-736f5975fb219222d35c2f61d73cb946&lt;SEP&gt;chunk-b1d594998c1682c2568840c15e1bd189&lt;SEP&gt;chunk-d26244bbe1742d15a52d19e1abee5345&lt;SEP&gt;chunk-117eaab3dfa5e5f9a91072db3eb7c1a2&lt;SEP&gt;chunk-4c58838595d7267790ecbcc9f0400ca9&lt;SEP&gt;chunk-0dc814b89f42b41d76783f0d2bd561d7&lt;SEP&gt;chunk-b62fb9854b005b20d61ed132312a3803&lt;SEP&gt;chunk-f06fe39c3373238f34a2854b4e3b10c9&lt;SEP&gt;chunk-f1789ff64448f1d8a3b458adc3cf17e5\nfile_path: ..\\..\\data\\de_an_2024_chunks.json&lt;SEP&gt;..\\..\\data\\quyet_dinh_1328_chunks.json&lt;SEP&gt;..\\..\\data\\data_1000_chunk_512.json\ncreated_at: 1775574333", "group": "chuyên_ngành", "value": 12}, {"id": 23, "label": "Cầu Giấy", "title": "entity_id: Cầu Giấy\nentity_type: location\ndescription: Cầu Giấy là quận/thành phần địa lý trong địa chỉ trụ sở chính.&lt;SEP&gt;Cầu Giấy là địa điểm/khu vực học trong bảng dữ liệu cho một số chuyên ngành.&lt;SEP&gt;Địa điểm học (Cầu Giấy) được ghi nhận cho nhiều ngành tuyển sinh trong bảng.&lt;SEP&gt;Cầu Giấy là địa điểm/cơ sở gắn với một số dòng dữ liệu trong bảng.&lt;SEP&gt;Cầu Giấy là quận/huyện được nêu trong địa chỉ liên hệ.&lt;SEP&gt;Khu vực được nêu cho các lớp tham dự họp trực tiếp.&lt;SEP&gt;Cầu Giấy là quận được nêu trong địa chỉ địa điểm thi.\nsource_id: chunk-457ee99614d1d4684d2dd863a6932c1d&lt;SEP&gt;chunk-876c60e2795f21253f7ddbe18b8619c0&lt;SEP&gt;chunk-2cc0a8e1e5ce4cf508ab8feae3eb98df&lt;SEP&gt;chunk-09f9598bcf9b8f3f671586c00f9242f3&lt;SEP&gt;chunk-b4b7e36d12b16edcb01a8ed73c16ca4a&lt;SEP&gt;chunk-3430f51584f1b8213e683dc67ec13252&lt;SEP&gt;chunk-c997ac125f0050062b709404aca9a79b\nfile_path: ..\\..\\data\\de_an_2024_chunks.json&lt;SEP&gt;..\\..\\data\\data_1000_chunk_512.json\ncreated_at: 1775575614", "group": "location", "value": 12}, {"id": 24, "label": "IELTS", "title": "entity_id: IELTS\nentity_type: chứng_chỉ_bằng_cấp\ndescription: IELTS là một chứng chỉ tiếng Anh quốc tế và đồng thời là một “cột điểm/tiêu chuẩn đầu vào” trong hệ thống xét tuyển, được dùng làm căn cứ để xét tuyển và tính điểm theo công thức quy đổi. Trong các bảng quy đổi chứng chỉ, IELTS được trình bày như cột giá trị điểm tương ứng với các mức đạt được, phản ánh thang điểm/tiêu chí gồm các mốc điển hình như 5.5, 6.0, 6.5, 7.0, 7.5 và dải 8.0–9.0. IELTS cũng được xác định là một trong những chứng chỉ tiếng Anh quốc tế được chấp nhận, với ngưỡng từ 5.5 trở lên; từ đó, chứng chỉ IELTS có thể được sử dụng để tính ĐX bằng công thức quy đổi dựa trên mức điểm tương ứng trong bảng.&lt;SEP&gt;IELTS là một chứng chỉ tiếng Anh quốc tế nằm trong nhóm các chứng chỉ được công nhận.&lt;SEP&gt;Loại chứng chỉ trong bảng tham chiếu với mức điểm tối thiểu tương ứng bậc 3 và bậc 4.&lt;SEP&gt;Chứng chỉ tiếng Anh quốc tế được nêu trong danh mục kết quả có thể dùng để xét tuyển.\nsource_id: chunk-cecd038c8741ea822ebb8cf98ca0c7b9&lt;SEP&gt;chunk-aa1cba655a0cdd24eb42bb9fa5ed653a&lt;SEP&gt;chunk-f8020318aa29fb36ec7c9ef65f0237a6&lt;SEP&gt;chunk-566c52cd13c2645f71810bac5ed79b9f&lt;SEP&gt;chunk-8fcf479b7acfaef1cec391c974807f4a&lt;SEP&gt;chunk-58d6f1b0acca94c213830a65920089c8&lt;SEP&gt;chunk-c6036d3d21022f6578d122b7d5c2b48c&lt;SEP&gt;chunk-c9d66ec8634b64e3621d5fd4186eefa1&lt;SEP&gt;chunk-905bbcd404a8c35707a1568c43f3a6e5&lt;SEP&gt;chunk-1a3df01c18894f70ba1089c4742063c5&lt;SEP&gt;chunk-03913866a9a5b2938de1653d231afa22\nfile_path: ..\\..\\data\\de_an_2024_chunks.json&lt;SEP&gt;..\\..\\data\\quyet_dinh_1328_chunks.json&lt;SEP&gt;..\\..\\data\\data_1000_chunk_512.json\ncreated_at: 1775555868", "group": "chứng_chỉ_bằng_cấp", "value": 12}, {"id": 25, "label": "Kỳ Thi IOI 2020", "title": "entity_id: Kỳ Thi IOI 2020\nentity_type: event\ndescription: Kỳ thi IOI 2020 được nêu trong văn bản và là một lần thi được tổ chức trực tuyến tại Việt Nam lần đầu tiên trong bối cảnh được mô tả.\nsource_id: chunk-8a7e7d9c2d81d63e9420d386f1660ef9\nfile_path: ..\\..\\data\\data_1000_chunk_512.json\ncreated_at: 1775571503", "group": "event", "value": 12}, {"id": 26, "label": "Kỹ thuật robot", "title": "entity_id: Kỹ thuật robot\nentity_type: chuyên_ngành\ndescription: Ngành được nêu trong bối cảnh GS. Ken Tomiyama trực tiếp giảng dạy cho sinh viên.&lt;SEP&gt;Ngành Kỹ thuật robot là đối tượng của chương trình đào tạo được mô tả trong văn bản.&lt;SEP&gt;Ngành đào tạo của Trường Đại học Công nghệ.\nsource_id: chunk-2bf09b0414a94411876841812c14f029&lt;SEP&gt;chunk-756a0f6c007a8a997fd3c6dec5da8c84&lt;SEP&gt;chunk-94f9971d368da1ee816d9fea1b85fdad\nfile_path: ..\\..\\data\\data_1000_chunk_512.json\ncreated_at: 1775554425", "group": "chuyên_ngành", "value": 12}, {"id": 27, "label": "Kỹ thuật điều khiển và tự động hóa", "title": "entity_id: Kỹ thuật điều khiển và tự động hóa\nentity_type: chuyên_ngành\ndescription: Chuyên ngành “Kỹ thuật điều khiển và tự động hóa” xuất hiện trong bảng dữ liệu kèm các giá trị số.&lt;SEP&gt;Kỹ thuật điều khiển và tự động hóa là tên ngành thuộc mã CN11 trong dữ liệu tuyển sinh.&lt;SEP&gt;“Kỹ thuật điều khiển và tự động hóa” là tên chuyên ngành tương ứng với mã CN11.&lt;SEP&gt;Kỹ thuật điều khiển và tự động hóa là một chuyên ngành kỹ thuật được liệt kê kèm mã số 7520216.&lt;SEP&gt;Ngành đào tạo được nêu bằng tiếng Việt với nội dung tập trung vào kiến thức điều khiển, tự động hóa, thiết kế và lập trình vận hành hệ thống.\nsource_id: chunk-d2a8966b15bf3e84b5310855bf8069c4&lt;SEP&gt;chunk-303b6a6387641139bc31e379d439a83b&lt;SEP&gt;chunk-32d59c864a39cf5de0e85540da8166e6&lt;SEP&gt;chunk-790034372189e4984658cf1ff1537314&lt;SEP&gt;chunk-936588e507c98fa93a7fd25d5d9f0b45\nfile_path: ..\\..\\data\\de_an_2024_chunks.json&lt;SEP&gt;..\\..\\data\\data_1000_chunk_512.json\ncreated_at: 1775499382", "group": "chuyên_ngành", "value": 12}, {"id": 28, "label": "Ngành Kỹ thuật Robot", "title": "entity_id: Ngành Kỹ thuật Robot\nentity_type: chuyên_ngành\ndescription: Ngành Kỹ thuật Robot là ngành học của sinh viên mà người giảng dạy trực tiếp đã giảng dạy cho sinh viên.&lt;SEP&gt;Người học ban đầu chỉ biết sơ qua về ngành Kỹ thuật Robot và sau khóa học được hiểu sâu hơn.\nsource_id: chunk-dc8ed48bf33f9c590e86423b4cffdf9a&lt;SEP&gt;chunk-1cd3785292674e6778a02587a94ca2be\nfile_path: ..\\..\\data\\data_1000_chunk_512.json\ncreated_at: 1775499304", "group": "chuyên_ngành", "value": 12}, {"id": 29, "label": "Nhóm nghiên cứu", "title": "entity_id: Nhóm nghiên cứu\nentity_type: organization\ndescription: Nhóm nghiên cứu là một chủ thể/tập thể tham gia các hoạt động nghiên cứu và triển khai, ứng dụng các thuật toán và mô hình của xử lý ngôn ngữ tự nhiên (NLP) và trí tuệ nhân tạo (AI) để trích xuất thông tin từ dữ liệu. Nhóm được ghi nhận với việc tạo ra một “giải pháp hữu ích” trong văn bản, đồng thời thực hiện nghiên cứu và phát triển theo định hướng hiệu quả sản phẩm, hướng tới công nghệ chế tạo đơn giản và giá thành thấp. Về kết quả công nghệ, Nhóm nghiên cứu thực hiện “Kỹ thuật mã hóa và giải mã video phân tán DVC”, trong đó TS. Đinh Triều Dương làm Trưởng nhóm; nhóm đã nỗ lực để đạt được bằng sáng chế và đã nộp hồ sơ xin cấp bằng độc quyền sáng chế từ năm 2017, đồng thời tiếp tục nộp hồ sơ để cấp bằng cho kỹ thuật nêu trên. Ngoài mảng video phân tán DVC, Nhóm nghiên cứu còn tiến hành nghiên cứu phục vụ dự báo và quản lý chất lượng không khí, hướng tới cung cấp các phát hiện từ bản đồ để hỗ trợ nhà hoạch định chính sách; nhóm tham gia cuộc thi Vệ tinh AI dự đoán chất lượng không khí cùng với Lương Sơn Bá. Nhóm cũng tham gia phát triển sản phẩm DoIt – Hệ thống nâng cao chất lượng văn bản; trong quá trình thực hiện, nhóm gặp khó khăn khi xử lý lượng dữ liệu lớn và sau đó áp dụng công nghệ Big Data để xây dựng nền tảng xử lý dữ liệu, đồng thời tiếp tục nghiên cứu theo hướng thương mại hóa và được ĐHQGHN đầu tư để hoàn thiện sản phẩm đưa ra thị trường. Bên cạnh đó, Nhóm nghiên cứu là đơn vị thực hiện sản phẩm “Hệ thống thu thập và Phân tích quan điểm cộng đồng mạng đối với các sản phẩm thương mại”.  \n\nSong song với các mảng công nghệ AI/Dữ liệu và sản phẩm phần mềm, Nhóm nghiên cứu còn thực hiện hoạt động tự thiết kế, chế tạo và làm chủ công nghệ cho các bộ điều khiển và các thiết bị liên quan, từng bước làm chủ công nghệ trong thiết kế hệ thống tự động hóa. Nhóm cũng triển khai sản phẩm hệ thống cửa tự động lắp cho biệt thự, với 30 sản phẩm được ứng dụng thực tế tại nhiều doanh nghiệp và cơ quan.\nsource_id: chunk-ac222c304ce1d401db154dadc22e3019&lt;SEP&gt;chunk-28aa9c5ec87813f59646f304741f8b90&lt;SEP&gt;chunk-180a70f27830aa2c535ac387c006ce5e&lt;SEP&gt;chunk-25460f125e4e5767b543cb63b0b83793&lt;SEP&gt;chunk-a2074c1ce083e1df89b954fe58b0b262&lt;SEP&gt;chunk-af41db2bb10375a55725ea3beeec211d&lt;SEP&gt;chunk-d3da9c89aed63f30db121c599f75518b&lt;SEP&gt;chunk-085958e76186db53a9503d1998cd7821&lt;SEP&gt;chunk-df5962c40dbbbac51d5a501fb03bd77c&lt;SEP&gt;chunk-5a71385043d0e397346809ab97f587ce&lt;SEP&gt;chunk-9637790a369706e669cc964f994f07dd&lt;SEP&gt;chunk-b9166f3a2cba60ebfa42d6417c42d6c2&lt;SEP&gt;chunk-79f56bb89c14d701a8a574d9804fe8e5&lt;SEP&gt;chunk-4b94413b58eaf74c12c591a1e4a4c833\nfile_path: ..\\..\\data\\data_1000_chunk_512.json\ncreated_at: 1775574745", "group": "organization", "value": 12}, {"id": 30, "label": "Tiến sĩ", "title": "entity_id: Tiến sĩ\nentity_type: chứng_chỉ_bằng_cấp\ndescription: Tiến sĩ là học vị mà Đinh Thị Thái Mai đã tốt nghiệp.&lt;SEP&gt;Trình độ học vị của người học trong chương trình đào tạo, gắn với yêu cầu về luận án và các chuẩn đầu ra.&lt;SEP&gt;Trình độ đào tạo được nêu là Tiến sĩ.&lt;SEP&gt;Bậc học tiếp theo được nêu: làm tiếp tiến sĩ.&lt;SEP&gt;Danh hiệu tốt nghiệp của chương trình đào tạo.&lt;SEP&gt;Tiến sĩ và nhóm tác giả được nêu là đã trải qua những khó khăn trong quá trình nghiên cứu, chủ yếu về chuyên môn.&lt;SEP&gt;Trình độ đào tạo của chương trình là trình độ Tiến sĩ.\nsource_id: chunk-cabb208711ae01b5a85dd08784d65483&lt;SEP&gt;chunk-c3ff6f5c7e622bf3d36c30e095f53d81&lt;SEP&gt;chunk-45910d993033c9d7b48633e1fd8dea6e&lt;SEP&gt;chunk-78987709c1c19276180157c567daf3b2&lt;SEP&gt;chunk-cfd8825c1d0fcae590be6246e2358a4d&lt;SEP&gt;chunk-5752acb17b137bb9ce1e0ebb805ff7ef&lt;SEP&gt;chunk-69ee4edf3b41e68d2f1e85bfcd58c0d1\nfile_path: ..\\..\\data\\data_1000_chunk_512.json\ncreated_at: 1775557869", "group": "chứng_chỉ_bằng_cấp", "value": 12}, {"id": 31, "label": "Bảng quy đổi điểm chứng chỉ tiếng Anh sang thang điểm 10", "title": "entity_id: Bảng quy đổi điểm chứng chỉ tiếng Anh sang thang điểm 10\nentity_type: bảng_dữ_liệu\ndescription: Bảng quy đổi trình độ tiếng Anh theo IELTS và TOEFL iBT sang quy đổi điểm chứng chỉ tiếng Anh quốc tế theo thang điểm 10.\nsource_id: chunk-c6036d3d21022f6578d122b7d5c2b48c\nfile_path: ..\\..\\data\\quyet_dinh_1328_chunks.json\ncreated_at: 1775486017", "group": "bảng_dữ_liệu", "value": 12}, {"id": 32, "label": "Chương trình đào tạo ngành Hệ thống thông tin", "title": "entity_id: Chương trình đào tạo ngành Hệ thống thông tin\nentity_type: chương_trình_đào_tạo\ndescription: Chương trình đào tạo ngành Hệ thống thông tin có mục tiêu chung đào tạo nguồn nhân lực trình độ Tiến sĩ trong lĩnh vực Hệ thống thông tin.&lt;SEP&gt;Chương trình đào tạo ngành Hệ thống thông tin được mô tả trong văn bản, bao gồm tổng số tín chỉ và cấu trúc các khối kiến thức.\nsource_id: chunk-69ee4edf3b41e68d2f1e85bfcd58c0d1&lt;SEP&gt;chunk-02288b9b453d54a3485963566e1eb175\nfile_path: ..\\..\\data\\data_1000_chunk_512.json\ncreated_at: 1775572320", "group": "chương_trình_đào_tạo", "value": 12}, {"id": 33, "label": "Chương trình đào tạo ngành Kỹ thuật robot", "title": "entity_id: Chương trình đào tạo ngành Kỹ thuật robot\nentity_type: chương_trình_đào_tạo\ndescription: Chương trình đào tạo ngành Kỹ thuật robot có tổng số 150 tín chỉ; cơ cấu gồm các khối kiến thức chung, theo lĩnh vực, theo khối ngành, theo nhóm ngành, kiến thức ngành, học phần bắt buộc, tự chọn, học phần bổ trợ, và khối kiến thức thực tập và tốt nghiệp.&lt;SEP&gt;Chương trình đào tạo cho ngành Kỹ thuật robot, mô tả các chuẩn đầu ra về kiến thức (PLO1, PLO2, PLO7, PLO8, PLO9, PLO10) và mức tự chủ/trách nhiệm (PLO11).\nsource_id: chunk-756a0f6c007a8a997fd3c6dec5da8c84&lt;SEP&gt;chunk-d75c34ba76e1b772e079f64337a15e6f\nfile_path: ..\\..\\data\\data_1000_chunk_512.json\ncreated_at: 1775532454", "group": "chương_trình_đào_tạo", "value": 12}, {"id": 34, "label": "Chương trình đào tạo ngành Kỹ thuật điều khiển và tự động hóa", "title": "entity_id: Chương trình đào tạo ngành Kỹ thuật điều khiển và tự động hóa\nentity_type: chương_trình_đào_tạo\ndescription: Chương trình đào tạo ngành Kỹ thuật điều khiển và tự động hóa nêu thông tin về tên ngành, mã số ngành, danh hiệu tốt nghiệp, thời gian đào tạo và mục tiêu trang bị kiến thức.&lt;SEP&gt;Chương trình đào tạo ngành Kỹ thuật điều khiển và tự động hóa với tổng số tín chỉ và cơ cấu khối kiến thức, bao gồm phần bắt buộc, tự chọn, thực tập và đồ án tốt nghiệp.\nsource_id: chunk-936588e507c98fa93a7fd25d5d9f0b45&lt;SEP&gt;chunk-4feae774c6e8bc223f7fed8b043a0e74\nfile_path: ..\\..\\data\\data_1000_chunk_512.json\ncreated_at: 1775535388", "group": "chương_trình_đào_tạo", "value": 12}, {"id": 35, "label": "Hà Nội", "title": "entity_id: Hà Nội\nentity_type: location\ndescription: Hà Nội là một địa danh/thành phố xuất hiện trong nhiều ngữ cảnh dữ liệu hành chính, tuyển dụng, sự kiện và tuyển sinh. Trong các bản ghi địa chỉ và tuyển dụng, Hà Nội thường được dùng như nơi đặt trụ sở chính hoặc nơi làm việc được nêu trong thông tin tuyển dụng (ví dụ các vị trí như “kỹ sư giải pháp”), đồng thời cũng có thể là nơi liên hệ trong các chuyến đi công tác khi hoạt động diễn ra ngoài Hà Nội. Về sự kiện, Hà Nội được ghi nhận là địa điểm tổ chức tọa đàm ngày 10/5; là thành phố diễn ra lễ khai mạc hội thảo và tổ chức lễ trao giải “Giải thưởng Nhân tài Đất Việt 2018”; đồng thời là nơi diễn ra chương trình Vinh Quang Việt Nam 2022, chương trình/hội thảo quốc tế về ô nhiễm không khí ở châu Á, và Hội thảo Quốc tế Việt Nam học lần thứ 5. Hà Nội còn được gắn với Khu Công Nghệ Cao Hòa Lạc thông qua hoạt động đón tiếp đoàn Hiệp hội hợp tác kinh doanh nông nghiệp Hà Lan – Việt Nam (vòng chung kết tại nhà thi đấu Quận Tây Hồ), và là nơi đón đoàn giáo viên, học sinh Trường THPT Chu Văn An.\n\nNgoài vai trò địa điểm sự kiện, Hà Nội xuất hiện trong dữ liệu liên quan đến triển khai hạ tầng và chương trình số, bao gồm hệ thống cung cấp video 360 độ cho các tuyến phố chính và một số tuyến phố cụ thể. Hà Nội cũng liên quan đến hoạt động lắp đặt mạng lưới thiết bị quan trắc bụi mịn PM2.5 và PM10 tại một số địa điểm thuộc trường học và cơ quan. Trên bình diện dữ liệu cá nhân/tổ chức, Hà Nội được ghi nhận là nơi sinh của nhiều cá nhân (NCS Phạm Duy Hưng, Nguyễn Thế Anh Tuấn, Nguyễn Thanh Tuyền, NCS Bùi Thị Hồng Nhung, Vũ Quốc Tuấn và NCS Nguyễn Thị Chăm), đồng thời là địa điểm liên hệ gắn với nơi sinh đối với Phạm Đức Anh và Nguyễn Thanh Tuyền. Hà Nội cũng xuất hiện trong địa chỉ trụ sở và trung tâm nghiên cứu kỹ thuật của NATV gắn với thông tin liên quan đến Lê Thị Thảo, và được nhắc trong bối cảnh tuyển sinh liên quan đến ĐHQGHN, kèm ngữ cảnh “Thảo lên để nhập học”. Dữ liệu bổ sung còn cho thấy có một hoạt động/địa điểm tại Hà Nội diễn ra vào ngày 25/10/2022. Cuối cùng, Hà Nội cũng được nêu như thành phố trong địa chỉ địa điểm thi.\nsource_id: chunk-457ee99614d1d4684d2dd863a6932c1d&lt;SEP&gt;chunk-78d8e093eda2ea379a1198d804f80ae9&lt;SEP&gt;chunk-e08a5096c6786563c55bce3fdb6e565a&lt;SEP&gt;chunk-6b273045c65d329d223bf700c31265d7&lt;SEP&gt;chunk-30c181f4aa2c849a90de3cd3928e5852&lt;SEP&gt;chunk-66ddcb13e30d0dea19db561c8b87de9e&lt;SEP&gt;chunk-cc8e89558018e68f4d35b8fd455cbb17&lt;SEP&gt;chunk-7e9ce05ca09efa2e88367aceb54eed0f&lt;SEP&gt;chunk-8244e636527f361eb3d6735f07279e97&lt;SEP&gt;chunk-ccbcd7e1fecd1d977592a8251dce787c&lt;SEP&gt;chunk-1e34a321b19ea73c53b8b95dcf48dfc1&lt;SEP&gt;chunk-64360a1c12b1ce1666dae520d5548536&lt;SEP&gt;chunk-2dc6425f3af826241828b938d3b9947c&lt;SEP&gt;chunk-dc4b395641f240e29e5c57b2ac3da353&lt;SEP&gt;chunk-ce5f5ac2d4416907a884352e921bd8e5&lt;SEP&gt;chunk-b4b7e36d12b16edcb01a8ed73c16ca4a&lt;SEP&gt;chunk-6c80f45b7d826d78e5a120ab2bd872ce&lt;SEP&gt;chunk-23826e8f8617f176f40c8449e4728fae&lt;SEP&gt;chunk-ad85244e17dd1838db2e3a05f591d33a&lt;SEP&gt;chunk-47ae4ee9c488da7a4c05917517fac30d&lt;SEP&gt;chunk-baeed7d930afb8da1a9ce6b826a4b689&lt;SEP&gt;chunk-a0f7f1df2eeaf12ccbdab1e4bc5381b9&lt;SEP&gt;chunk-d5dee4ccfd2ab40f904f1d46acd0560f&lt;SEP&gt;chunk-f50f1b2f0fb830d3b1a5ad22ae3e32fa&lt;SEP&gt;chunk-8ffb4ca07c75ed6279f07e6f1f8075f2&lt;SEP&gt;chunk-f8079719074c639fa305906157aade98&lt;SEP&gt;chunk-4f5f193176d336bf63709487ca850dc4&lt;SEP&gt;chunk-133d3b263e157081f887dea9cda784d7&lt;SEP&gt;chunk-100322b59594988fb4cc613a7c57ac92&lt;SEP&gt;chunk-50a85792bc2fa7bfeeee52d51ac816e0&lt;SEP&gt;chunk-0326e6d60c2774a63b0622df85116370&lt;SEP&gt;chunk-ca5cb0bee2f935f59219b26328a9a750&lt;SEP&gt;chunk-c997ac125f0050062b709404aca9a79b\nfile_path: ..\\..\\data\\de_an_2024_chunks.json&lt;SEP&gt;..\\..\\data\\quyet_dinh_1328_chunks.json&lt;SEP&gt;..\\..\\data\\data_1000_chunk_512.json\ncreated_at: 1775575619", "group": "location", "value": 12}, {"id": 36, "label": "Khung chương trình đào tạo", "title": "entity_id: Khung chương trình đào tạo\nentity_type: concept\ndescription: Khung chương trình đào tạo là một cấu trúc/khung nội dung trong văn bản được trình bày chủ yếu dưới dạng bảng. Khung chương trình đào tạo thể hiện danh mục các học phần kèm các thuộc tính học thuật và dữ liệu tổ chức như: số thứ tự (STT/Số TT), mã học phần (Mã số học phần/Mã học phần), tên học phần (có thể ghi theo tiếng Việt và tiếng Anh), số tín chỉ, số giờ tín chỉ, mã học phần tiên quyết (học phần tiên quyết/ môn học tiên quyết). Ngoài ra, khung còn phân bổ khối lượng cho từng học phần theo các thành phần học tập như lý thuyết, thực hành và tự học (Lý thuyết/Thực hành/Tự học hoặc tương đương). Trong văn bản, phần mô tả cấu trúc Khung chương trình đào tạo thường được đặt trong một mục cụ thể (ví dụ mục 2) và mô tả thông tin về học phần, mã học phần, số tín chỉ, số giờ tín chỉ và mã học phần tiên quyết, đồng thời có thể được mô tả kèm các khối kiến thức và cách sắp xếp cấu trúc dữ liệu theo bảng. Tài liệu sinh viên cũng được yêu cầu đọc và nghiên cứu kỹ theo hướng dẫn trong chính văn bản mô tả khung này.\nsource_id: chunk-756a0f6c007a8a997fd3c6dec5da8c84&lt;SEP&gt;chunk-8683285277902046c26e55084625aaaf&lt;SEP&gt;chunk-4feae774c6e8bc223f7fed8b043a0e74&lt;SEP&gt;chunk-dab17784adc9dd17150ed2245853d389&lt;SEP&gt;chunk-d7750493bfeca45f98383d1c1b8a00aa&lt;SEP&gt;chunk-154e857b6434dc42f7b9a942f2fd153c&lt;SEP&gt;chunk-32b0adbcd0807bb39304712db201c937&lt;SEP&gt;chunk-02288b9b453d54a3485963566e1eb175\nfile_path: ..\\..\\data\\data_1000_chunk_512.json\ncreated_at: 1775572341", "group": "concept", "value": 13}, {"id": 37, "label": "Lĩnh vực máy tính và công nghệ thông tin", "title": "entity_id: Lĩnh vực máy tính và công nghệ thông tin\nentity_type: chuyên_ngành\ndescription: Lĩnh vực bao gồm các ngành liên quan đến máy tính và công nghệ thông tin.\nsource_id: chunk-a84e71dd8daad2198c69b1cc677aaf37\nfile_path: ..\\..\\data\\de_an_2024_chunks.json\ncreated_at: 1775484003", "group": "chuyên_ngành", "value": 12}, {"id": 38, "label": "Thảo", "title": "entity_id: Thảo\nentity_type: person\ndescription: Thảo là người được nhắc đến trong câu chuyện, có hoàn cảnh gia đình và cung cấp thông tin về việc chuẩn bị kinh phí trước ngày nhập học.&lt;SEP&gt;Thảo là người chia sẻ trải nghiệm về cách học khi học cấp 3 và sự thay đổi khi lên đại học, đặc biệt là tự học và tự nghiên cứu.\nsource_id: chunk-47ae4ee9c488da7a4c05917517fac30d&lt;SEP&gt;chunk-877617269e14fe6f38043b814b31a837\nfile_path: ..\\..\\data\\data_1000_chunk_512.json\ncreated_at: 1775551586", "group": "person", "value": 12}, {"id": 39, "label": "Toán Ứng dụng", "title": "entity_id: Toán Ứng dụng\nentity_type: chuyên_ngành\ndescription: Toán ứng dụng trong công nghệ chế tạo robot là nội dung người học được hiểu thêm sau khóa học và quá trình tự học.\nsource_id: chunk-1cd3785292674e6778a02587a94ca2be\nfile_path: ..\\..\\data\\data_1000_chunk_512.json\ncreated_at: 1775499305", "group": "chuyên_ngành", "value": 12}, {"id": 40, "label": "Học Đại học", "title": "entity_id: Học Đại học\nentity_type: event\ndescription: Học Đại học được mô tả là giai đoạn cần chủ động hơn, đặc biệt trong tự học và tự nghiên cứu giáo trình.\nsource_id: chunk-877617269e14fe6f38043b814b31a837\nfile_path: ..\\..\\data\\data_1000_chunk_512.json\ncreated_at: 1775551589", "group": "event", "value": 12}, {"id": 41, "label": "STT", "title": "entity_id: STT\nentity_type: kháiniệm\ndescription: STT là cột hoặc trường chỉ số thứ tự trong bảng, thường được hiển thị/ghi nhãn dưới dạng “STT” để đánh số lần lượt các mục. Về bản chất, STT biểu thị “số thứ tự” cho từng phần tử hoặc từng hạng mục trong danh sách; do đó, trong dữ liệu, STT có thể được dùng như một trường/nhãn thứ tự để ghi nhận thứ tự và phục vụ quy đổi, đánh số lại. Khái niệm STT xuất hiện trong nhiều ngữ cảnh quản lý và biểu mẫu khác nhau như các bảng danh sách sinh viên và các bảng danh sách tương tự (ví dụ đánh số theo thứ tự cho từng công trình trong danh sách), trong các khung chương trình đào tạo dưới dạng “Cột STT (số thứ tự)”, đồng thời được xem là trường dữ liệu (số thứ tự) của khung chương trình. STT cũng xuất hiện như cột/thông tin thứ tự trong bảng thông tin họ và tên/năm tốt nghiệp/học vị, trong danh sách các lớp học phần (đặc biệt như cột dùng để đánh số thứ tự), trong bảng chỉ tiêu tuyển sinh (mục thống kê theo thứ tự), trong bảng danh sách cơ sở cấp chứng chỉ (với vai trò trường “STT”), và trong các bảng liệt kê mã lớp học phần kèm thông tin liên quan, cũng như các bảng khung chương trình nơi STT được dùng như chỉ số thứ tự.\nsource_id: chunk-0ebbeb1004b0f84158b918799ea6ef56&lt;SEP&gt;chunk-3b06b29a04a5d42eb96e6f87612abcca&lt;SEP&gt;chunk-c6036d3d21022f6578d122b7d5c2b48c&lt;SEP&gt;chunk-a02be7de6f2e2559d4bf55c351896991&lt;SEP&gt;chunk-cc8e89558018e68f4d35b8fd455cbb17&lt;SEP&gt;chunk-8244e636527f361eb3d6735f07279e97&lt;SEP&gt;chunk-17ea55146138006513bd1e260b8172c4&lt;SEP&gt;chunk-936c9af01e1a35b0ef4691b7df324198&lt;SEP&gt;chunk-705ef0131397538af3b6eb26607486e7&lt;SEP&gt;chunk-cb0d1945eac3c636a61416d43a91be30&lt;SEP&gt;chunk-154e857b6434dc42f7b9a942f2fd153c&lt;SEP&gt;chunk-7f539bc03df19955b7ad996a7db25089&lt;SEP&gt;chunk-905bbcd404a8c35707a1568c43f3a6e5&lt;SEP&gt;chunk-32b0adbcd0807bb39304712db201c937&lt;SEP&gt;chunk-e5c7267a515e6d3a98aa0276f1c95374\nfile_path: ..\\..\\data\\de_an_2024_chunks.json&lt;SEP&gt;..\\..\\data\\quyet_dinh_1328_chunks.json&lt;SEP&gt;..\\..\\data\\data_1000_chunk_512.json\ncreated_at: 1775558563", "group": "kháiniệm", "value": 12}, {"id": 42, "label": "Tự học", "title": "entity_id: Tự học\nentity_type: content\ndescription: Tự học là hoạt động học tập chủ động do người học thực hiện trong môi trường đại học nhằm mở rộng và củng cố kiến thức sau khóa học, được nhấn mạnh như một yêu cầu quan trọng. Đối với bối cảnh đào tạo được mô tả, tự học còn nhằm giúp người học hiểu thêm về toán ứng dụng trong công nghệ chế tạo robot. Trong khung chương trình đào tạo, Tự học được thể hiện thông qua các cột/bảng phân bổ phần tự học của từng học phần và phân bổ thời lượng theo hướng tự học; đồng thời có trường dữ liệu (dữ liệu/khung dữ liệu) ghi nhận phần tự học trong khung phân bổ cho học phần và/hoặc thể hiện số giờ tự học cho mỗi học phần. Khía cạnh năng lực cũng được nêu: khả năng tự học là năng lực được xác định cho sinh viên sau khi tốt nghiệp.\nsource_id: chunk-1cd3785292674e6778a02587a94ca2be&lt;SEP&gt;chunk-756a0f6c007a8a997fd3c6dec5da8c84&lt;SEP&gt;chunk-4feae774c6e8bc223f7fed8b043a0e74&lt;SEP&gt;chunk-9c12513ae4e1a7012aa6e8e12e131c66&lt;SEP&gt;chunk-154e857b6434dc42f7b9a942f2fd153c&lt;SEP&gt;chunk-877617269e14fe6f38043b814b31a837&lt;SEP&gt;chunk-32b0adbcd0807bb39304712db201c937&lt;SEP&gt;chunk-02288b9b453d54a3485963566e1eb175\nfile_path: ..\\..\\data\\data_1000_chunk_512.json\ncreated_at: 1775572354", "group": "content", "value": 12}, {"id": 43, "label": "Sinh viên ngành Công nghệ Kỹ thuật Xây dựng", "title": "entity_id: Sinh viên ngành Công nghệ Kỹ thuật Xây dựng\nentity_type: chuyên_ngành\ndescription: Sinh viên ngành Công nghệ Kỹ thuật xây dựng có khả năng tham mưu tư vấn và thực hiện nhiệm vụ của kỹ sư trong các lĩnh vực xây dựng dân dụng và công nghiệp, giao thông và cơ sở hạ tầng, đáp ứng yêu cầu cao về nghiên cứu và ứng dụng của xã hội.\nsource_id: chunk-9c12513ae4e1a7012aa6e8e12e131c66\nfile_path: ..\\..\\data\\data_1000_chunk_512.json\ncreated_at: 1775538291", "group": "chuyên_ngành", "value": 12}]);

trò điều phối/hệ thống của ĐHQGHN đối với trường. Trong hợp tác đào tạo và kế hoạch triển khai (kể cả bối cảnh tuyển sinh), Trường Đại học Công nghệ tiếp tục được gắn với ĐHQGHN, với ĐHQGHN đóng vai trò đơn vị liên hệ/đơn vị đi kèm trong các hoạt động thực hiện. Ngoài ra, mô tả thứ hai nhấn mạnh rằng Trường Đại học Công nghệ hoạt động theo các quy định và căn cứ trong khuôn khổ Đại học Quốc gia Hà Nội.\nkeywords: căn cứ kế hoạch,cơ sở quản lý,cấu trúc quản lý,gắn kết,hệ thống,hệ thống quản lý,hỗ trợ,liên kết,liên kết công bố,liên kết tên gọi,liên kết tổ chức,liên kết đơn vị trực thuộc,liên quan quản lý,liên quan tổ chức,nhận công văn,phạm vi liên quan,phạm vi tham gia,phối hợp,quản lý,sinh viên,thuộc,thuộc hệ thống,thuộc hệ thống quản lý,thuộc quản lý,thuộc về,thông báo,trường thành viên,trực thuộc,tư cách thành viên,tổ chức sự kiện,đơn vị chủ quản,đơn vị gắn kết,đơn vị thành viên\nsource_id: chunk-457ee99614d1d4684d2dd863a6932c1d&lt;SEP&gt;chunk-f8020318aa29fb36ec7c9ef65f0237a6&lt;SEP&gt;chunk-3c8df3ff7c17323598715fdec1e52e0e&lt;SEP&gt;chunk-bc09250c04495dee022491dc4fe04f47&lt;SEP&gt;chunk-286b577c73681bccb19daefed6cccaa1&lt;SEP&gt;chunk-77d7917ef2e7d9cd9a81dd72330ed7f1&lt;SEP&gt;chunk-94a7a176284b917cf1c262cc485c80ec&lt;SEP&gt;chunk-75953e090f489e714f8f24eb0bf5b4e3&lt;SEP&gt;chunk-662197e00be46e2e8d749cdd970a9093&lt;SEP&gt;chunk-e6fa4beaa9deb44835ebb9159bd04ee9&lt;SEP&gt;chunk-9d0302b0d28ec502bb1eea46ac7c2bf1&lt;SEP&gt;chunk-d2ed99677278ffd6489c8c46a6ec4a24&lt;SEP&gt;chunk-f79a2771bc2b5e7f0f9f433e297cd567&lt;SEP&gt;chunk-fb0ff228988af3daabfeb261cb40ae7d&lt;SEP&gt;chunk-faeb5a3af47a021da065efc9e55926d0&lt;SEP&gt;chunk-b1d594998c1682c2568840c15e1bd189&lt;SEP&gt;chunk-d371d9f75dc8e7e3f9021f498bb2d181&lt;SEP&gt;chunk-135c0c39a9b799eb3239fc99ede592fa&lt;SEP&gt;chunk-5e0d5eb2b63e933c911e3c3ff608faa2&lt;SEP&gt;chunk-29e8e52f6e4122b32c6998d8257ddf7d&lt;SEP&gt;chunk-f53102678d0bf26081c91acd44b82c19&lt;SEP&gt;chunk-e60047090c91b1648fd6331869ca5da0&lt;SEP&gt;chunk-586b6f06d2 _chunk_512.json\ncreated_at: 1775557918", "label": "trình độ đào tạo"}, {"from": 29, "to": 18, "title": "weight: 1.0\ndescription: ĐHQGHN tiếp tục đầu tư cho nhóm nghiên cứu để hoàn thiện sản phẩm.\nkeywords: hỗ trợ,đầu tư\nsource_id: chunk-5a71385043d0e397346809ab97f587ce\nfile_path: ..\\..\\data\\data_1000_chunk_512.json\ncreated_at: 1775547958", "label": "hỗ trợ,đầu tư"}, {"from": 29, "to": 1, "title": "weight: 1.0\ndescription: Nhóm nghiên cứu áp dụng trí tuệ nhân tạo trong quá trình xử lý dữ liệu.\nkeywords: công nghệ,hỗ trợ phân tích\nsource_id: chunk-ac222c304ce1d401db154dadc22e3019\nfile_path: ..\\..\\data\\data_1000_chunk_512.json\ncreated_at: 1775495280", "label": "công nghệ,hỗ trợ phân tích"}, {"from": 16, "to": 18, "title": "weight: 1.0\ndescription: ĐHQGHN tiếp tục đứng ở vị trí số 1 Việt Nam theo bảng xếp hạng Webometrics.\nkeywords: vị trí,xếp hạng\nsource_id: chunk-c6a31139ccee6473616b53b099c85aa9\nfile_path: ..\\..\\data\\data_1000_chunk_512.json\ncreated_at: 1775559389", "label": "vị trí,xếp hạng"}, {"from": 16, "to": 1, "title": "weight: 1.0\ndescription: Việt Nam được mô tả là bắt đầu có sự quan tâm về AI và có công bố về trí tuệ nhân tạo trên các tạp chí quốc tế.\nkeywords: công bố,quan tâm\nsource_id: chunk-9d676323292c7d78dcf48144f276965e\nfile_path: ..\\..\\data\\data_1000_chunk_512.json\ncreated_at: 1775552663", "label": "công bố,quan tâm"}, {"from": 16, "to": 7, "title": "weight: 1.0\ndescription: GS.TS Chử Đức Trình chia sẻ về lợi thế của Việt Nam trong lĩnh vực chip bán dẫn.\nkeywords: chia sẻ,đánh giá lợi thế\nsource_id: chunk-6c479722733a1c425f4db21c07b91c1a\nfile_path: ..\\..\\data\\data_1000_chunk_512.json\ncreated_at: 1775574656", "label": "chia sẻ,đánh giá lợi thế"}, {"from": 35, "to": 23, "title": "weight: 1.0\ndescription: Cầu Giấy và Hà Nội xuất hiện liên kết trong địa chỉ trụ sở chính.\nkeywords: vị trí,địa giới\nsource_id: chunk-457ee99614d1d4684d2dd863a6932c1d\nfile_path: ..\\..\\data\\de_an_2024_chunks.json\ncreated_at: 17754 c gia Hà Nội trong văn bản.\nkeywords: viết tắt,định danh,đồng danh,đồng nhất tổ chức\nsource_id: chunk-9d0302b0d28ec502bb1eea46ac7c2bf1&lt;SEP&gt;chunk-77f8340b268fdde348a0c7b012b1829f&lt;SEP&gt;chunk-f8ee6716d302aa15eae4352b3165f84b\nfile_path: ..\\..\\data\\data_1000_chunk_512.json\ncreated_at: 1775560026", "label": "viết tắt,định danh,đồng danh,đồng nhất tổ chức"}, {"from": 18, "to": 13, "title": "weight: 1.0\ndescription: ĐHQGHN cam kết áp dụng chính sách tốt để thu hút và đầu tư vun cao các nhóm nhà khoa học mũi nhọn tại nhà trường.\nkeywords: chính sách,thu hút đầu tư\nsource_id: chunk-35900977eb9299da11a0394943cf9257\nfile_path: ..\\..\\data\\data_1000_chunk_512.json\ncreated_at: 1775528536", "label": "chính sách,thu hút đầu tư"}, {"from": 42, "to": 39, "title": "weight: 1.0\ndescription: Tự học sau khóa học giúp người học hiểu thêm về toán ứng dụng trong công nghệ chế tạo robot.\nkeywords: kiến thức,tự bồi dưỡng\nsource_id: chunk-1cd3785292674e6778a02587a94ca2be\nfile_path: ..\\..\\data\\data_1000_chunk_512.json\ncreated_at: 1775499341", "label": "kiến thức,tự bồi dưỡng"}, {"from": 42, "to": 43, "title": "weight: 1.0\ndescription: Sinh viên sau tốt nghiệp có khả năng tự học.\nkeywords: học tập,năng lực phát triển\nsource_id: chunk-9c12513ae4e1a7012aa6e8e12e131c66\nfile_path: ..\\..\\data\\data_1000_chunk_512.json\ncreated_at: 1775538378", "label": "học tập,năng lực phát triển"}, {"from": 42, "to": 40, "title": "weight: 1.0\ndescription: Trong học đại học, tự học là hoạt động được nhấn mạnh.\nkeywords: phương pháp,tự chủ\nsource_id: chunk-877617269e14fe6f38043b814b31a837\nfile_path: ..\\..\\data\\data_1000_chunk_512.json\ncreated_at: 1775551717", "label": "phương pháp,tự chủ"}, {"from": 13, "to": 6, "title": "weight: 1.0\ndescription: Nhà trường phối hợp chặt chẽ với doanh nghiệp và lồng ghép kỹ năng mềm, kỹ năng trong cuộc sống vào các môn học.\nkeywords: phối hợp,tổ chức đào tạo\nsource_id: chunk-e95474548797126e22f1ff419766e65f\nfile_path: ..\\..\\data\\data_1000_chunk_512.json\ncreated_at: 1775530190", "label": "phối hợp,tổ chức đào tạo"}, {"from": 43, "to": 3, "title": "weight: 1.0\ndescription: Văn bản mô tả sinh viên ngành Công nghệ Kỹ thuật xây dựng có khả năng đảm nhiệm các việc làm sau khi tốt nghiệp.\nkeywords: năng lực nghề nghiệp,đảm nhiệm sau tốt nghiệp\nsource_id: chunk-9c12513ae4e1a7012aa6e8e12e131c66\nfile_path: ..\\..\\data\\data_1000_chunk_512.json\ncreated_at: 1775538349", "label": "năng lực nghề nghiệp,đảm nhiệm sau tốt nghiệp"}, {"from": 28, "to": 39, "title": "weight: 1.0\ndescription: Sau khóa học và tự học, người học hiểu thêm về toán ứng dụng trong công nghệ chế tạo robot gắn với ngành Kỹ thuật Robot.\nkeywords: liên quan học tập,mở rộng kiến thức\nsource_id: chunk-1cd3785292674e6778a02587a94ca2be\nfile_path: ..\\..\\data\\data_1000_chunk_512.json\ncreated_at: 1775499349", "label": "liên quan học tập,mở rộng kiến thức"}, {"from": 22, "to": 6, "title": "weight: 1.0\ndescription: Văn bản nêu Công nghệ thông tin là nền tảng kiến thức/thế mạnh của nhà trường được đưa vào cơ sở xây dựng chương trình.\nkeywords: nền tảng kiến thức,thế mạnh nhà trường\nsource_id: chunk-4b7fbb9536d4e17a52df1a87aa1e10a9\nfile_path: ..\\..\\data\\data_1000_chunk_512.json\ncreated_at: 1775531403", "label": "nền tảng kiến thức,thế mạnh nhà trường"}, {"from": 40, "to": 38, "title": "weight: 1.0\ndescription: Thảo cho biết khi lên đại học phải chủ động hơn trong việc học.\nkeywords: chủ động,yêu cầu\nsource_id: chunk-877617269e14fe6f38043b814b31a837\nfile_path: ..\\..\\data\\data_1000_chunk_512.json\ncreated_at: 1775551708", "label": "chủ động,yêu cầu"}]);
