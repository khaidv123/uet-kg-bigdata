  <script>
    const nodes = new vis.DataSet([{"id": 1, "label": "Trí tuệ nhân tạo", "title": "entity_id: Trí tuệ nhân tạo\nentity_type: chuyên_ngành\ndescription: Trí tuệ nhân tạo là một khái niệm/chuyên ngành được ghi nhận trong dữ liệu học thuật, gắn với mã CN12 và liên hệ với các tổ hợp A00, A01, D01 cùng các giá trị số kèm theo. Trong các bảng dữ liệu đào tạo đại học, Trí tuệ nhân tạo được thể hiện đồng thời như một ngành học liên kết với mã ngành 7480107 và các thông tin/“quyết định” đi kèm; trong bối cảnh chương trình đào tạo, ngành này còn được mô tả như một mảng kiến thức thuộc chương trình đào tạo đại học. Ở góc độ ứng dụng, Trí tuệ nhân tạo còn được nhắc đến như một công nghệ được áp dụng trong quá trình xử lý và trích xuất thông tin. Về mặt chủ đề học thuật, Trí tuệ nhân tạo xuất hiện trong hội nghị với nội dung được đưa vào ba phiên thảo luận và được mô tả là một trong các lĩnh vực then chốt trong “Cuộc cách mạng công nghiệp lần thứ 4”.\n\nTrí tuệ nhân tạo cũng được xem là lĩnh vực có tác động lớn và sâu sắc đến đời sống hàng ngày, tham gia giải quyết các thách thức xã hội, đồng thời có ứng dụng trong y học và nhiều lĩnh vực khác. Về yêu cầu nền tảng, Trí tuệ nhân tạo liên quan đến kiến thức nền tảng ngành KHMT (được nêu trong CĐR 5) và được coi là lĩnh vực cần được xử lý trên cơ sở nền tảng toán học trong bối cảnh các ứng dụng công nghệ. Ngoài ra, Trí tuệ nhân tạo là đối tượng công bố trên các tạp chí quốc tế như ISI và Scopus và là lĩnh vực có đào tạo tại nhiều khoa. Trí tuệ nhân tạo cũng được mô tả là một ngành đào tạo được mở mới, mang tính trách nhiệm xã hội.\nsource_id: chunk-d2a8966b15bf3e84b5310855bf8069c4&lt;SEP&gt;chunk-560aa8f7145b812a0a3f0961eae4bed8&lt;SEP&gt;chunk-32d59c864a39cf5de0e85540da8166e6&lt;SEP&gt;chunk-a84e71dd8daad2198c69b1cc677aaf37&lt;SEP&gt;chunk-73f0943bc53f57e4e794f7b328d9c011&lt;SEP&gt;chunk-ac222c304ce1d401db154dadc22e3019&lt;SEP&gt;chunk-c93f312ce61c87b410d91587c89f40b7&lt;SEP&gt;chunk-4b7fbb9536d4e17a52df1a87aa1e10a9&lt;SEP&gt;chunk-0926809b5854b3a58e3db38bdad979c7&lt;SEP&gt;chunk-1187c9f9ab68a43bc0377190f37254e6&lt;SEP&gt;chunk-41b19a9281237237779b36fc4659371b&lt;SEP&gt;chunk-9d676323292c7d78dcf48144f276965e&lt;SEP&gt;chunk-653c3e3e8802c8487fad608f9741926c\nfile_path: ..\\..\\data\\de_an_2024_chunks.json&lt;SEP&gt;..\\..\\data\\data_1000_chunk_512.json\ncreated_at: 1775555115", "group": "seed", "value": 17}, {"id": 2, "label": "Trường Đại học Công nghệ", "title": "entity_id: Trường Đại học Công nghệ\nentity_type: đơn_vị_trực_thuộc\ndescription: Trường Đại học Công nghệ (UET-VNU) là cơ sở giáo dục trực thuộc Đại học Quốc gia Hà Nội (ĐHQGHN), do ĐHQGHN quản lý và đồng thời là đơn vị thành viên trong hệ thống ĐHQGHN. Nhà trường có nhiệm vụ tổ chức, triển khai và phối hợp các hoạt động học thuật; điều hành công tác quản lý học vụ theo từng giai đoạn. Trong tuyển sinh, Trường công bố thông tin và thực hiện tuyển sinh theo thời gian, mẫu văn bản của ĐHQGHN; áp dụng cả xét tuyển và tuyển thẳng, bảo đảm tuân thủ yêu cầu/hồ sơ theo quy định. Các mô tả ghi nhận Trường tham gia tuyển sinh đại học chính quy năm 2017 và triển khai theo các giai đoạn năm 2018 và 2021 với các nhóm ngành như Công nghệ thông tin và Khoa học máy tính/Công nghệ kỹ thuật điện tử, truyền thông; đồng thời tuyển sinh–đón các đối tượng đỗ từ kỳ thi Đánh giá năng lực của ĐHQGHN năm 2023, kèm hoạt động tư vấn tuyển sinh và đón sinh viên. Ngoài đại học chính quy, Trường còn được nêu có tuyển dụng viên chức hành chính/kỹ thuật và xét tuyển năm 2019 theo kết quả SAT/A-Level/chứng chỉ tiếng Anh quốc tế. Trường áp dụng cơ chế miễn/giảm học phí trong thời gian đào tạo chính thức, có hỗ trợ chi phí học tập theo tiêu chí/điều kiện nộp hồ sơ để hưởng, và ban hành quy định tổ chức cấp học bổng.\n\nVề đào tạo sau đại học, Trường tổ chức tuyển sinh với tổng 1.120 chỉ tiêu cho 13 ngành/chương trình, đón tân học viên cao học và nghiên cứu sinh; duy trì các hoạt động học thuật thường niên như lễ bảo vệ luận án tiến sĩ và sinh viên nghiên cứu khoa học (có đề cập hoạt động cho học viên cao học) cùng các sự kiện liên quan đến lễ khai trương Xưởng cơ khí – Tự động hóa. Trường được mô tả tổ chức tuyển sinh sau đại học hai đợt trong năm 2020, điều hành xác nhận hồ sơ dự thi, tổ chức hội nghị/phiên họp, công bố kết quả và tổ chức lễ nghi/sự kiện tổng kết hằng năm. Trường tham gia truyền thông tuyển sinh–hướng nghiệp (ví dụ Ngày hội tư vấn tuyển sinh–hướng nghiệp 2019 và “Tuần lễ hội nhập sinh viên”), đồng thời triển khai biện pháp phòng dịch COVID-19 tại cơ sở học tập. Trường có học bổng Toshiba cho học viên cao học và nghiên cứu sinh (03 học viên cao học và 01 nghiên cứu sinh), gồm trường hợp nhận học bổng từ năm thứ nhất; đồng thời được nêu là đơn vị hướng dẫn tham gia BHYT bắt buộc cho sinh viên năm 2018 và tổ chức hoạt động công đoàn giai đoạn 2016–2021. Ngoài ra, Trường được mô tả là nơi diễn ra hoạt động xét công nhận đạt tiêu chuẩn chức danh GS, PGS năm 2024 trong bối cảnh có Hội đồng Giáo sư cơ sở trực thuộc.\n\nTrong quản trị và hoạt động nội bộ, các mô tả đề cập Hiệu trưởng với các tên như GS. TS Chử Đức Trình, PGS.TS. NGƯT Hà Quang Thụy và cũng có nhắc “Đồng chí Nguyễn Việt Hà” trong chức vụ Hiệu trưởng; Phạm Bảo Sơn được mô tả từng giữ chức vụ Phó Hiệu trưởng trước khi được bổ nhiệm Phó Giám đốc ĐHQGHN. Trường có các đơn vị trực thuộc như Khoa Công nghệ Xây dựng – Giao thông và Khoa Công nghệ nông nghiệp; tham gia hệ thống ĐHQGHN trong nhiệm vụ đánh giá/công nhận nghiên cứu sinh và cán bộ hướng dẫn, đồng thời trao các giải thưởng như Giải thưởng sinh viên nghiên cứu khoa học cấp ĐHQGHN năm 2017 và Giải thưởng KOVA lần thứ 17 năm 2019. Trường tổ chức các hoạt động cộng đồng và học thuật như ngày hội hiến máu “Sắc màu hy vọng”, hoạt động việc làm công nghệ, chương trình đánh giá chất lượng đồng cấp; đón đoàn giáo dục–đào tạo và nghiên cứu khoa học kèm triển lãm cho lễ kỷ niệm ĐHQGHN, gặp Hội Cựu chiến binh, và tổ chức tri ân ngày Nhà giáo Việt Nam 20/11. Trường cũng được mô tả ban hành/thực hiện căn cứ, thông báo liên quan đến việc tuyển dụng viên chức hành chính, kỹ thuật năm 2023.\n\nVề hợp tác nghiên cứu và đối ngoại, Trường được mô tả có quan hệ và phối hợp với nhiều đối tác trong và ngoài nước, đồng thời tổ chức/phối hợp các lễ ký kết thỏa thuận hợp tác. Cụ thể, Trường phối hợp với Trường Đại học Công nghệ Chiba (Nhật Bản) và tham chiếu JAIST Fair 2018; làm việc với Amrit Vishwa Vidyapeetham và JST; hợp tác toàn diện với Đại học Clermont Auvergne; ký thỏa thuận với Viện Nghiên cứu sáng chế và khai thước; hợp tác với Belarus trong công nghệ hàng không vũ trụ; và hợp tác ba bên với Trường ĐH Công nghệ Sydney và ĐHQGHN. Trường phối hợp đào tạo và nghiên cứu với Samsung Việt Nam từ năm 2014, tiếp tục với Samsung Display Việt Nam (SDV) cho đào tạo sau đại học; tiếp nhận chứng từ/học bổng từ hợp tác với Trường Đại học Công nghệ Chiba. Trường tham gia các dự án/hoạt động như VNU-SMM, đặt phòng thí nghiệm của các hãng công nghệ và hoạt động gắn với lễ trao học bổng năm 2022; được mô tả là “điểm đầu cầu Việt Nam” trong khai mạc, ký kết và tiếp nhận công văn từ ĐHQGHN liên quan đến học bổng Shinnyo. Trường cũng hợp tác với Boeing để hỗ trợ đào tạo, kết nối và tạo cơ hội cho sinh viên “thử sức”, đồng thời tiếp nhận và làm việc với đoàn trường đối tác nhằm thúc đẩy hợp tác và ký kết nghiên cứu, phát triển sản phẩm.\n\nVề định hướng phát triển và tự chủ đại học, Trường được mô tả hướng tới chất lượng cao và chuẩn bị giai đoạn mới, gồm kế hoạch di chuyển tới Hòa Lạc và xây dựng phương án tự chủ kèm phương án đào tạo; thúc đẩy cải tiến chương trình giảng dạy và phát triển các nhóm nghiên cứu (ví dụ nhóm nghiên cứu Khoa Công nghệ thông tin thực hiện sản phẩm “DoIt”). Các mô tả còn ghi nhận thành tích như đội tuyển Toán học đạt top 5 tại kỳ thi Olympic Toán học sinh viên toàn quốc năm 2024 và vai trò đăng cai tổ chức Hội thảo quốc tế về tích hợp hệ thống tại Quảng Ninh; đồng thời Trường tổ chức/đăng cai nhiều hội thảo, tọa đàm để điều chỉnh cơ cấu và nội dung chương trình, chiến lược dạy và học và quy hoạch phát triển đội ngũ. Trường được mô tả tổ chức lễ khai mạc đánh giá chất lượng đồng cấp chương trình đào tạo thạc sĩ chuyên ngành Kỹ thuật phần mềm; tổ chức sự kiện liên quan đến lễ khai trương Xưởng cơ khí – Tự động hóa; tổ chức Hội nghị tài chính năm 2019; và quản lý/thuộc tổ chức của Phòng Thí nghiệm Trọng điểm Công nghệ Mico-Nano (VMINA LAB). Trường cũng được nêu là nơi các thành viên BlueSam theo học và là đơn vị cung cấp thông tin chi tiết cho người học trong phạm vi hệ thống ĐHQGHN theo các ngữ cảnh văn bản liên quan, đồng thời có đề cập các nhà sáng lập startup của ĐHQGHN cho biết họ là cựu sinh viên (trong đó có cựu sinh viên đã học ngành Công nghệ thông tin tại Trường).\nsource_id: chunk-457ee99614d1d4684d2dd863a6932c1d&lt;SEP&gt;chunk-f8020318aa29fb36ec7c9ef65f0237a6&lt;SEP&gt;chunk-9ab2ef792aae97cabbe765a0b8f13dec&lt;SEP&gt;chunk-eea7f3f0a77966b3554bf342903e05eb&lt;SEP&gt;chunk-d154adbc9cebe63edec7b57cc0fb6a31&lt;SEP&gt;chunk-47941a0870aa6c0386e9b883e1b2ae2a&lt;SEP&gt;chunk-1827c42b382a75d980b95a9e2a91b882&lt;SEP&gt;chunk-2bf09b0414a94411876841812c14f029&lt;SEP&gt;chunk-4bd09eabb5d4f8f2393b46c5439befb0&lt;SEP&gt;chunk-3d4aef5003e1aee160cdc619a29f60ef&lt;SEP&gt;chunk-30f1f5ef1a97261c29fe2d1041ddb840&lt;SEP&gt;chunk-99b97336c8e19af00c124ea12945c226&lt;SEP&gt;chunk-3c8df3ff7c17323598715fdec1e52e0e&lt;SEP&gt;chunk-c7900e55a1878456792f2893a2b9a649&lt;SEP&gt;chunk-a8bcb9373a60a7f6c24b0e489aa080be&lt;SEP&gt;chunk-bc09250c04495dee022491dc4fe04f47&lt;SEP&gt;chunk-286b577c73681bccb19daefed6cccaa1&lt;SEP&gt;chunk-a81f7ef1a5397ec0a9e3adbe0d6986ec&lt;SEP&gt;chunk-2567bb2d2b66f6693dfdd85b11a0680e&lt;SEP&gt;chunk-4d615de6e6f01f3af3a25a5b99d35f3b&lt;SEP&gt;chunk-ec91545ddc9cc68506032e4470a8a9f8&lt;SEP&gt;chunk-68ff5a83b0af56203acad8be9bb71769&lt;SEP&gt;chunk-bbe290a15692091f354ffb5385d8273d&lt;SEP&gt;chunk-50cc7ab4caa4a5eda9e4f0ed12324a36&lt;SEP&gt;chunk-d17d9b452a0cfe0067feee3e8118fdf1&lt;SEP&gt;chunk-de1cdbb0ff8a42f5a738c9adb5bc754a&lt;SE \\data\\de_an_2024_chunks.json&lt;SEP&gt;..\\..\\data\\data_1000_chunk_512.json\ncreated_at: 1775576440", "group": "seed", "value": 24}, {"id": 3, "label": "Việc làm sau tốt nghiệp", "title": "entity_id: Việc làm sau tốt nghiệp\nentity_type: kháiniệm\ndescription: Việc làm mà học viên có thể đảm nhiệm sau khi tốt nghiệp gắn với năng lực tham mưu tư vấn và năng lực thực hiện nhiệm vụ kỹ sư trong các lĩnh vực xây dựng, giao thông và cơ sở hạ tầng.\nsource_id: chunk-9c12513ae4e1a7012aa6e8e12e131c66\nfile_path: ..\\..\\data\\data_1000_chunk_512.json\ncreated_at: 1775538291", "group": "seed", "value": 12}, {"id": 4, "label": "Bảng Dữ liệu", "title": "entity_id: Bảng Dữ liệu\nentity_type: bảng_dữ_liệu\ndescription: Bảng dữ liệu chứa nhiều hàng tương ứng với các chuyên ngành và nhiều cột giá trị số, có các dấu ngăn cách bằng ký hiệu “|”.\nsource_id: chunk-d2a8966b15bf3e84b5310855bf8069c4\nfile_path: ..\\..\\data\\de_an_2024_chunks.json\ncreated_at: 1775482715", "group": "bảng_dữ_liệu", "value": 13}, {"id": 5, "label": "CN12", "title": "entity_id: CN12\nentity_type: khái_niệm\ndescription: Ký hiệu nhóm ngành (CN12) áp dụng ngưỡng điểm xét tuyển ĐGNL theo quy định và xuất hiện trong nguyên tắc ưu tiên 2.&lt;SEP&gt;CN12 là mã ngành thuộc chương trình đại học, chuyên ngành Trí tuệ nhân tạo, kèm các tổ hợp xét tuyển A00, A01 và D01, cùng các số liệu 91, 60, 17, 72.&lt;SEP&gt;CN12 là mã chuyên ngành, tương ứng với “Trí tuệ nhân tạo”.&lt;SEP&gt;CN12 là mã ngành/chương trình được ghi trong bảng.\nsource_id: chunk-a1f18f5fcf6e63a0cbd7e2aef2e73353&lt;SEP&gt;chunk-560aa8f7145b812a0a3f0961eae4bed8&lt;SEP&gt;chunk-32d59c864a39cf5de0e85540da8166e6&lt;SEP&gt;chunk-876c60e2795f21253f7ddbe18b8619c0\nfile_path: ..\\..\\data\\de_an_2024_chunks.json\ncreated_at: 1775483774", "group": "khái_niệm", "value": 12}, {"id": 6, "label": "Chương trình đào tạo", "title": "entity_id: Chương trình đào tạo\nentity_type: chương_trình_đào_tạo\ndescription: Chương trình đào tạo là đối tượng trong công tác tuyển sinh/đào tạo do đơn vị đào tạo xác định và gắn với kế hoạch tuyển sinh của đơn vị. Chương trình đào tạo bao gồm các yếu tố như tổ hợp xét tuyển và chỉ tiêu tuyển sinh, qua đó phản ánh phạm vi điểm trúng tuyển được xét theo các phương thức tuyển sinh khác nhau. Đây là căn cứ để đơn vị lập kế hoạch xét tuyển, công bố các điều kiện đăng ký, điểm trúng tuyển và danh sách thí sinh trúng tuyển theo quy định của đơn vị đào tạo và ĐHQGHN; đồng thời trong quản lý đăng ký nguyện vọng, thí sinh phải đáp ứng đầy đủ điều kiện của chương trình đào tạo để được đăng ký. Trước thời điểm kết thúc đăng ký dự tuyển ít nhất 10 ngày, đơn vị đào tạo phải xác định và công bố ngưỡng đầu vào của chương trình. Chương trình đào tạo cũng được nêu trong đề án tuyển sinh và được gán mã số quy ước thống nhất trong đơn vị để định danh, quản lý. Về mặt cấu trúc, chương trình đào tạo có thể được thiết kế với chỉ tiêu riêng theo từng phương thức xét tuyển hoặc theo từng tổ hợp xét tuyển đối với một nhóm ngành/ngành; có thể quy định sử dụng đồng thời một số tổ hợp môn, bài thi/môn thi chính nhân hệ số và các điều kiện phụ. Chương trình đào tạo là cơ sở để xác định các chương trình đủ điều kiện trúng tuyển và là đối tượng để thí sinh xác định nguyện vọng ưu tiên; đồng thời liên quan đến việc báo cáo điểm trúng tuyển trước khi công bố kết quả và khi xác định danh sách thí sinh trúng tuyển phải bảo đảm không vượt quá chỉ tiêu được giao. Ngoài ra, chương trình đào tạo có thể được mô tả dưới nhiều hình thức như chuẩn, chất lượng cao và nhiệm vụ chiến lược; có thể xuất hiện ở cấp “chương trình đào tạo tiến sĩ chuyên ngành Hệ thống thông tin” với thông tin về chuyên ngành và mục tiêu đào tạo. Chương trình đào tạo cũng có thể được định hướng theo mô hình bảo đảm chất lượng và chuẩn đầu ra cao hơn CTĐT đại trà, có phối hợp giữa Nhà trường và doanh nghiệp, nhấn mạnh kỹ năng mềm và kỹ năng trong cuộc sống, đồng thời mời chuyên gia công nghệ từ đối tác doanh nghiệp tham gia giảng dạy. Theo một hướng mô tả mục tiêu khác, chương trình đào tạo hướng đến đào tạo các nhà thiết kế, đồ họa và các công trình sư, tổng công trình sư, được chuẩn bị trong khoảng 3 năm. Đồng thời, các mô tả cho thấy chương trình đào tạo có sự gắn kết và đồng hành của doanh nghiệp và viện nghiên cứu trong hoạt động đào tạo. Chương trình đào tạo/giải pháp đào tạo cũng có thể được thể hiện thông qua việc xây dựng giáo trình đào tạo và sử dụng hiệu quả trong công tác đào tạo kỹ sư.\nsource_id: chunk-3f8b3d332cf0c347e8de3d57dc270374&lt;SEP&gt;chunk-ca3d17d3c1f7fff2b4d41619bb94314f&lt;SEP&gt;chunk-a7392502acc92bb128d9d5a2c2c018b8&lt;SEP&gt;chunk-0d6008bd889a0ebc91d42d3a06f83f83&lt;SEP&gt;chunk-ffb1cfd0c23e7fa4206abe42c582cc74&lt;SEP&gt;chunk-bf836ea6db4d8badfb97990a59aa4543&lt;SEP&gt;chunk-cf425f7ca685593f88901f2f6d924893&lt;SEP&gt;chunk-6e093dcd458c3b7ddd3b4b61730ddfcd&lt;SEP&gt;chunk-18679ecca078f74da86923a647f33b04&lt;SEP&gt;chunk-c482f693ef8c5985db5d7021905a1633&lt;SEP&gt;chunk-997ff671382169a218710deb2964b40a&lt;SEP&gt;chunk-34684aec0d79f3237acdda225af3e906&lt;SEP&gt;chunk-5ef7502b5fff13cfaf706ccf8f094af6&lt;SEP&gt;chunk-cd46703dc1b9c9f1429ca6a08b6faddc&lt;SEP&gt;chunk-1827c42b382a75d980b95a9e2a91b882&lt;SEP&gt;chunk-45910d993033c9d7b48633e1fd8dea6e&lt;SEP&gt;chunk-e95474548797126e22f1ff419766e65f&lt;SEP&gt;chunk-4b7fbb9536d4e17a52df1a87aa1e10a9&lt;SEP&gt;chunk-f76ad378d5647d674585cd166cb0bd01&lt;SEP&gt;chunk-efa98f08730928450460d7950d4a8f5b\nfile_path: ..\\..\\data\\quyet_dinh_1328_chunks.json&lt;SEP&gt;..\\..\\data\\data_1000_chunk_512.json\ncreated_at: 1775575963", "group": "chương_trình_đào_tạo", "value": 14}, {"id": 7, "label": "GS.TS Chử Đức Trình", "title": "entity_id: GS.TS Chử Đức Trình\nentity_type: person\ndescription: GS.TS Chử Đức Trình được nêu là Hiệu trưởng Nhà trường, tham dự và phát biểu tại buổi gặp mặt.&lt;SEP&gt;GS.TS Chử Đức Trình là Phó Hiệu trưởng; tham dự Hội thảo và Lễ trao giải.&lt;SEP&gt;Hiệu trưởng nhà trường, trình bày Báo cáo về công tác đào tạo và khoa học công nghệ năm học 2023–2024 tại hội nghị.&lt;SEP&gt;GS.TS Chử Đức Trình là Hiệu trưởng Trường Đại học Công nghệ; được nêu là đại diện phía Trường ĐH Công nghệ tham dự.&lt;SEP&gt;Hiệu trưởng Trường ĐH Công nghệ GS.TS Chử Đức Trình, đánh giá cao hợp tác với ATOLL và bày tỏ mong muốn hai bên sớm ký kết.&lt;SEP&gt;Hiệu trưởng Trường ĐH Công nghệ, tham gia buổi trao đổi và làm việc theo nội dung.&lt;SEP&gt;GS.TS Chử Đức Trình chia sẻ về lợi thế của Việt Nam trong lĩnh vực chip bán dẫn và khẳng định Việt Nam có cơ hội để vươn lên vị trí quốc gia có nền công nghiệp hàng đầu trước khi dân số bước vào giai đoạn dân số già.\nsource_id: chunk-97e68f2fa4575a4b18bae08d56e768e9&lt;SEP&gt;chunk-d95fce5269bba584984947febdcc48f4&lt;SEP&gt;chunk-e54dc90afe47788551038c0c8c5a20b3&lt;SEP&gt;chunk-f0b1eaffa2e2206e0c4c14bd5799a6a5&lt;SEP&gt;chunk-716b876310e7bd2a34de993d66876927&lt;SEP&gt;chunk-63e975c10765e044d994471ee1e0a86f&lt;SEP&gt;chunk-6c479722733a1c425f4db21c07b91c1a\nfile_path: ..\\..\\data\\data_1000_chunk_512.json\ncreated_at: 1775574560", "group": "person", "value": 12}, {"id": 8, "label": "Hệ thống thông tin", "title": "entity_id: Hệ thống thông tin\nentity_type: chuyên_ngành\ndescription: Hệ thống thông tin (tiếng Anh: “Information Systems”) là một chuyên ngành/ngành đào tạo được ghi nhận trong dữ liệu với mã CN14. Dữ liệu mô tả mối liên hệ giữa Hệ thống thông tin với mã CN14, đồng thời nêu các tổ hợp A00, A01 và D01 cùng các thông tin trong bảng liên quan đến quyết định ban hành. Ở bậc cử nhân, Hệ thống thông tin được ghi nhận theo trình độ cử nhân; ở cấp chương trình tiến sĩ, mô tả yêu cầu luận án phải có đóng góp ban đầu đáng kể và thuộc một trong bốn chương trình đào tạo được khảo sát, đánh giá ngoài. Về bối cảnh tốt nghiệp, Hệ thống thông tin thuộc nhóm ngành/chuyên ngành có đối tượng tốt nghiệp trong kỳ tổ chức lễ, bao gồm sinh viên, học viên cao học và/hoặc nghiên cứu sinh tốt nghiệp đợt tháng 6/2017.\n\nTrong tuyển sinh, Hệ thống thông tin thuộc nhóm chuyên ngành của Khoa Công Nghệ Thông Tin (ngành Hệ thống thông tin) và được nhấn mạnh là chuyên ngành quan trọng trong thời đại kỹ thuật số. Dữ liệu cũng cho thấy chuyên ngành tuyển sinh tiến sĩ trong Khoa Công nghệ Thông tin đi kèm chỉ tiêu tuyển sinh, đồng thời chuyên ngành này tham gia tuyển sinh thạc sĩ đợt 1 năm 2020 thuộc Khoa Công nghệ Thông tin. Ngoài ra, một mô tả khác xác định Hệ thống thông tin là một trong bốn chương trình đào tạo trình độ đại học được đánh giá ngoài, thuộc ngành Hệ thống thông tin; và ngành Hệ thống thông tin được gắn với chuyên ngành Hệ thống thông tin trong thông báo.\nsource_id: chunk-d2a8966b15bf3e84b5310855bf8069c4&lt;SEP&gt;chunk-560aa8f7145b812a0a3f0961eae4bed8&lt;SEP&gt;chunk-32d59c864a39cf5de0e85540da8166e6&lt;SEP&gt;chunk-0c454253ecdc153f0a50ba1863e99f6b&lt;SEP&gt;chunk-73f0943bc53f57e4e794f7b328d9c011&lt;SEP&gt;chunk-eea7f3f0a77966b3554bf342903e05eb&lt;SEP&gt;chunk-c3ff6f5c7e622bf3d36c30e095f53d81&lt;SEP&gt;chunk-fb78f49fb6f886705d2c8450a4f83416&lt;SEP&gt;chunk-8244e636527f361eb3d6735f07279e97&lt;SEP&gt;chunk-f541b4deaeb1a76f28afbc3c71d01804&lt;SEP&gt;chunk-4831025db240fc1fe9d61dc85890f851&lt;SEP&gt;chunk-4c58838595d7267790ecbcc9f0400ca9&lt;SEP&gt;chunk-0dc814b89f42b41d76783f0d2bd561d7&lt;SEP&gt;chunk-7f539bc03df19955b7ad996a7db25089&lt;SEP&gt;chunk-69ee4edf3b41e68d2f1e85bfcd58c0d1&lt;SEP&gt;chunk-fb0e2e1566bb3500aaa5b0c065466edf&lt;SEP&gt;chunk-98a84794fc60999a5664ccbed37e4b33&lt;SEP&gt;chunk-02288b9b453d54a3485963566e1eb175&lt;SEP&gt;chunk-df1cd4430a15e0d8c3f8733c251d68ea&lt;SEP&gt;chunk-3b8acff514b226405357f478799dc3c9&lt;SEP&gt;chunk-f1789ff64448f1d8a3b458adc3cf17e5\nfile_path: ..\\..\\data\\de_an_2024_chunks.json&lt;SEP&gt;..\\..\\data\\data_1000_chunk_512.json\ncreated_at: 1775574326", "group": "chuyên_ngành", "value": 13}, {"id": 9, "label": "Hội nghị Trí tuệ nhân tạo AI4LIFE 2018", "title": "entity_id: Hội nghị Trí tuệ nhân tạo AI4LIFE 2018\nentity_type: event\ndescription: Hội nghị Trí tuệ nhân tạo AI4LIFE 2018 được chủ trì tổ chức bởi Trường Đại học Công nghệ (ĐHCN) – Đại học Quốc gia Hà Nội, chính thức khai mạc sáng ngày 10/5/2018.\nsource_id: chunk-0926809b5854b3a58e3db38bdad979c7\nfile_path: ..\\..\\data\\data_1000_chunk_512.json\ncreated_at: 1775533529", "group": "event", "value": 12}, {"id": 10, "label": "Khoa Công nghệ thông tin", "title": "entity_id: Khoa Công nghệ thông tin\nentity_type: đơn_vị_trực_thuộc\ndescription: Khoa Công nghệ thông tin là một đơn vị học thuật/đào tạo thuộc VNU-UET, gắn với Trường Đại học Công nghệ – Đại học Quốc gia Hà Nội (ĐHQGHN); trong một số mô tả, đơn vị này còn được gọi theo cách gắn với “Trường Đại học Công nghệ (ĐHQGHN)”. Khoa xuất hiện trong nhiều ngữ cảnh quản lý và học thuật, đồng thời được liên kết với các cá nhân như PGS.TS Đặng Đức Hạnh, TS. Trần Mai Vũ (thuộc nhóm nghiên cứu được nêu), PGS.TS Hà Quang Thụy (xuất hiện trong phần liên quan đến đơn vị trực thuộc), TS. Đỗ Đức Đông và PGS.TS Phan Xuân Hiếu. Ở khía cạnh quản lý, các mô tả cho biết TS. Võ Đình Hiếu giữ vai trò Phó Chủ nhiệm, cùng các Phó Chủ nhiệm gồm PGS.TS Phạm Bảo Sơn và PGS.TS Phạm Ngọc Hùng.\n\nVề hoạt động chuyên môn và hỗ trợ học tập, Khoa được nhắc trong các nội dung trao/ghi nhận giải thưởng cho nghiên cứu sinh (NCS) của khoa, kèm định hướng về năng lực nghiên cứu theo nhu cầu để xác định trọng tâm thời gian tới; đồng thời Khoa tham gia hội thảo/họp chuyên môn (ví dụ poster của NCS Lê Hoàng Quỳnh). Khoa cũng hỗ trợ sinh viên thông qua hoạt động ôn tập cho nhóm sinh viên giỏi nhằm dự các kỳ thi/cuộc thi, có sự hiện diện của đại diện lãnh đạo. Trong nghiên cứu và sản phẩm, mô tả đề cập nhóm nghiên cứu thực hiện sản phẩm DoIt; đồng thời nhóm BlueSam được nêu là thuộc Khoa Công nghệ thông tin hoặc một đơn vị thuộc Trường Đại học Công nghệ, ĐHQGHN, và một mô tả khác khẳng định BlueSam là nhóm mà các thành viên xuất thân từ Khoa Công nghệ thông tin. Khoa còn được gắn với các sinh viên như Nguyễn Văn Dôn, Kha Văn Thương (thuộc Khoa), Nguyễn Xuân Đức đang theo học tại Khoa (cũng có mô tả liên quan đến Nguyễn Tấn Minh với thông tin “Khoa là đơn vị học tập”).\n\nKhoa Công nghệ thông tin còn xuất hiện trong các thông tin đăng ký/định danh theo khóa học (ví dụ các khóa QH-2022, QH-2023, trong đó Dương Ngân Hà theo học tại Khoa) và trong bối cảnh các ngành trong lịch học của các mô tả liên quan. Về thành tựu và hợp tác, Khoa tham gia tổ chức lễ tổng kết và trao giải thưởng sinh viên nghiên cứu khoa học năm 2023, ghi nhận 28 công trình khoa học được khen thưởng; đồng thời được nêu là đơn vị liên quan trong nhóm thực hiện VNU-SMM: Hệ thống giám sát mạng xã hội. Ngoài ra, có một mô tả bổ sung cho rằng Khoa Công nghệ thông tin thuộc Trường ĐH Công nghệ Sydney, Úc (UTS) và có người đại diện tham gia ký thỏa thuận hợp tác; thông tin này có thể phản ánh quan hệ hợp tác/định danh theo bối cảnh khác, vì đa số mô tả đặt Khoa trong hệ thống VNU-UET/Trường Đại học Công nghệ (ĐHQGHN). Khoa cũng được nhắc trong thông tin về cựu sinh viên K57 Anh Nguyễn Văn Khánh, và được mô tả tham gia các khuyến nghị/cải tiến nhằm nâng cao chất lượng theo định hướng của lãnh đạo nhà trường. Một mô tả khác nêu Khoa Công nghệ thông tin là đơn vị thuộc Trường Đại học Công nghệ, gắn với ngành Khoa học máy tính của Vũ Thành Long.\nsource_id: chunk-47941a0870aa6c0386e9b883e1b2ae2a&lt;SEP&gt;chunk-5b02279de165a97728d81442f368fce3&lt;SEP&gt;chunk-80173c33f3dd2cd4a9f3bbfa74082586&lt;SEP&gt;chunk-86cfcb4ee52da2b2643757368bd183ac&lt;SEP&gt;chunk-6ad550a9eb9cfa0fd796c232cbe06b15&lt;SEP&gt;chunk-a0164f7f660f0511780a1c507673fd81&lt;SEP&gt;chunk-7b81d0c6634bd97499f8cb8631bf5c4f&lt;SEP&gt;chunk-4d615de6e6f01f3af3a25a5b99d35f3b&lt;SEP&gt;chunk-fffc22ca4e4b27a0e13f47d115e19983&lt;SEP&gt;chunk-7ad80a82bd47f062bcd07963ab332bce&lt;SEP&gt;chunk-002414703deab8b54c9cf554471492ce&lt;SEP&gt;chunk-fc73ed1059e312eae72ab783bff01fd4&lt;SEP&gt;chunk-2005eb4c51b813918c965dc8372a1598&lt;SEP&gt;chunk-19ed03951e18fa6848458f2bd015e30d&lt;SEP&gt;chunk-d3da9c89aed63f30db121c599f75518b&lt;SEP&gt;chunk-b9e8ed58af89314115793a4be3ade25d&lt;SEP&gt;chunk-8c3aef2d74a930d688137cedc422a22c&lt;SEP&gt;chunk-08c6fcdb33ecbe14268890478563fc51&lt;SEP&gt;chunk-8b3f7265a717e2c1b642303ee5e681c7&lt;SEP&gt;chunk-9cc599f95d63d272604057fd8aa88455&lt;SEP&gt;chunk-a7dfaea328b5d5c81cbe256e8211ee50&lt;SEP&gt;chunk-62f174882dd84fe498c808dc4a53f916&lt;SEP&gt;chunk-2f6a0ae1ea831f72cdab8b38eb0e808e&lt;SEP&gt;chunk-ad84d61355fc921da9b5fa53489742ad&lt;SEP&gt;chunk-082031e1b79e5138b19557686af1faa5&lt;SEP&gt;chunk-0efac51e7b340f97404e66a3c2471dd2&lt;SEP&gt;chunk-ba89ee29fa4c0d1bafd5c08f394640b4&lt;SEP&gt;chunk-41b19a9281237237779b36fc4659371b&lt;SEP&gt;chunk-1c81102c63409740cad7996319f87efc&lt;SEP&gt;chunk-a0da9b3944720d4db88bd1b2e8e1c49b&lt;SEP&gt;chunk-01468ff331f4ebc74e6ea58c58aba2cf&lt;SEP&gt;chunk-dbc8a4ce9a6e80cd3c325b89dc6fb7a6&lt;SEP&gt;chunk-87e5549e1de1fcbf4b93b0e1735ba280&lt;SEP&gt;chunk-14bb4091aa4c61ca027007392568a24c\nfile_path: ..\\..\\data\\data_1000_chunk_512.json\ncreated_at: 1775576435", "group": "đơn_vị_trực_thuộc", "value": 12}, {"id": 11, "label": "Khoa Cơ học Kỹ thuật và Tự động hóa", "title": "entity_id: Khoa Cơ học Kỹ thuật và Tự động hóa\nentity_type: đơn_vị_trực_thuộc\ndescription: Khoa Cơ học Kỹ thuật và Tự động hóa có các đề tài đạt giải Nhất.&lt;SEP&gt;Khoa Cơ học Kỹ thuật và Tự động hóa là một chương trình được nêu trong văn bản, thuộc nhóm các chương trình cần đánh giá.&lt;SEP&gt;Đơn vị trực thuộc được kỷ niệm 15 năm thành lập; tổ chức gặp mặt các thế hệ cán bộ, giảng viên và báo cáo kết quả trong 15 năm qua.&lt;SEP&gt;Khoa Cơ học Kỹ thuật và Tự động hóa được nêu là một đơn vị đào tạo, thuộc Trường ĐHCN, ĐHQG Hà Nội, xây dựng và hoạt động theo mô hình phối thuộc.\nsource_id: chunk-16082ffa22328598a7603962e06d5759&lt;SEP&gt;chunk-6b59ddfc3d399f3eb888e1aee9ade483&lt;SEP&gt;chunk-bb2e7b04600050c60b4c32e09608c99e&lt;SEP&gt;chunk-b3b9b194ea53d1e6157391c0e749aaee\nfile_path: ..\\..\\data\\data_1000_chunk_512.json\ncreated_at: 1775572097", "group": "đơn_vị_trực_thuộc", "value": 12}, {"id": 12, "label": "Khoa Cơ học kỹ thuật và Tự động hóa", "title": "entity_id: Khoa Cơ học kỹ thuật và Tự động hóa\nentity_type: đơn_vị_trực_thuộc\ndescription: Khoa Cơ học kỹ thuật và Tự động hóa là một khoa thuộc Trường Đại học Công nghệ (Đại học Quốc gia Hà Nội, ĐHQGHN), nơi TS. Trần Thanh Tùng công tác. Khoa có các hoạt động học thuật và hợp tác, trong đó phối hợp tổ chức chương trình trao đổi nghiên cứu quốc tế và tổ chức thi lái xe tự hành với các trường/đơn vị tại Hàn Quốc; đồng thời khoa tham dự và giới thiệu các đội thi của mình. Đối với công tác quản trị học thuật và triển khai chương trình đào tạo, Khoa được Nhà trường đánh giá là có 2 chương trình theo Bộ tiêu chí của ĐHQGHN.\n\nVề hoạt động định hướng cho người học, Khoa tổ chức buổi tìm hiểu, định hướng ngành và giới thiệu các ngành nghề cho tân sinh viên, có sự hỗ trợ của các thầy cô. Khoa cũng có sự tham gia của đại diện lãnh đạo tại các hội thảo. Về cơ cấu tổ chức, thông tin mô tả cho thấy khoa có chức danh chủ nhiệm được nêu trong thông tin đề tài; đồng thời PGS.TS. Phạm Mạnh Thắng giữ chức vụ phó chủ nhiệm thường trực của Khoa.\n\nNgoài ra, Khoa là đơn vị nơi Phòng thí nghiệm Vật liệu và Kết cấu tiên tiến thuộc về, như được nêu trong mô tả chức danh của GS. TSKH Nguyễn Đình Đức.\nsource_id: chunk-5b02279de165a97728d81442f368fce3&lt;SEP&gt;chunk-99b97336c8e19af00c124ea12945c226&lt;SEP&gt;chunk-4d615de6e6f01f3af3a25a5b99d35f3b&lt;SEP&gt;chunk-00013c7d0035e5c15f6307d45bccf8fd&lt;SEP&gt;chunk-2ca8857f44555621498a81cb61b1602d&lt;SEP&gt;chunk-586b6f06d2c379a560c3cc342c4bb78f&lt;SEP&gt;chunk-8233fa2689bbdd699a004ce04abcf40c&lt;SEP&gt;chunk-79f56bb89c14d701a8a574d9804fe8e5\nfile_path: ..\\..\\data\\data_1000_chunk_512.json\ncreated_at: 1775574744", "group": "đơn_vị_trực_thuộc", "value": 12}, {"id": 13, "label": "Nhà trường", "title": "entity_id: Nhà trường\nentity_type: concept\ndescription: Nhà trường là đơn vị giáo dục và đồng thời là chủ thể quản lý ở cấp đơn vị, chịu sự quản lý tương ứng và có tổng chỉ tiêu tuyển sinh; trong các điều chỉnh liên quan, nội dung điều chỉnh được nêu là không làm thay đổi tổng chỉ tiêu tuyển sinh. Trong hoạt động tuyển sinh và xét tuyển, Nhà trường công bố điểm ưu tiên áp dụng theo phương thức xét tuyển dựa trên kết quả tổ hợp môn thi tốt nghiệp THPT năm 2024; việc xem xét để vào học dựa trên kết quả học tập THPT, kết quả kiểm tra kiến thức và năng lực tiếng Việt, đồng thời tuân theo quy định của Nhà trường và ĐHQGHN. Nhà trường tổ chức các chương trình đào tạo toàn diện, bao quát, gắn đào tạo với nghiên cứu khoa học và các hoạt động liên quan; đối với thí sinh trúng tuyển chưa nhập trường trong thời hạn 03 ngày, tổ chức hoạt động gặp mặt/tiếp đón. Nhà trường cũng được mô tả có thẩm quyền đồng ý khi sinh viên đăng ký ít hơn số tối thiểu hoặc nhiều hơn số tối đa.\n\nVề quản lý và nhân sự, Nhà trường có Hiệu trưởng Nguyễn Việt Hà; giảng viên tham gia giảng dạy các buổi tập huấn đội tuyển và trong các văn bản có gắn vai trò Phó Hiệu trưởng. Nhà trường tham gia đánh giá, kiểm định các chương trình đào tạo; triển khai kế hoạch nâng cao năng lực cán bộ, đội ngũ nghiên cứu và chất lượng đào tạo theo định hướng phát triển toàn diện “bứt phá” thông qua cơ chế thu hút và đầu tư. Nhà trường công bố dự kiến định mức học phí, thời gian thu, hình thức và thời hạn nộp học phí cùng các khoản nợ (nếu có), tiếp nhận khuyến nghị/đề xuất sau khảo sát chính thức, và tổ chức hoạt động nhằm nâng cao chất lượng đào tạo và giáo dục; đồng thời ghi nhận mong muốn tiếp tục nhận hỗ trợ từ GS.TS. NGƯT Bạch Gia Dương cho đào tạo và nghiên cứu khoa học. Nhà trường còn được mô tả thực hiện công tác tài chính và đã cơ bản hoàn thành chỉ tiêu, kế hoạch giai đoạn 2016–2018.\n\nTrong phối hợp nâng cao chất lượng, Nhà trường hợp tác với doanh nghiệp, lồng ghép kỹ năng mềm và kỹ năng trong cuộc sống vào các môn học; tổ chức báo cáo tổng kết cùng các hoạt động khoa học công nghệ gắn với đào tạo. Nhà trường tổ chức lễ ra mắt, trưng bày sản phẩm khoa học công nghệ tiêu biểu và ký kết chương trình hợp tác hỗ trợ phát triển Trung tâm, gồm hợp tác với Viện nghiên cứu sáng chế; cam kết tạo điều kiện để cán bộ, nhà khoa học tham gia triển khai các hoạt động hiệu quả. Nhà trường tổ chức tư vấn và cử cán bộ tham gia gian tư vấn trong bối cảnh hợp tác cộng đồng, phối hợp với Trường Đại học Công nghệ và xây dựng cộng đồng cựu sinh viên; đồng thời quan tâm đến đời sống và điều kiện để sinh viên học tập, phát triển. Nhà trường còn được nêu có hợp tác với Samsung, nhận hỗ trợ cho đào tạo và nghiên cứu khoa học, và tổ chức hoạt động tri ân trong cộng đồng cựu sinh viên thông qua tiếp đón, triển khai hợp tác/trưng bày/chương trình.\n\nVề gắn kết với người học và hỗ trợ nghề nghiệp, Nhà trường khảo sát, tìm kiếm và hỗ trợ cơ hội thực tập, việc làm; có đội ngũ cán bộ kỹ thuật viên hướng dẫn thực hành để sinh viên hòa nhập công việc sau tốt nghiệp. Nhà trường hỗ trợ để sinh viên tiếp cận học bổng, tham gia các chương trình đào tạo, và tổ chức hoạt động kết hợp chuyến thăm với Boeing để phỏng vấn sinh viên. Nhà trường được nêu là chủ thể trong kế hoạch đề nghị các Khoa và sinh viên các lớp K61 cùng các khóa cũ đủ điều kiện tốt nghiệp thực hiện các công việc đã nêu và thông báo/đề nghị các Khoa/Viện triển khai sinh hoạt lớp khóa học đầu năm học 2023–2024. Nhà trường xây dựng cơ chế phối hợp giữa các đơn vị để tư vấn, hỗ trợ sinh viên kịp thời, tổ chức các hoạt động đối thoại trực tiếp định kỳ với sinh viên; tổ chức tham quan khu giảng đường và các phòng học thực hành, thực tập cho đoàn học sinh nhằm tạo không gian tham quan, giao lưu và định hướng nghề nghiệp. Nhà trường cũng đề cập định hướng “song hành” và gắn với sự nghiệp “trồng người” thông qua khảo sát theo đợt, tiếp thu khuyến nghị để cải tiến nâng cao chất lượng, đồng thời trong một bối cảnh khác đề nghị tạo điều kiện cho đoàn thu thập thông tin phục vụ đánh giá theo định hướng quan tâm của Hiệu trưởng nhằm đảm bảo chất lượng.\n\nTrong nội dung hợp tác, đối tượng được nhắc đến gồm Trường Đại học Công nghệ (ĐHCN) và ĐHQGHN. Đồng thời, theo mô tả bổ sung, “Nhà trường” được dùng để chỉ Trường Đại học Công nghệ trong thông tin về lễ ký kết thỏa thuận hợp tác.\nsource_id: chunk-c813248f3fd91e9c88ae0b8e03534373&lt;SEP&gt;chunk-566c52cd13c2645f71810bac5ed79b9f&lt;SEP&gt;chunk-6965e521e19b54175b8063b76f581f31&lt;SEP&gt;chunk-5b02279de165a97728d81442f368fce3&lt;SEP&gt;chunk-1cd3785292674e6778a02587a94ca2be&lt;SEP&gt;chunk-26435cc51ec961d4bc384e2e8d9c6f88&lt;SEP&gt;chunk-ec91545ddc9cc68506032e4470a8a9f8&lt;SEP&gt;chunk-a2074c1ce083e1df89b954fe58b0b262&lt;SEP&gt;chunk-fb78f49fb6f886705d2c8450a4f83416&lt;SEP&gt;chunk-a70eebf800e7a62325facb9b2a39e225&lt;SEP&gt;chunk-cbca8a3204d1b4738454c99fcc14fd6c&lt;SEP&gt;chunk-35900977eb9299da11a0394943cf9257&lt;SEP&gt;chunk-f0ed8f16302e4eb641a96c123d7699d4&lt;SEP&gt;chunk-9a33a9a2cfc8a2bc3454dba98ae02d75&lt;SEP&gt;chunk-e95474548797126e22f1ff419766e65f&lt;SEP&gt;chunk-b8ca46505c25cb71f65e8e716fa0cc11&lt;SEP&gt;chunk-cbaad4f5ffa444e3dcb8bd427461a522&lt;SEP&gt;chunk-3cf8f1078cdae17cb169490b06a7d3a2&lt;SEP&gt;chunk-cff3159a90a97f5f8a586b9b02800305&lt;SEP&gt;chunk-da7fa5d862e7e684f2e2138e322bf294&lt;SEP&gt;chunk-ff82987a098b25f804d5fad5776fd19d&lt;SEP&gt;chunk-198ae95ae51a73bdde16bfabc5eeb0b1&lt;SEP&gt;chunk-46a2c80abbf0715cb6590c4e29109c36&lt;SEP&gt;chunk-8b3f7265a717e2c1b642303ee5e681c7&lt;SEP&gt;chunk-c0938a6509e63e88a09d6ba4b56654b1&lt;SEP&gt;chunk-e256f76874c017ad64b8c26abae14a81&lt;SEP&gt;chunk-3ebb2c409088319e502833350531aaa5&lt;SEP&gt;chunk-f0b1eaffa2e2206e0c4c14bd5799a6a5&lt;SEP&gt;chunk-6eea7eddaf35625985f819ad545909ce&lt;SEP&gt;chunk-33a24bfcac3a123fd6825fd7a9c3340b&lt;SEP&gt;chunk-c1a1b0abc28272f46be9093a21f65136&lt;SEP&gt;chunk-3ff911fde8bdcf8bd4624c83415292a5&lt;SEP&gt;chunk-a085aab048cc0c6bf5bf05d56b6745e9&lt;SEP&gt;chunk-5e8de8faf9039ca7b42684ddc53a8ec7&lt;SEP&gt;chunk-4faa9efda80f51cf7e323d1bf593ae3f&lt;SEP&gt;chunk-43df8dc4a15954796f288350d5490c29&lt;SEP&gt;chunk-1bfeef9a58955bf3e2ccd4cc860b3387&lt;SEP&gt;chunk-c8c08836ed219eac2f78784395ca751a&lt;SEP&gt;chunk-1a5695a13e9666f6da88052c24ef18d6&lt;SEP&gt;chunk-3b9b14ee7b72c05cb87811adb1c73b4d&lt;SEP&gt;chunk-2e79134b7e2ef2bed3518516035b2c4f&lt;SEP&gt;chunk-28c13a5c94182964bde50c27ad27ab93&lt;SEP&gt;chunk-3d849f409aa7fd6fa035cdc049cc9c4e&lt;SEP&gt;chunk-4a44d25733d7e250ff903ae46a3de731&lt;SEP&gt;chunk-f8079719074c639fa305906157aade98&lt;SEP&gt;chunk-4efd5ba965a41bf51a4ab842704088d1&lt;SEP&gt;chunk-258efc78e597faee830837bc841994ad&lt;SEP&gt;chunk-0a1062e0c26d240d4b7a1aa919a43b0d&lt;SEP&gt;chunk-dbc8a4ce9a6e80cd3c325b89dc6fb7a6&lt;SEP&gt;chunk-66aedae90503a87bb30259e7b942537c&lt;SEP&gt;chunk-880f3fe6ed4da0d4b6c4587adfeb4ab8&lt;SEP&gt;chunk-4f11779749aed293abcdd91a02dabb0d&lt;SEP&gt;chunk-efa98f08730928450460d7950d4a8f5b\nfile_path: ..\\..\\data\\de_an_2024_chunks.json&lt;SEP&gt;..\\..\\data\\data_1000_chunk_512.json\ncreated_at: 1775575954", "group": "concept", "value": 15}, {"id": 14, "label": "Trường ĐHCN", "title": "entity_id: Trường ĐHCN\nentity_type: đơn_vị_trực_thuộc\ndescription: Trường ĐHCN (Trường Đại học Công nghệ) là một đơn vị thuộc Đại học Quốc gia Hà Nội (ĐHQGHN), được mô tả có vai trò quan trọng trong hệ thống đào tạo và quản trị của ĐHQGHN, định hướng ưu tiên theo chiến lược của ĐHQGHN và được nhấn mạnh là đơn vị tiên phong trong các trường thành viên. Về tổ chức đào tạo, Trường có hai khu học tập chính; việc học của sinh viên được phân bổ theo ngành và theo thời gian học. Công tác quản lý đào tạo và người học được thực hiện thông qua các khoa gắn với cơ cấu giảng viên và cán bộ khoa học (từ trình độ tiến sĩ trở lên), có nhắc đến tỷ lệ GS và PGS. Trường có cơ chế ghi nhận thành tích theo giai đoạn (ví dụ năm 2018 ghi nhận 12 gương mặt trẻ tiêu biểu nhận danh hiệu), cung cấp học bổng cho thủ khoa đầu vào (có mô tả liên quan học bổng ADF), và tổ chức các hoạt động hỗ trợ/ghi nhận sinh viên đạt giải trong kỳ thi học sinh giỏi và Olympic cấp khu vực hoặc quốc tế. Hoạt động nghiên cứu và đào tạo được nêu theo các giai đoạn, có đề cập nhóm sinh viên đạt Giải Nhì “Sinh viên nghiên cứu khoa học” năm 2016 và các giai đoạn 2020–2021. \n\nTrường ĐHCN liên quan đến chương trình đào tạo thứ 05, được đánh giá đạt chuẩn AUN-QA và tham gia định hướng đào tạo; đồng thời Trường ban hành quy định về yêu cầu hồ sơ trong quản lý quy trình, bổ sung quy định chung của ĐHQGHN. Trường tham gia đánh giá cơ sở trong hệ thống ĐHQGHN như một “chương trình đánh giá thứ năm”. Trong tuyển sinh, Trường xây dựng phương án tuyển sinh hằng năm làm căn cứ và ban hành quy định cụ thể về yêu cầu hồ sơ theo từng năm; một số mô tả cũng ghi nhận vai trò hỗ trợ đào tạo ngành Kỹ thuật robot theo phương án tuyển sinh hằng năm. Trường còn tham gia hoạt động sinh viên phục vụ tuyển dụng, bao gồm tập hợp sinh viên, phối hợp hội thảo tuyển dụng, hỗ trợ thực hiện, quản lý sinh viên và điều chỉnh lịch học. Ngoài ra, Trường được nhắc trong bối cảnh là nơi sinh viên đạt các giải nhì cấp ĐHQGHN.\n\nVề hợp tác và hệ sinh thái sáng tạo, Trường tổ chức trao đổi/làm việc và cử cán bộ, sinh viên sang Trường Đại học Công nghệ Chiba; phát triển hợp tác đào tạo gắn với người học và việc làm, tiếp nhận ý kiến để tăng cường năng lực quản trị đại học và đẩy mạnh đào tạo, nghiên cứu tại cơ sở tầng 7 Nhà E3, nơi JTIRC đặt trụ sở. Trường tham gia hệ sinh thái Creative Lab by UP (với đối tác UTS), được mô tả bảo đảm cơ sở vật chất và trang thiết bị nghiên cứu cho sinh viên nước ngoài; đồng thời là đối tác với Viện nghiên cứu sáng chế và khai thác, phối hợp chương trình b by UP để tổ chức hoạt động tạo sân chơi sáng tạo, hỗ trợ hiện thực hóa ý tưởng và tham dự sự kiện/trưng bày, bao gồm Triển lãm quốc tế đầu tiên về đổi mới sáng tạo Việt Nam. Trường tham gia trưng bày sản phẩm khoa học công nghệ và ký kết chương trình hợp tác hỗ trợ phát triển Trung tâm (02 gian hàng, 04 sản phẩm) tại lễ ra mắt Trung tâm Đổi mới Sáng tạo về internet vạn vật; đồng thời tham gia tuyển dụng trong khuôn khổ chương trình khoa học và công nghệ quốc gia liên quan đến trạm thu di động thông tin vệ tinh nhằm nâng cao chất lượng đào tạo và cơ hội việc làm. Về hoạt động xã hội, Trường tổ chức hoạt động “xanh” ở Hòa Lạc và tham gia phong trào thi đua “Giỏi việc trường – Đảm việc nhà” giai đoạn 2016–2020, đồng thời tham gia xây dựng bản đồ số Việt Nam (VNmap) trong đề án Hệ tri thức Việt số hóa.\n\nVề năng lực giảng dạy và nghiên cứu, Trường triển khai các ngành đào tạo qua các khoa chủ chốt, trong đó có Khoa Vật lý kỹ thuật và Công nghệ nano; đồng thời có mô tả liên quan đến Khoa Cơ học kỹ thuật và Tự động hóa, cùng các khoa chủ chốt cho đào tạo và phát triển trong các lĩnh vực điện tử, viễn thông và công nghệ thông tin. Các nhân sự được nêu gồm GS.TS. NGƯT Bạch Gia Dương (liên quan nghiên cứu siêu cao tần), PGS.TS Nguyễn Ngọc Bình (được mô tả là người Việt Nam đầu tiên được một trường đại học của Nhật Bản mời và bổ nhiệm), và Nguyễn Thị Xoan (công tác 22 năm), đồng thời Nguyễn Thị Xoan được nêu là đồng sáng lập InfoRe (được mô tả là cựu sinh viên của Trường). Trường cũng được liên hệ với các nhóm thầy trò/đề tài đạt giải liên quan đến Nguyễn Như Cường và Nguyễn Tiến Duy, có thông tin Trường chủ trì hội nghị về trí tuệ nhân tạo lần đầu tiên, là đích trúng tuyển cho sinh viên khóa QH.2023, tổ chức đào tạo sau đại học và hợp tác với các tập đoàn công nghệ/doanh nghiệp để tạo môi trường thực tập và hỗ trợ định hướng nghề nghiệp. Trường tổ chức gặp mặt các thế hệ cán bộ, giảng viên, trao tặng danh hiệu thi đua, khen thưởng và kỷ niệm chương.\n\nVề lãnh đạo và các sự kiện, Trường ĐHCN được nêu là nơi PGS.TS Nguyễn Việt Hà giữ chức vụ Hiệu trưởng và là đơn vị tổ chức kỳ thi IOI 2020 trực tuyến tại Việt Nam; Trường cũng được ghi nhận là điểm đến đoàn công tác nơi GS. Kazuhiro Takanabe đánh giá hiệu quả cao. Trường có thông tin phỏng vấn TS. Đinh Triều Dương và ghi nhận một số nhân sự/đối tác như Nguyễn Thị Thanh Vân, đồng thời có mô tả bổ sung liên quan đến PGS.TS Lê Anh Cường. Trường hỗ trợ tổ chức các khóa đào tạo công nghệ về lập trình Java, lập trình ứng dụng Android, lập trình ứng dụng mobile và thực hiện các đề tài nghiên cứu phát triển công nghệ; đồng thời một mô tả khác chỉ nêu Trường ĐHCN là đơn vị được đề cập trong nội dung thông báo.\nsource_id: chunk-c324b92b681c17cdf3eba24ba23d8617&lt;SEP&gt;chunk-911dbda4cdcc1d65567a9ed8f9511285&lt;SEP&gt;chunk-dc8ed48bf33f9c590e86423b4cffdf9a&lt;SEP&gt;chunk-3d4aef5003e1aee160cdc619a29f60ef&lt;SEP&gt;chunk-24bf8f10fe4493b04a123772b28798a7&lt;SEP&gt;chunk-d62c693997b57f941e6cbe4a1db996c0&lt;SEP&gt;chunk-80219d099cb9c5476f79d3dd0bcf101f&lt;SEP&gt;chunk-5fcea6c2649ec6a0b76f922f1354847c&lt;SEP&gt;chunk-522a85684dbf6e36456ac34398662fd9&lt;SEP&gt;chunk-4227e1476fedf0e5dbee6bc8e8c0bce2&lt;SEP&gt;chunk-2567bb2d2b66f6693dfdd85b11a0680e&lt;SEP&gt;chunk-c724b61420a1aeaf203aaeeaaf19e3e2&lt;SEP&gt;chunk-a70eebf800e7a62325facb9b2a39e225&lt;SEP&gt;chunk-81f18e91a5029c15ef23ce86e8d2d7cf&lt;SEP&gt;chunk-39689826c7f6456cd1eccb9cdd7f5600&lt;SEP&gt;chunk-d3ab281f1c2c7f3f939a012c7f98602d&lt;SEP&gt;chunk-fc73ed1059e312eae72ab783bff01fd4&lt;SEP&gt;chunk-2fcee1b38d0995af08d41a10cb50b6b6&lt;SEP&gt;chunk-d48248c013722b9717e32f91fae06cf3&lt;SEP&gt;chunk-05609d6fe815d139e4f0c67874ade3ec&lt;SEP&gt;chunk-614c9735abf0d5083487b3e6fb51231a&lt;SEP&gt;chunk-8455c45ea6c7cd65abb7df3df1e9ed4c&lt;SEP&gt;chunk-99719c07ce234086e4535ca5d20b4889&lt;SEP&gt;chunk-84ad73b29c416bf0e1e363ba22fb8361&lt;SEP&gt;chunk-6b59ddfc3d399f3eb888e1aee9ade483&lt;SEP&gt;chunk-dd1026ed848085f290de481ab1d588cf&lt;SEP&gt;chunk-fb7f7b40a50da794b627b640f0913ce8&lt;SEP&gt;chunk-64360a1c12b1ce1666dae520d5548536&lt;SEP&gt;chunk-0d30a969de11751939272d970c41ac81&lt;SEP&gt;chunk-cf0bebf4f1c0d415977d3c6b5d12fef9&lt;SEP&gt;chunk-780f0ad841d3e77cab1a138c4b61178b&lt;SEP&gt;chunk-aa1cb9c40d03597147f7a51e16f9084c&lt;SEP&gt;chunk-6d1a8882f2f906bd16024b8cc49f983f&lt;SEP&gt;chunk-41f7696696ef90ac579a60c8f6744940&lt;SEP&gt;chunk-ff82987a098b25f804d5fad5776fd19d&lt;SEP&gt;chunk-ce5f5ac2d4416907a884352e921bd8e5&lt;SEP&gt;chunk-46a2c80abbf0715cb6590c4e291 57e881aa9a9de0\nfile_path: ..\\..\\data\\de_an_2024_chunks.json&lt;SEP&gt;..\\..\\data\\data_1000_chunk_512.json\ncreated_at: 1775576143", "group": "đơn_vị_trực_thuộc", "value": 17}, {"id": 15, "label": "Trường Đại học Công nghệ (ĐHCN)", "title": "entity_id: Trường Đại học Công nghệ (ĐHCN)\nentity_type: đơn_vị_trực_thuộc\ndescription: Trường Đại học Công nghệ (ĐHCN) là một đơn vị giáo dục thuộc Đại học Quốc gia Hà Nội (ĐHQGHN), sử dụng “ĐHCN”/“Trường Đại học Công nghệ” như cách viết tắt khi đề cập đến đơn vị triển khai chương trình. Trường được ghi nhận tham gia tổ chức các hoạt động liên quan đến xét tuyển giảng viên trình độ Tiến sĩ trong khuôn khổ tuyển dụng viên chức giảng viên năm 2021. Trong các nội dung chuyên môn và nghiên cứu, Trường được gắn với GS.TS.NGƯT Bạch Gia Dương, đồng thời là nơi cán bộ, sinh viên gửi cảm nhận và là địa điểm tổ chức phiên họp lần thứ VIII. Ở các hoạt động định hướng, Trường được nêu là đối tượng được tư vấn và tham gia góp ý cho các chủ trương, nhiệm vụ trọng tâm trong giai đoạn tới.\n\nVề hợp tác, Trường Đại học Công nghệ được mô tả là đơn vị tiếp đón và trao đổi trong buổi làm việc liên quan đến robot, kèm kế hoạch gửi nghiên cứu sinh sang Nhật Bản. Trường có các kết quả nghiên cứu được cấp bằng độc quyền cho các giải pháp hữu ích (được nêu là hai nghiên cứu) và xuất hiện trong bối cảnh tuyển sinh cùng thành tích cá nhân, bao gồm việc Nguyễn Xuân Đức được tuyển thẳng và đạt danh hiệu thủ khoa đầu vào năm học 2013–2014. Trường cũng tổ chức/đồng tổ chức chuỗi chương trình liên quan đến Samsung và tiếp đón đoàn làm việc của Tập đoàn Samsung. Về đào tạo, Trường từng tổ chức Lễ khai giảng năm học 2019–2020 và đang đào tạo các ngành Kỹ thuật robot và Kỹ thuật xây dựng, được nhắc đến với các thành tựu nghiên cứu về robot và từng xuất hiện trong bối cảnh một buổi nói chuyện được tổ chức tại phòng 212-E3. Ngoài ra, Trường được mô tả là đơn vị thuộc hệ thống ĐHQGHN và là nơi thuộc nhóm nghiên cứu thực hiện đề tài. Trường cũng được ghi nhận là nơi ngành Kỹ thuật máy tính bắt đầu tuyển sinh.\nsource_id: chunk-ead4ac48e0b97eb063181288c238ee63&lt;SEP&gt;chunk-ea57c9315676c67210911da548478a31&lt;SEP&gt;chunk-77d7917ef2e7d9cd9a81dd72330ed7f1&lt;SEP&gt;chunk-824a0e8df6eccd832bfb388bf660ec06&lt;SEP&gt;chunk-af41db2bb10375a55725ea3beeec211d&lt;SEP&gt;chunk-793697f37d99480ccf403a1b21f35491&lt;SEP&gt;chunk-9cc599f95d63d272604057fd8aa88455&lt;SEP&gt;chunk-8e79e22b4c737d5026aa4eaa8f8b6d88&lt;SEP&gt;chunk-2f6a0ae1ea831f72cdab8b38eb0e808e&lt;SEP&gt;chunk-33a24bfcac3a123fd6825fd7a9c3340b&lt;SEP&gt;chunk-94f9971d368da1ee816d9fea1b85fdad&lt;SEP&gt;chunk-1c81102c63409740cad7996319f87efc&lt;SEP&gt;chunk-1241a583ad5c28008997a3ede7a15de3&lt;SEP&gt;chunk-077c2eaae12fe57fa3f23857dfb7c451\nfile_path: ..\\..\\data\\data_1000_chunk_512.json\ncreated_at: 1775575297", "group": "đơn_vị_trực_thuộc", "value": 12}, {"id": 16, "label": "Việt Nam", "title": "entity_id: Việt Nam\nentity_type: location\ndescription: Việt Nam là một “quốc gia/bối cảnh” xuất hiện trong nhiều lĩnh vực và chuỗi hoạt động đa dạng. Ở cấp độ công nghệ và cộng đồng, Việt Nam gắn với nhu cầu bảo đảm khả năng tiếp cận công nghệ cho người khiếm thị, đồng thời được liên hệ đến các cộng đồng quan tâm ứng dụng VAV sau khi ứng dụng này có mặt trên Google Play. Trong học thuật, Việt Nam được xem là một trong các quốc gia có đóng góp công trình cho các hội nghị. Ở môi trường tổ chức/doanh nghiệp, Việt Nam được nêu cùng MQ ICT Solutions như một trong bốn công ty thuộc hệ sinh thái, với kỳ vọng phát triển trung tâm đào tạo sinh viên và triển khai hợp tác trao đổi sinh viên với IMEC; đồng thời Việt Nam được đặt trong định hướng hỗ trợ doanh nghiệp vươn lên thành một trong các công ty công nghệ hàng đầu khu vực và tham gia chuỗi cung ứng vi mạch bán dẫn toàn cầu. Việt Nam cũng là bối cảnh cho việc SAE (Viện Công nghệ Hàng không vũ trụ) chính thức ra mắt; trong một mô tả liên quan đến NATV, “Quốc gia” được hiểu theo nghĩa NATV tiên phong tại Việt Nam trong nghiên cứu và thiết kế ô tô thương hiệu NISSAN, kèm lộ trình R&amp;D hướng tới thương mại hóa dựa trên bối cảnh thị trường và nhu cầu sử dụng trong nước. Ngoài ra, Việt Nam được mô tả là nơi LGDVH mở rộng đầu tư, nơi cần làm chủ triển khai hệ thống điện gió tổng thể và các công nghệ liên quan do năng lượng gió tăng mạnh; đồng thời được nhấn mạnh có địa hình đa dạng, khí hậu–thời tiết đặc trưng theo vùng miền và là nơi có hệ thống cung cấp dữ liệu/nguồn ảnh.  \n\nTrong lĩnh vực môi trường và dữ liệu quan trắc, Việt Nam được mô tả có mạng lưới trạm quan trắc còn hạn chế, làm tăng độ bất định ở các khu vực thiếu trạm, với trọng tâm vào chất lượng và ô nhiễm không khí. Việt Nam có bản đồ nồng độ bụi PM2.5 phục vụ quản lý và được đưa vào Báo cáo EPI 2018 cùng các thứ hạng liên quan đến chất lượng không khí và sức khỏe môi trường; Việt Nam cũng xuất hiện trong các nghiên cứu và phương pháp giám sát, quản lý ô nhiễm không khí, củng cố vai trò trong nỗ lực dữ liệu hóa và quản trị chất lượng không khí. Một số mô tả khác nhấn mạnh năng lực nghiên cứu của Việt Nam qua các thành tựu như vắc xin và ghép tạng so với thế giới.  \n\nTrong giáo dục, hợp tác và quốc tế hóa, Việt Nam được mô tả có thứ hạng cao theo tiêu chí Kết quả tuyển dụng, có “vị trí xếp hạng cao nhất ở Việt Nam”, với đội tuyển sinh viên duy trì thành tích. Việt Nam nổi bật trong hợp tác khu vực về khởi nghiệp và đổi mới sáng tạo, gồm hợp tác với Hàn Quốc gắn với chuyến thăm và làm việc của Tổng thống Hàn Quốc tháng 6/2023, giao lưu/hợp tác phần mềm, và hợp tác giáo dục với Cộng hòa Belarus theo thỏa thuận, kèm tổ chức “Ngày hội Giáo dục Belarus” lần đầu và các hoạt động ký kết. Việt Nam cũng được nêu là điểm đến và đối tác trong chương trình Global Wales năm 2023 khi đoàn làm việc của Tập đoàn Samsung đến làm việc; đồng thời được xem là bối cảnh nơi các chuyên gia/nhà nghiên cứu đầu ngành hoạt động và kỳ vọng chương trình đào tạo có yếu tố nước ngoài thu hút người học. Việt Nam xuất hiện trong các bối cảnh triển khai đào tạo có yếu tố nước ngoài; có mô tả về “quốc gia” trong công trình liên quan điều hành chính sách và mô tả quốc gia về số lượng sinh viên tham gia, trải nghiệm môi trường sống tại Nhật, cùng một mô tả thứ hạng trong đó ĐHQGHN đứng vị trí số 1. Trong giáo dục công nghệ máy tính, Việt Nam được mô tả là địa điểm tổ chức kỳ thi IOI 2020 trực tuyến, nơi các thí sinh tham dự IOI 2020 đại diện.  \n\nTrong trí tuệ nhân tạo (AI), Việt Nam được mô tả vừa bắt đầu có quan tâm vừa là quốc gia đang ứng dụng và phát triển AI; xuất hiện trong các xếp hạng công bố về AI trên các tạp chí quốc tế như ISI và Scopus, đồng thời có chỉ số sáng tạo quốc gia và nền tảng công nghiệp AI. Việt Nam cũng được dự báo tiếp tục nhận các chỉ đạo phát triển AI trong tương lai, kèm bài giảng công chúng và khóa huấn luyện nâng cao nhằm lan tỏa tri thức và năng lực thực thi trong các chương trình đào tạo liên quan đến công nghệ và AI; AI đồng thời được nêu như công cụ thúc đẩy phát triển trong nhiều lĩnh vực.  \n\nNgoài ra, Việt Nam được đề cập trong bối cảnh gia nhập WTO với các điều kiện kinh tế–xã hội liên quan và vai trò chủ thể của yêu cầu phát triển kinh tế biển gắn với nguồn năng lượng sóng. Việt Nam còn được bổ sung là quốc gia có “cơ hội thành công cao” trong phát triển ngành bán dẫn nhờ vị trí địa lý thuận lợi và nền chính trị ổn định, đồng thời xuất hiện trong bối cảnh hợp tác lịch sử lâu dài và bền chặt với CHLB Nga. Việt Nam được nêu đã phê duyệt một số giống biến đổi gen và cũng được mô tả trong hợp tác phát triển giữa Việt Nam và Nhật Bản. Về nền kinh tế, Việt Nam được ghi nhận có nông nghiệp giữ vai trò quan trọng, và các định hướng phát triển công nghệ nông nghiệp được gắn với thế mạnh của đất nước. Một mô tả khác nhấn mạnh Việt Nam có nhiều lợi thế trong lĩnh vực chip bán dẫn, gồm vị trí địa lý, nền tảng công nghiệp điện tử, thị trường tốt, nhiều doanh nghiệp đầu tư và nguồn nhân lực trẻ, cùng sự đồng hành của nhiều quốc gia và doanh nghiệp trên thế giới.\nsource_id: chunk-9d11239c7661d6629a95e18ae3d9f8d6&lt;SEP&gt;chunk-c93f312ce61c87b410d91587c89f40b7&lt;SEP&gt;chunk-4166b29d3d9d72c8633be3f6c9252f40&lt;SEP&gt;chunk-30c181f4aa2c849a90de3cd3928e5852&lt;SEP&gt;chunk-6a99e66233571a9dda7e3dfa2ef0ab28&lt;SEP&gt;chunk-bc09250c04495dee022491dc4fe04f47&lt;SEP&gt;chunk-25460f125e4e5767b543cb63b0b83793&lt;SEP&gt;chunk-48f713a499aaafe51c50da28b0a7a6cb&lt;SEP&gt;chunk-522a85684dbf6e36456ac34398662fd9&lt;SEP&gt;chunk-90c2db1b0925e8b40f745afe557228ec&lt;SEP&gt;chunk-9d3f6a1595a8e6f488f82e2fd76f04e8&lt;SEP&gt;chunk-39689826c7f6456cd1eccb9cdd7f5600&lt;SEP&gt;chunk-037b6a7d78980ec7da048e0aa0c84751&lt;SEP&gt;chunk-944ce2255899537f5492dac939115d80&lt;SEP&gt;chunk-3cf90efe033e5ded92b461ad94851b55&lt;SEP&gt;chunk-5b3e3a91f48d636c96d29ec9b0964e8f&lt;SEP&gt;chunk-8613c9cfa2ba254e288947750ebfd235&lt;SEP&gt;chunk-3d5c2d4835da8437b0e5f2d102e63002&lt;SEP&gt;chunk-cdd6349a4c91f2ec1f3ef4223beb840a&lt;SEP&gt;chunk-5a02c8ae1cd60d03d864a5c28e9b7752&lt;SEP&gt;chunk-7fbbc42dcf818c71b6ae768644d0f223&lt;SEP&gt;chunk-67b8a97d87f022b7f21aded50dab9340&lt;SEP&gt;chunk-9c5d7d5f2f8c847971799cd3ffb43cec&lt;SEP&gt;chunk-a327cb862a6fa32c514f2b9ff0bdcc04&lt;SEP&gt;chunk-8ebf34cb943b7ae241ee5638de0cb5df&lt;SEP&gt;chunk-4d9ba6115d871cdeeca6beea5b91a52a&lt;SEP&gt;chunk-c8e5a73225405649ef76b2239319a57c&lt;SEP&gt;chunk-345ba3ea4c0a4f72cc85d813e2af9cd8&lt;SEP&gt;chunk-1bae06f1a4113699c662d137b2664719&lt;SEP&gt;chunk-1010b616485d42c71a131e4ecfc24215&lt;SEP&gt;chunk-acd7e618643d8b8c6089dbd941157aba&lt;SEP&gt;chunk-baeed7d930afb8da1a9ce6b826a4b689&lt;SEP&gt;chunk-33a24bfcac3a123fd6825fd7a9c3340b&lt;SEP&gt;chunk-25db5e0f346b168310a107d0213d5d38&lt;SEP&gt;chunk-a085aab048cc0c6bf5bf05d56b6745e9&lt;SEP&gt;chunk-9bfeeda764cf055fcee4689e3d55d4ed&lt;SEP&gt;chunk-eba4a754296d6bc055fc8b4d4d2a442b&lt;SEP&gt;chunk-2e7ddbf9bb5a9756dfc557c5ec5e3ead&lt;SEP&gt;chunk-e763cce82ab114b641534f127cb534bc&lt;SEP&gt;chunk-9d676323292c7d78dcf48144f276965e&lt;SEP&gt;chunk-f27fb67ac82acaf99dfbc03f3897777d&lt;SEP&gt;chunk-44e0b84fdad88f93dca4b8cf2ea910b7&lt;SEP&gt;chunk-60e355fb94abfa5b47ef91cf38a5c755&lt;SEP&gt;chunk-3d849f409aa7fd6fa035cdc049cc9c4e&lt;SEP&gt;chunk-5d36424d5f8d7390c1ba84b79e167b8a&lt;SEP&gt;chunk-63e975c10765e044d994471ee1e0a86f&lt;SEP&gt;chunk-46f4503c7d611185583d516bbe6ec053&lt;SEP&gt;chunk-c6a31139ccee6473616b53b099c85aa9&lt;SEP&gt;chunk-e0de36577ec23f2c5a1669f781a210e9&lt;SEP&gt;chunk-8a7e7d9c2d81d63e9420d386f1660ef9&lt;SEP&gt;chunk-42e7f6ddb5c8cafedd8c7a0e8e9d1797&lt;SEP&gt;chunk-1241a583ad5c28008997a3ede7a15de3&lt;SEP&gt;chunk-0f9afce8a889fa5ce822ae23fc04b2e3&lt;SEP&gt;chunk-1d787e1c9110800e62fe659a7e6c8b80&lt;SEP&gt;chunk-6c479722733a1c425f4db21c07b91c1a\nfile_path: ..\\..\\data\\data_1000_chunk_512.json\ncreated_at: 1775574567", "group": "location", "value": 13}, {"id": 17, "label": "Vật lý kỹ thuật", "title": "entity_id: Vật lý kỹ thuật\nentity_type: chuyên_ngành\ndescription: Vật lý kỹ thuật là một nhóm ngành/chuyên ngành trong bảng tuyển sinh, được mô tả như một “ngành” thuộc mã CN3 trong dữ liệu tuyển sinh và đồng thời là ngành/chuyên ngành được liệt kê trong bảng tương ứng với mã tuyển sinh CN3. Trong cấu trúc dữ liệu tuyển sinh, Vật lý kỹ thuật còn gắn với các thông tin theo các cột như thời lượng đào tạo, địa điểm học và loại bằng, đi kèm các số liệu tương ứng trong bảng. Về mặt mã số, Vật lý kỹ thuật được xác định là một chuyên ngành kỹ thuật có mã số 7520401 và được đặt trong ngữ cảnh “07 chương trình đào tạo trình độ đại học được đánh giá chất lượng ngoài”. Trong các mô tả liên quan đến “tốt nghiệp”, Vật lý kỹ thuật có đối tượng tốt nghiệp theo kỳ tổ chức lễ; đồng thời cũng được nêu là có sinh viên, học viên cao học và/hoặc nghiên cứu sinh tốt nghiệp đợt tháng 6/2017. Ngành học này gắn với tên ngành Vật lý kỹ thuật trong chương trình đào tạo và được mô tả là một chuyên ngành đóng vai trò nguồn nhân lực, phản ánh việc người học hoàn thành chương trình và tham gia lễ tốt nghiệp theo các đợt được tổ chức.\nsource_id: chunk-cecd038c8741ea822ebb8cf98ca0c7b9&lt;SEP&gt;chunk-303b6a6387641139bc31e379d439a83b&lt;SEP&gt;chunk-0ebbeb1004b0f84158b918799ea6ef56&lt;SEP&gt;chunk-2cc0a8e1e5ce4cf508ab8feae3eb98df&lt;SEP&gt;chunk-1a7858e2173d3a60e2bbb79e15b63ed3&lt;SEP&gt;chunk-790034372189e4984658cf1ff1537314&lt;SEP&gt;chunk-74b8343cdf7a8927f39450d6d7741ff3&lt;SEP&gt;chunk-f541b4deaeb1a76f28afbc3c71d01804&lt;SEP&gt;chunk-4c58838595d7267790ecbcc9f0400ca9&lt;SEP&gt;chunk-154e857b6434dc42f7b9a942f2fd153c&lt;SEP&gt;chunk-0dc814b89f42b41d76783f0d2bd561d7&lt;SEP&gt;chunk-8021ad216c1583516c956d8629bf8729\nfile_path: ..\\..\\data\\de_an_2024_chunks.json&lt;SEP&gt;..\\..\\data\\data_1000_chunk_512.json\ncreated_at: 1775552808", "group": "chuyên_ngành", "value": 12}, {"id": 18, "label": "ĐHQGHN", "title": "entity_id: ĐHQGHN\nentity_type: đơn_vị_trực_thuộc\ndescription: ĐHQGHN (Đại học Quốc gia Hà Nội) là cơ sở giáo dục/đại học quốc gia thuộc hệ thống ĐHQGHN, giữ vai trò điều phối và quản lý các hoạt động trọng tâm trên toàn hệ thống. Trong công tác tuyển sinh, ĐHQGHN tham gia và/hoặc tổ chức cơ chế xét tuyển thẳng đối với học sinh THPT hệ chuyên thuộc ĐHQGHN, tổ chức/điều phối các kỳ thi Olympic và tham gia tổ chức kỳ thi Đánh giá năng lực (ĐGNL; VSTEP/HSA) hoặc tương tự. ĐHQGHN công bố kết quả và dữ liệu phục vụ xét tuyển theo mức điểm ưu tiên, ban hành hoặc tham gia ban hành các văn bản quản lý về thời hạn, quy trình tuyển sinh; cập nhật dữ liệu theo đề án tuyển sinh, xác định mốc các đợt bổ sung và gắn dữ liệu theo từng dòng/chuyên ngành. ĐHQGHN cũng quyết định/chỉ đạo/điều phối quy định xét tuyển đặc thù, công tác đánh giá năng lực, công bố đề án tuyển sinh và tiêu chí/ngưỡng đầu vào cho giai đoạn 2017–2023, vận hành Ban Chỉ đạo tuyển sinh và Cổng thông tin tuyển sinh để thí sinh tra cứu kết quả/ngưỡng, phê duyệt phương thức tuyển sinh và tiếp nhận báo cáo phương án. Các điều chỉnh hằng năm có thể bao gồm mã đăng ký SAT (ví dụ năm 2024), nội dung đề án thu hút học sinh Nam Trung Bộ và Nam Bộ, hướng dẫn cập nhật danh sách trúng tuyển, xử lý gian lận và triển khai cơ chế đặc thù như chứng chỉ ngoại ngữ thi online.\n\nTrong tuyển sinh liên ngành và sau đại học từ 2017, ĐHQGHN được mô tả cung cấp phần mềm tuyển sinh sau đại học để thí sinh khai báo dự tuyển, ban hành hằng năm hướng dẫn điều kiện, hồ sơ và quy định tuyển sinh sau đại học; đồng thời nhấn mạnh yêu cầu công khai tình hình khảo sát việc làm và áp dụng quy định xét tuyển đối với công dân nước ngoài. ĐHQGHN cũng áp dụng các văn bản/công văn hướng dẫn công tác sinh viên giai đoạn 2021–2022, đặc biệt về ngưỡng đảm bảo chất lượng đầu vào. Về quản trị đào tạo, ĐHQGHN ban hành Quy chế đào tạo đại học và quy định liên quan đến đăng ký, bao gồm xử lý trường hợp số lượng đăng ký không đạt hoặc vượt ngưỡng tối thiểu/tối đa (trong phạm vi nhà trường đồng ý) và quy định đăng ký số tín chỉ; đồng thời quản lý đào tạo thông qua đặt chỉ tiêu, kế hoạch và nhiệm vụ đào tạo cho UET trong các năm học 2017–2018, có tham chiếu các khung/quy định về năng lực giảng dạy của giảng viên (nhắc Quyết định số 2401/QĐ-ĐHQGHN) và tham gia hoạt động kiểm định với các đơn vị/cá nhân trực thuộc.\n\nTrong quan hệ ĐHQGHN – Trường Đại học Công nghệ (UET/ĐHCN), các mô tả cho thấy sự gắn kết nhiều chiều: ĐHQGHN được nêu là tổ chức chủ quản của UET/ĐHCN, gắn với hoạt động nghiên cứu đề tài cùng UET; đồng thời có mô tả về việc UET từng được xem như đối tượng/ưu tiên trong chiến lược phát triển hoặc có vai trò quản lý/thuộc UET trong khuôn khổ hợp tác (được nhắc theo cấu trúc VNU–UET). ĐHQGHN cũng được mô tả là đơn vị đại học gắn với Trường Đại học Công nghệ nơi nhóm BlueSam đến từ, phản ánh sự liên kết giữa hệ thống ĐHQGHN và các hoạt động/nhóm nghiên cứu tại UET.\n\nĐHQGHN thúc đẩy hợp tác quốc tế và nghiên cứu thông qua các thỏa thuận với nhiều đối tác; các đơn vị thuộc ĐHQGHN (kể cả UET–VNU) ký thỏa thuận với MAI, Trường ĐH Công nghệ ký với các đại học quốc gia Belarus; ĐHQGHN hợp tác với Đại học Clermont Auvergne và có đề cập liên quan đến Đại học Công nghệ Chiba. ĐHQGHN liên hệ với “đơn vị phát triển VAV” (VAV) và Viện Đảm bảo chất lượng giáo dục ĐHQGHN, đồng thời được đưa vào nhóm các trường đại học hàng đầu theo QS WUR 2025. ĐHQGHN triển khai chính sách thu hút nghiên cứu sinh và tiến sĩ, tham dự các hội thảo về đào tạo nhân tài và phát triển nguồn nhân lực chất lượng cao, thảo luận phát triển nhóm nghiên cứu mạnh; phối hợp trao học bổng với POSCO TJ Park (2021–2022), nhận học bổng ADF và phối hợp ADF trao học bổng cho thủ khoa đầu vào của Trường ĐH Công nghệ, cùng chương trình học bổng Toshiba cho học viên và nghiên cứu sinh. ĐHQGHN nhấn mạnh chỉ số đánh giá sản phẩm khoa học công nghệ (có nhắc công trình UFBoot2 với số trích dẫn cao) và tổ chức nghiệm thu đề tài khoa học công nghệ cấp ĐHQGHN tại Trường ĐH Công nghệ.\n\nVề đối ngoại, học thuật và hình ảnh, ĐHQGHN được mô tả có phương án tái đầu tư nguồn thu học phí và có vai trò của Giám đốc; tham gia nhiều hoạt động như tặng Bằng khen cho sinh viên tại lễ tổng kết khóa học K58, tiếp đón đoàn làm việc của Samsung, phối hợp/trao đổi với LGDVH để thu hút nhân tài và phát triển hạ tầng đào tạo thông qua UET–VNU, tổ chức lễ tổng kết và trao thưởng công trình sinh viên nghiên cứu khoa học cấp ĐHQGHN năm 2017, trồng cây và tạo không gian học tập/sinh hoạt xanh tại Hòa Lạc, và tham gia hợp tác 3 bên với FPT. ĐHQGHN được mô tả có biến động thứ hạng Webometrics theo thời gian, từng dẫn đầu Việt Nam ở một số mốc (nhắc tháng 1/2020) và chiếm hạng nhất trong bảng xếp hạng Webometrics 2007. ĐHQGHN định hướng phát triển theo nghiên cứu và đại học số thông qua số hóa tài liệu, tham gia phát triển hệ thống BLife, được ghi nhận là tiên phong thành lập Khoa Công nghệ Nông nghiệp, có tham gia tiếp đoàn CIAT; đồng thời tham gia/đăng cai hội thảo quốc tế về tích hợp hệ thống cùng Trường ĐH Công nghệ và xuất hiện trong “Sáng tạo khởi nghiệp ĐHQGHN 2017”. Ngoài ra, ĐHQGHN còn được nêu trong vai trò công nhận phòng thí nghiệm trọng điểm và nhóm nghiên cứu mạnh cấp ĐHQGHN gắn với Trường ĐH Công nghệ, và được mô tả là đơn vị đưa kết quả nghiên cứu ra thị trường để kết nối nhà khoa học với doanh nghiệp và nhà đầu tư. Một mô tả ngắn cũng cho thấy ĐHQGHN có liên quan đến Trường ĐHCN trong hồ sơ, phản ánh sự gắn kết thông tin giữa các thực thể trong dữ liệu được đề cập.\nsource_id: chunk-a1f18f5fcf6e63a0cbd7e2aef2e73353&lt;SEP&gt;chunk-b411571421fd1e71727ad110e22d48fe&lt;SEP&gt;chunk-0639db15ed0575cdeb829d8a203a46c4&lt;SEP&gt;chunk-28f547b58c21b631b4398f5666bdc538&lt;SEP&gt;chunk-af9a015f54d835324a9340cecb98c2dd&lt;SEP&gt;chunk-aa1cba655a0cdd24eb42bb9fa5ed653a&lt;SEP&gt;chunk-f8020318aa29fb36ec7c9ef65f0237a6&lt;SEP&gt;chunk-566c52cd13c2645f71810bac5ed79b9f&lt;SEP&gt;chunk-e4c9484d2c42749a4f2545c34a9eb157&lt;SEP&gt;chunk-18601e96a6da0041c763bbf0764817e4&lt;SEP&gt;chunk-9a006ae3c6a47d88c88c15417c0e81d2&lt;SEP&gt;chunk-51728c249edbe2ffa611d004c2c204a2&lt;SEP&gt;chunk-0c454253ecdc153f0a50ba1863e99f6b&lt;SEP&gt;chunk-a84e71dd8daad2198c69b1cc677aaf37&lt;SEP&gt;chunk-9ab2ef792aae97cabbe765a0b8f13dec&lt;SEP&gt;chunk-fb27102441a5e0d4ba41b9cafbeaa433&lt;SEP&gt;chunk-e1bb6d226b8dd94ec65393a9e387ac99&lt;SEP&gt;chunk-1deaf3341433e5fa2ee300c53b6045ba&lt;SEP&gt;chunk-a9650fb1673ca3caba1c69a1523baa2a&lt;SEP&gt;chunk-dccd9d905892f60251e114b78ae49b4c&lt;SEP&gt;chunk-ddace097418fed36cbe37da8f4249576&lt;SEP&gt;chunk-3f8b3d332cf0c347e8de3d57dc270374&lt;SEP&gt;chunk-a7392502acc92bb128d9d5a2c2c018b8&lt;SEP&gt;chunk-42c0bd7eac70305a81f43b3e9300d670&lt;SEP&gt;chunk-ffb1cfd0c23e7fa4206abe42c582cc74&lt;SEP&gt;chunk-73e274f4a5ed1f38ed08014e717a6f92&lt;SEP&gt;chunk-d830f682b07ebeb668d54551a6209b96&lt;SEP&gt;chunk-038bfce812c2a7c7b1d93d0bc6564602&lt;SEP&gt;chunk-e2e77743fb90d76576cdd797d7c3d1da&lt;SEP&gt;chunk-43c856f4bdfe687ea4c848b9c52f8f5c&lt;SEP&gt;chunk-170b153fd5ea4a9ddacf6c3b10783810&lt;SEP&gt;chunk-6e093dcd458c3b7ddd3b4b61730ddfcd&lt;SEP&gt;chunk-0abf0789ba93e1147b98fac10073dd1f&lt;SEP&gt;chunk-c482f693ef8c5985db5d7021905a1633&lt;SEP&gt;chunk-c92925a533e68756425abf9fbc22af83&lt;SEP&gt;chunk-416f1069b7af a8a574d9804fe8e5&lt;SEP&gt;chunk-4f11779749aed293abcdd91a02dabb0d&lt;SEP&gt;chunk-15d83f371295989f8f770315270eb9e7&lt;SEP&gt;chunk-f6daf1b52f11576e1e64a117ac87c73a&lt;SEP&gt;chunk-819eb3316de253e4a6dc60214a8803dd&lt;SEP&gt;chunk-c997ac125f0050062b709404aca9a79b&lt;SEP&gt;chunk-abbcd84010b1b921e0082f05625d13b6&lt;SEP&gt;chunk-aa3e8ae62b2af0da1857e881aa9a9de0&lt;SEP&gt;chunk-c401f3557f59df12ef5b95fcefe119e7&lt;SEP&gt;chunk-14bb4091aa4c61ca027007392568a24c\nfile_path: ..\\..\\data\\de_an_2024_chunks.json&lt;SEP&gt;..\\..\\data\\quyet_dinh_1328_chunks.json&lt;SEP&gt;..\\..\\data\\data_1000_chunk_512.json\ncreated_at: 1775576440", "group": "đơn_vị_trực_thuộc", "value": 17}, {"id": 19, "label": "Đại học Quốc gia Hà Nội", "title": "entity_id: Đại học Quốc gia Hà Nội\nentity_type: đơn_vị_trực_thuộc\ndescription: Đại học Quốc gia Hà Nội (ĐHQGHN, VNU) được mô tả là một đơn vị cấp cao trong hệ thống cơ sở đại học trực thuộc, đồng thời còn được gọi là “đơn vị đại học quản lý” và “đơn vị tuyển sinh”. Với vai trò chi phối và bảo đảm việc áp dụng quy định về tuyển sinh và đào tạo, ĐHQGHN tổ chức/định hướng công tác tuyển sinh đại học chính quy, bao gồm tổ chức tuyển sinh năm 2017 theo hệ thống chỉ tiêu (7.345 chỉ tiêu, 99 ngành/chương trình đào tạo bậc đại học) với sự phối hợp của các đơn vị thành viên. Trong quản lý đào tạo, ĐHQGHN ban hành quy chế và văn bản quản lý đào tạo đại học, thể hiện qua Quyết định số 3626/QĐ-ĐHQGHN về quy chế đào tạo đại học, và có thẩm quyền hoặc tham gia các hoạt động liên quan đến công nhận nghiên cứu sinh (ví dụ Quyết định số 3205/QĐ-SĐH). ĐHQGHN cũng phát hành công văn/thông tin chỉ đạo về công tác sinh viên, như công văn số 768/ĐHQGHN-CT&amp;CTHSSV về đề cử sinh viên tham gia chương trình trao đổi TF–NUS LEaRN, và xuất hiện trong các thông báo tuyển dụng với vai trò đơn vị chủ quản/đại học cấp trên; một số mô tả khác còn đề cập ĐHQGHN như “đơn vị đại học nơi có viên/học viên tham gia” theo các điều kiện nêu trong văn bản.\n\nVề tổ chức và hợp tác, ĐHQGHN được xác định là đầu mối/đối tác quản lý trực tiếp gắn với Trường Đại học Công nghệ (FIMO). ĐHQGHN tiếp nhận chứng chỉ chất lượng AUN-QA cho các chương trình đào tạo của FIMO, phối hợp tổ chức hoạt động học thuật và tổng kết đào tạo theo hệ thống tín chỉ (kế hoạch tổng kết năm học 2019–2020). ĐHQGHN cũng được nhắc đến trong các bối cảnh liên quan thứ hạng QS WUR by Subject 2023 và đồng hành cùng FIMO trong các sự kiện học thuật và quốc tế, gồm đồng chủ trì Hội nghị Trí tuệ nhân tạo AI4LIFE 2018, tham gia các buổi làm việc của FIMO (có làm việc với Boeing), cùng bối cảnh “Trường Đại học Công nghệ – ĐHQGHN” (VNU-UET) có sự tham gia/phát biểu của Phó Giám đốc Nguyễn Hoàng Hải. Ngoài ra, ĐHQGHN triển khai và đồng hành các hoạt động hỗ trợ sinh viên, khởi nghiệp và học bổng: tổ chức/đồng hành cuộc thi “Sáng tạo khởi nghiệp Đại học Quốc gia Hà Nội”, triển khai Dự án hỗ trợ khởi nghiệp và thực hiện các đề án thuộc Nhiệm vụ chiến lược; tham gia/triển khai học bổng Nguyễn Trường Tộ và hỗ trợ sinh viên nghèo vượt khó, đồng thời ban hành công văn thông báo các chương trình học bổng Shinnyo (2022–2023) và Shinnyo-en (2023–2024). Theo thỏa thuận hợp tác, sinh viên FIMO–ĐHQGHN được thuộc diện nhận học bổng thạc sĩ, với lễ trao học bổng diễn ra tại Trường Đại học Công nghệ. Các mô tả cũng ghi nhận hoạt động quyên góp/ủng hộ có sự tham dự của Công đoàn ĐHQGHN, đề án mở chương trình đào tạo ngành Kỹ thuật Robot (18/02/2018), và công văn về “Trao đổi học kỳ mùa Thu tại Đại học Kyushu, Nhật Bản” năm 2024; thêm vào đó, ĐHQGHN xuất hiện trong bối cảnh liên quan đến nghiên cứu được cấp bằng độc quyền sáng chế với tư cách là đơn vị liên quan.\n\nTổng thể, ĐHQGHN được mô tả là một trong những cơ sở đại học hàng đầu Việt Nam, tiên phong tham gia AUN, có chủ trương hướng tới tự chủ đại học (bao gồm kế hoạch di chuyển về Hòa Lạc và định hướng công tác tự chủ, quản trị đại học). Đồng thời, các mô tả nhấn mạnh vai trò Công đoàn ĐHQGHN trong việc tham dự/tổ chức hội nghị công đoàn cho đại biểu được bầu và liên quan đến Nhiệm vụ chiến lược nhằm xây dựng, phát triển các ngành/chuyên ngành tại ĐHQGHN. Một số mô tả bổ sung còn coi ĐHQGHN là “lò đào tạo” cho các nhà sáng lập startup, trong đó có đề cập 06 nhà sáng lập startup, và ĐHQGHN còn xuất hiện trong bối cảnh lễ ký kết với cách diễn đạt “– Đại học Quốc gia Hà Nội”.\nsource_id: chunk-457ee99614d1d4684d2dd863a6932c1d&lt;SEP&gt;chunk-f8020318aa29fb36ec7c9ef65f0237a6&lt;SEP&gt;chunk-7616737e824d72530897f1de64d028aa&lt;SEP&gt;chunk-78d8e093eda2ea379a1198d804f80ae9&lt;SEP&gt;chunk-d154adbc9cebe63edec7b57cc0fb6a31&lt;SEP&gt;chunk-47941a0870aa6c0386e9b883e1b2ae2a&lt;SEP&gt;chunk-e08a5096c6786563c55bce3fdb6e565a&lt;SEP&gt;chunk-2bf09b0414a94411876841812c14f029&lt;SEP&gt;chunk-85e7f3a95c0661c7f3255a19f288db2e&lt;SEP&gt;chunk-99b97336c8e19af00c124ea12945c226&lt;SEP&gt;chunk-3c8df3ff7c17323598715fdec1e52e0e&lt;SEP&gt;chunk-c7900e55a1878456792f2893a2b9a649&lt;SEP&gt;chunk-bc09250c04495dee022491dc4fe04f47&lt;SEP&gt;chunk-988f93799b4d14547a0b5dfa81023762&lt;SEP&gt;chunk-42efc428f31a0463f0af26150cefad7c&lt;SEP&gt;chunk-286b577c73681bccb19daefed6cccaa1&lt;SEP&gt;chunk-68ff5a83b0af56203acad8be9bb71769&lt;SEP&gt;chunk-80ead412aa64994bda37959a8a64529e&lt;SEP&gt;chunk-d1be213626c937aa11e6d8ba73186f71&lt;SEP&gt;chunk-77d7917ef2e7d9cd9a81dd72330ed7f1&lt;SEP&gt;chunk-0f2ee7d35b2b916bdbfeef909cf8a2df&lt;SEP&gt;chunk-a31efb191e1d55b62d4574be319e6949&lt;SEP&gt;chunk-94a7a176284b917cf1c262cc485c80ec&lt;SEP&gt;chunk-753157c0d9fa8c15829a438582a79cd9&lt;SEP&gt;chunk-75953e090f489e714f8f24eb0bf5b4e3&lt;SEP&gt;chunk-662197e00be46e2e8d749cdd970a9093&lt;SEP&gt;chunk-824a0e8df6eccd832bfb388bf660ec06&lt;SEP&gt;chunk-af41db2bb10375a55725ea3beeec211d&lt;SEP&gt;chunk-e6fa4beaa9deb44835ebb9159bd04ee9&lt;SEP&gt;chunk-1e2b409df351e00ba9252521675a6320&lt;SEP&gt;chunk-0d30a969de11751939272d970c41ac81&lt;SEP&gt;chunk-0926809b5854b3a58e3db38bdad979c7&lt;SEP&gt;chunk-dc4b395641f240e29e5c57b2ac3da353&lt;SEP&gt;chunk-9d0302b0d28ec502bb1eea46ac7c2
