# Defaults live in config/*.yaml.
# .env is reserved for secrets, endpoints, and deployment/runtime overrides.
# Do not hard-code model names, rate limits, or async concurrency in source.

provider: openai_compatible

generation:
  model: gpt-5.4-nano-2026-03-17

embedding:
  model: text-embedding-3-small
  dimension: 1536
  token_limit: 8192

request:
  timeout_seconds: 120
  max_retries: 3
  backoff_seconds: 2

rate_limit:
  calls_per_minute_per_worker: 50
  async_concurrency: 10
