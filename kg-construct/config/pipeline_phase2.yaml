# Defaults live in config/*.yaml.
# .env is reserved for secrets, endpoints, and deployment/runtime overrides.
# Do not hard-code worker_count, sample size, model names, rate limits, or async concurrency in source.

phase:
  name: phase2_distributed_graph_construction
  version: v1

runtime:
  default_lang: vi
  file_format: parquet
  run_id_strategy: env_or_timestamp
  start_step: 01_ingest_documents
  end_step: 14_compute_embeddings
  schema_version: v1
  prompt_version: v2
  context_version: v1
  demo_raw_web_pages: 100

cleaning:
  allowed_languages:
    - vi
    - vi-vn
    - vi_vn
  min_text_length: 50
  remove_nul: true
  replace_html_entities: true
  remove_html_tags: true
  replace_broken_unicode: true
  collapse_whitespace: true

chunking:
  chunk_size: 3000
  chunk_overlap: 200
  min_chunk_length: 50
  max_chunk_per_doc: 50
  split_on_word_boundary: true
  word_boundary: whitespace

node_context:
  context_top_k: 3
  max_neighbors_each_side: 3
  context_sampling_strategy: deterministic_hash
  context_random_seed: 20260427
  prefer_relation_diversity: true
  max_context_chars: 1200

embedding:
  default_limit: 1000
  node_text_template: "Node: {node_name}\nNode type: {node_type}\nContext: {context_text}"
  edge_text_template: "Edge: {src} --{relation}--> {dst}"
  text_node_max_chars: 8000
  node_context_max_chars: 1200
  edge_text_max_chars: 2000

orchestration:
  default_ingest_limit: 10
  default_extraction_limit: 100
  default_concept_limit: 100
  default_embedding_limit: 100
  default_start_step: ingest_documents
  default_end_step: compute_embeddings
  run_export_graph: false
  max_active_runs: 1
  retry_count: 0
  timeout_seconds_per_step: 7200

jobs:
  enabled_steps:
    - 01_ingest_documents
    - 02_clean_documents
    - 03_chunk_documents
    - 04_build_extraction_requests
    - 05_run_extraction
    - 06_validate_extraction
    - 07_build_graph_base
    - 08_build_node_context
    - 09_build_concept_requests
    - 10_run_concept_generation
    - 11_validate_concepts
    - 12_merge_concepts
    - 13_export_graph
    - 14_compute_embeddings
