version: 1
disable_existing_loggers: false

formatters:
  standard:
    format: "%(asctime)s | %(levelname)s | %(name)s | %(message)s"

handlers:
  console:
    class: logging.StreamHandler
    level: INFO
    formatter: standard
    stream: ext://sys.stdout
  ingestion_file:
    class: logging.FileHandler
    level: INFO
    formatter: standard
    filename: "${PROJECT_ROOT}/logs/ingestion/bootstrap.log"
    encoding: utf-8

loggers:
  data_ingestion:
    level: INFO
    handlers:
      - console
      - ingestion_file
    propagate: false

root:
  level: WARNING
  handlers:
    - console
